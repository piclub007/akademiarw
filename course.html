<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Interactive Learning Platform</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --secondary: #06B6D4; --accent: #8B5CF6;
            --success: #04AA6D; --success-dark: #038857; --success-bg: rgba(4,170,109,0.07);
            --warning: #F59E0B; --warning-bg: #FFFBEB;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --purple: #7C3AED; --purple-bg: #F5F3FF;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --code-bg: #1e1e2e;
            --radius-sm: 6px; --radius: 8px; --radius-lg: 12px; --radius-xl: 16px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.1);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif; background: var(--gray-50);
            color: var(--gray-800); line-height: 1.6;
            -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .splash-screen.hide { opacity: 0; visibility: hidden; }
        .splash-content { text-align: center; color: white; animation: pulse 1.5s ease infinite; }
        .splash-content i { font-size: 4rem; margin-bottom: 1rem; display: block; }
        .splash-content h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .splash-content p { opacity: 0.8; font-size: 0.875rem; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--gray-100); }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        .topbar { background: var(--gray-900); color: white; padding: 0.5rem 0; font-size: 0.813rem; z-index: 1001; }
        .topbar-inner { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
        .topbar-links { display: flex; gap: 1.5rem; }
        .topbar-links a { color: #9ca3af; text-decoration: none; display: flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; }
        .topbar-links a:hover { color: white; }

        .navbar { background: var(--white); border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .nav-logo img { height: 32px; width: auto; }
        .nav-logo span { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 700; color: var(--gray-900); }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; }
        .nav-links a { padding: 0.5rem 0.875rem; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 500; color: var(--gray-700); text-decoration: none; transition: all var(--transition); }
        .nav-links a:hover, .nav-links a.active { background: var(--primary-bg); color: var(--primary); }
        .nav-right { display: flex; align-items: center; gap: 0.75rem; }

        .btn { font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1.125rem; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; transition: all var(--transition); cursor: pointer; border: none; text-decoration: none; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; } 
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; } 
        .btn-success:hover { background: var(--success-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); } 
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #d97706; }

        .profile-dropdown { position: relative; }
        .profile-trigger { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--gray-200); background: white; }
        .profile-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.813rem; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 0.813rem; font-weight: 600; color: var(--gray-900); max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
        .profile-dropdown-menu { position: absolute; top: calc(100% + 4px); right: 0; background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border: 1px solid var(--gray-200); min-width: 220px; padding: 0.5rem; opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all var(--transition); z-index: 100; }
        .profile-dropdown:hover .profile-dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .profile-dropdown-menu a { display: flex; align-items: center; gap: 0.625rem; padding: 0.625rem 0.875rem; border-radius: var(--radius-sm); font-size: 0.813rem; color: var(--gray-700); text-decoration: none; }
        .profile-dropdown-menu a:hover { background: var(--primary-bg); color: var(--primary); }
        .profile-dropdown-menu .divider { height: 1px; background: var(--gray-200); margin: 0.375rem 0; }
        .profile-dropdown-menu .logout-btn { color: var(--danger); cursor: pointer; }

        .breadcrumb-bar { background: var(--gray-50); border-bottom: 1px solid var(--gray-200); padding: 0.625rem 0; font-size: 0.813rem; }
        .breadcrumb-inner { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; gap: 0.375rem; color: var(--gray-500); flex-wrap: wrap; }

        .main-layout { display: flex; gap: 0; max-width: 1280px; margin: 0 auto; flex: 1; }
        .sidebar { width: 280px; flex-shrink: 0; background: white; border-right: 1px solid var(--gray-200); padding: 1.25rem 0; position: sticky; top: 60px; max-height: calc(100vh - 60px); overflow-y: auto; }
        .sidebar-title { font-size: 0.875rem; font-weight: 700; padding: 0 1.25rem; margin-bottom: 0.75rem; color: var(--gray-900); display: flex; justify-content: space-between; }
        
        .tree-explorer { padding: 0 0.5rem; }
        .tree-folder { cursor: pointer; margin-bottom: 0.125rem; }
        .tree-folder-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.813rem; font-weight: 500; color: var(--gray-700); }
        .tree-folder-header:hover { background: var(--gray-100); }
        .tree-folder-header i.chevron { font-size: 0.75rem; transition: transform var(--transition); width: 16px; }
        .tree-folder.open > .tree-folder-header i.chevron { transform: rotate(90deg); }
        .tree-children { display: none; padding-left: 1.5rem; }
        .tree-folder.open > .tree-children { display: block; }
        .tree-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--gray-600); text-decoration: none; cursor: pointer; }
        .tree-item:hover { background: var(--primary-bg); color: var(--primary); }
        .tree-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 500; }
        .tree-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gray-300); }
        .tree-item.completed .dot { background: var(--success); }
        .tree-item.locked { opacity: 0.5; cursor: not-allowed; }

        .content-area { flex: 1; padding: 1.5rem 2rem; min-width: 0; }
        .course-header { margin-bottom: 2rem; }
        .course-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .course-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.813rem; color: var(--gray-500); margin: 0.5rem 0; }
        .progress-bar-wrap { margin-top: 1rem; background: var(--gray-200); border-radius: 9999px; height: 6px; overflow: hidden; max-width: 400px; }
        .progress-bar-fill { height: 100%; background: var(--success); border-radius: 9999px; }

        .checkpoint-block { background: #f0fdf4; border-left: 4px solid var(--success); border-radius: var(--radius); padding: 1.25rem; margin: 1.5rem 0; }
        .checkpoint-title { font-weight: 700; font-size: 0.875rem; color: var(--success-dark); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .checkpoint-option { display: block; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); margin-bottom: 0.375rem; cursor: pointer; background: white; }
        .checkpoint-option:hover { background: var(--gray-50); border-color: var(--success); }
        .checkpoint-option.selected { background: var(--success-bg); border-color: var(--success); }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: var(--gray-900); border-radius: var(--radius-lg); overflow: hidden; margin: 1rem 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .code-block-wrapper { position: relative; margin: 1rem 0; }
        .code-block-wrapper pre { background: var(--code-bg); color: #cdd6f4; padding: 1.25rem; border-radius: var(--radius); font-family: 'Source Code Pro', monospace; font-size: 0.813rem; overflow-x: auto; padding-right: 3rem; }
        .code-actions { position: absolute; top: 0.5rem; right: 0.5rem; display: flex; gap: 0.25rem; }
        .code-btn { background: rgba(255,255,255,0.1); border: none; color: #cdd6f4; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.625rem; cursor: pointer; }
        .try-btn { background: var(--primary); color: white; }

        .remember-block { background: var(--warning-bg); border-left: 3px solid var(--warning); border-radius: 8px; padding: 0.75rem 1rem; margin: 0.75rem 0; }
        .remember-block.hidden { display: none; }
        .got-it-btn { background: var(--warning); color: white; border: none; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.688rem; cursor: pointer; }

        .question-box { background: var(--purple-bg); border-left: 4px solid var(--purple); border-radius: var(--radius); padding: 1.25rem; margin: 1rem 0; }
        .q-option { display: block; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); margin-bottom: 0.375rem; cursor: pointer; background: white; }
        .q-option:hover { border-color: var(--purple); background: var(--purple-bg); }
        .q-option.selected { border-color: var(--purple); background: var(--purple-bg); }

        .lesson-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200); gap: 1rem; flex-wrap: wrap; }
        .nav-buttons { display: flex; gap: 0.75rem; }
        .complete-btn { background: var(--success); color: white; padding: 0.625rem 1.25rem; border-radius: var(--radius); font-weight: 600; font-size: 0.875rem; border: none; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .complete-btn:hover { background: var(--success-dark); transform: translateY(-1px); }

        .right-panel { width: 280px; flex-shrink: 0; background: var(--gray-50); border-left: 1px solid var(--gray-200); padding: 1.25rem; position: sticky; top: 60px; max-height: calc(100vh - 60px); overflow-y: auto; }
        .right-panel-section { background: white; border-radius: var(--radius-lg); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--gray-200); }
        .progress-ring { position: relative; width: 64px; height: 64px; margin: 0 auto 0.5rem; }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring .text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: var(--radius-xl); max-width: 450px; width: 90%; padding: 1.5rem; }
        .modal h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
        .modal p { font-size: 0.875rem; color: var(--gray-600); margin-bottom: 1rem; }
        .modal-buttons { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
        .confirm-question { padding: 0.5rem; margin: 0.5rem 0; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); cursor: pointer; }
        .confirm-question:hover { background: var(--primary-bg); }
        .confirm-question.selected { background: var(--success-bg); border-color: var(--success); }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.813rem; animation: toastIn 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .toast.success { background: #059669; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .notfound-hero { text-align: center; padding: 2rem; }
        .search-bar-small { max-width: 300px; margin: 1rem auto; display: flex; gap: 0.5rem; }
        .search-bar-small input { flex: 1; padding: 0.5rem 0.75rem; border: 1px solid var(--gray-300); border-radius: 30px; outline: none; }
        .suggestions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .suggestion-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg); padding: 1rem; text-decoration: none; color: inherit; display: block; }
        .suggestion-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        @media (max-width: 1024px) { .right-panel { display: none; } }
        @media (max-width: 768px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; position: static; } .content-area { padding: 1rem; } }
    </style>
</head>

<div class="modal-overlay" id="confirmModal"><div class="modal"><h3 id="confirmTitle">Are you sure?</h3><p id="confirmMessage"></p><div id="confirmQuestions"></div><div class="modal-buttons"><button class="btn btn-outline" id="confirmCancel">Cancel</button><button class="btn btn-success" id="confirmOk">Yes, Complete</button></div></div></div>

<script type="module">
    // ============================================
    // AKADEMIA COURSE PAGE - OPTIONAL COMPLETION
    // With confirmation questions
    // ============================================
    
    import { db, auth } from './js/firebase.js';
    import { collection, getDocs, doc, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

    // Hide splash screen when ready
    function hideSplash() {
        const splash = document.getElementById('splashScreen');
        if (splash) splash.classList.add('hide');
        setTimeout(() => { if (splash) splash.remove(); }, 500);
    }

    // DOM Elements
    const DOM = {
        get: (id) => document.getElementById(id),
        toastContainer: document.getElementById('toastContainer'),
        breadCourse: document.getElementById('breadCourse'),
        sidebarContent: document.getElementById('sidebarContent'),
        courseHeader: document.getElementById('courseHeader'),
        lessonContent: document.getElementById('lessonContent'),
        lessonNav: document.getElementById('lessonNav'),
        rpProgressContent: document.getElementById('rpProgressContent'),
        rpExerciseLinks: document.getElementById('rpExerciseLinks'),
        profileAvatar: document.getElementById('profileAvatar'),
        profileName: document.getElementById('profileName'),
        profileDropdown: document.getElementById('profileDropdown'),
        btnSignIn: document.getElementById('btnSignIn'),
        btnRegister: document.getElementById('btnRegister'),
        logoutBtn: document.getElementById('logoutBtn'),
        confirmModal: document.getElementById('confirmModal'),
        confirmTitle: document.getElementById('confirmTitle'),
        confirmMessage: document.getElementById('confirmMessage'),
        confirmQuestions: document.getElementById('confirmQuestions'),
        confirmCancel: document.getElementById('confirmCancel'),
        confirmOk: document.getElementById('confirmOk')
    };

    const showToast = (msg, type = 'success') => {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerHTML = `<i class='bx ${type === 'success' ? 'bx-check-circle' : 'bx-x-circle'}'></i> ${msg}`;
        DOM.toastContainer.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    };

    const escapeHtml = (s) => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };
    const getYouTubeId = (url) => { const m = url?.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]{11})/); return m ? m[1] : null; };

    // State
    const State = {
        user: null,
        course: null,
        modules: [],
        lessons: [],
        allCourses: [],
        allModules: [],
        allLessons: [],
        currentModuleId: null,
        currentLessonId: null,
        completedLessons: {},
        interactions: { videoWatched: {}, textScrolled: {}, questionsDone: {} },
        freeLessonLimit: 3,
        pendingAnswer: null
    };

    // Firebase
    async function loadUserProgress(uid) {
        if (!uid) return;
        try {
            const docSnap = await getDoc(doc(db, 'users', uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                State.completedLessons = data.completedLessons || {};
                State.interactions = data.interactions || { videoWatched: {}, textScrolled: {}, questionsDone: {} };
            }
        } catch(e) { console.warn(e); }
    }

    async function saveUserProgress() {
        if (!State.user) return;
        try {
            await setDoc(doc(db, 'users', State.user.uid), {
                completedLessons: State.completedLessons,
                interactions: State.interactions,
                lastUpdated: new Date().toISOString()
            }, { merge: true });
        } catch(e) { console.warn(e); }
    }

    async function markLessonComplete(lessonId) {
        if (!State.user || State.completedLessons[lessonId]) return false;
        State.completedLessons[lessonId] = true;
        await saveUserProgress();
        showToast('🎉 Lesson completed! +20 Sparks', 'success');
        renderSidebar();
        renderCourseHeader();
        updateRightPanel();
        return true;
    }

    // OPTIONAL COMPLETION WITH CONFIRMATION QUESTIONS
    function showCompletionModal(lessonId, lessonTitle, lessonBlocks) {
        // Extract 3 random questions from lesson blocks for confirmation
        const questionsFromLesson = [];
        lessonBlocks.forEach((block, idx) => {
            if (block.type === 'question' && block.question) {
                questionsFromLesson.push({
                    text: block.question,
                    options: block.options,
                    correct: block.correctAnswer
                });
            } else if (block.type === 'remember' && block.text) {
                questionsFromLesson.push({
                    text: `What was the key point about "${block.text.substring(0, 50)}..."?`,
                    options: ['I remember this!', 'Not sure', 'Need to review'],
                    correct: 0
                });
            }
        });
        
        // If not enough questions, create generic ones
        const confirmQuestionsList = questionsFromLesson.length >= 2 ? 
            questionsFromLesson.slice(0, 3) : [
                { text: `Did you understand the main concepts of "${lessonTitle}"?`, options: ['Yes, fully', 'Mostly', 'Partially'], correct: 0 },
                { text: 'Can you apply what you learned in this lesson?', options: ['Yes, confidently', 'With some help', 'Not yet'], correct: 0 },
                { text: 'Would you recommend this lesson to others?', options: ['Definitely', 'Maybe', 'Not sure'], correct: 0 }
            ];
        
        DOM.confirmTitle.textContent = `✅ Complete "${lessonTitle}"?`;
        DOM.confirmMessage.textContent = 'Answer these quick questions to confirm your understanding (optional, not scored):';
        
        let selectedAnswers = new Array(confirmQuestionsList.length).fill(null);
        let questionsHtml = '';
        confirmQuestionsList.forEach((q, i) => {
            questionsHtml += `
                <div style="margin: 1rem 0; padding: 0.75rem; background: var(--gray-50); border-radius: var(--radius);">
                    <p style="font-weight: 600; margin-bottom: 0.5rem;">${i+1}. ${escapeHtml(q.text)}</p>
                    ${q.options.map((opt, optIdx) => `
                        <div class="confirm-question" data-qidx="${i}" data-optidx="${optIdx}" data-opttext="${escapeHtml(opt)}" style="padding: 0.5rem; margin: 0.25rem 0; border-radius: var(--radius-sm); cursor: pointer;">
                            ${String.fromCharCode(65+optIdx)}. ${escapeHtml(opt)}
                        </div>
                    `).join('')}
                </div>
            `;
        });
        DOM.confirmQuestions.innerHTML = questionsHtml;
        
        // Add click handlers for questions
        DOM.confirmQuestions.querySelectorAll('.confirm-question').forEach(el => {
            el.addEventListener('click', () => {
                const qIdx = parseInt(el.dataset.qidx);
                const optIdx = parseInt(el.dataset.optidx);
                selectedAnswers[qIdx] = optIdx;
                // Visual feedback
                const container = el.closest('div[style*="background: var(--gray-50)"]');
                container.querySelectorAll('.confirm-question').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
            });
        });
        
        // Show modal
        DOM.confirmModal.classList.add('show');
        
        // Handle confirmation
        const onConfirm = async () => {
            DOM.confirmModal.classList.remove('show');
            // Second confirmation
            const secondConfirm = confirm(`⚠️ One more check: Are you SURE you've completed "${lessonTitle}"?\n\nThis will mark the lesson as complete.`);
            if (secondConfirm) {
                await markLessonComplete(lessonId);
            } else {
                showToast('Lesson completion cancelled', 'info');
            }
            DOM.confirmOk.removeEventListener('click', onConfirm);
        };
        
        const onCancel = () => {
            DOM.confirmModal.classList.remove('show');
            showToast('Completion cancelled - keep learning!', 'info');
            DOM.confirmCancel.removeEventListener('click', onCancel);
            DOM.confirmOk.removeEventListener('click', onConfirm);
        };
        
        DOM.confirmOk.onclick = onConfirm;
        DOM.confirmCancel.onclick = onCancel;
    }

    // Render Lesson with optional completion button
    function renderLesson() {
        const lesson = State.lessons.find(l => l.id === State.currentLessonId);
        if (!lesson) { DOM.lessonContent.innerHTML = '<p style="padding:2rem;text-align:center;">Select a lesson</p>'; DOM.lessonNav.style.display = 'none'; return; }
        
        const blocks = lesson.pages?.[0]?.blocks || [];
        const flat = [];
        State.modules.forEach(m => { State.lessons.filter(l => l.moduleId === m.id).forEach(l => flat.push(l)); });
        const idx = flat.findIndex(l => l.id === State.currentLessonId);
        const prev = idx > 0 ? flat[idx-1] : null;
        const next = idx < flat.length-1 ? flat[idx+1] : null;
        const isCompleted = State.completedLessons[State.currentLessonId];
        
        let contentHtml = `<h2>${escapeHtml(lesson.title || 'Lesson')}</h2>`;
        
        blocks.forEach(block => {
            switch(block.type) {
                case 'text':
                    contentHtml += `<div class="text-block">${block.content || ''}</div>`;
                    break;
                case 'video':
                    const ytid = getYouTubeId(block.url);
                    if (ytid) contentHtml += `<div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${ytid}" allowfullscreen></iframe></div>`;
                    break;
                case 'remember':
                    contentHtml += `<div class="remember-block"><div class="remember-text">🧠 ${escapeHtml(block.text || '')}</div><div class="remember-footer"><button class="got-it-btn" onclick="this.closest('.remember-block').remove()"><i class='bx bx-check'></i> Got it</button></div></div>`;
                    break;
                case 'question':
                    contentHtml += `<div class="question-box" data-qidx="${blocks.indexOf(block)}"><div class="q-title">❓ ${escapeHtml(block.question)}</div>${(block.options || []).map((opt, i) => `<div class="q-option" data-val="${i}" onclick="window.selectAnswer(this, '${lesson.id}', ${blocks.indexOf(block)}, ${i}, ${block.correctAnswer})">${String.fromCharCode(65+i)}. ${escapeHtml(opt)}</div>`).join('')}<div class="submit-answer" style="margin-top:0.75rem;"><button class="btn btn-primary btn-sm" onclick="window.submitAnswer('${lesson.id}', ${blocks.indexOf(block)}, ${block.correctAnswer}, ${block.points || 10})">Submit Answer</button></div></div>`;
                    break;
                case 'code':
                    contentHtml += `<div class="code-block-wrapper"><pre><code>${escapeHtml(block.code || '')}</code></pre><div class="code-actions"><button class="code-btn" onclick="window.copyCode(this)"><i class='bx bx-copy'></i> Copy</button><button class="code-btn try-btn" onclick="window.tryCode(this)"><i class='bx bx-play'></i> Try it yourself →</button></div></div>`;
                    break;
                case 'image':
                    if (block.url) contentHtml += `<img src="${block.url}" alt="${escapeHtml(block.alt || '')}" style="max-width:100%;border-radius:12px;margin:0.75rem 0;">`;
                    break;
            }
        });
        
        DOM.lessonContent.innerHTML = contentHtml;
        
        // Navigation with real buttons
        DOM.lessonNav.style.display = 'flex';
        DOM.lessonNav.innerHTML = `
            <div class="nav-buttons">
                ${prev ? `<button class="btn btn-outline" onclick="window.loadLesson('${prev.moduleId}', '${prev.id}')"><i class='bx bx-chevron-left'></i> Previous</button>` : ''}
                ${next ? `<button class="btn btn-primary" onclick="window.loadLesson('${next.moduleId}', '${next.id}')">Next <i class='bx bx-chevron-right'></i></button>` : ''}
            </div>
            ${!isCompleted && State.user ? `<button class="complete-btn" onclick="window.completeLesson('${State.currentLessonId}', '${escapeHtml(lesson.title)}')"><i class='bx bx-check-double'></i> Mark as Completed</button>` : isCompleted ? `<span style="font-size:0.75rem;color:var(--success);"><i class='bx bx-check-circle'></i> Lesson completed</span>` : ''}
        `;
        
        renderSidebar();
        
        // Simple scroll tracking
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.target.classList.contains('text-block') && !State.interactions.textScrolled[lesson.id] && State.user) {
                    State.interactions.textScrolled[lesson.id] = true;
                    saveUserProgress();
                }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('.text-block').forEach(el => observer.observe(el));
    }

    // Global functions for buttons
    window.loadLesson = async (moduleId, lessonId) => {
        State.currentModuleId = moduleId;
        State.currentLessonId = lessonId;
        window.history.pushState({}, '', `?id=${State.course.id}&module=${moduleId}&lesson=${lessonId}`);
        renderLesson();
        renderSidebar();
        window.scrollTo({ top: 0 });
    };
    
    window.completeLesson = (lessonId, lessonTitle) => {
        const lesson = State.lessons.find(l => l.id === lessonId);
        const blocks = lesson?.pages?.[0]?.blocks || [];
        showCompletionModal(lessonId, lessonTitle, blocks);
    };
    
    window.selectAnswer = (el, lessonId, qIdx, selected, correct) => {
        const container = el.closest('.question-box');
        container.querySelectorAll('.q-option').forEach(opt => opt.classList.remove('selected'));
        el.classList.add('selected');
        State.pendingAnswer = { lessonId, qIdx, selected, correct, container };
    };
    
    window.submitAnswer = async (lessonId, qIdx, correct, points) => {
        if (!State.pendingAnswer || State.pendingAnswer.qIdx !== qIdx) {
            showToast('Select an answer first', 'error');
            return;
        }
        if (State.pendingAnswer.selected === correct) {
            const key = `${lessonId}_${qIdx}`;
            if (!State.interactions.questionsDone[key] && State.user) {
                State.interactions.questionsDone[key] = true;
                await saveUserProgress();
                showToast(`Correct! +${points} Sparks`, 'success');
            }
            State.pendingAnswer.container.style.opacity = '0.6';
        } else {
            showToast('Wrong answer! Try again.', 'error');
        }
        State.pendingAnswer = null;
    };
    
    window.copyCode = (btn) => {
        const code = btn.closest('.code-block-wrapper').querySelector('pre code')?.textContent;
        if (code) { navigator.clipboard.writeText(code); showToast('Code copied!', 'success'); }
    };
    
    window.tryCode = (btn) => {
        const code = btn.closest('.code-block-wrapper').querySelector('pre code')?.textContent;
        if (code) window.open(`Editor.html?code=${encodeURIComponent(code)}`, '_blank');
    };

    // Sidebar
    function renderSidebar() {
        if (!State.course) return;
        let html = '<div class="tree-explorer">';
        State.modules.forEach(mod => {
            const modLessons = State.lessons.filter(l => l.moduleId === mod.id);
            const open = State.currentModuleId === mod.id;
            html += `<div class="tree-folder ${open ? 'open' : ''}">
                <div class="tree-folder-header" onclick="this.parentElement.classList.toggle('open')"><i class='bx bx-chevron-right chevron'></i><i class='bx bx-folder' style="color:var(--warning);"></i> ${escapeHtml(mod.name)} <span style="margin-left:auto;font-size:0.625rem;">${modLessons.length}</span></div>
                <div class="tree-children">`;
            modLessons.forEach((l, i) => {
                const locked = !State.user && i >= State.freeLessonLimit;
                const completed = State.completedLessons[l.id];
                const active = State.currentLessonId === l.id;
                html += `<a href="${locked ? '#' : `?id=${State.course.id}&module=${mod.id}&lesson=${l.id}`}" class="tree-item ${active ? 'active' : ''} ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}" onclick="${locked ? 'return false;' : `event.preventDefault(); window.loadLesson('${mod.id}', '${l.id}');`}"><span class="dot"></span> ${escapeHtml(l.title || 'Lesson')} ${completed ? '<i class="bx bx-check-circle" style="color:var(--success);margin-left:auto;font-size:0.625rem;"></i>' : ''}</a>`;
            });
            html += `</div></div>`;
        });
        html += '</div>';
        DOM.sidebarContent.innerHTML = html;
    }

    function renderCourseHeader() {
        const total = State.lessons.length;
        const completed = Object.keys(State.completedLessons).filter(id => State.lessons.some(l => l.id === id)).length;
        const pct = total ? Math.round((completed / total) * 100) : 0;
        const circum = 175.93;
        const offset = circum - (pct / 100) * circum;
        
        DOM.courseHeader.innerHTML = `
            <h1>${escapeHtml(State.course.name)}</h1>
            <div class="course-meta"><span><i class='bx bx-book-open'></i> ${State.modules.length} modules</span><span><i class='bx bx-video'></i> ${total} lessons</span><span><i class='bx bx-bar-chart-alt-2'></i> ${State.course.difficulty || 'All Levels'}</span></div>
            ${State.course.description ? `<p>${escapeHtml(State.course.description)}</p>` : ''}
            ${State.user ? `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;"></div><span style="font-size:0.688rem;">${completed}/${total} completed</span></div>` : ''}
        `;
        
        DOM.rpProgressContent.innerHTML = `
            <div class="progress-ring"><svg width="64" height="64" viewBox="0 0 64 64"><circle class="bg" cx="32" cy="32" r="28" fill="none" stroke="#e5e7eb" stroke-width="6"/><circle cx="32" cy="32" r="28" fill="none" stroke="#04AA6D" stroke-width="6" stroke-dasharray="175.93" stroke-dashoffset="${offset}"/></svg><div class="text">${pct}%</div></div>
            <p style="font-size:0.75rem;text-align:center;">${completed}/${total} completed</p>
            ${!State.user ? '<a href="auth.html" class="btn btn-primary btn-sm" style="width:100%;justify-content:center;margin-top:0.5rem;">Sign in to track</a>' : ''}
        `;
        
        if (State.course && State.currentLessonId) {
            DOM.rpExerciseLinks.innerHTML = `<a href="exercise.html?course=${State.course.id}&module=${State.currentModuleId}&lesson=${State.currentLessonId}" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;"><i class='bx bx-dumbbell'></i> Practice this lesson</a>`;
        }
    }

    function updateRightPanel() { renderCourseHeader(); }

    // Auth
    onAuthStateChanged(auth, async (user) => {
        State.user = user;
        if (user) {
            DOM.btnSignIn.style.display = 'none';
            DOM.btnRegister.style.display = 'none';
            DOM.profileDropdown.style.display = 'block';
            const name = user.displayName || user.email?.split('@')[0] || 'User';
            DOM.profileName.textContent = name;
            if (user.photoURL) DOM.profileAvatar.innerHTML = `<img src="${user.photoURL}">`;
            else DOM.profileAvatar.textContent = name.charAt(0).toUpperCase();
            await loadUserProgress(user.uid);
        } else {
            DOM.btnSignIn.style.display = '';
            DOM.btnRegister.style.display = '';
            DOM.profileDropdown.style.display = 'none';
        }
        if (State.course) {
            renderSidebar();
            renderCourseHeader();
            if (State.currentLessonId) renderLesson();
        }
        hideSplash();
    });
    
    DOM.logoutBtn?.addEventListener('click', async () => { await signOut(auth); showToast('Signed out'); location.reload(); });

    // Load Data
    async function loadAllData() {
        try {
            const [cSnap, mSnap, lSnap] = await Promise.all([
                getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc'))),
                getDocs(query(collection(db, 'modules'), orderBy('order'))),
                getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')))
            ]);
            State.allCourses = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            State.allModules = mSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            State.allLessons = lSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        } catch(e) { console.warn(e); }
        
        const params = new URLSearchParams(location.search);
        const courseId = params.get('id');
        if (courseId) {
            State.course = State.allCourses.find(c => c.id === courseId);
            if (State.course) {
                State.modules = State.allModules.filter(m => m.courseId === courseId).sort((a,b) => (a.order||0)-(b.order||0));
                State.lessons = [];
                State.modules.forEach(m => { State.lessons.push(...State.allLessons.filter(l => l.moduleId === m.id)); });
                State.currentModuleId = params.get('module') || State.lessons[0]?.moduleId;
                State.currentLessonId = params.get('lesson') || State.lessons[0]?.id;
                DOM.breadCourse.textContent = State.course.name;
                renderSidebar();
                renderCourseHeader();
                if (State.currentLessonId) renderLesson();
                hideSplash();
                return;
            }
        }
        
        // No course found - show explorer
        DOM.breadCourse.textContent = 'Explore Courses';
        const popular = [...State.allCourses].sort(() => Math.random() - 0.5).slice(0, 6);
        DOM.lessonContent.innerHTML = `
            <div class="notfound-hero"><i class='bx bx-compass'></i><h1>Find Your Perfect Course</h1><div class="search-bar-small"><input type="text" id="searchInput" placeholder="Search courses..."><button class="btn btn-primary btn-sm" onclick="window.searchCourses()">Search</button></div><div id="searchResults"></div></div>
            <h3>Popular Courses</h3><div class="suggestions-grid" id="popularGrid"></div>
        `;
        const grid = document.getElementById('popularGrid');
        if (grid) grid.innerHTML = popular.map(c => `<a href="course.html?id=${c.id}" class="suggestion-card"><h4>${escapeHtml(c.name)}</h4><p>${escapeHtml((c.description||'').substring(0,80))}</p></a>`).join('');
        window.searchCourses = () => {
            const q = document.getElementById('searchInput')?.value.toLowerCase();
            if (!q) return;
            const results = State.allCourses.filter(c => c.name?.toLowerCase().includes(q));
            const resDiv = document.getElementById('searchResults');
            if (resDiv) resDiv.innerHTML = results.length ? `<div class="suggestions-grid">${results.map(c => `<a href="course.html?id=${c.id}" class="suggestion-card"><h4>${escapeHtml(c.name)}</h4></a>`).join('')}</div>` : '<p>No results</p>';
        };
        hideSplash();
    }

    loadAllData();
    console.log('🚀 Course Page - Optional completion with confirmation, real buttons, splash screen');
</script>
</body>
</html>
