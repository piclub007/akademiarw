<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Find Your Path</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED;
            --success: #04AA6D; --success-dark: #038857; --success-bg: #ECFDF5;
            --warning: #F59E0B; --danger: #EF4444;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 24px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: #f0f2f5;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ FULL PAGE CONTAINER ============ */
        .pathfinder-screen {
            height: 100vh; width: 100vw; display: flex;
            background: var(--white); position: relative;
        }

        /* ============ LEFT BRAND PANEL ============ */
        .brand-side {
            width: 40%; background: linear-gradient(160deg, #0f172a 0%, #1a1f2e 40%, #1a1a2e 100%);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 3rem; position: relative; overflow: hidden;
        }
        .brand-side::before {
            content: ''; position: absolute; top: -30%; right: -30%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .brand-logo { text-align: center; position: relative; z-index: 1; }
        .brand-logo img { height: 80px; width: auto; margin-bottom: 1rem; }
        .brand-logo h1 {
            font-family: 'Space Grotesk', sans-serif; font-size: 2rem;
            font-weight: 700; color: white; letter-spacing: -0.5px;
        }
        .brand-logo p {
            font-size: 0.875rem; color: #9ca3af; margin-top: 0.5rem;
        }
        .brand-features {
            margin-top: 3rem; display: flex; flex-direction: column;
            gap: 1rem; position: relative; z-index: 1;
        }
        .brand-feat {
            display: flex; align-items: center; gap: 0.75rem;
            font-size: 0.875rem; color: #d1d5db;
        }
        .brand-feat .bf-icon {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 0.875rem;
            background: rgba(4,170,109,0.15); color: var(--success);
        }
        .brand-step-indicator {
            margin-top: 3rem; text-align: center; position: relative; z-index: 1;
        }
        .brand-step-indicator .bsi-number {
            font-family: 'Space Grotesk', sans-serif; font-size: 4rem;
            font-weight: 700; color: white; line-height: 1;
        }
        .brand-step-indicator .bsi-label {
            font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px;
        }

        /* ============ RIGHT FORM SIDE ============ */
        .form-side {
            width: 60%; display: flex; flex-direction: column; overflow: hidden;
        }

        /* PROGRESS BAR */
        .progress-section {
            padding: 1.5rem 3rem 0; flex-shrink: 0;
        }
        .progress-steps-row {
            display: flex; justify-content: space-between; margin-bottom: 0.5rem;
        }
        .progress-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--gray-200);
            transition: all var(--transition);
        }
        .progress-dot.done { background: var(--success); }
        .progress-dot.current { background: var(--primary); width: 12px; height: 12px; margin-top: -2px; }
        .progress-bar-wrap {
            height: 3px; background: var(--gray-100); border-radius: 2px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: var(--primary); border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* STEP CONTENT */
        .step-area {
            flex: 1; display: flex; flex-direction: column; padding: 1.5rem 3rem;
            overflow-y: auto; animation: slideIn 0.4s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .step-label {
            font-size: 0.688rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--primary); margin-bottom: 0.5rem;
        }
        .step-question {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem;
            font-weight: 700; color: var(--gray-900); margin-bottom: 0.25rem;
        }
        .step-hint { font-size: 0.813rem; color: var(--gray-500); margin-bottom: 1.5rem; }

        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem;
        }
        .options-grid.col-1 { grid-template-columns: 1fr; }
        .options-grid.col-3 { grid-template-columns: 1fr 1fr 1fr; }

        .opt-card {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.875rem 1rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); cursor: pointer;
            transition: all var(--transition); background: var(--white);
            text-align: left; font-family: 'Inter', sans-serif;
        }
        .opt-card:hover { border-color: var(--primary); background: var(--primary-bg); }
        .opt-card.selected { border-color: var(--primary); background: var(--primary-bg); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .opt-card.multi-selected { border-color: var(--accent); background: #F5F3FF; box-shadow: 0 0 0 3px rgba(139,92,246,0.08); }
        .opt-icon {
            width: 38px; height: 38px; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.125rem; flex-shrink: 0;
        }
        .opt-icon.c1 { background: #EFF6FF; color: #2563EB; }
        .opt-icon.c2 { background: #F5F3FF; color: #7C3AED; }
        .opt-icon.c3 { background: #ECFDF5; color: #059669; }
        .opt-icon.c4 { background: #FFF7ED; color: #F97316; }
        .opt-icon.c5 { background: #FDF2F8; color: #EC4899; }
        .opt-icon.c6 { background: #F0FDFA; color: #14B8A6; }
        .opt-icon.c7 { background: #FFFBEB; color: #D97706; }
        .opt-text { font-size: 0.813rem; font-weight: 600; color: var(--gray-800); }
        .opt-check {
            width: 20px; height: 20px; border-radius: 5px; border: 2px solid var(--gray-300);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.688rem; flex-shrink: 0; transition: all var(--transition);
            margin-left: auto;
        }
        .opt-card.multi-selected .opt-check { background: var(--accent); border-color: var(--accent); color: white; }

        /* NAVIGATION */
        .nav-section {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 3rem; border-top: 1px solid var(--gray-100); flex-shrink: 0;
        }
        .nav-btn {
            padding: 0.625rem 1.5rem; border-radius: 50px;
            font-family: 'Inter', sans-serif; font-size: 0.813rem; font-weight: 600;
            cursor: pointer; border: none; transition: all var(--transition);
            display: flex; align-items: center; gap: 0.375rem;
        }
        .nav-btn.back { background: var(--gray-100); color: var(--gray-700); }
        .nav-btn.back:hover { background: var(--gray-200); }
        .nav-btn.next { background: var(--primary); color: white; }
        .nav-btn.next:hover { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        .nav-btn.next:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        .nav-btn.finish { background: var(--success); color: white; }
        .nav-btn.finish:hover { background: var(--success-dark); box-shadow: 0 4px 12px rgba(4,170,109,0.3); }
        .nav-counter { font-size: 0.75rem; color: var(--gray-400); }

        /* SUMMARY OVERLAY */
        .summary-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }
        .summary-overlay.show { opacity: 1; pointer-events: all; }
        .summary-card {
            background: white; border-radius: var(--radius-2xl);
            padding: 2.5rem; max-width: 550px; width: 90%; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            max-height: 80vh; overflow-y: auto;
        }
        .summary-check {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--success-bg); display: flex; align-items: center;
            justify-content: center; margin: 0 auto 1.5rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .summary-check i { font-size: 2.5rem; color: var(--success); }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .summary-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem;
            font-weight: 700; margin-bottom: 0.5rem;
        }
        .summary-subtitle { font-size: 0.875rem; color: var(--gray-500); margin-bottom: 1.5rem; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; text-align: left; margin-bottom: 1.5rem; }
        .summary-item {
            background: var(--gray-50); padding: 0.625rem 0.875rem;
            border-radius: var(--radius-sm); font-size: 0.75rem;
        }
        .summary-item .sl { font-size: 0.625rem; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-item .sv { font-weight: 600; color: var(--gray-900); margin-top: 0.125rem; }
        .summary-loader {
            width: 36px; height: 36px; border: 3px solid var(--gray-200);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .brand-side { display: none; }
            .form-side { width: 100%; }
            .step-area { padding: 1rem 1.5rem; }
            .nav-section { padding: 0.75rem 1.5rem; }
            .options-grid { grid-template-columns: 1fr; }
            .options-grid.col-3 { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- PATHFINDER SCREEN -->
    <div class="pathfinder-screen">
        <!-- LEFT BRAND PANEL -->
        <div class="brand-side">
            <div class="brand-logo">
                <img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia" style="filter:brightness(0)invert(1);">
                <h1>Akademia</h1>
                <p>Discover your perfect learning path</p>
            </div>
            <div class="brand-features">
                <div class="brand-feat"><div class="bf-icon"><i class='bx bx-check'></i></div> Personalized learning journey</div>
                <div class="brand-feat"><div class="bf-icon"><i class='bx bx-check'></i></div> AI-powered recommendations</div>
                <div class="brand-feat"><div class="bf-icon"><i class='bx bx-check'></i></div> Track your progress</div>
            </div>
            <div class="brand-step-indicator">
                <div class="bsi-number" id="bsiNumber">1</div>
                <div class="bsi-label">of 20 steps</div>
            </div>
        </div>

        <!-- RIGHT FORM SIDE -->
        <div class="form-side">
            <!-- PROGRESS -->
            <div class="progress-section">
                <div class="progress-steps-row" id="progressDots"></div>
                <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
            </div>

            <!-- STEP CONTENT -->
            <div class="step-area" id="stepArea"></div>

            <!-- NAVIGATION -->
            <div class="nav-section" id="navSection"></div>
        </div>
    </div>

    <!-- SUMMARY OVERLAY -->
    <div class="summary-overlay" id="summaryOverlay">
        <div class="summary-card">
            <div class="summary-check"><i class='bx bx-check'></i></div>
            <h2 class="summary-title">Pathfinding Complete!</h2>
            <p class="summary-subtitle">Your personalized learning path is ready</p>
            <div class="summary-grid" id="summaryGrid"></div>
            <div class="summary-loader"></div>
            <p style="font-size:0.75rem;color:var(--gray-400);margin-top:1rem;">Redirecting to your dashboard...</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const $ = id => document.getElementById(id);

        // ============ CHECK ALREADY DONE ============
        function checkAlreadyDone() {
            if (localStorage.getItem('ak_pathfinder_done')) {
                window.location.href = 'user.html';
                return true;
            }
            return false;
        }

        // ============ 20 STEPS ============
        const steps = [
            { number:1, question:'Career Goal', hint:'What do you want to become?', type:'single', key:'goal', options:[
                {v:'frontend',l:'Frontend Developer',i:'bx-code-alt',c:'c1'},{v:'backend',l:'Backend Developer',i:'bx-server',c:'c2'},
                {v:'fullstack',l:'Full Stack Developer',i:'bx-layer',c:'c3'},{v:'mobile',l:'Mobile Developer',i:'bx-mobile-alt',c:'c4'},
                {v:'designer',l:'UI/UX Designer',i:'bx-palette',c:'c5'},{v:'ai',l:'AI Engineer',i:'bx-brain',c:'c6'},
                {v:'cyber',l:'Cybersecurity Specialist',i:'bx-shield-quarter',c:'c7'},{v:'data',l:'Data Analyst',i:'bx-bar-chart-square',c:'c1'},
                {v:'unsure',l:'Not Sure Yet',i:'bx-question-mark',c:'c3'}
            ]},
            { number:2, question:'Experience Level', hint:'How experienced are you?', type:'single', key:'experience', options:[

                {v:'intermediate',l:'Intermediate',i:'bx-cool',c:'c2'},{v:'advanced',l:'Advanced',i:'bx-badge-check',c:'c4'}
            ]},
            { number:3, question:'Interests', hint:'What interests you most? Select all that apply', type:'multi', key:'interests', options:[
                {v:'websites',l:'Websites',i:'bx-globe',c:'c1'},{v:'apps',l:'Apps',i:'bx-mobile',c:'c2'},
                {v:'design',l:'Design',i:'bx-paint',c:'c5'},{v:'ai',l:'AI',i:'bx-bot',c:'c6'},
                {v:'data',l:'Data',i:'bx-data',c:'c3'},{v:'security',l:'Security',i:'bx-shield',c:'c7'},
                {v:'games',l:'Games',i:'bx-joystick',c:'c4'}

            { number:4, question:'Daily Study Time', hint:'How much time can you study daily?', type:'single', key:'studyTime', options:[

                {v:'mixed',l:'Mixed',i:'bx-grid-alt',c:'c5'}
            ]},
            { number:6, question:'Main Goal', hint:'Why are you learning?', type:'single', key:'outcome', options:[
                {v:'job',l:'Job',i:'bx-briefcase',c:'c3'},{v:'freelancing',l:'Freelancing',i:'bx-globe',c:'c2'},
                {v:'business',l:'Business',i:'bx-rocket',c:'c4'},{v:'projects',l:'Personal Projects',i:'bx-code-alt',c:'c5'},
                {v:'school',l:'School',i:'bx-building-house',c:'c6'},{v:'curiosity',l:'Curiosity',i:'bx-compass',c:'c1'}
            ]},
            { number:7, question:'Age Range', hint:'Which age group are you in?', type:'single', key:'age', options:[

                {v:'university',l:'University',i:'bx-buildings',c:'c3'},{v:'selftaught',l:'Self-Taught',i:'bx-book',c:'c4'},
                {v:'other',l:'Other',i:'bx-dots-horizontal',c:'c5'}
            ]},
            { number:9, question:'Programming Experience', hint:'Have you coded before?', type:'single', key:'codingExperience', options:[

            { number:17, question:'Community Preference', hint:'How do you like learning?', type:'single', key:'community', options:[

                {v:'money',l:'Money',i:'bx-dollar',c:'c4'},{v:'creativity',l:'Creativity',i:'bx-bulb',c:'c6'},

            ]},
            { number:20, question:'Commitment Check', hint:'Are you ready to follow a personalized learning path?', type:'single', key:'commitment', options:[
                {v:'absolutely',l:'Absolutely',i:'bx-check-shield',c:'c3'},{v:'try',l:'I\'ll Try',i:'bx-shield',c:'c1'},
                {v:'notsure',l:'Not Sure',i:'bx-shield-quarter',c:'c2'}
            ]}
        ];

        let currentStep = 0, answers = {};

        // ============ INIT ============
        function init() {
            if (checkAlreadyDone()) return;
            onAuthStateChanged(auth, () => {});
            renderAll();
        }

        function renderAll() {
            renderProgress();
            renderStep();
            renderNav();
            $('bsiNumber').textContent = currentStep + 1;
        }

        // ============ PROGRESS ============
        function renderProgress() {
            $('progressDots').innerHTML = steps.map((_, i) => 
                `<div class="progress-dot ${i < currentStep ? 'done' : i === currentStep ? 'current' : ''}"></div>`
            ).join('');
            $('progressBar').style.width = ((currentStep / (steps.length - 1)) * 100) + '%';
        }

        // ============ STEP ============
        function renderStep() {
            const s = steps[currentStep];
            const isMulti = s.type === 'multi';
            const sel = isMulti ? (answers[s.key] || []) : [answers[s.key]];
            const cols = s.options.length <= 3 ? 'col-1' : s.options.length >= 8 ? 'col-3' : '';

            $('stepArea').innerHTML = `
                <div class="step-label">Step ${s.number} of 20</div>
                <h2 class="step-question">${s.question}</h2>
                <p class="step-hint">${s.hint}</p>
                <div class="options-grid ${cols}">
                    ${s.options.map(o => `
                        <button class="opt-card ${sel.includes(o.v) ? (isMulti ? 'multi-selected' : 'selected') : ''}" 
                                onclick="selectOpt('${o.v}','${s.key}',${isMulti})">
                            <div class="opt-icon ${o.c}"><i class='bx ${o.i}'></i></div>
                            <span class="opt-text">${o.l}</span>
                            ${isMulti ? `<div class="opt-check">${sel.includes(o.v) ? '<i class="bx bx-check"></i>' : ''}</div>` : ''}
                        </button>
                    `).join('')}
                </div>`;
        }

        // ============ NAV ============
        function renderNav() {
            const s = steps[currentStep];
            const isMulti = s.type === 'multi';
            const sel = isMulti ? (answers[s.key] || []) : [answers[s.key]];
            const has = isMulti ? sel.length > 0 : !!answers[s.key];
            const isLast = currentStep === steps.length - 1;

            $('navSection').innerHTML = `
                <button class="nav-btn back" onclick="prevStep()" ${currentStep === 0 ? 'style="visibility:hidden;"' : ''}>
                    <i class='bx bx-chevron-left'></i> Back
                </button>
                <span class="nav-counter">${currentStep + 1} / 20</span>
                <button class="nav-btn ${isLast ? 'finish' : 'next'}" onclick="nextStep()" ${!has ? 'disabled' : ''}>
                    ${isLast ? 'Finish <i class="bx bx-check"></i>' : 'Next <i class="bx bx-chevron-right"></i>'}
                </button>`;
        }

        // ============ SELECT ============
        window.selectOpt = function(value, key, isMulti) {
            if (isMulti) {
                if (!answers[key]) answers[key] = [];
                const idx = answers[key].indexOf(value);
                idx > -1 ? answers[key].splice(idx, 1) : answers[key].push(value);
            } else {
                answers[key] = value;
            }
            renderStep(); renderNav();
        };

        // ============ NAVIGATE ============
        window.prevStep = function() {
            if (currentStep > 0) { currentStep--; renderAll(); }
        };
        window.nextStep = function() {
            const s = steps[currentStep];
            const isMulti = s.type === 'multi';
            const sel = isMulti ? (answers[s.key] || []) : [answers[s.key]];
            if (isMulti && !sel.length) return;
            if (!isMulti && !answers[s.key]) return;
            if (currentStep < steps.length - 1) { currentStep++; renderAll(); }
            else { finishPathfinder(); }
        };

        // ============ FINISH ============
        function finishPathfinder() {
            const data = { ...answers, completedAt: new Date().toISOString() };
            localStorage.setItem('ak_pathfinder_done', JSON.stringify(data));
            localStorage.setItem('ak_pathfinder_answers', JSON.stringify(answers));

            // Summary
            const labels = {
                goal:'Career Goal',experience:'Experience',interests:'Interests',studyTime:'Study Time',
                learningStyle:'Learning Style',outcome:'Main Goal',age:'Age',education:'Education',
                codingExperience:'Coding Exp',technologies:'Technologies',device:'Device',internet:'Internet',
                projectType:'Project Type',timeline:'Timeline',confidence:'Confidence',difficulty:'Difficulty',
                community:'Community',workPreference:'Work',motivation:'Motivation',commitment:'Commitment'
            };
            const vals = {
                frontend:'Frontend Dev',backend:'Backend Dev',fullstack:'Full Stack',mobile:'Mobile Dev',
                designer:'UI/UX',ai:'AI Engineer',cyber:'Cybersecurity',data:'Data Analyst',unsure:'Not Sure',
                complete_beginner:'Complete Beginner',beginner:'Beginner',intermediate:'Intermediate',advanced:'Advanced',
                '15min':'15 min','30min':'30 min','1hour':'1 hr','2hours':'2 hrs','3plus':'3+ hrs',
                videos:'Videos',reading:'Reading',practice:'Practice',projects:'Projects',mixed:'Mixed',
                job:'Job',freelancing:'Freelancing',business:'Business',school:'School',curiosity:'Curiosity',
                absolutely:'Absolutely!','try':"I'll Try",notsure:'Not Sure'
            };

            $('summaryGrid').innerHTML = Object.keys(answers).map(k => {
                const v = answers[k];
                const dv = Array.isArray(v) ? v.map(x => vals[x] || x).join(', ') : (vals[v] || v);
                return `<div class="summary-item"><div class="sl">${labels[k]||k}</div><div class="sv">${dv}</div></div>`;
            }).join('');

            $('summaryOverlay').classList.add('show');
            setTimeout(() => { window.location.href = 'user.html'; }, 3500);
        }

        init();
        console.log('🚀 Akademia 20-Step Pathfinder loaded!');
    </script>
</body>
</html>
