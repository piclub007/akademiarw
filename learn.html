<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeQuest - Your Python Adventure | Learn to Code</title>
    <meta name="description" content="Complete coding quests, earn XP, and learn Python through gamified adventures.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">

    <style>
        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --secondary: #00D4AA;
            --accent: #FF6584;
            --gold: #FFD700;
            --bg-dark: #0F0E17;
            --bg-card: #1A1928;
            --bg-input: #252439;
            --text-primary: #FFFFFE;
            --text-secondary: #A7A6B3;
            --border: #2D2B3D;
            --radius: 12px;
            --radius-lg: 16px;
            --nav-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Top Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: rgba(15,14,23,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0 24px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-gradient {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .player-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .stat-icon {
            font-size: 1.2rem;
        }

        .level-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .xp-bar {
            width: 100px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s ease;
        }

        .btn-logout {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 0;
            margin-top: var(--nav-height);
            min-height: calc(100vh - var(--nav-height));
        }

        /* Quest Sidebar */
        .quest-sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
        }

        .quest-list-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quest-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quest-card:hover {
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .quest-card.active {
            border-color: var(--primary);
            background: rgba(108,99,255,0.1);
        }

        .quest-card.completed {
            opacity: 0.6;
            border-color: var(--secondary);
        }

        .quest-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .quest-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .quest-difficulty {
            font-size: 0.8rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--border);
        }

        .quest-rewards {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Main Quest Area */
        .quest-area {
            padding: 32px;
            max-width: 900px;
        }

        .quest-header {
            margin-bottom: 32px;
        }

        .quest-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .quest-story {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

            content: '📜
