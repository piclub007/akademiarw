<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses · Akademia</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/drafting-mono" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'BlockBlueprint';
      src: local('BlockBlueprint'), local('BlockBlueprint');
      font-display: swap;
    }
    @font-face {
      font-family: 'Drafting Mono';
      src: local('Drafting Mono'), local('Drafting Mono');
      font-display: swap;
    }
  </style>

  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg-secondary: #F7F7F7;
      --text: #4B4B4B;
      --text-secondary: #777777;
      --border: #E5E5E5;
      --radius: 14px;
      --gold: #FFC800;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Drafting Mono', 'Drafting* Mono', monospace;
      background: var(--bg-secondary);
      color: var(--text);
      line-height: 1.5;
      padding-bottom: 40px;
    }

    h1, h2, h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

    /* Top Bar */
    .topbar {
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-img { width:34px; height:34px; border-radius:10px; }
    .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
    .logo-text span { color:var(--green); }

    .right-section {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .sparks-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      border-radius: 20px;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .sparks-badge iconify-icon { color: var(--gold); }

    .user-menu {
      position: relative;
    }
    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .user-avatar:hover { transform: scale(1.05); }

    .dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      min-width: 160px;
      display: none;
      z-index: 50;
    }
    .dropdown.active { display: block; }
    .dropdown-item {
      padding: 10px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .dropdown-item:hover { background: var(--bg-secondary); }

    /* Container */
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .greeting {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .sub-greeting {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Recent Section */
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }
    .recent-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 32px;
      scrollbar-width: thin;
    }
    .recent-card {
      min-width: 160px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .recent-card:hover { border-color: var(--green); transform: translateY(-2px); }
    .recent-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .recent-meta { font-size: 0.75rem; color: var(--text-secondary); }

    /* Course Grid */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .course-card {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
    }
    .course-card:hover {
      border-color: var(--green);
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }
    .course-icon {
      font-size: 2rem;
      color: var(--green);
      margin-bottom: 12px;
      display: block;
    }
    .course-title {
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'BlockBlueprint', sans-serif;
      margin-bottom: 4px;
    }
    .course-desc {
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.5s;
    }
    .course-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <img src="../favicon.ico" alt="Akademia" class="logo-img">
      <div class="logo-text">Akade<span>mia</span></div>
    </a>
    <div class="right-section">
      <div class="sparks-badge">
        <iconify-icon icon="pixelarticons:fire"></iconify-icon>
        <span id="sparksDisplay">0</span> Sparks
      </div>
      <div class="user-menu" id="userMenu">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="dropdown" id="dropdownMenu">
          <div class="dropdown-item" id="settingsBtn">
            <iconify-icon icon="pixelarticons:settings"></iconify-icon> Settings
          </div>
          <div class="dropdown-item" id="logoutBtn">
            <iconify-icon icon="pixelarticons:logout"></iconify-icon> Log out
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <h1 class="greeting" id="greetingText">Welcome!</h1>
    <p class="sub-greeting">Pick up where you left off, or explore new courses.</p>

    <!-- Recent Section -->
    <div class="section-title">
      <iconify-icon icon="pixelarticons:history"></iconify-icon> Recent
    </div>
    <div class="recent-scroll" id="recentScroll">
      <!-- Dynamically filled -->
    </div>

    <!-- All Courses -->
    <div class="section-title">
      <iconify-icon icon="pixelarticons:folder"></iconify-icon> All Courses
    </div>
    <div class="courses-grid" id="coursesGrid">
      <!-- Dynamically filled -->
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../src/js/firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { doc, getDoc, collection, getDocs, query, orderBy, updateDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Elements
    const userAvatar = document.getElementById('userAvatar');
    const sparksDisplay = document.getElementById('sparksDisplay');
    const greetingText = document.getElementById('greetingText');
    const recentScroll = document.getElementById('recentScroll');
    const coursesGrid = document.getElementById('coursesGrid');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const userMenu = document.getElementById('userMenu');

    let userData = null;
    let allCourses = [];

    // Auth state
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        userData = userDoc.data();
        userData.uid = user.uid;
        updateUI();
      }
      loadCourses();
    });

    function updateUI() {
      userAvatar.textContent = (userData.name || 'A')[0].toUpperCase();
      greetingText.textContent = `Hello, ${userData.name || 'Adventurer'}!`;
      sparksDisplay.textContent = userData.sparks || 0;
    }

    // Toggle dropdown
    userAvatar.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.classList.toggle('active');
    });
    document.addEventListener('click', () => {
      dropdownMenu.classList.remove('active');
    });

    // Settings / Logout
    document.getElementById('settingsBtn').addEventListener('click', () => {
      // Navigate to settings page (placeholder)
      alert('Settings page coming soon.');
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '../index.html';
    });

    // Load courses
    async function loadCourses() {
      try {
        const snap = await getDocs(query(collection(db, 'courses'), orderBy('createdAt')));
        allCourses = [];
        snap.forEach(doc => allCourses.push({ id: doc.id, ...doc.data() }));
        renderRecent();
        renderAllCourses();
      } catch (error) {
        console.error(error);
        coursesGrid.innerHTML = '<div class="empty-state">Could not load courses.</div>';
      }
    }

    // Render recent courses (from user data)
    function renderRecent() {
      const recentIds = userData?.recentCourses || [];
      if (recentIds.length === 0) {
        recentScroll.innerHTML = '<div style="color:var(--text-secondary); font-size:0.9rem;">No recent activity yet.</div>';
        return;
      }
      // Get course details for recent IDs (they may not be in allCourses if not loaded, but loadCourses done first)
      const recentCourses = recentIds.map(id => allCourses.find(c => c.id === id)).filter(Boolean);
      recentScroll.innerHTML = recentCourses.slice(0, 5).map(course => `
        <div class="recent-card" onclick="window.openCourse('${course.id}')">
          <div class="recent-title">${escapeHtml(course.title)}</div>
          <div class="recent-meta">${escapeHtml(course.description?.substring(0, 30) || '')}</div>
        </div>
      `).join('');
    }

    // Render all courses grid with progress
    function renderAllCourses() {
      if (allCourses.length === 0) {
        coursesGrid.innerHTML = '<div class="empty-state">No courses available yet. Check back soon!</div>';
        return;
      }
      const completedLessons = userData?.completedLessons || [];
      coursesGrid.innerHTML = allCourses.map(course => {
        // Calculate progress (simplistic: count completed lessons of this course)
        const courseCompleted = completedLessons.filter(id => id.startsWith(course.id)).length;
        const totalLessons = course.totalLessons || 10; // fallback
        const progress = totalLessons > 0 ? Math.min(100, (courseCompleted / totalLessons) * 100) : 0;
        return `
          <div class="course-card" onclick="window.openCourse('${course.id}')">
            <iconify-icon icon="pixelarticons:folder" class="course-icon"></iconify-icon>
            <div class="course-title">${escapeHtml(course.title)}</div>
            <div class="course-desc">${escapeHtml(course.description || '')}</div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%;"></div>
            </div>
            <div class="course-meta">
              <span>${Math.round(progress)}% complete</span>
              <span>${courseCompleted} / ${totalLessons} lessons</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Open course and update recent
    window.openCourse = async function(courseId) {
      if (userData?.uid) {
        // Add to recentCourses in user doc
        const userRef = doc(db, 'users', userData.uid);
        await updateDoc(userRef, {
          recentCourses: arrayUnion(courseId),
          lastActive: serverTimestamp()
        }).catch(err => console.error('Could not update recent:', err));
      }
      window.location.href = `course.html?courseId=${courseId}`;
    };
  </script>
</body>
</html>
