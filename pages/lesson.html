<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson · Akademia</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <!-- Preload critical font to reduce FOIT -->
  <link rel="preload" href="https://fonts.cdnfonts.com/s/125011/BlockBlueprint.woff" as="font" type="font/woff" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <style>
    /* Fallback if custom font fails */
    @font-face {
      font-family: 'BlockBlueprint';
      src: local('BlockBlueprint'), local('BlockBlueprint');
      font-display: swap;
    }
    /* System monospace for body */
    body {
      font-family: 'Courier New', 'Consolas', 'Monaco', monospace;
    }
    h1,h2,h3,h4 { font-family: 'BlockBlueprint', 'Segoe UI', sans-serif; letter-spacing: -0.3px; }
  </style>

  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <!-- Skulpt for Python (preload) -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg-secondary: #F7F7F7;
      --text: #1e1e1e;
      --text-secondary: #777;
      --border: #E5E5E5;
      --radius: 16px;
      --gold: #FFC800;
      --error: #FF4B4B;
      --panel-resize-handle: 4px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg-secondary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      height: 60px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-img { width:34px; height:34px; border-radius:10px; }
    .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
    .logo-text span { color:var(--green); }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      text-decoration: none;
    }

    /* Main layout */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Left panel */
    .left-panel {
      width: 260px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .lesson-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text);
    }
    .nav-btn:hover { background: #ebf7e6; border-color: var(--green); }
    .nav-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .lesson-details {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 14px;
      border: 1px solid var(--border);
    }
    .lesson-details h3 {
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .ai-placeholder {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      padding: 8px;
      border-radius: 8px;
      background: #f0f0f0;
      margin-top: auto;
    }

    /* Center content */
    .lesson-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }
    .lesson-header { margin-bottom: 24px; }
    .lesson-header h1 { font-size: 2rem; margin-bottom: 4px; }
    .lesson-header p { color: var(--text-secondary); font-size:0.9rem; }

    /* Block styles */
    .block { margin-bottom: 24px; }
    .block h3 { font-size:1.2rem; margin-bottom:8px; }
    .block p { color:var(--text-secondary); line-height:1.6; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .hint, .tip, .warning {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom:12px;
    }
    .hint { background:#FFF9E6; border:1px solid #FFD700; }
    .tip { background:#E6F7FF; border:1px solid #91D5FF; }
    .warning { background:#FFF1F0; border:1px solid #FFA39E; }

    .quiz-block {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom:16px;
      background: var(--bg-secondary);
    }
    .question { font-weight:700; margin-bottom:12px; }
    .option {
      padding:10px; border:1px solid var(--border); border-radius:8px;
      margin-bottom:8px; cursor:pointer; transition:all 0.2s;
    }
    .option:hover { background:var(--bg); }
    .option.selected { border-color:var(--green); background:#F0FDE0; }
    .option.correct { border-color:var(--green); background:#E8F8E8; }
    .option.wrong { border-color:var(--error); background:#FFE6E6; }

    .fill-blank input {
      padding:8px 12px; border:1px solid var(--border); border-radius:6px;
      font-family:inherit; font-size:0.9rem; margin:4px;
    }
    .fill-blank input.correct-input { border-color:var(--green); }
    .fill-blank input.wrong-input { border-color:var(--error); }

    .complete-btn {
      display: block;
      width: 100%;
      margin-top: 32px;
      font-family:inherit;
    }

    .btn {
      padding:12px 24px; border:none; border-radius:14px; font-weight:700;
      font-size:0.9rem; cursor:pointer; font-family:inherit;
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      transition:all 0.2s; background:var(--green); color:white;
      box-shadow:0 4px 0 var(--green-hover);
    }
    .btn:hover { background:var(--green-hover); transform:translateY(-1px); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }

    /* Right panel (resizable) */
    .right-panel {
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s;
      /* default width set by JS */
    }
    .panel-tabs {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .panel-tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .panel-tab.active {
      background: var(--bg);
      border-bottom: 2px solid var(--green);
    }
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Editor specific */
    .editor-lang-select {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .lang-btn {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: white;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .lang-btn.active {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }
    .code-editor {
      width: 100%;
      height: 200px;
      background: #1e1e1e;
      color: #d4d4d4;
      border: none;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      resize: vertical;
      border-radius: 8px;
    }
    .preview-frame {
      width: 100%;
      height: 150px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 12px;
    }
    .console-output {
      background: #1e1e1e;
      color: #aaa;
      padding: 12px;
      border-radius: 8px;
      min-height: 60px;
      white-space: pre-wrap;
      margin-top: 8px;
    }

    /* Resize handle */
    .resize-handle {
      width: var(--panel-resize-handle);
      background: var(--border);
      cursor: col-resize;
      transition: background 0.2s;
    }
    .resize-handle:hover { background: var(--green); }

    /* Stats card */
    .card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .big-number { font-size:2rem; font-weight:800; font-family:'BlockBlueprint', sans-serif; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <img src="../favicon.ico" alt="Akademia" class="logo-img">
      <span class="logo-text">Akade<span>mia</span></span>
    </a>
    <a href="learn.html" class="back-btn">
      <iconify-icon icon="pixelarticons:arrow-left"></iconify-icon> Back to Courses
    </a>
  </div>

  <div class="main-layout">
    <!-- Left panel -->
    <aside class="left-panel" id="leftPanel">
      <div class="lesson-nav" id="lessonNav">
        <button class="nav-btn" id="prevLessonBtn" disabled>
          <iconify-icon icon="pixelarticons:chevron-left"></iconify-icon> Previous
        </button>
        <button class="nav-btn" id="nextLessonBtn" disabled>
          Next <iconify-icon icon="pixelarticons:chevron-right"></iconify-icon>
        </button>
      </div>
      <div class="lesson-details" id="lessonDetailsCard">
        <h3>Lesson Info</h3>
        <div id="lessonDetails"></div>
      </div>
      <div class="ai-placeholder">
        <iconify-icon icon="pixelarticons:bot"></iconify-icon>
        <span>AI Companion (soon)</span>
      </div>
    </aside>

    <!-- Main content -->
    <main class="lesson-content" id="lessonContent">
      <div class="lesson-header">
        <h1 id="lessonTitle">Lesson Title</h1>
        <p id="lessonType">Loading...</p>
      </div>
      <div id="blocksContainer"></div>
      <button class="btn complete-btn" id="completeLessonBtn" disabled>
        <iconify-icon icon="pixelarticons:check"></iconify-icon> Mark as Complete
      </button>
    </main>

    <!-- Right panel (resizable) -->
    <div class="right-panel" id="rightPanel" style="width: 320px;">
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="progress">Progress</div>
        <div class="panel-tab" data-tab="editor">Editor</div>
      </div>
      <div class="panel-content" id="panelContent">
        <!-- Progress tab (default) -->
        <div id="progressTab">
          <div class="card">
            <h3>Your Progress</h3>
            <div class="big-number" id="completedCount">0</div>
            <small>lessons completed</small>
            <div class="big-number" style="margin-top:12px;" id="sparksCount">0</div>
            <small>sparks earned</small>
          </div>
        </div>
        <!-- Editor tab (hidden initially) -->
        <div id="editorTab" style="display:none;">
          <div class="editor-lang-select" id="langSelect">
            <span class="lang-btn active" data-lang="html">HTML</span>
            <span class="lang-btn" data-lang="css">CSS</span>
            <span class="lang-btn" data-lang="javascript">JS</span>
            <span class="lang-btn" data-lang="python">Python</span>
          </div>
          <textarea class="code-editor" id="codeEditor" placeholder="Write your code here..."></textarea>
          <button class="btn" id="runCodeBtn" style="margin-top:8px;">Run</button>
          <div class="preview-frame" id="previewFrame"></div>
          <div class="console-output" id="consoleOutput"></div>
        </div>
      </div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <script type="module">
    import { auth, db } from '../src/js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { doc, getDoc, collection, getDocs, query, orderBy, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
    import { Compiler } from '../src/js/compiler.js';

    // --- State ---
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('courseId');
    const moduleId = params.get('moduleId');
    const lessonId = params.get('lessonId');

    if (!courseId || !moduleId || !lessonId) {
      document.getElementById('lessonContent').innerHTML = '<p>Missing lesson parameters.</p>';
      throw new Error('Missing parameters');
    }

    let currentUser = null;
    let userData = { completedLessons: [], sparks: 0 };
    let lessonData = null;
    let allLessonsInModule = [];
    let currentLessonIndex = -1;
    let correctAnswerSet = new Set(); // track correctly answered question blocks to avoid double sparks
    const compiler = new Compiler();

    // --- DOM elements ---
    const completeBtn = document.getElementById('completeLessonBtn');
    const progressTab = document.getElementById('progressTab');
    const editorTab = document.getElementById('editorTab');
    const panelTabs = document.querySelectorAll('.panel-tab');
    const langSelect = document.getElementById('langSelect');
    const codeEditor = document.getElementById('codeEditor');
    const runCodeBtn = document.getElementById('runCodeBtn');
    const previewFrame = document.getElementById('previewFrame');
    const consoleOutput = document.getElementById('consoleOutput');
    const resizeHandle = document.getElementById('resizeHandle');
    const rightPanel = document.getElementById('rightPanel');

    // --- Panel tab switching ---
    panelTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        panelTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        if (tabName === 'progress') {
          progressTab.style.display = 'block';
          editorTab.style.display = 'none';
        } else {
          progressTab.style.display = 'none';
          editorTab.style.display = 'block';
        }
      });
    });

    // --- Language selection for editor ---
    let currentLang = 'html';
    langSelect.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        langSelect.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        codeEditor.placeholder = `Write ${currentLang.toUpperCase()} code...`;
      });
    });

    // --- Run code ---
    runCodeBtn.addEventListener('click', async () => {
      const code = codeEditor.value;
      if (!code.trim()) return;
      const result = await compiler.runCode(currentLang, code);
      if (result.type === 'html') {
        previewFrame.srcdoc = result.code;
        previewFrame.style.display = 'block';
        consoleOutput.style.display = 'none';
      } else if (result.type === 'script') {
        // JS execution using iframe
        const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(`<script>${result.code}<\/script>`);
        iframeDoc.close();
        previewFrame.style.display = 'block';
        consoleOutput.style.display = 'none';
      } else if (result.type === 'text') {
        previewFrame.style.display = 'none';
        consoleOutput.style.display = 'block';
        consoleOutput.textContent = result.output;
      }
    });

    // --- Resize right panel ---
    let isResizing = false;
    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const newWidth = window.innerWidth - e.clientX;
      if (newWidth > 320 && newWidth < 700) {
        rightPanel.style.width = newWidth + 'px';
      }
    });
    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
      }
    });

    // --- Load user data ---
    async function loadUserData(uid) {
      const userRef = doc(db, 'users', uid);
      const userDoc = await getDoc(userRef);
      if (userDoc.exists()) {
        userData = userDoc.data();
        userData.completedLessons = userData.completedLessons || [];
        userData.sparks = userData.sparks || 0;
      }
      updateProgressUI();
    }

    // --- Load module lessons (for navigation) ---
    async function loadModuleLessons() {
      const lesSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules', moduleId, 'lessons'), orderBy('createdAt')));
      allLessonsInModule = [];
      lesSnap.forEach(doc => allLessonsInModule.push({ id: doc.id, ...doc.data() }));
      currentLessonIndex = allLessonsInModule.findIndex(l => l.id === lessonId);
      updateNavButtons();
    }

    // --- Load current lesson ---
    async function loadLesson() {
      const lessonRef = doc(db, 'courses', courseId, 'modules', moduleId, 'lessons', lessonId);
      const snap = await getDoc(lessonRef);
      if (!snap.exists()) {
        document.getElementById('lessonContent').innerHTML = '<p>Lesson not found.</p>';
        return;
      }
      lessonData = snap.data();
      document.getElementById('lessonTitle').textContent = lessonData.title || 'Untitled';
      document.getElementById('lessonType').textContent = lessonData.type || 'lesson';
      document.getElementById('lessonDetails').innerHTML = `
        <p><strong>Type:</strong> ${escapeHtml(lessonData.type || 'lesson')}</p>
        ${lessonData.description ? `<p>${escapeHtml(lessonData.description)}</p>` : ''}
      `;
      renderBlocks(lessonData.blocks || []);
    }

    // --- Render blocks ---
    function renderBlocks(blocks) {
      const container = document.getElementById('blocksContainer');
      container.innerHTML = '';
      blocks.forEach((block, index) => {
        const blockEl = document.createElement('div');
        blockEl.className = 'block';
        blockEl.innerHTML = renderBlock(block, index);
        container.appendChild(blockEl);
      });
      attachInteractiveListeners();
      checkCompletionStatus();
    }

    function renderBlock(block, idx) {
      const data = block.data || {};
      switch (block.type) {
        case 'heading': return `<h3>${escapeHtml(data.text || '')}</h3>`;
        case 'paragraph': return `<p>${escapeHtml(data.text || '')}</p>`;
        case 'image': return data.url ? `<img src="${data.url}" alt="Lesson image" style="max-width:100%; border-radius:8px;">` : '';
        case 'video':
          if (data.url) {
            const embed = getYouTubeEmbed(data.url);
            return embed ? `<div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="${embed}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:8px;"></iframe></div>` : `<a href="${data.url}" target="_blank">Watch video</a>`;
          }
          return '';
        case 'console':
          return `<pre><code>${escapeHtml(data.code || '')}</code></pre>${data.output ? `<p><strong>Output:</strong> ${escapeHtml(data.output)}</p>` : ''}`;
        case 'hint': return `<div class="hint">💡 ${escapeHtml(data.text || '')}</div>`;
        case 'warning': return `<div class="warning">⚠️ ${escapeHtml(data.text || '')}</div>`;
        case 'tip': return `<div class="tip">💡 ${escapeHtml(data.text || '')}</div>`;
        case 'multiple-choice': return renderMCQ(data, idx);
        case 'fill-blank': return renderFillBlank(data, idx);
        case 'quiz': return renderQuiz(data, idx);
        case 'divider': return '<hr>';
        case 'completion': return `<p style="font-weight:700; color:var(--green);">${escapeHtml(data.message || 'Lesson complete!')}</p>`;
        default: return '';
      }
    }

    function renderMCQ(data, idx) {
      const options = data.options || [];
      return `
        <div class="quiz-block" data-block-type="mcq" data-block-idx="${idx}" data-correct="${data.correct}">
          <div class="question">${escapeHtml(data.question || '')}</div>
          ${options.map((opt, i) => `<div class="option" data-option="${i}">${escapeHtml(opt)}</div>`).join('')}
        </div>
      `;
    }

    function renderFillBlank(data, idx) {
      const answers = data.answers || [];
      const text = data.text || '';
      const parts = text.split('___');
      let html = `<div class="quiz-block fill-blank" data-block-type="fill-blank" data-block-idx="${idx}" data-answers='${JSON.stringify(answers)}'>`;
      parts.forEach((part, i) => {
        html += escapeHtml(part);
        if (i < parts.length - 1) {
          html += `<input type="text" placeholder="..." />`;
        }
      });
      html += '<button class="btn" style="margin-top:8px; width:auto;" onclick="window.checkFillBlanks(this)">Check</button></div>';
      return html;
    }

    function renderQuiz(data, idx) {
      if (!data.items) return '';
      let html = `<div class="quiz-block" data-block-type="quiz" data-block-idx="${idx}">`;
      data.items.forEach((item, qi) => {
        const options = item.options || [];
        html += `<div class="quiz-item" data-qidx="${qi}" data-correct="${item.correct}">
          <div class="question">Q${qi+1}: ${escapeHtml(item.question || '')}</div>
          ${options.map((opt, oi) => `<div class="option" data-option="${oi}">${escapeHtml(opt)}</div>`).join('')}
        </div>`;
      });
      html += '</div>';
      return html;
    }

    // --- Interactive listeners ---
    function attachInteractiveListeners() {
      // MCQ
      document.querySelectorAll('.quiz-block[data-block-type="mcq"]').forEach(block => {
        const correct = parseInt(block.dataset.correct);
        const blockIdx = block.dataset.blockIdx;
        block.querySelectorAll('.option').forEach(opt => {
          opt.addEventListener('click', () => {
            if (block.querySelector('.option.selected')) return;
            const chosen = parseInt(opt.dataset.option);
            block.querySelectorAll('.option').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
            if (chosen === correct) {
              opt.classList.add('correct');
              if (!correctAnswerSet.has(`mcq-${blockIdx}`)) {
                correctAnswerSet.add(`mcq-${blockIdx}`);
                awardSparks(10);
              }
            } else {
              opt.classList.add('wrong');
              block.querySelector(`.option[data-option="${correct}"]`).classList.add('correct');
            }
            checkCompletionStatus();
          });
        });
      });

      // Quiz items
      document.querySelectorAll('.quiz-item').forEach(item => {
        const correct = parseInt(item.dataset.correct);
        const qidx = item.dataset.qidx;
        const blockIdx = item.closest('.quiz-block').dataset.blockIdx;
        const key = `quiz-${blockIdx}-${qidx}`;
        item.querySelectorAll('.option').forEach(opt => {
          opt.addEventListener('click', () => {
            if (item.querySelector('.option.selected')) return;
            const chosen = parseInt(opt.dataset.option);
            item.querySelectorAll('.option').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
            if (chosen === correct) {
              opt.classList.add('correct');
              if (!correctAnswerSet.has(key)) {
                correctAnswerSet.add(key);
                awardSparks(10);
              }
            } else {
              opt.classList.add('wrong');
              item.querySelector(`.option[data-option="${correct}"]`).classList.add('correct');
            }
            checkCompletionStatus();
          });
        });
      });

      // Fill-blank check function (exposed globally)
      window.checkFillBlanks = function(btn) {
        const container = btn.closest('.fill-blank');
        const answers = JSON.parse(container.dataset.answers);
        const blockIdx = container.dataset.blockIdx;
        const inputs = container.querySelectorAll('input');
        let allCorrect = true;
        inputs.forEach((input, i) => {
          if (input.value.trim().toLowerCase() === answers[i].toLowerCase()) {
            input.classList.add('correct-input');
            input.classList.remove('wrong-input');
          } else {
            input.classList.add('wrong-input');
            input.classList.remove('correct-input');
            allCorrect = false;
          }
        });
        if (allCorrect && !correctAnswerSet.has(`fill-${blockIdx}`)) {
          correctAnswerSet.add(`fill-${blockIdx}`);
          awardSparks(10);
        }
        checkCompletionStatus();
      };
    }

    // --- Check if all interactive blocks are correctly answered ---
    function checkCompletionStatus() {
      let allCorrect = true;
      // MCQ
      document.querySelectorAll('.quiz-block[data-block-type="mcq"]').forEach(block => {
        if (!block.querySelector('.option.correct')) allCorrect = false;
      });
      // Quiz items
      document.querySelectorAll('.quiz-item').forEach(item => {
        if (!item.querySelector('.option.correct')) allCorrect = false;
      });
      // Fill-blank (need all inputs correct)
      document.querySelectorAll('.fill-blank').forEach(block => {
        const answers = JSON.parse(block.dataset.answers);
        const inputs = block.querySelectorAll('input');
        inputs.forEach((input, i) => {
          if (input.value.trim().toLowerCase() !== answers[i].toLowerCase()) allCorrect = false;
        });
      });

      const hasInteractive = document.querySelectorAll('.quiz-block, .quiz-item, .fill-blank').length > 0;
      completeBtn.disabled = hasInteractive ? !allCorrect : false; // if no interactive blocks, enable
    }

    // --- Award sparks and update UI ---
    function awardSparks(amount) {
      userData.sparks += amount;
      updateProgressUI();
      // Persist to Firestore (optimistic)
      const userRef = doc(db, 'users', currentUser.uid);
      updateDoc(userRef, { sparks: increment(amount) }).catch(console.error);
    }

    // --- Mark as complete ---
    completeBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      if (userData.completedLessons.includes(lessonId)) {
        alert('Already completed.');
        return;
      }
      const userRef = doc(db, 'users', currentUser.uid);
      try {
        await updateDoc(userRef, {
          completedLessons: arrayUnion(lessonId),
          sparks: increment(100) // completion reward
        });
        userData.completedLessons.push(lessonId);
        userData.sparks += 100;
        updateProgressUI();
        alert('Lesson completed! +100 Sparks');
        setTimeout(() => {
          window.location.href = `course.html?courseId=${courseId}&moduleId=${moduleId}`;
        }, 1500);
      } catch (error) {
        console.error(error);
        alert('Failed to save progress.');
      }
    });

    // --- Navigation ---
    function updateNavButtons() {
      const prevBtn = document.getElementById('prevLessonBtn');
      const nextBtn = document.getElementById('nextLessonBtn');
      if (currentLessonIndex > 0) {
        prevBtn.disabled = false;
        prevBtn.onclick = () => navigateToLesson(allLessonsInModule[currentLessonIndex - 1].id);
      } else {
        prevBtn.disabled = true;
      }
      if (currentLessonIndex < allLessonsInModule.length - 1) {
        nextBtn.disabled = false;
        nextBtn.onclick = () => navigateToLesson(allLessonsInModule[currentLessonIndex + 1].id);
      } else {
        nextBtn.disabled = true;
      }
    }

    function navigateToLesson(newLessonId) {
      window.location.href = `lesson.html?courseId=${courseId}&moduleId=${moduleId}&lessonId=${newLessonId}`;
    }

    // --- Progress UI ---
    function updateProgressUI() {
      document.getElementById('completedCount').textContent = userData.completedLessons.length;
      document.getElementById('sparksCount').textContent = userData.sparks;
    }

    // --- Helpers ---
    function getYouTubeEmbed(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      if (match && match[2].length === 11) {
        return `https://www.youtube.com/embed/${match[2]}`;
      }
      return null;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // --- Auth & init ---
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      await loadUserData(user.uid);
      await loadModuleLessons();
      await loadLesson();
    });
  </script>
</body>
</html>
