<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson · Akademia</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <!-- Only BlockBlueprint via CDN (stable) – fallback to system monospace for body -->
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'BlockBlueprint';
      src: local('BlockBlueprint'), local('BlockBlueprint');
      font-display: swap;
    }
  </style>

  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg-secondary: #F7F7F7;
      --text: #1e1e1e;
      --text-secondary: #777;
      --border: #E5E5E5;
      --radius: 16px;
      --gold: #FFC800;
      --error: #FF4B4B;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Courier New', 'Consolas', 'Monaco', monospace; /* fallback */
      background: var(--bg-secondary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

    /* Top bar */
    .topbar {
      height: 60px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-img { width:34px; height:34px; border-radius:10px; }
    .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
    .logo-text span { color:var(--green); }

    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      text-decoration: none;
    }

    /* Main layout */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Center – lesson content */
    .lesson-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }
    .lesson-header {
      margin-bottom: 24px;
    }
    .lesson-header h1 {
      font-size: 2rem;
      margin-bottom: 4px;
    }
    .lesson-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Block styles */
    .block {
      margin-bottom: 24px;
    }
    .block h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .block p {
      color: var(--text-secondary);
      line-height: 1.6;
    }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .hint, .tip, .warning {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .hint { background: #FFF9E6; border: 1px solid #FFD700; }
    .tip { background: #E6F7FF; border: 1px solid #91D5FF; }
    .warning { background: #FFF1F0; border: 1px solid #FFA39E; }

    .quiz-block {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      background: var(--bg-secondary);
    }
    .question {
      font-weight: 700;
      margin-bottom: 12px;
    }
    .option {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover { background: var(--bg); }
    .option.selected { border-color: var(--green); background: #F0FDE0; }
    .option.correct { border-color: var(--green); background: #E8F8E8; }
    .option.wrong { border-color: var(--error); background: #FFE6E6; }

    .fill-blank input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.9rem;
    }
    .fill-blank input.correct-input { border-color: var(--green); }
    .fill-blank input.wrong-input { border-color: var(--error); }

    .complete-btn {
      display: block;
      width: 100%;
      margin-top: 32px;
      font-family: inherit;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      background: var(--green);
      color: white;
      box-shadow: 0 4px 0 var(--green-hover);
    }
    .btn:hover {
      background: var(--green-hover);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Right panel (learner stats) */
    .right-panel {
      width: 280px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .stats-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }
    .stats-card h3 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .big-number {
      font-size: 2rem;
      font-weight: 800;
      font-family: 'BlockBlueprint', sans-serif;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <img src="../favicon.ico" alt="Akademia" class="logo-img">
      <span class="logo-text">Akade<span>mia</span></span>
    </a>
    <a href="learn.html" class="back-btn">
      <iconify-icon icon="pixelarticons:arrow-left"></iconify-icon> Back to Courses
    </a>
  </div>

  <div class="main-layout">
    <!-- Main lesson content -->
    <main class="lesson-content" id="lessonContent">
      <div class="lesson-header">
        <h1 id="lessonTitle">Lesson Title</h1>
        <p id="lessonType">Loading...</p>
      </div>
      <div id="blocksContainer"></div>
      <button class="btn complete-btn" id="completeLessonBtn" disabled>
        <iconify-icon icon="pixelarticons:check"></iconify-icon> Mark as Complete
      </button>
    </main>

    <!-- Right panel: learner stats -->
    <aside class="right-panel" id="rightPanel">
      <!-- filled by JS -->
    </aside>
  </div>

  <script type="module">
    import { auth, db } from '../src/js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { doc, getDoc, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // URL params
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('courseId');
    const moduleId = params.get('moduleId');
    const lessonId = params.get('lessonId');

    if (!courseId || !moduleId || !lessonId) {
      document.getElementById('lessonContent').innerHTML = '<p>Missing lesson parameters.</p>';
      throw new Error('Missing courseId, moduleId, or lessonId');
    }

    let currentUser = null;
    let userData = { completedLessons: [], sparks: 0 };
    let lessonData = null;
    let allBlocksCorrect = false; // track if all interactive questions are answered correctly

    // Fetch user data
    async function loadUserData(uid) {
      const userRef = doc(db, 'users', uid);
      const userDoc = await getDoc(userRef);
      if (userDoc.exists()) {
        userData = userDoc.data();
        userData.completedLessons = userData.completedLessons || [];
        userData.sparks = userData.sparks || 0;
      }
      renderRightPanel();
    }

    // Load lesson from Firestore
    async function loadLesson() {
      const lessonRef = doc(db, 'courses', courseId, 'modules', moduleId, 'lessons', lessonId);
      const snap = await getDoc(lessonRef);
      if (!snap.exists()) {
        document.getElementById('lessonContent').innerHTML = '<p>Lesson not found.</p>';
        return;
      }
      lessonData = snap.data();
      document.getElementById('lessonTitle').textContent = lessonData.title || 'Untitled';
      document.getElementById('lessonType').textContent = lessonData.type || 'lesson';
      renderBlocks(lessonData.blocks || []);
    }

    // Render blocks
    function renderBlocks(blocks) {
      const container = document.getElementById('blocksContainer');
      container.innerHTML = '';
      allBlocksCorrect = false; // reset

      blocks.forEach((block, index) => {
        const blockEl = document.createElement('div');
        blockEl.className = 'block';
        blockEl.innerHTML = renderBlock(block, index);
        container.appendChild(blockEl);
      });

      // After rendering, attach event listeners for interactive blocks
      attachInteractiveListeners();
    }

    function renderBlock(block, idx) {
      const data = block.data || {};
      switch (block.type) {
        case 'heading':
          return `<h3>${escapeHtml(data.text || '')}</h3>`;
        case 'paragraph':
          return `<p>${escapeHtml(data.text || '')}</p>`;
        case 'image':
          return data.url ? `<img src="${data.url}" alt="Lesson image" style="max-width:100%; border-radius:8px;">` : '';
        case 'video':
          if (data.url) {
            const embed = getYouTubeEmbed(data.url);
            return embed ? `<div style="position:relative; padding-bottom:56.25%; height:0;"><iframe src="${embed}" frameborder="0" allowfullscreen style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:8px;"></iframe></div>` : `<a href="${data.url}" target="_blank">Watch video</a>`;
          }
          return '';
        case 'console':
          return `<pre><code>${escapeHtml(data.code || '')}</code></pre>${data.output ? `<p><strong>Output:</strong> ${escapeHtml(data.output)}</p>` : ''}`;
        case 'hint':
          return `<div class="hint">💡 ${escapeHtml(data.text || '')}</div>`;
        case 'warning':
          return `<div class="warning">⚠️ ${escapeHtml(data.text || '')}</div>`;
        case 'tip':
          return `<div class="tip">💡 ${escapeHtml(data.text || '')}</div>`;
        case 'multiple-choice':
          return renderMCQ(data, idx);
        case 'fill-blank':
          return renderFillBlank(data, idx);
        case 'quiz':
          return renderQuiz(data, idx);
        case 'divider':
          return '<hr>';
        case 'completion':
          return `<p style="font-weight:700; color:var(--green);">${escapeHtml(data.message || 'Lesson complete!')}</p>`;
        default:
          return '';
      }
    }

    function renderMCQ(data, idx) {
      const options = data.options || [];
      return `
        <div class="quiz-block" data-block-type="mcq" data-block-idx="${idx}" data-correct="${data.correct}">
          <div class="question">${escapeHtml(data.question || '')}</div>
          ${options.map((opt, i) => `<div class="option" data-option="${i}">${escapeHtml(opt)}</div>`).join('')}
        </div>
      `;
    }

    function renderFillBlank(data, idx) {
      const answers = data.answers || [];
      const text = data.text || '';
      // Replace blanks with input fields
      const parts = text.split('___');
      let html = '<div class="quiz-block fill-blank" data-block-type="fill-blank" data-block-idx="'+idx+'" data-answers=\'' + JSON.stringify(answers) + '\'>';
      parts.forEach((part, i) => {
        html += escapeHtml(part);
        if (i < parts.length - 1) {
          html += `<input type="text" placeholder="..." />`;
        }
      });
      html += '<button class="btn" style="margin-top:8px; width:auto;" onclick="checkFillBlanks(this)">Check</button></div>';
      return html;
    }

    function renderQuiz(data, idx) {
      if (!data.items) return '';
      let html = `<div class="quiz-block" data-block-type="quiz" data-block-idx="${idx}">`;
      data.items.forEach((item, qi) => {
        const options = item.options || [];
        html += `<div class="quiz-item" data-qidx="${qi}" data-correct="${item.correct}">
          <div class="question">Q${qi+1}: ${escapeHtml(item.question || '')}</div>
          ${options.map((opt, oi) => `<div class="option" data-option="${oi}">${escapeHtml(opt)}</div>`).join('')}
        </div>`;
      });
      html += '</div>';
      return html;
    }

    // Attach listeners for MCQ, quiz options
    function attachInteractiveListeners() {
      // MCQ
      document.querySelectorAll('.quiz-block[data-block-type="mcq"]').forEach(block => {
        const correct = parseInt(block.dataset.correct);
        block.querySelectorAll('.option').forEach(opt => {
          opt.addEventListener('click', () => {
            // Prevent multiple selections
            if (block.querySelector('.option.selected')) return;
            const chosen = parseInt(opt.dataset.option);
            block.querySelectorAll('.option').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
            if (chosen === correct) {
              opt.classList.add('correct');
            } else {
              opt.classList.add('wrong');
              block.querySelector(`.option[data-option="${correct}"]`).classList.add('correct');
            }
            checkAllBlocksCorrect();
          });
        });
      });

      // Quiz items (individual questions)
      document.querySelectorAll('.quiz-item').forEach(item => {
        const correct = parseInt(item.dataset.correct);
        item.querySelectorAll('.option').forEach(opt => {
          opt.addEventListener('click', () => {
            if (item.querySelector('.option.selected')) return;
            const chosen = parseInt(opt.dataset.option);
            item.querySelectorAll('.option').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
            if (chosen === correct) {
              opt.classList.add('correct');
            } else {
              opt.classList.add('wrong');
              item.querySelector(`.option[data-option="${correct}"]`).classList.add('correct');
            }
            checkAllBlocksCorrect();
          });
        });
      });

      // Fill-blank check is handled by inline function, but we still need to re-evaluate completion status after check
      window.checkFillBlanks = function(btn) {
        const container = btn.closest('.fill-blank');
        const answers = JSON.parse(container.dataset.answers);
        const inputs = container.querySelectorAll('input');
        let allCorrect = true;
        inputs.forEach((input, i) => {
          if (input.value.trim().toLowerCase() === answers[i].toLowerCase()) {
            input.classList.add('correct-input');
            input.classList.remove('wrong-input');
          } else {
            input.classList.add('wrong-input');
            input.classList.remove('correct-input');
            allCorrect = false;
          }
        });
        // After checking, re-evaluate overall completion
        checkAllBlocksCorrect();
      };

      // Initial check
      checkAllBlocksCorrect();
    }

    function checkAllBlocksCorrect() {
      // Check all MCQ blocks
      const mcqBlocks = document.querySelectorAll('.quiz-block[data-block-type="mcq"]');
      let allCorrect = mcqBlocks.length > 0;
      mcqBlocks.forEach(block => {
        const correctOpt = block.querySelector('.option.correct');
        if (!correctOpt) allCorrect = false;
      });

      // Check quiz items
      const quizItems = document.querySelectorAll('.quiz-item');
      quizItems.forEach(item => {
        const correctOpt = item.querySelector('.option.correct');
        if (!correctOpt) allCorrect = false;
      });

      // Check fill-blank blocks
      const fillBlocks = document.querySelectorAll('.fill-blank');
      fillBlocks.forEach(block => {
        const inputs = block.querySelectorAll('input');
        const answers = JSON.parse(block.dataset.answers);
        inputs.forEach((input, i) => {
          if (input.value.trim().toLowerCase() !== answers[i].toLowerCase()) {
            allCorrect = false;
          }
        });
      });

      // Enable complete button only if all interactive blocks are answered correctly
      const completeBtn = document.getElementById('completeLessonBtn');
      if (allCorrect && (mcqBlocks.length > 0 || quizItems.length > 0 || fillBlocks.length > 0)) {
        completeBtn.disabled = false;
      } else {
        completeBtn.disabled = true;
      }
    }

    // Completion button handler
    document.getElementById('completeLessonBtn').addEventListener('click', async () => {
      if (!currentUser) return;
      const userRef = doc(db, 'users', currentUser.uid);
      try {
        await updateDoc(userRef, {
          completedLessons: arrayUnion(lessonId),
          sparks: increment(50) // default spark reward
        });
        // Update local data
        userData.completedLessons.push(lessonId);
        userData.sparks += 50;
        renderRightPanel();
        alert('Lesson completed! +50 Sparks');
        // Optionally redirect back to course
        setTimeout(() => {
          window.location.href = `course.html?courseId=${courseId}&moduleId=${moduleId}`;
        }, 1500);
      } catch (error) {
        console.error(error);
        alert('Failed to save progress.');
      }
    });

    // Update right panel
    function renderRightPanel() {
      const right = document.getElementById('rightPanel');
      if (!right) return;
      const completedCount = (userData.completedLessons && userData.completedLessons.length) || 0;
      right.innerHTML = `
        <div class="stats-card">
          <h3>Your Progress</h3>
          <div class="big-number">${completedCount}</div>
          <small>lessons completed</small>
        </div>
        <div class="stats-card">
          <h3>Total Sparks</h3>
          <div class="big-number">${userData.sparks || 0}</div>
          <small>earned</small>
        </div>
      `;
    }

    function getYouTubeEmbed(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      if (match && match[2].length === 11) {
        return `https://www.youtube.com/embed/${match[2]}`;
      }
      return null;
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Auth state observer
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      await loadUserData(user.uid);
      await loadLesson();
    });
  </script>
</body>
</html>
