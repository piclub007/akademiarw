<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses · Akademia</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/drafting-mono" rel="stylesheet">
  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg2: #F7F7F7;
      --text: #1e1e1e;
      --text2: #777;
      --border: #E5E5E5;
      --radius: 16px;
      --gold: #FFC800;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Drafting Mono', monospace;
      background: var(--bg2);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    h1,h2,h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }
    .logo img { width: 28px; height: 28px; border-radius: 8px; }
    .logo span { color: var(--green); }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text2);
      transition: background 0.2s;
    }
    .nav-item:hover { background: var(--bg2); color: var(--text); }
    .nav-item.active { background: #ebf7e6; color: var(--green); font-weight: 700; }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-stats {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px 20px;
      text-align: center;
      flex: 1;
      border: 1px solid var(--border);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 900;
      color: var(--green);
      font-family: 'BlockBlueprint', sans-serif;
    }
    .stat-label { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .course-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .course-card:hover {
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }
    .course-icon { font-size: 2rem; color: var(--green); margin-bottom: 12px; }
    .course-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .course-desc { font-size: 0.8rem; color: var(--text2); margin-bottom: 12px; }
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.5s;
    }
    .course-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text2);
    }

    /* Roadmap expand (simple) */
    .roadmap-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 16px;
    }
    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      padding: 8px 0;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .module-header:last-child { border-bottom: none; }
    .lesson-list {
      display: none;
      padding-left: 20px;
    }
    .lesson-list.open { display: block; }
    .lesson-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .lesson-item.completed { color: var(--green); }
    .lesson-item.locked { color: #ccc; pointer-events: none; }

    /* Right dashboard (gamification) */
    .right-panel {
      width: 280px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .user-card {
      text-align: center;
      padding: 16px;
      background: var(--bg2);
      border-radius: var(--radius);
    }
    .avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      font-size: 1.5rem;
      color: #fff;
    }
    .level-badge {
      background: var(--gold);
      color: #000;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin: 8px 0;
      font-size: 0.8rem;
    }
    .xp-bar {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 8px 0;
    }
    .xp-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
    }
    .quest-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
    }
    .quest-check {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quest-check.done { background: var(--green); border-color: var(--green); color: white; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="../favicon.ico" alt="Akademia">
      Akade<span>mia</span>
    </div>
    <nav>
      <div class="nav-item active"><iconify-icon icon="pixelarticons:home"></iconify-icon> Home</div>
      <div class="nav-item"><iconify-icon icon="pixelarticons:compass"></iconify-icon> Discover</div>
      <div class="nav-item"><iconify-icon icon="pixelarticons:trophy"></iconify-icon> Achievements</div>
      <div class="nav-item"><iconify-icon icon="pixelarticons:bookmark"></iconify-icon> Saved</div>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main">
    <!-- Top stats -->
    <div class="top-stats">
      <div class="stat-card">
        <div class="stat-value" id="sparksCount">240</div>
        <div class="stat-label">🔥 Sparks</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streakCount">5</div>
        <div class="stat-label">📅 Day Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="completedCount">12</div>
        <div class="stat-label">✅ Completed</div>
      </div>
    </div>

    <!-- Courses section -->
    <div class="content">
      <h2 style="margin-bottom:16px;">Your Courses</h2>
      <div class="courses-grid" id="coursesGrid"></div>

      <!-- Inline roadmap for selected course -->
      <div class="roadmap-section" id="roadmapSection" style="display:none;">
        <h3 id="selectedCourseTitle" style="margin-bottom:12px;"></h3>
        <div id="moduleContainer"></div>
      </div>
    </div>
  </main>

  <!-- Right gamification panel -->
  <aside class="right-panel">
    <div class="user-card">
      <div class="avatar">A</div>
      <div style="font-weight:700;">Adventurer</div>
      <div class="level-badge">Level 7</div>
      <div class="xp-bar">
        <div class="xp-fill" style="width:68%;"></div>
      </div>
      <small style="color:var(--text2);">2,430 / 3,500 XP</small>
    </div>
    <div class="card">
      <strong>Daily Quests</strong>
      <div class="quest-item">
        <div class="quest-check done">✓</div>
        <span>Complete 1 lesson</span>
      </div>
      <div class="quest-item">
        <div class="quest-check" style="border-color:var(--gold);"> </div>
        <span>Earn 50 sparks</span>
      </div>
      <div class="quest-item">
        <div class="quest-check"></div>
        <span>Study 30 min</span>
      </div>
    </div>
    <div>
      <strong>Recent Achievements</strong>
      <div style="font-size:0.8rem; margin-top:8px;">🏆 Fast Learner</div>
      <div style="font-size:0.8rem;">⭐ First Steps</div>
    </div>
  </aside>

  <script type="module">
    import { db } from '../src/js/firebase-config.js';
    import { collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Simulated user data (would come from Firebase auth + Firestore)
    const user = {
      uid: 'demo123',
      name: 'Adventurer',
      sparks: 240,
      level: 7,
      xp: 2430,
      xpToNext: 3500,
      streak: 5,
      completedLessons: ['les1','les2','les3']
    };

    // Load courses
    async function loadCourses() {
      const coursesGrid = document.getElementById('coursesGrid');
      coursesGrid.innerHTML = '<p>Loading courses...</p>';
      try {
        const q = query(collection(db, 'courses'), orderBy('createdAt'));
        const snap = await getDocs(q);
        coursesGrid.innerHTML = '';
        snap.forEach(courseDoc => {
          const course = { id: courseDoc.id, ...courseDoc.data() };
          const card = document.createElement('div');
          card.className = 'course-card';
          // Calculate progress (simplified: count completed lessons vs total)
          const total = 10; // you'd fetch real count from modules/lessons
          const completed = user.completedLessons.filter(id => id.startsWith(course.id)).length;
          const progress = (completed / total) * 100;
          card.innerHTML = `
            <iconify-icon icon="pixelarticons:folder" class="course-icon"></iconify-icon>
            <div class="course-title">${escapeHtml(course.title)}</div>
            <div class="course-desc">${escapeHtml(course.description || '')}</div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${progress}%;"></div>
            </div>
            <div class="course-meta">
              <span>${Math.round(progress)}% done</span>
              <span>${completed}/${total} lessons</span>
            </div>
          `;
          card.addEventListener('click', () => showRoadmap(course.id, course.title));
          coursesGrid.appendChild(card);
        });
      } catch (err) {
        coursesGrid.innerHTML = '<p>Failed to load courses.</p>';
      }
    }

    // Show module/lesson roadmap for selected course
    async function showRoadmap(courseId, courseTitle) {
      const section = document.getElementById('roadmapSection');
      section.style.display = 'block';
      document.getElementById('selectedCourseTitle').textContent = courseTitle;
      const container = document.getElementById('moduleContainer');
      container.innerHTML = '<p>Loading modules...</p>';
      try {
        const modulesSnap = await getDocs(collection(db, 'courses', courseId, 'modules'));
        container.innerHTML = '';
        for (let modDoc of modulesSnap.docs) {
          const mod = { id: modDoc.id, ...modDoc.data() };
          const modDiv = document.createElement('div');
          modDiv.innerHTML = `
            <div class="module-header">
              <span>${escapeHtml(mod.title)}</span>
              <span>▼</span>
            </div>
            <div class="lesson-list" id="lessons-${mod.id}"></div>
          `;
          container.appendChild(modDiv);
          const header = modDiv.querySelector('.module-header');
          const list = modDiv.querySelector('.lesson-list');
          header.addEventListener('click', () => {
            list.classList.toggle('open');
          });
          // Load lessons for this module
          const lessonsSnap = await getDocs(collection(db, 'courses', courseId, 'modules', mod.id, 'lessons'));
          let html = '';
          lessonsSnap.forEach(lesDoc => {
            const les = { id: lesDoc.id, ...lesDoc.data() };
            const completed = user.completedLessons.includes(les.id);
            const locked = false; // would be determined by order
            html += `
              <div class="lesson-item ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}">
                <iconify-icon icon="${completed ? 'pixelarticons:check' : (locked ? 'pixelarticons:lock' : 'pixelarticons:play')}"></iconify-icon>
                <span>${escapeHtml(les.title)}</span>
                ${completed ? '<span style="margin-left:auto;">✓</span>' : ''}
              </div>
            `;
          });
          list.innerHTML = html;
        }
      } catch (err) {
        container.innerHTML = '<p>Could not load modules.</p>';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadCourses();
  </script>
</body>
</html>
