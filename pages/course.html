<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey · Akademia</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/drafting-mono" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'BlockBlueprint';
      src: local('BlockBlueprint'), local('BlockBlueprint');
      font-display: swap;
    }
    @font-face {
      font-family: 'Drafting Mono';
      src: local('Drafting Mono'), local('Drafting Mono');
      font-display: swap;
    }
  </style>

  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg-secondary: #F7F7F7;
      --text: #1e1e1e;
      --text-secondary: #777;
      --border: #E5E5E5;
      --radius: 16px;
      --gold: #FFC800;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Drafting Mono', 'Drafting* Mono', monospace;
      background: var(--bg-secondary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

    /* Top bar */
    .topbar {
      height: 60px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 10;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-img { width:34px; height:34px; border-radius:10px; }
    .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
    .logo-text span { color:var(--green); }

    .course-title-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .course-title {
      font-family: 'BlockBlueprint', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .back-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
      text-decoration: none;
    }

    /* Main layout */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Left sidebar (module list) */
    .sidebar-modules {
      width: 280px;
      background: var(--bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px 16px;
      flex-shrink: 0;
    }
    .module-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .module-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid transparent;
    }
    .module-item:hover { background: var(--bg-secondary); }
    .module-item.active {
      background: #ebf7e6;
      border-color: var(--green);
    }
    .module-item .module-progress {
      margin-left: auto;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Center – roadmap */
    .roadmap-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }
    .module-header {
      margin-bottom: 24px;
    }
    .module-header h2 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }
    .module-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    /* Vertical roadmap */
    .roadmap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }
    .roadmap::before {
      content: '';
      position: absolute;
      left: 27px;
      top: 20px;
      bottom: 20px;
      width: 2px;
      background: var(--border);
      border-radius: 1px;
    }
    .lesson-node {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      margin-bottom: 16px;
      position: relative;
      cursor: pointer;
    }
    .node-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s;
      flex-shrink: 0;
      z-index: 2;
    }
    .lesson-node.completed .node-circle {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }
    .lesson-node.current .node-circle {
      border-color: var(--green);
      background: #ebf7e6;
      color: var(--green);
    }
    .lesson-node.locked .node-circle {
      background: var(--bg-secondary);
      border-color: #ddd;
      color: #ccc;
      cursor: not-allowed;
    }
    .node-content {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      transition: all 0.2s;
    }
    .lesson-node.completed .node-content {
      border-color: var(--green);
      background: #f0fde0;
    }
    .lesson-node.current .node-content {
      border-color: var(--green);
    }
    .lesson-node:hover .node-content {
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .lesson-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .lesson-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .continue-btn {
      margin-top: 16px;
      align-self: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      background: var(--green);
      color: white;
      box-shadow: 0 4px 0 var(--green-hover);
    }
    .btn:hover {
      background: var(--green-hover);
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Right panel (learner stats) */
    .right-panel {
      width: 300px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    .stats-card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }
    .stats-card h3 {
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .xp-progress {
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      margin: 8px 0;
    }
    .xp-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <img src="../favicon.ico" alt="Akademia" class="logo-img">
      <span class="logo-text">Akade<span>mia</span></span>
    </a>
    <div class="course-title-area" id="courseTitleArea">
      <a href="learn.html" class="back-btn">
        <iconify-icon icon="pixelarticons:arrow-left"></iconify-icon> Back to Courses
      </a>
      <span class="course-title" id="headerCourseTitle"></span>
    </div>
    <div></div>
  </div>

  <div class="main-layout">
    <!-- Left sidebar: module list -->
    <aside class="sidebar-modules" id="moduleSidebar">
      <div class="module-list" id="moduleList"></div>
    </aside>

    <!-- Center: roadmap of lessons -->
    <main class="roadmap-container" id="roadmapContainer">
      <div class="module-header">
        <h2 id="currentModuleName">Fundamentals</h2>
        <p id="currentModuleDesc"></p>
      </div>
      <div class="roadmap" id="roadmap"></div>
    </main>

    <!-- Right panel: learner stats -->
    <aside class="right-panel">
      <div class="stats-card">
        <h3>Your Progress</h3>
        <div><strong>Level 7</strong></div>
        <div class="xp-progress">
          <div class="xp-fill" style="width:68%;"></div>
        </div>
        <small>2,430 / 3,500 XP</small>
      </div>
      <div class="stats-card">
        <h3>Streak</h3>
        <div style="font-size:2rem; font-weight:800; color:var(--gold);">5</div>
        <small>days</small>
      </div>
      <div class="stats-card">
        <h3>Sparks</h3>
        <div style="font-size:2rem; font-weight:800;">240</div>
        <small>earned</small>
      </div>
    </aside>
  </div>

  <script type="module">
    import { db } from '../src/js/firebase-config.js';
    import { collection, getDocs, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('courseId') || 'python';
    const moduleId = params.get('moduleId') || 'fundamentals'; // optional, will default to first module

    // Simulated user (replace with Firebase auth later)
    const user = {
      uid: 'demo',
      completedLessons: ['les1', 'les2', 'les3'],
      sparks: 240,
      level: 7,
      xp: 2430,
      streak: 5
    };

    let course = null;
    let modules = [];
    let currentModuleId = moduleId;
    let lessons = [];

    // Load course data
    async function loadCourse() {
      const courseDoc = await getDoc(doc(db, 'courses', courseId));
      if (!courseDoc.exists()) {
        document.getElementById('roadmap').innerHTML = '<p>Course not found.</p>';
        return;
      }
      course = { id: courseDoc.id, ...courseDoc.data() };
      document.getElementById('headerCourseTitle').textContent = course.title;

      // Load modules
      const modSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules'), orderBy('createdAt')));
      modules = [];
      modSnap.forEach(doc => modules.push({ id: doc.id, ...doc.data() }));
      renderModuleSidebar();

      // If no moduleId provided or invalid, use the first one
      if (!modules.some(m => m.id === currentModuleId) && modules.length > 0) {
        currentModuleId = modules[0].id;
      }
      loadModuleLessons(currentModuleId);
    }

    // Render module list in sidebar
    function renderModuleSidebar() {
      const list = document.getElementById('moduleList');
      list.innerHTML = modules.map(mod => `
        <div class="module-item ${mod.id === currentModuleId ? 'active' : ''}" data-module-id="${mod.id}">
          <iconify-icon icon="pixelarticons:folder"></iconify-icon>
          <span>${escapeHtml(mod.title)}</span>
          <span class="module-progress">${getModuleProgress(mod.id)}%</span>
        </div>
      `).join('');

      // Add click handlers
      list.querySelectorAll('.module-item').forEach(item => {
        item.addEventListener('click', () => {
          const newModuleId = item.dataset.moduleId;
          if (newModuleId !== currentModuleId) {
            currentModuleId = newModuleId;
            loadModuleLessons(newModuleId);
            // Update active state
            list.querySelectorAll('.module-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
          }
        });
      });
    }

    // Calculate progress percentage for a module
    function getModuleProgress(moduleId) {
      // For simplicity, count completed lessons in this module (would need to fetch lesson IDs)
      return Math.floor(Math.random() * 100); // placeholder
    }

    // Load lessons for a module
    async function loadModuleLessons(moduleId) {
      const module = modules.find(m => m.id === moduleId);
      if (!module) return;
      document.getElementById('currentModuleName').textContent = module.title;
      document.getElementById('currentModuleDesc').textContent = module.description || '';

      const lesSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules', moduleId, 'lessons'), orderBy('createdAt')));
      lessons = [];
      lesSnap.forEach(doc => lessons.push({ id: doc.id, ...doc.data() }));
      renderRoadmap();
    }

    // Render the vertical roadmap
    function renderRoadmap() {
      const roadmapEl = document.getElementById('roadmap');
      roadmapEl.innerHTML = '';

      if (lessons.length === 0) {
        roadmapEl.innerHTML = '<p style="text-align:center; color:var(--text-secondary);">No lessons in this module.</p>';
        return;
      }

      let lastCompleted = true;
      let currentReached = false;

      lessons.forEach((les, idx) => {
        const completed = user.completedLessons.includes(les.id);
        const locked = !completed && !currentReached && !(idx === 0);
        if (completed) lastCompleted = true;
        if (!completed && !locked && !currentReached) {
          currentReached = true;
          les.current = true;
        } else {
          les.current = false;
        }
        if (!completed && !les.current && idx > 0 && !lessons[idx-1].completed) {
          les.locked = true;
        } else {
          les.locked = locked;
        }

        const nodeClass = completed ? 'completed' : (les.current ? 'current' : (les.locked ? 'locked' : ''));
        const icon = completed ? 'check' : (les.locked ? 'lock' : 'play');

        const nodeDiv = document.createElement('div');
        nodeDiv.className = `lesson-node ${nodeClass}`;
        nodeDiv.innerHTML = `
          <div class="node-circle">
            <iconify-icon icon="pixelarticons:${icon}"></iconify-icon>
          </div>
          <div class="node-content">
            <div class="lesson-title">${escapeHtml(les.title)}</div>
            <div class="lesson-meta">
              ${les.type || 'lesson'} · ${les.duration || 10} min · +${les.reward || 30} XP
            </div>
          </div>
        `;

        if (!les.locked) {
          nodeDiv.addEventListener('click', () => {
            // Navigate to lesson page
            window.location.href = `lesson.html?courseId=${courseId}&moduleId=${currentModuleId}&lessonId=${les.id}`;
          });
        }

        roadmapEl.appendChild(nodeDiv);
      });

      // Add continue button for the next incomplete lesson
      const nextLesson = lessons.find(l => !user.completedLessons.includes(l.id) && !l.locked);
      if (nextLesson) {
        const continueDiv = document.createElement('div');
        continueDiv.className = 'continue-btn';
        continueDiv.innerHTML = `
          <button class="btn" id="continueLessonBtn">
            <iconify-icon icon="pixelarticons:play"></iconify-icon> Continue
          </button>
        `;
        continueDiv.querySelector('button').addEventListener('click', () => {
          window.location.href = `lesson.html?courseId=${courseId}&moduleId=${currentModuleId}&lessonId=${nextLesson.id}`;
        });
        roadmapEl.appendChild(continueDiv);
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadCourse();
  </script>
</body>
</html>
