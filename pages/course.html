<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Journey · Akademia</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/x-icon" href="../favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/drafting-mono" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'BlockBlueprint';
      src: local('BlockBlueprint'), local('BlockBlueprint');
      font-display: swap;
    }
    @font-face {
      font-family: 'Drafting Mono';
      src: local('Drafting Mono'), local('Drafting Mono');
      font-display: swap;
    }
  </style>

  <!-- Icons -->
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

  <style>
    :root {
      --green: #58CC02;
      --green-hover: #46A302;
      --bg: #FFFFFF;
      --bg-secondary: #F7F7F7;
      --text: #4B4B4B;
      --text-secondary: #777777;
      --border: #E5E5E5;
      --radius: 14px;
      --gold: #FFC800;
      --shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Drafting Mono', 'Drafting* Mono', monospace;
      background: var(--bg-secondary);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

    /* Top Bar */
    .topbar {
      height: 60px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .logo-img { width:34px; height:34px; border-radius:10px; }
    .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
    .logo-text span { color:var(--green); }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-icon {
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      color: var(--text);
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--bg-secondary); }
    .btn-icon.active { border-color: var(--green); background: #F0FDE0; }

    .user-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left Sidebar */
    .sidebar-left {
      width: 260px;
      background: var(--bg);
      border-right: 2px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      transition: width 0.3s;
      flex-shrink: 0;
    }
    .sidebar-left.collapsed { width: 50px; padding: 10px; }
    .sidebar-left .tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }
    .sidebar-left .tree-item:hover { background: var(--bg-secondary); }
    .sidebar-left .tree-item.active { background: #F0FDE0; font-weight: 700; }
    .tree-children { padding-left: 20px; }
    .tree-toggle { cursor: pointer; width: 16px; display: inline-block; text-align: center; }

    /* Main Canvas Area */
    .canvas-container {
      flex: 1;
      position: relative;
      background: var(--bg-secondary);
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    /* Floating toolbar on canvas */
    .canvas-toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 5;
    }

    /* Node Preview (hover) */
    .node-preview {
      position: absolute;
      pointer-events: none;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      z-index: 15;
      display: none;
      max-width: 220px;
    }
    .node-preview .title { font-weight: 700; font-size: 0.9rem; }
    .node-preview .desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
    .node-preview .meta { display: flex; gap: 8px; margin-top: 8px; font-size: 0.7rem; color: var(--text-secondary); }

    /* Side Drawer (right) */
    .drawer {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100%;
      background: var(--bg);
      border-left: 2px solid var(--border);
      box-shadow: -5px 0 20px rgba(0,0,0,0.1);
      z-index: 20;
      transition: right 0.3s ease;
      padding: 24px;
      overflow-y: auto;
    }
    .drawer.open { right: 0; }
    .drawer-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--text-secondary);
    }
    .drawer h2 { margin-bottom: 12px; }
    .drawer .meta-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.9rem; }
    .drawer .btn-primary { display: block; width: 100%; margin-top: 20px; }

    /* Right Sidebar */
    .sidebar-right {
      width: 300px;
      background: var(--bg);
      border-left: 2px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-right .card {
      background: var(--bg-secondary);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card .stat-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--green);
      font-family: 'BlockBlueprint', sans-serif;
    }
    .progress-ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: conic-gradient(var(--green) 68%, var(--border) 0);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      position: relative;
    }
    .progress-ring span {
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'BlockBlueprint', sans-serif;
    }
    .goal-item { font-size: 0.8rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

    /* Context Menu */
    .context-menu {
      position: absolute;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      z-index: 30;
      display: none;
      min-width: 150px;
    }
    .context-menu .item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .context-menu .item:hover { background: var(--bg-secondary); }

    /* Animations */
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="../index.html" class="logo">
      <img src="../favicon.ico" alt="Akademia" class="logo-img">
      <div class="logo-text">Akade<span>mia</span></div>
    </a>
    <div class="topbar-center">
      <button class="btn-icon" id="zoomInBtn" title="Zoom In"><iconify-icon icon="pixelarticons:zoom-in"></iconify-icon></button>
      <button class="btn-icon" id="zoomOutBtn" title="Zoom Out"><iconify-icon icon="pixelarticons:zoom-out"></iconify-icon></button>
      <button class="btn-icon" id="fitBtn" title="Fit to Screen"><iconify-icon icon="pixelarticons:expand"></iconify-icon></button>
      <button class="btn-icon" id="collapseAllBtn" title="Collapse All"><iconify-icon icon="pixelarticons:collapse"></iconify-icon></button>
      <button class="btn-icon" id="expandAllBtn" title="Expand All"><iconify-icon icon="pixelarticons:expand"></iconify-icon></button>
    </div>
    <div class="user-avatar" id="userAvatar">A</div>
  </div>

  <div class="layout">
    <!-- Left Sidebar (tree of modules/lessons) -->
    <aside class="sidebar-left" id="leftSidebar">
      <div id="treeContainer"></div>
    </aside>

    <!-- Canvas -->
    <div class="canvas-container" id="canvasContainer">
      <canvas id="roadmapCanvas"></canvas>
      <div class="canvas-toolbar">
        <button class="btn-icon" id="toggleGridBtn" title="Grid"><iconify-icon icon="pixelarticons:grid"></iconify-icon></button>
        <button class="btn-icon" id="toggleMiniMapBtn" title="Mini Map"><iconify-icon icon="pixelarticons:map"></iconify-icon></button>
      </div>
      <!-- Node preview -->
      <div class="node-preview" id="nodePreview"></div>
    </div>

    <!-- Right Sidebar (learner dashboard) -->
    <aside class="sidebar-right" id="rightSidebar">
      <div class="card" style="text-align:center;">
        <div class="progress-ring"><span>68%</span></div>
        <div style="font-weight:800;">Overall Progress</div>
        <div style="font-size:0.8rem; color:var(--text-secondary);">14 / 20 completed</div>
      </div>
      <div class="card">
        <div class="stat-value" id="sparksDisplay">0</div>
        <div style="font-size:0.9rem;">Sparks earned</div>
      </div>
      <div class="card">
        <div style="font-weight:700;">Today's Goals</div>
        <div class="goal-item"><input type="checkbox" checked disabled> Read one lesson</div>
        <div class="goal-item"><input type="checkbox" disabled> Complete a quiz</div>
        <div class="goal-item"><input type="checkbox" disabled> Study 30 min</div>
      </div>
      <div class="card">
        <div style="font-weight:700;">Streak</div>
        <div style="font-size:2rem; font-weight:900; color:var(--gold);">5</div>
        <div style="font-size:0.8rem;">Days</div>
      </div>
    </aside>
  </div>

  <!-- Side Drawer (lesson details) -->
  <div class="drawer" id="drawer">
    <button class="drawer-close" onclick="closeDrawer()"><iconify-icon icon="pixelarticons:close"></iconify-icon></button>
    <h2 id="drawerTitle">Node Title</h2>
    <div class="meta-item"><iconify-icon icon="pixelarticons:clock"></iconify-icon> <span id="drawerDuration">10 min</span></div>
    <div class="meta-item"><iconify-icon icon="pixelarticons:coin"></iconify-icon> <span id="drawerXP">+50 XP</span></div>
    <div class="meta-item"><iconify-icon icon="pixelarticons:file"></iconify-icon> <span id="drawerType">Lesson</span></div>
    <p id="drawerDesc" style="margin:12px 0; font-size:0.9rem; color:var(--text-secondary);"></p>
    <button class="btn btn-primary" id="startLessonBtn" style="display:none;">Start Lesson</button>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="item" data-action="open"><iconify-icon icon="pixelarticons:play"></iconify-icon> Open</div>
    <div class="item" data-action="bookmark"><iconify-icon icon="pixelarticons:bookmark"></iconify-icon> Bookmark</div>
    <div class="item" data-action="complete"><iconify-icon icon="pixelarticons:check"></iconify-icon> Mark Complete</div>
    <div class="item" data-action="notes"><iconify-icon icon="pixelarticons:note"></iconify-icon> Notes</div>
  </div>

  <script type="module">
    import { auth, db } from '../src/js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { doc, getDoc, collection, getDocs, query, orderBy, updateDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // ─── CONFIGURATION ────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    if (!courseId) { document.body.innerHTML = '<h2>No course selected.</h2>'; throw new Error('Missing courseId'); }

    const canvas = document.getElementById('roadmapCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    const nodePreview = document.getElementById('nodePreview');
    const contextMenu = document.getElementById('contextMenu');
    const drawer = document.getElementById('drawer');

    let userData = null;
    let courseData = null;
    let modules = [];
    let lessonsMap = new Map(); // moduleId -> [lesson]
    let nodes = [];
    let edges = [];
    let nodeRadius = 28;
    let scale = 1;
    let offsetX = 0, offsetY = 0;
    let isPanning = false, panStart = { x: 0, y: 0 };
    let hoveredNode = null;
    let selectedNode = null;

    // ─── AUTH & DATA ─────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) userData = userDoc.data();
      document.getElementById('userAvatar').textContent = (userData?.name || 'A')[0].toUpperCase();
      document.getElementById('sparksDisplay').textContent = userData?.sparks || 0;
      await loadCourseData();
      buildGraph();
      resizeCanvas();
      requestAnimationFrame(render);
    });

    async function loadCourseData() {
      const courseDoc = await getDoc(doc(db, 'courses', courseId));
      if (!courseDoc.exists()) return;
      courseData = courseDoc.data();
      const modSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules'), orderBy('createdAt')));
      modules = [];
      modSnap.forEach(doc => modules.push({ id: doc.id, ...doc.data() }));
      for (let mod of modules) {
        const lesSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules', mod.id, 'lessons'), orderBy('createdAt')));
        const lessons = [];
        lesSnap.forEach(doc => lessons.push({ id: doc.id, ...doc.data() }));
        lessonsMap.set(mod.id, lessons);
      }
    }

    // ─── GRAPH BUILDING ──────────────────────────────
    function buildGraph() {
      nodes = [];
      edges = [];
      const startX = 200, startY = 100;
      // Course node
      nodes.push({
        id: 'course',
        type: 'course',
        title: courseData?.title || 'Untitled',
        description: courseData?.description || '',
        x: startX, y: startY,
        fixed: true
      });
      // Module nodes
      const modSpacing = 180;
      modules.forEach((mod, i) => {
        const x = startX + 120 + i * modSpacing;
        const y = startY + 150;
        nodes.push({
          id: mod.id,
          type: 'module',
          title: mod.title,
          description: '',
          x, y,
          parent: 'course'
        });
        edges.push({ from: 'course', to: mod.id });
        // Lesson nodes for this module
        const lessons = lessonsMap.get(mod.id) || [];
        lessons.forEach((les, j) => {
          const lx = x + j * 90;
          const ly = y + 120;
          nodes.push({
            id: les.id,
            type: les.type || 'lesson',
            title: les.title,
            description: les.description || '',
            x: lx, y: ly,
            parent: mod.id,
            reward: les.reward || 50,
            duration: les.duration || 10
          });
          edges.push({ from: mod.id, to: les.id });
        });
      });
    }

    // ─── CANVAS & INTERACTION ────────────────────────
    function resizeCanvas() {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', () => { resizeCanvas(); render(); });

    // Transformations
    function toScreen(x, y) {
      return {
        sx: (x + offsetX) * scale + canvas.width / 2,
        sy: (y + offsetY) * scale + canvas.height / 2
      };
    }
    function toWorld(sx, sy) {
      return {
        x: (sx - canvas.width / 2) / scale - offsetX,
        y: (sy - canvas.height / 2) / scale - offsetY
      };
    }

    // Pan & zoom
    canvas.addEventListener('mousedown', (e) => {
      if (e.button === 0) { // left click
        const world = toWorld(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
        const clickedNode = hitTest(world.x, world.y);
        if (clickedNode) {
          selectNode(clickedNode);
          return;
        }
        isPanning = true;
        panStart = { x: e.clientX, y: e.clientY, ox: offsetX, oy: offsetY };
      }
    });
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      if (isPanning) {
        const dx = (e.clientX - panStart.x) / scale;
        const dy = (e.clientY - panStart.y) / scale;
        offsetX = panStart.ox + dx;
        offsetY = panStart.oy + dy;
        render();
        return;
      }
      // Hover detection
      const world = toWorld(mx, my);
      const node = hitTest(world.x, world.y);
      if (node) {
        canvas.style.cursor = 'pointer';
        if (hoveredNode !== node) {
          hoveredNode = node;
          showNodePreview(node, e.clientX, e.clientY);
        }
      } else {
        canvas.style.cursor = 'grab';
        hoveredNode = null;
        nodePreview.style.display = 'none';
      }
    });
    canvas.addEventListener('mouseup', () => { isPanning = false; });
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.08 : 0.92;
      scale *= factor;
      scale = Math.min(2, Math.max(0.3, scale));
      render();
    });

    function hitTest(wx, wy) {
      for (let node of nodes) {
        const { sx, sy } = toScreen(node.x, node.y);
        const dist = Math.hypot(sx - wx, sy - wy); // approximate
        if (dist < nodeRadius + 5) return node;
      }
      return null;
    }

    // Node selection
    function selectNode(node) {
      selectedNode = node;
      // Open side drawer
      const drawerTitle = document.getElementById('drawerTitle');
      drawerTitle.textContent = node.title;
      document.getElementById('drawerDuration').textContent = node.duration ? `${node.duration} min` : '—';
      document.getElementById('drawerXP').textContent = node.reward ? `+${node.reward} XP` : '—';
      document.getElementById('drawerType').textContent = node.type || 'Lesson';
      document.getElementById('drawerDesc').textContent = node.description || '';
      const startBtn = document.getElementById('startLessonBtn');
      if (node.type === 'lesson' || node.type === 'quiz' || node.type === 'project') {
        startBtn.style.display = 'block';
        startBtn.onclick = () => {
          window.location.href = `lesson.html?courseId=${courseId}&moduleId=${node.parent}&lessonId=${node.id}`;
        };
      } else {
        startBtn.style.display = 'none';
      }
      drawer.classList.add('open');
    }
    window.closeDrawer = function() { drawer.classList.remove('open'); };

    // Preview on hover
    function showNodePreview(node, mx, my) {
      nodePreview.innerHTML = `
        <div class="title">${escapeHtml(node.title)}</div>
        <div class="desc">${escapeHtml(node.description || '')}</div>
        <div class="meta">
          <span>⏱ ${node.duration || '?'} min</span>
          <span>⭐ +${node.reward || '?'} XP</span>
        </div>
      `;
      nodePreview.style.display = 'block';
      nodePreview.style.left = (mx + 20) + 'px';
      nodePreview.style.top = (my + 20) + 'px';
    }

    // Context menu
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const world = toWorld(e.clientX - canvas.getBoundingClientRect().left, e.clientY - canvas.getBoundingClientRect().top);
      const node = hitTest(world.x, world.y);
      if (node) {
        contextMenu.style.display = 'block';
        contextMenu.style.left = (e.clientX) + 'px';
        contextMenu.style.top = (e.clientY) + 'px';
        contextMenu.dataset.nodeId = node.id;
      }
    });
    document.addEventListener('click', () => contextMenu.style.display = 'none');
    contextMenu.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const nodeId = contextMenu.dataset.nodeId;
        const node = nodes.find(n => n.id === nodeId);
        if (!node) return;
        const action = item.dataset.action;
        if (action === 'open') selectNode(node);
        else if (action === 'bookmark') alert('Bookmark added');
        else if (action === 'complete') markComplete(node);
        else if (action === 'notes') alert('Notes feature coming soon');
        contextMenu.style.display = 'none';
      });
    });

    async function markComplete(node) {
      if (!userData?.uid) return;
      const userRef = doc(db, 'users', userData.uid);
      await updateDoc(userRef, {
        completedLessons: arrayUnion(node.id),
        sparks: (userData.sparks || 0) + (node.reward || 50)
      });
      node.completed = true;
      render();
    }

    // ─── RENDERING ──────────────────────────────────
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Draw grid (optional)
      ctx.strokeStyle = '#eaeaea';
      ctx.lineWidth = 0.5;
      const gridSize = 40 * scale;
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      // Draw edges
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 2;
      edges.forEach(edge => {
        const fromNode = nodes.find(n => n.id === edge.from);
        const toNode = nodes.find(n => n.id === edge.to);
        if (!fromNode || !toNode) return;
        const p1 = toScreen(fromNode.x, fromNode.y);
        const p2 = toScreen(toNode.x, toNode.y);
        ctx.beginPath();
        ctx.moveTo(p1.sx, p1.sy);
        ctx.lineTo(p2.sx, p2.sy);
        ctx.stroke();
      });

      // Draw nodes
      nodes.forEach(node => {
        const { sx, sy } = toScreen(node.x, node.y);
        // State styling
        let fillColor = '#fff';
        let strokeColor = '#ccc';
        if (node.completed) { fillColor = '#e6ffe6'; strokeColor = '#58CC02'; }
        if (selectedNode?.id === node.id) { strokeColor = '#FFC800'; }
        // Draw circle
        ctx.beginPath();
        ctx.arc(sx, sy, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = fillColor;
        ctx.fill();
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 3;
        ctx.stroke();

        // Icon/type indicator
        ctx.fillStyle = '#4B4B4B';
        ctx.font = '14px BlockBlueprint';
        ctx.textAlign = 'center';
        ctx.fillText(node.type === 'course' ? 'C' : node.type === 'module' ? 'M' : 'L', sx, sy + 4);

        // Title below
        ctx.fillStyle = '#4B4B4B';
        ctx.font = '11px Drafting Mono';
        ctx.fillText(node.title.length > 15 ? node.title.substring(0,13)+'…' : node.title, sx, sy + nodeRadius + 14);
      });

      // Current node pulse
      if (selectedNode) {
        const { sx, sy } = toScreen(selectedNode.x, selectedNode.y);
        ctx.beginPath();
        ctx.arc(sx, sy, nodeRadius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#FFC800';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // ─── BUTTONS ───────────────────────────────────
    document.getElementById('zoomInBtn').addEventListener('click', () => { scale *= 1.1; render(); });
    document.getElementById('zoomOutBtn').addEventListener('click', () => { scale *= 0.9; render(); });
    document.getElementById('fitBtn').addEventListener('click', () => {
      scale = 1; offsetX = 0; offsetY = 0; render();
    });
    document.getElementById('collapseAllBtn').addEventListener('click', () => { /* collapse modules */ });
    document.getElementById('expandAllBtn').addEventListener('click', () => { /* expand all */ });

    function escapeHtml(text) {
      if (!text) return '';
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Initial resize and render
    resizeCanvas();
  </script>
</body>
</html>
