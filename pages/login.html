<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Path · Akademia</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">

    <!-- Fonts -->
    <link href="https://fonts.cdnfonts.com/css/blockblueprint" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/drafting-mono" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'BlockBlueprint';
            src: local('BlockBlueprint'), local('BlockBlueprint');
            font-display: swap;
        }
        @font-face {
            font-family: 'Drafting Mono';
            src: local('Drafting Mono'), local('Drafting Mono');
            font-display: swap;
        }
    </style>

    <!-- Icons -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <style>
        :root {
            --green: #58CC02;
            --green-hover: #46A302;
            --bg: #FFFFFF;
            --bg-secondary: #F7F7F7;
            --text: #4B4B4B;
            --text-secondary: #777777;
            --border: #E5E5E5;
            --radius: 16px;
            --gold: #FFC800;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Drafting Mono', 'Drafting* Mono', monospace;
            background: var(--bg-secondary);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        h1, h2, h3 { font-family: 'BlockBlueprint', sans-serif; letter-spacing: -0.3px; }

        .topbar {
            height: 64px;
            background: var(--bg);
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .logo-img { width:34px; height:34px; border-radius:10px; }
        .logo-text { font-size:1.3rem; font-weight:800; color:var(--text); }
        .logo-text span { color:var(--green); }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .page-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 48px;
        }

        /* ---------- ROADMAP STYLES ---------- */
        .roadmap {
            position: relative;
            padding-left: 32px;
        }
        .roadmap::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .roadmap-item {
            position: relative;
            margin-bottom: 32px;
        }

        .roadmap-node {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .roadmap-node:hover .node-title {
            color: var(--green);
        }

        .node-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg);
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .roadmap-item.expanded .node-circle {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }
        .node-circle iconify-icon {
            font-size: 18px;
            color: var(--text-secondary);
        }
        .roadmap-item.expanded .node-circle iconify-icon {
            color: white;
        }

        .node-content {
            flex: 1;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            transition: border-color 0.2s;
        }
        .roadmap-item.expanded .node-content {
            border-color: var(--green);
        }
        .node-title {
            font-size: 1.2rem;
            font-weight: 800;
            font-family: 'BlockBlueprint', sans-serif;
            margin-bottom: 4px;
        }
        .node-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .children-container {
            margin-left: 32px;
            margin-top: 12px;
            display: none;
        }
        .roadmap-item.expanded > .children-container {
            display: block;
        }

        .sub-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .sub-item:hover {
            border-color: var(--green);
        }
        .sub-item::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            width: 12px;
            height: 2px;
            background: var(--border);
        }
        .sub-item .sub-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }
        .sub-item .sub-title {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .sub-item .sub-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .lesson-item {
            margin-left: 28px;
            margin-bottom: 4px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .lesson-item:hover {
            background: var(--bg-secondary);
        }
        .lesson-item::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .loading {
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 4px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="../index.html" class="logo">
            <img src="../favicon.ico" alt="Akademia" class="logo-img">
            <div class="logo-text">Akade<span>mia</span></div>
        </a>
        <a href="../index.html" class="back-link">
            <iconify-icon icon="pixelarticons:arrow-left"></iconify-icon> Home
        </a>
    </div>

    <div class="container">
        <h1 class="page-title">Your Learning Path</h1>
        <p class="page-subtitle">Choose a course, then a module, and start a lesson.</p>

        <div class="roadmap" id="roadmap">
            <div class="loading"><div class="spinner"></div><p>Loading courses…</p></div>
        </div>
    </div>

    <script type="module">
        import { db } from '../src/js/firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const roadmapEl = document.getElementById('roadmap');

        // Fetch all courses
        async function loadRoadmap() {
            roadmapEl.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading courses…</p></div>';
            try {
                const coursesSnap = await getDocs(query(collection(db, 'courses'), orderBy('createdAt')));
                const courses = [];
                coursesSnap.forEach(doc => courses.push({ id: doc.id, ...doc.data() }));

                if (courses.length === 0) {
                    roadmapEl.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary);">No courses available yet.</div>';
                    return;
                }

                roadmapEl.innerHTML = '';
                courses.forEach((course, idx) => {
                    const courseItem = document.createElement('div');
                    courseItem.className = 'roadmap-item';
                    courseItem.innerHTML = `
                        <div class="roadmap-node" data-course-id="${course.id}">
                            <div class="node-circle">
                                <iconify-icon icon="pixelarticons:folder"></iconify-icon>
                            </div>
                            <div class="node-content">
                                <div class="node-title">${escapeHtml(course.title)}</div>
                                <div class="node-desc">${escapeHtml(course.description || 'Master the fundamentals')}</div>
                            </div>
                        </div>
                        <div class="children-container" id="modules-${course.id}"></div>
                    `;
                    roadmapEl.appendChild(courseItem);

                    // Toggle expansion
                    const node = courseItem.querySelector('.roadmap-node');
                    node.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        courseItem.classList.toggle('expanded');
                        const modulesContainer = document.getElementById(`modules-${course.id}`);
                        if (courseItem.classList.contains('expanded') && modulesContainer.children.length === 0) {
                            await loadModules(course.id, modulesContainer);
                        }
                    });
                });
            } catch (error) {
                roadmapEl.innerHTML = '<p style="text-align:center; color:red;">Failed to load courses.</p>';
                console.error(error);
            }
        }

        async function loadModules(courseId, container) {
            container.innerHTML = '<div style="padding:10px; color:var(--text-secondary);">Loading modules…</div>';
            try {
                const modulesSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules'), orderBy('createdAt')));
                container.innerHTML = '';
                modulesSnap.forEach(modDoc => {
                    const mod = { id: modDoc.id, ...modDoc.data() };
                    const modDiv = document.createElement('div');
                    modDiv.className = 'sub-item';
                    modDiv.innerHTML = `
                        <div class="sub-circle"></div>
                        <span class="sub-title">${escapeHtml(mod.title)}</span>
                        <span class="sub-meta">Module</span>
                    `;
                    container.appendChild(modDiv);

                    const lessonsDiv = document.createElement('div');
                    lessonsDiv.className = 'children-container';
                    lessonsDiv.id = `lessons-${mod.id}`;
                    container.appendChild(lessonsDiv);

                    modDiv.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        // Toggle lessons visibility
                        if (lessonsDiv.style.display === 'block') {
                            lessonsDiv.style.display = 'none';
                        } else {
                            if (lessonsDiv.children.length === 0) {
                                await loadLessons(courseId, mod.id, lessonsDiv);
                            }
                            lessonsDiv.style.display = 'block';
                        }
                    });
                });
            } catch (error) {
                container.innerHTML = '<p style="color:red;">Error loading modules.</p>';
            }
        }

        async function loadLessons(courseId, moduleId, container) {
            container.innerHTML = '<div style="padding:10px; color:var(--text-secondary);">Loading lessons…</div>';
            try {
                const lessonsSnap = await getDocs(query(collection(db, 'courses', courseId, 'modules', moduleId, 'lessons'), orderBy('createdAt')));
                container.innerHTML = '';
                lessonsSnap.forEach(lesDoc => {
                    const les = { id: lesDoc.id, ...lesDoc.data() };
                    const lesItem = document.createElement('div');
                    lesItem.className = 'lesson-item';
                    lesItem.innerHTML = `
                        <span>${escapeHtml(les.title)}</span>
                        <span style="margin-left:auto; font-size:0.75rem; color:var(--text-secondary);">→</span>
                    `;
                    lesItem.addEventListener('click', () => {
                        window.location.href = `lesson.html?courseId=${courseId}&moduleId=${moduleId}&lessonId=${les.id}`;
                    });
                    container.appendChild(lesItem);
                });
            } catch (error) {
                container.innerHTML = '<p style="color:red;">Error loading lessons.</p>';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        loadRoadmap();
    </script>
</body>
</html>
