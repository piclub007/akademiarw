<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join CodeQuest - Start Your Python Adventure</title>
    <meta name="description" content="Create your CodeQuest account and start learning Python through gamified adventures. Free and fun for beginners.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="../favicon.ico">

    <style>
        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --secondary: #00D4AA;
            --accent: #FF6584;
            --gold: #FFD700;
            --bg-dark: #0F0E17;
            --bg-card: #1A1928;
            --bg-input: #252439;
            --text-primary: #FFFFFE;
            --text-secondary: #A7A6B3;
            --border: #2D2B3D;
            --radius: 12px;
            --radius-lg: 16px;
            --error: #FF4444;
            --success: #4CAF50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(108,99,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0,212,170,0.1) 0%, transparent 50%);
        }

        .auth-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
            text-decoration: none;
        }

        .logo-img {
            width: 40px;
            height: 40px;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
        }

        input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 6px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(108,99,255,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108,99,255,0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            background: white;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            border: 1px solid var(--border);
        }

        .btn-google:hover {
            background: #f5f5f5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-secondary);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider span {
            padding: 0 16px;
            font-size: 0.9rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .toggle-form {
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .notification {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: var(--radius);
            color: white;
            font-weight: 500;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .notification-success {
            background: var(--success);
        }

        .notification-error {
            background: var(--error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .password-strength {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            transition: all 0.3s;
        }

        .strength-weak { width: 33%; background: var(--error); }
        .strength-medium { width: 66%; background: var(--gold); }
        .strength-strong { width: 100%; background: var(--success); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="../index.html" class="logo">
                <img src="../favicon.ico" alt="" class="logo-img" width="40" height="40">
                <span class="logo-text">CodeQuest</span>
            </a>
            <div id="loginHeader">
                <h1>Welcome Back!</h1>
                <p>Continue your coding adventure</p>
            </div>
            <div id="signupHeader" class="hidden">
                <h1>Begin Your Quest</h1>
                <p>Create your free account</p>
            </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="adventurer@email.com" required autocomplete="email">
                <div class="error-message" id="loginEmailError"></div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                <div class="error-message" id="loginPasswordError"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="loginSubmit">
                Start Adventure
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label for="signupUsername">Hero Name</label>
                <input type="text" id="signupUsername" placeholder="Choose your username" required minlength="3" autocomplete="username">
                <div class="error-message" id="signupUsernameError"></div>
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="adventurer@email.com" required autocomplete="email">
                <div class="error-message" id="signupEmailError"></div>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <div class="error-message" id="signupPasswordError"></div>
            </div>
            <button type="submit" class="btn btn-primary" id="signupSubmit">
                Create Account
            </button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button class="btn btn-google" id="googleSignIn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="auth-footer">
            <span id="toggleText">New to CodeQuest?</span>
            <a href="#" class="toggle-form" id="toggleForm">Create an account</a>
        </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script type="module">
        import authManager from '../src/js/auth.js';
        import security from '../src/js/security.js';

        // Initialize security
        security.init();

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginHeader = document.getElementById('loginHeader');
        const signupHeader = document.getElementById('signupHeader');
        const toggleForm = document.getElementById('toggleForm');
        const toggleText = document.getElementById('toggleText');
        const googleSignIn = document.getElementById('googleSignIn');
        const loginSubmit = document.getElementById('loginSubmit');
        const signupSubmit = document.getElementById('signupSubmit');
        const passwordStrengthBar = document.getElementById('passwordStrengthBar');

        let isLogin = true;

        // Toggle between login and signup
        toggleForm.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;

            if (isLogin) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginHeader.classList.remove('hidden');
                signupHeader.classList.add('hidden');
                toggleText.textContent = 'New to CodeQuest?';
                toggleForm.textContent = 'Create an account';
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                loginHeader.classList.add('hidden');
                signupHeader.classList.remove('hidden');
                toggleText.textContent = 'Already have an account?';
                toggleForm.textContent = 'Log in';
            }
        });

        // Password strength indicator
        document.getElementById('signupPassword').addEventListener('input', (e) => {
            const password = e.target.value;
            const bar = passwordStrengthBar;
            
            bar.className = 'password-strength-bar';
            
            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    bar.classList.add('strength-strong');
                } else if (/[A-Z]/.test(password) || /[0-9]/.test(password)) {
                    bar.classList.add('strength-medium');
                } else {
                    bar.classList.add('strength-weak');
                }
            }
        });

        // Login handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Clear previous errors
            clearErrors();
            
            // Validate
            if (!security.validateEmail(email)) {
                showError('loginEmailError', 'Please enter a valid email');
                return;
            }
            
            if (password.length < 8) {
                showError('loginPasswordError', 'Password must be at least 8 characters');
                return;
            }
            
            // Rate limiting check
            if (!security.checkRateLimit('login')) {
                showNotification('Please wait before trying again', 'error');
                return;
            }
            
            // Show loading
            loginSubmit.disabled = true;
            loginSubmit.innerHTML = '<span class="spinner"></span> Logging in...';
            
            const result = await authManager.login(email, password);
            
            if (result.success) {
                showNotification('Welcome back, adventurer!', 'success');
                setTimeout(() => {
                    window.location.href = 'learn.html';
                }, 1000);
            } else {
                showNotification(result.error, 'error');
                loginSubmit.disabled = false;
                loginSubmit.textContent = 'Start Adventure';
            }
        });

        // Signup handler
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = security.sanitizeInput(document.getElementById('signupUsername').value);
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            // Clear previous errors
            clearErrors();
            
            // Validate
            if (username.length < 3) {
                showError('signupUsernameError', 'Username must be at least 3 characters');
                return;
            }
            
            if (!security.validateEmail(email)) {
                showError('signupEmailError', 'Please enter a valid email');
                return;
            }
            
            if (!security.validatePassword(password)) {
                showError('signupPasswordError', 'Password must have 8+ characters with uppercase and numbers');
                return;
            }
            
            // Rate limiting check
            if (!security.checkRateLimit('signup')) {
                showNotification('Please wait before trying again', 'error');
                return;
            }
            
            // Show loading
            signupSubmit.disabled = true;
            signupSubmit.innerHTML = '<span class="spinner"></span> Creating account...';
            
            const result = await authManager.register(email, password, username);
            
            if (result.success) {
                showNotification('Account created! Welcome to CodeQuest!', 'success');
                setTimeout(() => {
                    window.location.href = 'learn.html';
                }, 1000);
            } else {
                showNotification(result.error, 'error');
                signupSubmit.disabled = false;
                signupSubmit.textContent = 'Create Account';
            }
        });

        // Google sign-in handler
        googleSignIn.addEventListener('click', async () => {
            if (!security.checkRateLimit('google-auth')) {
                showNotification('Please wait before trying again', 'error');
                return;
            }
            
            googleSignIn.disabled = true;
            googleSignIn.innerHTML = '<span class="spinner"></span> Connecting...';
            
            const result = await authManager.signInWithGoogle();
            
            if (result.success) {
                showNotification('Welcome to CodeQuest!', 'success');
                setTimeout(() => {
                    window.location.href = 'learn.html';
                }, 1000);
            } else {
                showNotification(result.error, 'error');
                googleSignIn.disabled = false;
                googleSignIn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                `;
            }
        });

        // Helper functions
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('visible');
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.classList.remove('visible');
            });
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification notification-${type}`;
            
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 3000);
        }

        // Check if user is already logged in
        authManager.onAuthChange((isLoggedIn) => {
            if (isLoggedIn) {
                window.location.href = 'learn.html';
            }
        });
    </script>
</body>
</html>
