<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Lesson Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #3B82F6;
            --primary-bg: #EFF6FF; --primary-bg-hover: #DBEAFE;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --success: #10B981; --success-bg: #ECFDF5;
            --warning: #F59E0B; --warning-bg: #FFFBEB;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --purple: #7C3AED; --purple-bg: #F5F3FF;
            --teal: #14B8A6; --teal-bg: #F0FDFA;
            --pink: #EC4899; --pink-bg: #FDF2F8;
            --orange: #F97316; --orange-bg: #FFF7ED;
            --header-height: 56px;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 48px rgba(0,0,0,0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5; color: var(--gray-800);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

        /* Top Loader */
        .top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            z-index: 9999; pointer-events: none;
        }
        .top-loader::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), var(--teal));
            animation: none;
        }
        .top-loader.active::before { animation: topLoader 1.2s ease-in-out infinite; }
        @keyframes topLoader {
            0% { left: -100%; width: 40%; } 50% { left: 60%; width: 40%; } 100% { left: 100%; width: 40%; }
        }

        /* Topbar */
        .topbar {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 1.5rem; height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-back {
            display: flex; align-items: center; gap: 0.375rem;
            color: var(--gray-600); text-decoration: none;
            font-size: 0.813rem; font-weight: 500;
            padding: 0.375rem 0.625rem; border-radius: var(--radius-sm);
            transition: all var(--transition);
        }
        .topbar-back:hover { background: var(--gray-100); }
        .lesson-title-input {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem; font-weight: 700;
            border: none; background: transparent;
            color: var(--gray-900); outline: none;
            width: 250px; padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
        }
        .lesson-title-input:focus { background: var(--gray-50); }
        .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }
        .topbar-status {
            font-size: 0.75rem; padding: 0.25rem 0.625rem;
            border-radius: 100px; font-weight: 600;
        }
        .topbar-status.draft { background: #F3F4F6; color: #6B7280; }
        .topbar-status.published { background: var(--success-bg); color: #059669; }
        .topbar-status.saving { background: var(--warning-bg); color: #D97706; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Tabs */
        .main-tabs {
            display: flex; gap: 0; border-bottom: 2px solid var(--gray-200);
            background: white; padding: 0 1.5rem;
            position: sticky; top: var(--header-height); z-index: 40;
            overflow-x: auto;
        }
        .main-tab {
            padding: 0.75rem 1.25rem; font-size: 0.813rem; font-weight: 500;
            color: var(--gray-500); cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            transition: all var(--transition); white-space: nowrap;
            display: flex; align-items: center; gap: 0.375rem;
        }
        .main-tab:hover { color: var(--gray-700); }
        .main-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
        .main-tab i { font-size: 1rem; }

        /* Tab Panels */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Create Panel */
        .create-lesson-container {
            max-width: 550px; margin: 4rem auto;
            background: white; border-radius: var(--radius-xl);
            padding: 2.5rem; box-shadow: var(--shadow-md); text-align: center;
        }
        .create-lesson-container .create-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .create-lesson-container h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; margin-bottom: 0.5rem;
        }
        .create-lesson-container p { color: var(--gray-500); font-size: 0.875rem; margin-bottom: 2rem; }
        .searchable-select { position: relative; text-align: left; }
        .searchable-select input {
            width: 100%; padding: 0.625rem 0.875rem;
            border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.875rem;
            outline: none; transition: all var(--transition);
        }
        .searchable-select input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .searchable-select .dropdown {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm); max-height: 200px;
            overflow-y: auto; z-index: 10; box-shadow: var(--shadow); display: none;
        }
        .searchable-select .dropdown.show { display: block; }
        .searchable-select .dropdown-item {
            padding: 0.5rem 0.875rem; cursor: pointer;
            font-size: 0.813rem; transition: background var(--transition);
        }
        .searchable-select .dropdown-item:hover { background: var(--primary-bg); }
        .searchable-select .dropdown-item.selected { background: var(--primary-bg); font-weight: 600; }

        /* Manage & Analysis Panels */
        .panel-container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .panel-header-row {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem;
        }
        .panel-header-row h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; }
        .search-input { max-width: 300px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .lesson-card {
            background: white; border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg); padding: 1.25rem;
            cursor: pointer; transition: all var(--transition);
        }
        .lesson-card:hover { border-color: var(--primary); box-shadow: var(--shadow); transform: translateY(-2px); }
        .lesson-card .card-title { font-weight: 600; font-size: 0.938rem; margin-bottom: 0.375rem; }
        .lesson-card .card-meta { font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.5rem; }
        .lesson-card .card-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .lesson-card .card-stat {
            font-size: 0.688rem; padding: 0.1875rem 0.5rem;
            border-radius: 100px; background: var(--gray-50);
            display: flex; align-items: center; gap: 0.25rem;
        }
        .lesson-card .card-actions { display: flex; gap: 0.25rem; margin-top: 0.75rem; }

        /* Analysis Stats */
        .analysis-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .analysis-stat {
            background: white; border: 1px solid var(--gray-100);
            border-radius: var(--radius-lg); padding: 1.25rem;
            text-align: center;
        }
        .analysis-stat .stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 700; }
        .analysis-stat .stat-lbl { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.25rem; }
        .analysis-stat.blue .stat-val { color: var(--primary); }
        .analysis-stat.green .stat-val { color: var(--success); }
        .analysis-stat.purple .stat-val { color: var(--purple); }
        .analysis-stat.orange .stat-val { color: var(--orange); }

        .progress-bar-sm {
            height: 6px; background: var(--gray-200);
            border-radius: 3px; overflow: hidden; margin-top: 0.375rem;
        }
        .progress-bar-sm .fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .fill.blue { background: var(--primary); }
        .fill.green { background: var(--success); }
        .fill.purple { background: var(--purple); }

        /* Buttons */
        .btn {
            font-family: 'Inter', sans-serif;
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem; border-radius: var(--radius-sm);
            font-size: 0.813rem; font-weight: 600;
            transition: all var(--transition); cursor: pointer;
            border: none; white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-ghost { background: transparent; color: var(--gray-600); }
        .btn-ghost:hover { background: var(--gray-100); }
        .btn-sm { padding: 0.3125rem 0.625rem; font-size: 0.75rem; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
        .btn-teal { background: var(--teal); color: white; }
        .btn-teal:hover { opacity: 0.9; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; }
        .btn-danger:hover { background: var(--danger-bg); border-color: #FECACA; }

        /* Editor Area */
        .editor-area { padding: 1.5rem 2rem; max-width: 850px; margin: 0 auto; }
        .block-palette {
            display: flex; gap: 0.375rem; flex-wrap: wrap;
            margin-bottom: 1.5rem; justify-content: center;
            padding: 0.625rem; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px); border-radius: var(--radius-xl);
            border: 1px solid var(--gray-200);
            position: sticky; top: calc(var(--header-height) + 44px); z-index: 10;
        }
        .palette-item {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.4375rem 0.75rem; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.75rem; font-weight: 600;
            transition: all var(--transition); background: white;
            border: 1px solid var(--gray-200); user-select: none;
        }
        .palette-item:hover { border-color: var(--primary); background: var(--primary-bg); transform: translateY(-1px); }
        .palette-item:active { transform: scale(0.95); }
        .palette-item i { font-size: 0.875rem; }

        .blocks-canvas { display: flex; flex-direction: column; gap: 0.75rem; }
        .block-card {
            background: white; border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            transition: all var(--transition);
            animation: blockAppear 0.3s ease;
        }
        .block-card:hover { border-color: var(--gray-300); box-shadow: var(--shadow); }
        .block-card.focused { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .block-card.minimized .block-body { display: none; }
        @keyframes blockAppear { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .block-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.625rem 1rem; cursor: grab; user-select: none;
        }
        .block-header:hover { background: var(--gray-50); }
        .block-drag { color: var(--gray-400); font-size: 1rem; flex-shrink: 0; }
        .block-type-icon {
            width: 28px; height: 28px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.875rem; flex-shrink: 0;
        }
        .block-type-icon.text { background: var(--primary-bg); color: var(--primary); }
        .block-type-icon.video { background: var(--danger-bg); color: var(--danger); }
        .block-type-icon.remember { background: var(--warning-bg); color: #D97706; }
        .block-type-icon.question { background: var(--purple-bg); color: var(--purple); }
        .block-type-icon.image { background: var(--teal-bg); color: var(--teal); }
        .block-type-icon.code { background: var(--pink-bg); color: var(--pink); }
        .block-type-label { font-weight: 600; font-size: 0.75rem; flex: 1; }
        .block-number { font-size: 0.625rem; color: var(--gray-400); }
        .block-actions { display: flex; gap: 0.125rem; }
        .block-action-btn {
            width: 26px; height: 26px; border-radius: var(--radius-xs);
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-400); font-size: 0.875rem; transition: all var(--transition);
        }
        .block-action-btn:hover { background: var(--gray-100); color: var(--gray-700); }
        .block-action-btn.danger:hover { background: var(--danger-bg); color: var(--danger); }

        .block-body { padding: 1rem 1.25rem; border-top: 1px solid var(--gray-100); }

        /* Rich Editor */
        .rich-editor { border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
        .rich-editor:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .rich-toolbar {
            display: flex; gap: 0.125rem; padding: 0.375rem;
            background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }
        .rich-tool-btn {
            width: 28px; height: 28px; border-radius: var(--radius-xs);
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-600); font-size: 0.75rem; transition: all var(--transition);
        }
        .rich-tool-btn:hover { background: var(--gray-200); color: var(--gray-900); }
        .rich-content {
            min-height: 80px; padding: 0.75rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.938rem; line-height: 1.8;
            color: var(--gray-800); outline: none;
        }
        .rich-content:empty::before { content: 'Start typing...'; color: var(--gray-400); }

        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.875rem;
            color: var(--gray-900); transition: all var(--transition);
            background: white; outline: none;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-textarea { resize: vertical; min-height: 60px; }
        .form-label { display: block; font-size: 0.813rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.3125rem; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray-400); }
        .empty-state i { font-size: 3.5rem; display: block; margin-bottom: 0.75rem; opacity: 0.5; }
        .empty-state h3 { font-family: 'Space Grotesk', sans-serif; color: var(--gray-500); margin-bottom: 0.5rem; }

        /* Toast */
        .toast-container { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 300; display: flex; flex-direction: column; gap: 0.375rem; }
        .toast {
            background: var(--gray-900); color: white;
            padding: 0.75rem 1.125rem; border-radius: var(--radius);
            font-size: 0.813rem; font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            max-width: 380px; display: flex; align-items: center; gap: 0.5rem;
        }
        .toast.success { background: #059669; }
        .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity var(--transition);
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: var(--radius-xl);
            width: 90%; max-width: 700px; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: scale(0.95); transition: transform 0.25s ease;
        }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            border: none; background: var(--gray-100); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--gray-200); }
        .modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 0.875rem 1.25rem; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end; gap: 0.5rem; }

        @media (max-width: 768px) {
            .editor-area { padding: 0.75rem; }
            .block-palette { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; }
            .main-tabs { overflow-x: auto; padding: 0 0.5rem; }
            .analysis-stats { grid-template-columns: repeat(2, 1fr); }
            .card-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Top Loader -->
    <div class="top-loader" id="topLoader"></div>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="admin.html" class="topbar-back"><i class='bx bx-arrow-back'></i> Admin</a>
            <input type="text" class="lesson-title-input" id="lessonTitleInput" placeholder="Untitled Lesson" style="display:none;">
            <span class="topbar-status draft" id="topbarStatus" style="display:none;">Draft</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-outline btn-sm" id="btnPreview" style="display:none;"><i class='bx bx-show'></i> Preview</button>
            <button class="btn btn-primary btn-sm" id="btnSave" style="display:none;"><i class='bx bx-save'></i> Save</button>
            <button class="btn btn-teal btn-sm" id="btnPublish" style="display:none;"><i class='bx bx-cloud-upload'></i> Publish</button>
        </div>
    </header>

    <!-- Main Tabs -->
    <nav class="main-tabs" id="mainTabs">
        <button class="main-tab active" data-tab="create"><i class='bx bx-plus-circle'></i> Create New</button>
        <button class="main-tab" data-tab="manage"><i class='bx bx-folder'></i> Manage Lessons</button>
        <button class="main-tab" data-tab="analysis"><i class='bx bx-bar-chart-square'></i> Analysis</button>
        <button class="main-tab" data-tab="editor" id="tabEditor" style="display:none;"><i class='bx bx-edit'></i> Editor</button>
    </nav>

    <!-- ============ TAB PANELS ============ -->
    
    <!-- Create New -->
    <div class="tab-panel active" id="panelCreate">
        <div class="create-lesson-container">
            <div class="create-icon">📝</div>
            <h2>Create New Lesson</h2>
            <p>Start building an interactive learning experience</p>
            <div style="text-align:left;">
                <div class="form-group">
                    <label class="form-label">Lesson Title <span style="color:var(--danger);">*</span></label>
                    <input type="text" class="form-input" id="createLessonTitle" placeholder="e.g., Introduction to HTML Forms">
                </div>
                <div class="form-group">
                    <label class="form-label">Module <span style="color:var(--danger);">*</span></label>
                    <div class="searchable-select" id="moduleSearchContainer">
                        <input type="text" id="moduleSearchInput" placeholder="Search modules..." autocomplete="off">
                        <div class="dropdown" id="moduleDropdown"></div>
                        <input type="hidden" id="selectedModuleId">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">View Type</label>
                    <div style="display:flex;gap:0.5rem;">
                        <button class="btn btn-outline btn-sm active" id="optOnePage" data-view="one-page">📄 One Page</button>
                        <button class="btn btn-outline btn-sm" id="optSections" data-view="sections">📑 Sections</button>
                    </div>
                </div>
            </div>
            <button class="btn btn-primary" id="btnCreateLesson" style="width:100%;justify-content:center;margin-top:1.5rem;padding:0.75rem;">
                <i class='bx bx-plus'></i> Create Lesson & Start Editing
            </button>
        </div>
    </div>

    <!-- Manage Lessons -->
    <div class="tab-panel" id="panelManage">
        <div class="panel-container">
            <div class="panel-header-row">
                <h2>📚 All Lessons</h2>
                <input type="text" class="form-input search-input" id="lessonSearchInput" placeholder="🔍 Search lessons...">
            </div>
            <div class="card-grid" id="lessonCardGrid"></div>
        </div>
    </div>

    <!-- Analysis -->
    <div class="tab-panel" id="panelAnalysis">
        <div class="panel-container">
            <div class="panel-header-row"><h2>📊 Lesson Analysis</h2></div>
            <div class="analysis-stats" id="analysisStats">
                <div class="analysis-stat blue"><div class="stat-val" id="aTotalLessons">0</div><div class="stat-lbl">Total Lessons</div></div>
                <div class="analysis-stat green"><div class="stat-val" id="aPublished">0</div><div class="stat-lbl">Published</div></div>
                <div class="analysis-stat purple"><div class="stat-val" id="aTotalBlocks">0</div><div class="stat-lbl">Total Blocks</div></div>
                <div class="analysis-stat orange"><div class="stat-val" id="aTotalDuration">0m</div><div class="stat-lbl">Total Duration</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;">
                <div class="panel" style="background:white;border:1px solid var(--gray-100);border-radius:var(--radius-lg);padding:1.25rem;">
                    <h4 style="font-family:'Space Grotesk',sans-serif;margin-bottom:1rem;">📈 Block Type Distribution</h4>
                    <div id="blockTypeChart"></div>
                </div>
                <div class="panel" style="background:white;border:1px solid var(--gray-100);border-radius:var(--radius-lg);padding:1.25rem;">
                    <h4 style="font-family:'Space Grotesk',sans-serif;margin-bottom:1rem;">📋 Lesson Status Breakdown</h4>
                    <div id="statusChart"></div>
                </div>
            </div>
            <div style="margin-top:1.5rem;background:white;border:1px solid var(--gray-100);border-radius:var(--radius-lg);padding:1.25rem;">
                <h4 style="font-family:'Space Grotesk',sans-serif;margin-bottom:1rem;">📋 Lessons by Module</h4>
                <div id="moduleBreakdown"></div>
            </div>
        </div>
    </div>

    <!-- Editor -->
    <div class="tab-panel" id="panelEditor">
        <div class="editor-area">
            <div class="block-palette" id="blockPalette">
                <button class="palette-item" data-block="text"><i class='bx bx-text'></i> Text</button>
                <button class="palette-item" data-block="video"><i class='bx bx-video'></i> Video</button>
                <button class="palette-item" data-block="remember"><i class='bx bx-brain'></i> Remember</button>
                <button class="palette-item" data-block="question"><i class='bx bx-help-circle'></i> Question</button>
                <button class="palette-item" data-block="image"><i class='bx bx-image'></i> Image</button>
                <button class="palette-item" data-block="code"><i class='bx bx-code-alt'></i> Code</button>
            </div>
            <div class="blocks-canvas" id="blocksCanvas"></div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title">📖 Lesson Preview</h3><button class="modal-close" id="btnClosePreview"><i class='bx bx-x'></i></button></div>
            <div class="modal-body"><div id="previewContent" style="font-family:'Manrope',sans-serif;line-height:1.8;"></div></div>
            <div class="modal-footer"><button class="btn btn-ghost" id="btnClosePreview2">Close</button></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db } from './js/firebase.js';
        import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const IMGBB_API_KEY = 'ba8023ca74166460c442e8e703d2a1b0';

        // ============ UTILITIES ============
        const $ = id => document.getElementById(id);
        const toast = (msg, type = 'success') => {
            const c = $('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class='bx ${type==='success'?'bx-check-circle':'bx-x-circle'}'></i> ${msg}`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };
        const showLoader = () => $('topLoader').classList.add('active');
        const hideLoader = () => $('topLoader').classList.remove('active');
        const escHtml = s => { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; };

        // ============ GLOBAL DATA ============
        let allModules = [];
        let allLessons = [];
        let selectedModuleId = '';
        let selectedViewType = 'one-page';

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            const tabEl = document.querySelector(`.main-tab[data-tab="${tabName}"]`);
            const panelEl = $(`panel${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`);
            
            if (tabEl) tabEl.classList.add('active');
            if (panelEl) panelEl.classList.add('active');
            
            const isEditor = tabName === 'editor';
            ['btnPreview','btnSave','btnPublish','lessonTitleInput','topbarStatus'].forEach(id => {
                const el = $(id);
                if (el) el.style.display = isEditor ? '' : 'none';
            });
            
            if (tabName === 'manage') loadManageTab();
            if (tabName === 'analysis') loadAnalysisTab();
        }

        $('mainTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.main-tab');
            if (tab && tab.dataset.tab) switchTab(tab.dataset.tab);
        });

        // ============ MODULE SEARCH ============
        function setupModuleSearch() {
            const input = $('moduleSearchInput');
            const dropdown = $('moduleDropdown');
            if (!input || !dropdown) return;
            
            input.addEventListener('focus', () => { filterModules(input.value); dropdown.classList.add('show'); });
            input.addEventListener('input', () => filterModules(input.value));
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#moduleSearchContainer')) dropdown.classList.remove('show');
            });
        }

        function filterModules(query) {
            const dropdown = $('moduleDropdown');
            if (!dropdown) return;
            const filtered = query ? allModules.filter(m => 
                m.name.toLowerCase().includes(query.toLowerCase()) ||
                (m.courseName || '').toLowerCase().includes(query.toLowerCase())
            ) : allModules;
            
            dropdown.innerHTML = filtered.length ? filtered.map(m => `
                <div class="dropdown-item ${m.id === selectedModuleId ? 'selected' : ''}" 
                     data-module-id="${m.id}" data-module-name="${escHtml(m.name)} (${escHtml(m.courseName||'No course')})">
                    ${escHtml(m.name)} <span style="color:var(--gray-400);font-size:0.75rem;">(${escHtml(m.courseName||'No course')})</span>
                </div>
            `).join('') : '<div class="dropdown-item" style="color:var(--gray-400);">No modules found</div>';
            
            dropdown.classList.add('show');
        }

        $('moduleDropdown')?.addEventListener('click', (e) => {
            const item = e.target.closest('.dropdown-item[data-module-id]');
            if (item) {
                selectedModuleId = item.dataset.moduleId;
                $('selectedModuleId').value = selectedModuleId;
                $('moduleSearchInput').value = item.dataset.moduleName;
                $('moduleDropdown').classList.remove('show');
            }
        });

        // View type selection
        document.getElementById('optOnePage')?.addEventListener('click', function() {
            selectedViewType = 'one-page';
            this.classList.add('active');
            $('optSections').classList.remove('active');
        });
        document.getElementById('optSections')?.addEventListener('click', function() {
            selectedViewType = 'sections';
            this.classList.add('active');
            $('optOnePage').classList.remove('active');
        });

        // ============ DATA LOADING ============
        async function loadModules() {
            try {
                const snap = await getDocs(query(collection(db, 'modules'), orderBy('order')));
                allModules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                allModules = JSON.parse(localStorage.getItem('ak_modules') || '[]');
            }
            setupModuleSearch();
        }

        async function loadAllLessons() {
            try {
                const snap = await getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')));
                allLessons = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                allLessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]');
            }
        }

        // ============ MANAGE TAB ============
        async function loadManageTab() {
            await loadAllLessons();
            renderLessonCards();
        }

        function renderLessonCards() {
            const grid = $('lessonCardGrid');
            if (!grid) return;
            const query = ($('lessonSearchInput')?.value || '').toLowerCase();
            let filtered = allLessons;
            if (query) filtered = allLessons.filter(l => (l.title||'').toLowerCase().includes(query) || (l.moduleName||'').toLowerCase().includes(query));
            
            if (!filtered.length) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="bx bx-folder-open"></i><h3>No Lessons Found</h3><p>Create a new lesson or adjust your search</p></div>';
                return;
            }
            
            grid.innerHTML = filtered.map(l => {
                const blocks = l.blockCount || ((l.pages||[]).reduce((s,p)=>s+(p.blocks?.length||0),0));
                const statusClass = l.status==='published'?'success':l.status==='archived'?'danger':'';
                return `
                <div class="lesson-card" data-lesson-id="${l.id}">
                    <div class="card-title">${escHtml(l.title||'Untitled')}</div>
                    <div class="card-meta">${escHtml(l.moduleName||'No module')} • ${l.viewType==='sections'?'Sections':'One Page'}</div>
                    <div class="card-stats">
                        <span class="card-stat"><i class='bx bx-cube'></i> ${blocks} blocks</span>
                        <span class="card-stat"><i class='bx bx-time'></i> ${l.estimatedTime||0} min</span>
                        <span class="card-stat" style="color:${l.status==='published'?'var(--success)':'var(--gray-500)'};">${l.status||'draft'}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm edit-lesson-btn" data-id="${l.id}"><i class='bx bx-edit'></i> Edit</button>
                        <button class="btn btn-ghost btn-sm view-lesson-btn" data-id="${l.id}"><i class='bx bx-show'></i></button>
                        <button class="btn btn-danger btn-sm delete-lesson-btn" data-id="${l.id}"><i class='bx bx-trash'></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        $('lessonSearchInput')?.addEventListener('input', renderLessonCards);

        // Manage tab button clicks (event delegation)
        $('lessonCardGrid')?.addEventListener('click', async (e) => {
            const card = e.target.closest('.lesson-card');
            if (!card) return;
            const id = card.dataset.lessonId;
            
            if (e.target.closest('.edit-lesson-btn')) {
                await editExistingLesson(id);
            } else if (e.target.closest('.view-lesson-btn')) {
                previewExistingLesson(id);
            } else if (e.target.closest('.delete-lesson-btn')) {
                deleteLessonConfirm(id);
            } else {
                await editExistingLesson(id);
            }
        });

        async function editExistingLesson(id) {
            showLoader();
            try {
                const snap = await getDoc(doc(db, 'lessons', id));
                if (snap.exists()) {
                    const data = snap.data();
                    LessonBuilder.init({
                        title: data.title || 'Untitled',
                        moduleId: data.moduleId || '',
                        viewType: data.viewType || 'one-page',
                        blocks: data.viewType === 'sections' ? [] : (data.pages?.[0]?.blocks || []),
                        pages: data.viewType === 'sections' ? (data.pages || [{ blocks: [] }]) : [{ blocks: [] }],
                        status: data.status || 'draft',
                        lessonId: id
                    });
                    switchTab('editor');
                    toast('Lesson loaded!', 'success');
                }
            } catch (e) {
                toast('Failed to load lesson', 'error');
            }
            hideLoader();
        }

        function previewExistingLesson(id) {
            const lesson = allLessons.find(l => l.id === id);
            if (!lesson) return;
            const blocks = lesson.pages?.[0]?.blocks || [];
            let html = `<h1 style="font-family:'Space Grotesk',sans-serif;">${escHtml(lesson.title||'Untitled')}</h1>`;
            blocks.forEach(b => {
                html += '<div style="padding:1rem;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:0.75rem;">';
                if (b.type==='text') html += b.content||'<p>Empty</p>';
                if (b.type==='video') html += b.url?'<div style="background:#111;color:#fff;padding:2rem;text-align:center;">📹 Video</div>':'<p>No video</p>';
                if (b.type==='remember') html += `<div style="background:var(--warning-bg);padding:1rem;border-radius:8px;"><strong>🧠</strong> ${escHtml(b.text||'')}</div>`;
                if (b.type==='question') html += `<div style="background:var(--purple-bg);padding:1rem;border-radius:8px;"><strong>❓ ${escHtml(b.question||'')}</strong></div>`;
                if (b.type==='image') html += b.url?`<img src="${b.url}" style="max-width:100%;border-radius:8px;">`:'<p>No image</p>';
                if (b.type==='code') html += `<pre style="background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:8px;">${escHtml(b.code||'')}</pre>`;
                html += '</div>';
            });
            $('previewContent').innerHTML = html;
            $('previewModal').classList.add('show');
        }

        async function deleteLessonConfirm(id) {
            if (!confirm('Delete this lesson permanently?')) return;
            showLoader();
            try {
                await deleteDoc(doc(db, 'lessons', id));
                allLessons = allLessons.filter(l => l.id !== id);
                localStorage.setItem('ak_lessons', JSON.stringify(allLessons));
                renderLessonCards();
                toast('Deleted!', 'success');
            } catch (e) {
                allLessons = allLessons.filter(l => l.id !== id);
                localStorage.setItem('ak_lessons', JSON.stringify(allLessons));
                renderLessonCards();
                toast('Deleted locally', 'warning');
            }
            hideLoader();
        }

        // ============ ANALYSIS TAB ============
        async function loadAnalysisTab() {
            await loadAllLessons();
            
            const total = allLessons.length;
            const published = allLessons.filter(l => l.status === 'published').length;
            const totalBlocks = allLessons.reduce((s, l) => s + (l.blockCount || ((l.pages||[]).reduce((sp,p)=>sp+(p.blocks?.length||0),0))), 0);
            const totalDuration = allLessons.reduce((s, l) => s + (l.estimatedTime || 0), 0);
            
            $('aTotalLessons').textContent = total;
            $('aPublished').textContent = published;
            $('aTotalBlocks').textContent = totalBlocks;
            $('aTotalDuration').textContent = totalDuration + 'm';
            
            // Block type distribution
            const blockTypes = { text: 0, video: 0, remember: 0, question: 0, image: 0, code: 0 };
            allLessons.forEach(l => {
                (l.pages || []).forEach(p => {
                    (p.blocks || []).forEach(b => {
                        if (blockTypes[b.type] !== undefined) blockTypes[b.type]++;
                    });
                });
            });
            
            const maxBlocks = Math.max(...Object.values(blockTypes), 1);
            const labels = { text: 'Text', video: 'Video', remember: 'Remember', question: 'Question', image: 'Image', code: 'Code' };
            const colors = { text: 'blue', video: 'red', remember: 'yellow', question: 'purple', image: 'teal', code: 'pink' };
            
            $('blockTypeChart').innerHTML = Object.entries(blockTypes).map(([type, count]) => `
                <div style="margin-bottom:0.75rem;">
                    <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.25rem;">
                        <span>${labels[type]}</span><span style="font-weight:600;">${count}</span>
                    </div>
                    <div class="progress-bar-sm"><div class="fill ${colors[type]}" style="width:${(count/maxBlocks)*100}%;"></div></div>
                </div>
            `).join('');
            
            // Status breakdown
            const draftCount = allLessons.filter(l => !l.status || l.status === 'draft').length;
            const archivedCount = allLessons.filter(l => l.status === 'archived').length;
            $('statusChart').innerHTML = `
                <div style="margin-bottom:0.75rem;"><div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.25rem;"><span>✅ Published</span><span style="font-weight:600;">${published}</span></div><div class="progress-bar-sm"><div class="fill green" style="width:${total?(published/total)*100:0}%;"></div></div></div>
                <div style="margin-bottom:0.75rem;"><div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.25rem;"><span>📝 Draft</span><span style="font-weight:600;">${draftCount}</span></div><div class="progress-bar-sm"><div class="fill blue" style="width:${total?(draftCount/total)*100:0}%;"></div></div></div>
                <div style="margin-bottom:0.75rem;"><div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.25rem;"><span>📦 Archived</span><span style="font-weight:600;">${archivedCount}</span></div><div class="progress-bar-sm"><div class="fill purple" style="width:${total?(archivedCount/total)*100:0}%;"></div></div></div>
            `;
            
            // Module breakdown
            const moduleMap = {};
            allLessons.forEach(l => {
                const key = l.moduleName || 'No Module';
                if (!moduleMap[key]) moduleMap[key] = 0;
                moduleMap[key]++;
            });
            
            $('moduleBreakdown').innerHTML = Object.entries(moduleMap).sort((a,b) => b[1] - a[1]).map(([name, count]) => `
                <div style="display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--gray-100);">
                    <span style="flex:1;font-size:0.813rem;">${escHtml(name)}</span>
                    <span class="badge" style="background:var(--primary-bg);color:var(--primary);padding:0.1875rem 0.5rem;border-radius:100px;font-size:0.688rem;font-weight:600;">${count} lessons</span>
                </div>
            `).join('') || '<p style="color:var(--gray-400);font-size:0.813rem;">No data yet</p>';
        }

        // ============ CREATE LESSON ============
        $('btnCreateLesson').addEventListener('click', () => {
            const title = $('createLessonTitle').value.trim();
            if (!title) { toast('Please enter a lesson title', 'error'); $('createLessonTitle').focus(); return; }
            if (!selectedModuleId) { toast('Please select a module', 'error'); $('moduleSearchInput').focus(); return; }
            
            LessonBuilder.init({
                title, moduleId: selectedModuleId,
                viewType: selectedViewType,
                blocks: [], pages: [{ blocks: [] }],
                status: 'draft', lessonId: null
            });
            switchTab('editor');
            toast('Lesson created! Start adding blocks.', 'success');
        });

        // ============ LESSON BUILDER ============
        const LessonBuilder = {
            title: '', moduleId: '', viewType: 'one-page', status: 'draft',
            blocks: [], pages: [{ blocks: [] }], currentPage: 0,
            lessonId: null, focusedBlockId: null, autoSaveTimer: null, lastDeleted: null,

            init(data) {
                this.title = data.title; this.moduleId = data.moduleId;
                this.viewType = data.viewType; this.status = data.status;
                this.blocks = data.blocks || []; this.pages = data.pages || [{ blocks: [] }];
                this.currentPage = 0; this.lessonId = data.lessonId;
                this.focusedBlockId = null;
                
                $('lessonTitleInput').value = this.title;
                $('topbarStatus').textContent = this.status;
                $('topbarStatus').className = 'topbar-status ' + this.status;
                this.renderBlocks();
            },

            getBlocks() {
                return this.viewType === 'sections' ? (this.pages[this.currentPage]?.blocks || []) : this.blocks;
            },

            addBlock(type) {
                const block = this._createBlock(type);
                this.getBlocks().push(block);
                this.focusedBlockId = block.id;
                this.renderBlocks();
                this._autoSave();
                setTimeout(() => {
                    const el = document.getElementById('block-' + block.id);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
                toast('Block added!', 'success');
            },

            _createBlock(type) {
                const id = 'b_' + Date.now();
                const base = { id, type };
                switch (type) {
                    case 'text': return { ...base, content: '' };
                    case 'video': return { ...base, url: '' };
                    case 'remember': return { ...base, text: '' };
                    case 'question': return { ...base, question: '', questionType: 'multiple-choice', options: ['','','',''], correctAnswer: 0, points: 10 };
                    case 'image': return { ...base, url: '', alt: '' };
                    case 'code': return { ...base, code: '', language: 'javascript', caption: '' };
                    default: return base;
                }
            },

            renderBlocks() {
                const canvas = $('blocksCanvas');
                if (!canvas) return;
                const blocks = this.getBlocks();
                if (!blocks.length) {
                    canvas.innerHTML = '<div class="empty-state"><i class="bx bx-cube"></i><h3>Empty Canvas</h3><p>Click a block type above to start building</p></div>';
                    return;
                }
                canvas.innerHTML = blocks.map((b, i) => this._renderCard(b, i)).join('');
            },

            _renderCard(block, index) {
                const icons = { text:'bx-text',video:'bx-video',remember:'bx-brain',question:'bx-help-circle',image:'bx-image',code:'bx-code-alt' };
                const labels = { text:'Rich Text',video:'Video',remember:'Remember',question:'Question',image:'Image',code:'Code' };
                const isFocused = this.focusedBlockId === block.id;
                const bid = block.id;
                
                return `<div class="block-card ${isFocused?'focused':''}" id="block-${bid}" data-block-id="${bid}">
                    <div class="block-header">
                        <i class='bx bx-grid-vertical block-drag'></i>
                        <div class="block-type-icon ${block.type}"><i class='bx ${icons[block.type]||'bx-cube'}'></i></div>
                        <span class="block-type-label">${labels[block.type]||block.type}</span>
                        <span class="block-number">Block ${index+1}</span>
                        <div class="block-actions">
                            <button class="block-action-btn minimize-btn" data-id="${bid}"><i class='bx bx-chevron-up'></i></button>
                            <button class="block-action-btn duplicate-btn" data-id="${bid}"><i class='bx bx-copy'></i></button>
                            <button class="block-action-btn danger delete-btn" data-id="${bid}"><i class='bx bx-trash'></i></button>
                        </div>
                    </div>
                    <div class="block-body">${this._renderContent(block)}</div>
                </div>`;
            },

            _renderContent(block) {
                const bid = block.id;
                switch (block.type) {
                    case 'text': return `<div class="rich-editor"><div class="rich-toolbar">
                        <button class="rich-tool-btn rich-cmd" data-cmd="bold" data-id="${bid}"><b>B</b></button>
                        <button class="rich-tool-btn rich-cmd" data-cmd="italic" data-id="${bid}"><i>I</i></button>
                        <button class="rich-tool-btn rich-cmd" data-cmd="underline" data-id="${bid}"><u>U</u></button>
                        <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                        <button class="rich-tool-btn rich-cmd" data-cmd="formatBlock" data-id="${bid}" data-val="h2">H2</button>
                        <button class="rich-tool-btn rich-cmd" data-cmd="formatBlock" data-id="${bid}" data-val="h3">H3</button>
                        <button class="rich-tool-btn rich-cmd" data-cmd="formatBlock" data-id="${bid}" data-val="p">P</button>
                        <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                        <button class="rich-tool-btn rich-cmd" data-cmd="insertUnorderedList" data-id="${bid}"><i class='bx bx-list-ul'></i></button>
                        <button class="rich-tool-btn rich-cmd" data-cmd="insertOrderedList" data-id="${bid}"><i class='bx bx-list-ol'></i></button>
                        <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                        <button class="rich-tool-btn link-btn" data-id="${bid}"><i class='bx bx-link'></i></button>
                    </div><div class="rich-content" id="rich-${bid}" contenteditable="true">${block.content||''}</div></div>`;
                    case 'video': return `<input type="text" class="form-input video-url-input" data-id="${bid}" value="${block.url||''}" placeholder="YouTube URL...">${block.url?`<div style="margin-top:0.75rem;position:relative;padding-bottom:56.25%;height:0;background:var(--gray-900);border-radius:var(--radius);overflow:hidden;"><iframe src="https://www.youtube.com/embed/${LessonBuilder._getYTId(block.url)||''}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>`:''}`;
                    case 'remember': return `<div style="background:var(--warning-bg);border:1px solid #FCD34D;border-radius:var(--radius);padding:1rem;"><label style="font-weight:700;font-size:0.75rem;color:#D97706;display:block;margin-bottom:0.5rem;">🧠 Key Point</label><textarea class="form-textarea remember-input" data-id="${bid}" rows="3">${block.text||''}</textarea></div>`;
                    case 'question': return this._renderQuestionForm(block);
                    case 'image': return `<input type="file" accept="image/*" style="display:none;" class="img-file-input" data-id="${bid}"><div style="text-align:center;cursor:pointer;padding:1.5rem;border:2px dashed var(--gray-300);border-radius:var(--radius);" class="img-upload-trigger" data-id="${bid}"><i class='bx bx-cloud-upload' style="font-size:2rem;color:var(--gray-400);"></i><p style="font-size:0.75rem;color:var(--gray-500);">Click to upload</p></div><input type="text" class="form-input img-url-input" data-id="${bid}" value="${block.url||''}" placeholder="Or paste URL..." style="margin-top:0.5rem;"><input type="text" class="form-input img-alt-input" data-id="${bid}" value="${block.alt||''}" placeholder="Caption" style="margin-top:0.375rem;">${block.url?`<img src="${block.url}" style="max-width:100%;max-height:300px;margin-top:0.75rem;border-radius:var(--radius);">`:''}`;
                    case 'code': return `<select class="form-select code-lang-select" data-id="${bid}" style="width:160px;margin-bottom:0.5rem;"><option value="javascript" ${block.language==='javascript'?'selected':''}>JavaScript</option><option value="python" ${block.language==='python'?'selected':''}>Python</option><option value="html" ${block.language==='html'?'selected':''}>HTML</option><option value="css" ${block.language==='css'?'selected':''}>CSS</option></select><textarea class="form-textarea code-input" data-id="${bid}" rows="5" style="font-family:'JetBrains Mono',monospace;font-size:0.813rem;background:#1e1e2e;color:#cdd6f4;">${block.code||''}</textarea><input type="text" class="form-input code-caption-input" data-id="${bid}" value="${block.caption||''}" placeholder="Caption" style="margin-top:0.375rem;">`;
                    default: return '';
                }
            },

            _renderQuestionForm(block) {
                const bid = block.id;
                return `<div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                    <select class="form-select q-type-select" data-id="${bid}" style="width:180px;"><option value="multiple-choice" ${block.questionType==='multiple-choice'?'selected':''}>Multiple Choice</option><option value="boolean" ${block.questionType==='boolean'?'selected':''}>True/False</option></select>
                    <input type="number" class="form-input q-points-input" data-id="${bid}" value="${block.points||10}" style="width:80px;" min="0" placeholder="Points">
                </div>
                <input type="text" class="form-input q-text-input" data-id="${bid}" value="${block.question||''}" placeholder="Enter question..." style="margin-bottom:0.75rem;font-weight:600;">
                ${block.questionType==='boolean'?`<div style="display:flex;gap:0.5rem;"><button class="btn btn-outline btn-sm bool-true-btn" data-id="${bid}" style="flex:1;${block.correctAnswer===true?'background:var(--success-bg);border-color:var(--success);':''}">✅ True</button><button class="btn btn-outline btn-sm bool-false-btn" data-id="${bid}" style="flex:1;${block.correctAnswer===false?'background:var(--success-bg);border-color:var(--success);':''}">❌ False</button></div>`:
                (block.options||['','','','']).map((opt,i)=>`<div class="opt-row" data-id="${bid}" data-opt="${i}" style="display:flex;align-items:center;gap:0.5rem;padding:0.375rem 0.75rem;border:1px solid ${block.correctAnswer===i?'var(--success)':'var(--gray-200)'};border-radius:var(--radius-sm);margin-bottom:0.25rem;background:${block.correctAnswer===i?'var(--success-bg)':'white'};cursor:pointer;"><div style="width:18px;height:18px;border-radius:50%;border:2px solid ${block.correctAnswer===i?'var(--success)':'var(--gray-300)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${block.correctAnswer===i?'✓':''}</div><input class="form-input opt-input" data-id="${bid}" data-opt="${i}" value="${opt}" placeholder="Option ${String.fromCharCode(65+i)}" style="border:none;padding:0.25rem;flex:1;"></div>`).join('')+`<div style="font-size:0.688rem;color:var(--gray-400);margin-top:0.25rem;">Click option row to mark as correct</div>`}`;
            },

            _getYTId(url) { if(!url)return null; const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]{11})/); return m?m[1]:null; },

            _findBlock(id) { return this.getBlocks().find(b => b.id === id); },

            _autoSave() {
                clearTimeout(this.autoSaveTimer);
                this.autoSaveTimer = setTimeout(() => {
                    const data = {
                        title: $('lessonTitleInput')?.value || this.title,
                        moduleId: this.moduleId, viewType: this.viewType, status: this.status,
                        pages: this.viewType==='sections'?this.pages:[{blocks:this.blocks}],
                        estimatedTime: this.getBlocks().length*5, blockCount: this.getBlocks().length
                    };
                    localStorage.setItem('ak_lesson_autosave', JSON.stringify(data));
                }, 2000);
            },

            async save() {
                showLoader();
                $('topbarStatus').textContent = 'Saving...';
                $('topbarStatus').className = 'topbar-status saving';
                const data = {
                    title: $('lessonTitleInput')?.value || this.title,
                    moduleId: this.moduleId, viewType: this.viewType, status: this.status,
                    pages: this.viewType==='sections'?this.pages:[{blocks:this.blocks}],
                    estimatedTime: this.getBlocks().length*5, blockCount: this.getBlocks().length,
                    updatedAt: new Date().toISOString()
                };
                this.title = data.title;
                try {
                    if (this.lessonId) {
                        await updateDoc(doc(db,'lessons',this.lessonId),{...data,updatedAt:Timestamp.now()});
                    } else {
                        const ref = await addDoc(collection(db,'lessons'),{...data,createdAt:Timestamp.now(),updatedAt:Timestamp.now()});
                        this.lessonId = ref.id;
                        localStorage.setItem('ak_current_lesson', ref.id);
                        window.history.replaceState({},'',`?id=${ref.id}`);
                    }
                    localStorage.setItem('ak_lesson_backup',JSON.stringify(data));
                    $('topbarStatus').textContent = this.status;
                    $('topbarStatus').className = 'topbar-status '+this.status;
                    toast('Saved! 💾','success');
                } catch(e) {
                    localStorage.setItem('ak_lesson_backup',JSON.stringify(data));
                    toast('Saved locally (offline)','warning');
                }
                hideLoader();
            },

            publish() { this.status='published'; $('topbarStatus').textContent='Published'; $('topbarStatus').className='topbar-status published'; this.save(); toast('Published! 🚀','success'); },

            preview() {
                const blocks = this.getBlocks();
                let h = `<h1 style="font-family:'Space Grotesk',sans-serif;">${escHtml(this.title)}</h1>`;
                blocks.forEach(b=>{
                    h+='<div style="padding:1rem;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:0.75rem;">';
                    if(b.type==='text')h+=b.content||'<p>Empty</p>';
                    if(b.type==='video')h+=b.url?'<div style="background:#111;color:#fff;padding:2rem;text-align:center;">📹 Video</div>':'<p>No video</p>';
                    if(b.type==='remember')h+=`<div style="background:var(--warning-bg);padding:1rem;border-radius:8px;"><strong>🧠</strong> ${escHtml(b.text||'')}</div>`;
                    if(b.type==='question')h+=`<div style="background:var(--purple-bg);padding:1rem;border-radius:8px;"><strong>❓ ${escHtml(b.question||'')}</strong></div>`;
                    if(b.type==='image')h+=b.url?`<img src="${b.url}" style="max-width:100%;border-radius:8px;">`:'<p>No image</p>';
                    if(b.type==='code')h+=`<pre style="background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:8px;">${escHtml(b.code||'')}</pre>`;
                    h+='</div>';
                });
                $('previewContent').innerHTML=h;
                $('previewModal').classList.add('show');
            }
        };

        // ============ EVENT DELEGATION FOR EDITOR ============
        document.addEventListener('click', async (e) => {
            // Block palette
            const paletteBtn = e.target.closest('.palette-item[data-block]');
            if (paletteBtn) {
                LessonBuilder.addBlock(paletteBtn.dataset.block);
                return;
            }
            
            // Block card focus
            const blockCard = e.target.closest('.block-card[data-block-id]');
            if (blockCard && !e.target.closest('button,input,textarea,select,[contenteditable]')) {
                LessonBuilder.focusedBlockId = blockCard.dataset.blockId;
                document.querySelectorAll('.block-card').forEach(c => c.classList.remove('focused'));
                blockCard.classList.add('focused');
                return;
            }
            
            // Minimize button
            const minBtn = e.target.closest('.minimize-btn');
            if (minBtn) {
                document.getElementById('block-' + minBtn.dataset.id)?.classList.toggle('minimized');
                return;
            }
            
            // Duplicate button
            const dupBtn = e.target.closest('.duplicate-btn');
            if (dupBtn) {
                const id = dupBtn.dataset.id;
                const blocks = LessonBuilder.getBlocks();
                const idx = blocks.findIndex(b => b.id === id);
                if (idx !== -1) {
                    const clone = JSON.parse(JSON.stringify(blocks[idx]));
                    clone.id = 'b_' + Date.now();
                    blocks.splice(idx + 1, 0, clone);
                    LessonBuilder.renderBlocks();
                    LessonBuilder._autoSave();
                    toast('Duplicated!', 'success');
                }
                return;
            }
            
            // Delete button
            const delBtn = e.target.closest('.delete-btn');
            if (delBtn) {
                const id = delBtn.dataset.id;
                const blocks = LessonBuilder.getBlocks();
                const idx = blocks.findIndex(b => b.id === id);
                if (idx !== -1) {
                    LessonBuilder.lastDeleted = { block: blocks.splice(idx, 1)[0], index: idx };
                    LessonBuilder.renderBlocks();
                    LessonBuilder._autoSave();
                    toast('Block deleted', 'info');
                }
                return;
            }
            
            // Rich text commands
            const richCmd = e.target.closest('.rich-cmd');
            if (richCmd) {
                const { cmd, id, val } = richCmd.dataset;
                const richEl = document.getElementById('rich-' + id);
                if (richEl) {
                    richEl.focus();
                    document.execCommand(cmd, false, val || null);
                    const block = LessonBuilder._findBlock(id);
                    if (block) { block.content = richEl.innerHTML; LessonBuilder._autoSave(); }
                }
                return;
            }
            
            // Link button
            const linkBtn = e.target.closest('.link-btn');
            if (linkBtn) {
                const id = linkBtn.dataset.id;
                const richEl = document.getElementById('rich-' + id);
                if (richEl) {
                    richEl.focus();
                    const url = prompt('Enter URL:', 'https://');
                    if (url) {
                        document.execCommand('createLink', false, url);
                        const block = LessonBuilder._findBlock(id);
                        if (block) { block.content = richEl.innerHTML; LessonBuilder._autoSave(); }
                    }
                }
                return;
            }
            
            // Question: option row click (mark correct)
            const optRow = e.target.closest('.opt-row');
            if (optRow && !e.target.closest('input')) {
                const id = optRow.dataset.id;
                const optIdx = parseInt(optRow.dataset.opt);
                const block = LessonBuilder._findBlock(id);
                if (block) { block.correctAnswer = optIdx; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
                return;
            }
            
            // Boolean buttons
            const boolTrue = e.target.closest('.bool-true-btn');
            if (boolTrue) {
                const block = LessonBuilder._findBlock(boolTrue.dataset.id);
                if (block) { block.correctAnswer = true; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
                return;
            }
            const boolFalse = e.target.closest('.bool-false-btn');
            if (boolFalse) {
                const block = LessonBuilder._findBlock(boolFalse.dataset.id);
                if (block) { block.correctAnswer = false; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
                return;
            }
            
            // Image upload trigger
            const imgTrigger = e.target.closest('.img-upload-trigger');
            if (imgTrigger) {
                const fileInput = document.querySelector(`.img-file-input[data-id="${imgTrigger.dataset.id}"]`);
                if (fileInput) fileInput.click();
                return;
            }
        });

        // Input change events (delegated)
        document.addEventListener('change', async (e) => {
            const getBlock = (id) => LessonBuilder._findBlock(id);
            
            // Rich content
            if (e.target.classList.contains('rich-content')) {
                const id = e.target.id.replace('rich-', '');
                const block = getBlock(id);
                if (block) { block.content = e.target.innerHTML; LessonBuilder._autoSave(); }
            }
            
            // Video URL
            if (e.target.classList.contains('video-url-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.url = e.target.value; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
            }
            
            // Remember text
            if (e.target.classList.contains('remember-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.text = e.target.value; LessonBuilder._autoSave(); }
            }
            
            // Question fields
            if (e.target.classList.contains('q-type-select')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.questionType = e.target.value; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('q-points-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.points = parseInt(e.target.value) || 0; LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('q-text-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.question = e.target.value; LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('opt-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.options[parseInt(e.target.dataset.opt)] = e.target.value; LessonBuilder._autoSave(); }
            }
            
            // Image fields
            if (e.target.classList.contains('img-url-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.url = e.target.value; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('img-alt-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.alt = e.target.value; LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('img-file-input')) {
                const file = e.target.files?.[0];
                if (file) {
                    showLoader();
                    const fd = new FormData(); fd.append('image', file);
                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                        const data = await res.json();
                        if (data.success) {
                            const block = getBlock(e.target.dataset.id);
                            if (block) { block.url = data.data.url; LessonBuilder.renderBlocks(); LessonBuilder._autoSave(); toast('Uploaded!', 'success'); }
                        }
                    } catch(ex) { toast('Upload failed', 'error'); }
                    hideLoader();
                }
            }
            
            // Code fields
            if (e.target.classList.contains('code-lang-select')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.language = e.target.value; LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('code-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.code = e.target.value; LessonBuilder._autoSave(); }
            }
            if (e.target.classList.contains('code-caption-input')) {
                const block = getBlock(e.target.dataset.id);
                if (block) { block.caption = e.target.value; LessonBuilder._autoSave(); }
            }
        });

        // ============ TOPBAR BUTTONS ============
        $('btnSave')?.addEventListener('click', () => LessonBuilder.save());
        $('btnPublish')?.addEventListener('click', () => LessonBuilder.publish());
        $('btnPreview')?.addEventListener('click', () => LessonBuilder.preview());
        $('btnClosePreview')?.addEventListener('click', () => $('previewModal').classList.remove('show'));
        $('btnClosePreview2')?.addEventListener('click', () => $('previewModal').classList.remove('show'));

        $('lessonTitleInput')?.addEventListener('input', function() {
            LessonBuilder.title = this.value;
            LessonBuilder._autoSave();
        });

        // Close modals
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('show')) {
                e.target.classList.remove('show');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); LessonBuilder.save(); }
            if (e.ctrlKey && e.key === 'p') { e.preventDefault(); LessonBuilder.preview(); }
            if (e.key === 'Delete' && LessonBuilder.focusedBlockId && !e.target.closest('[contenteditable],input,textarea,select')) {
                e.preventDefault();
                const blocks = LessonBuilder.getBlocks();
                const idx = blocks.findIndex(b => b.id === LessonBuilder.focusedBlockId);
                if (idx !== -1) {
                    LessonBuilder.lastDeleted = { block: blocks.splice(idx, 1)[0], index: idx };
                    LessonBuilder.renderBlocks();
                    LessonBuilder._autoSave();
                }
            }
            if (e.ctrlKey && e.key === 'z' && LessonBuilder.lastDeleted) {
                e.preventDefault();
                const { block, index } = LessonBuilder.lastDeleted;
                LessonBuilder.getBlocks().splice(index, 0, block);
                LessonBuilder.renderBlocks();
                LessonBuilder.lastDeleted = null;
                toast('Undo!', 'info');
            }
            if (e.key === 'Escape') {
                $('previewModal').classList.remove('show');
            }
        });

        // ============ INIT ============
        loadModules();
        loadAllLessons();
        console.log('🚀 Akademia Lesson Studio v3.0 ready!');
    </script>
</body>
</html>
