<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Lesson Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #3B82F6;
            --primary-bg: #EFF6FF; --primary-bg-hover: #DBEAFE;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --success: #10B981; --success-bg: #ECFDF5;
            --warning: #F59E0B; --warning-bg: #FFFBEB;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --purple: #7C3AED; --purple-bg: #F5F3FF;
            --teal: #14B8A6; --teal-bg: #F0FDFA;
            --pink: #EC4899; --pink-bg: #FDF2F8;
            --header-height: 56px;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 48px rgba(0,0,0,0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: var(--gray-800);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

        /* ============ TOP LOADER ============ */
        .top-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            z-index: 9999; pointer-events: none;
        }
        .top-loader::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), var(--teal));
            animation: none;
        }
        .top-loader.active::before { animation: topLoader 1.2s ease-in-out infinite; }
        @keyframes topLoader {
            0% { left: -100%; width: 40%; }
            50% { left: 60%; width: 40%; }
            100% { left: 100%; width: 40%; }
        }

        /* ============ TOPBAR ============ */
        .topbar {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 1.5rem; height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-back {
            display: flex; align-items: center; gap: 0.375rem;
            color: var(--gray-600); text-decoration: none;
            font-size: 0.813rem; font-weight: 500;
            padding: 0.375rem 0.625rem; border-radius: var(--radius-sm);
            transition: all var(--transition);
        }
        .topbar-back:hover { background: var(--gray-100); }
        .lesson-title-input {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.125rem; font-weight: 700;
            border: none; background: transparent;
            color: var(--gray-900); outline: none;
            width: 250px; padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
        }
        .lesson-title-input:focus { background: var(--gray-50); }
        .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }
        .topbar-status {
            font-size: 0.75rem; padding: 0.25rem 0.625rem;
            border-radius: 100px; font-weight: 600;
        }
        .topbar-status.draft { background: #F3F4F6; color: #6B7280; }
        .topbar-status.published { background: var(--success-bg); color: #059669; }
        .topbar-status.saving { background: var(--warning-bg); color: #D97706; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* ============ TABS ============ */
        .main-tabs {
            display: flex; gap: 0;
            border-bottom: 2px solid var(--gray-200);
            background: white;
            padding: 0 1.5rem;
            position: sticky; top: var(--header-height); z-index: 40;
        }
        .main-tab {
            padding: 0.75rem 1.25rem; font-size: 0.813rem; font-weight: 500;
            color: var(--gray-500); cursor: pointer; border: none; background: none;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
            transition: all var(--transition); white-space: nowrap;
            display: flex; align-items: center; gap: 0.375rem;
        }
        .main-tab:hover { color: var(--gray-700); }
        .main-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
        .main-tab i { font-size: 1rem; }

        /* ============ TAB PANELS ============ */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ============ CREATE LESSON PANEL ============ */
        .create-lesson-container {
            max-width: 550px; margin: 4rem auto;
            background: white; border-radius: var(--radius-xl);
            padding: 2.5rem; box-shadow: var(--shadow-md);
            text-align: center;
        }
        .create-lesson-container .create-icon {
            font-size: 3.5rem; margin-bottom: 1rem;
        }
        .create-lesson-container h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; margin-bottom: 0.5rem;
        }
        .create-lesson-container p {
            color: var(--gray-500); font-size: 0.875rem; margin-bottom: 2rem;
        }
        .searchable-select {
            position: relative;
        }
        .searchable-select input {
            width: 100%; padding: 0.625rem 0.875rem;
            border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.875rem;
            outline: none; transition: all var(--transition);
        }
        .searchable-select input:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .searchable-select .dropdown {
            position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm); max-height: 200px;
            overflow-y: auto; z-index: 10; box-shadow: var(--shadow);
            display: none;
        }
        .searchable-select .dropdown.show { display: block; }
        .searchable-select .dropdown-item {
            padding: 0.5rem 0.875rem; cursor: pointer;
            font-size: 0.813rem; transition: background var(--transition);
        }
        .searchable-select .dropdown-item:hover { background: var(--primary-bg); }
        .searchable-select .dropdown-item.selected { background: var(--primary-bg); font-weight: 600; }

        /* ============ MANAGE PANEL ============ */
        .lesson-list-item {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; border: 1px solid var(--gray-200);
            border-radius: var(--radius); margin-bottom: 0.5rem;
            cursor: pointer; transition: all var(--transition);
            background: white;
        }
        .lesson-list-item:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
        .lesson-list-item .lesson-info { flex: 1; }
        .lesson-list-item .lesson-name { font-weight: 600; font-size: 0.875rem; }
        .lesson-list-item .lesson-meta { font-size: 0.75rem; color: var(--gray-500); }

        /* ============ BUTTONS ============ */
        .btn {
            font-family: 'Inter', sans-serif;
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem; border-radius: var(--radius-sm);
            font-size: 0.813rem; font-weight: 600;
            transition: all var(--transition); cursor: pointer;
            border: none; white-space: nowrap;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-ghost { background: transparent; color: var(--gray-600); }
        .btn-ghost:hover { background: var(--gray-100); }
        .btn-sm { padding: 0.3125rem 0.625rem; font-size: 0.75rem; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-bg); }
        .btn-teal { background: var(--teal); color: white; }
        .btn-teal:hover { opacity: 0.9; }
        .btn-purple { background: var(--purple); color: white; }
        .btn-purple:hover { opacity: 0.9; }

        /* ============ EDITOR AREA ============ */
        .editor-area { padding: 1.5rem 2rem; max-width: 850px; margin: 0 auto; }

        /* Block Palette */
        .block-palette {
            display: flex; gap: 0.375rem; flex-wrap: wrap;
            margin-bottom: 1.5rem; justify-content: center;
            padding: 0.625rem; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px); border-radius: var(--radius-xl);
            border: 1px solid var(--gray-200); position: sticky;
            top: calc(var(--header-height) + 44px); z-index: 10;
        }
        .palette-item {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.4375rem 0.75rem; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.75rem; font-weight: 600;
            transition: all var(--transition); background: white;
            border: 1px solid var(--gray-200); user-select: none;
        }
        .palette-item:hover { border-color: var(--primary); background: var(--primary-bg); transform: translateY(-1px); }
        .palette-item:active { transform: scale(0.95); }
        .palette-item i { font-size: 0.875rem; }

        /* Blocks */
        .blocks-canvas { display: flex; flex-direction: column; gap: 0.75rem; }
        .block-card {
            background: white; border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            transition: all var(--transition);
            animation: blockAppear 0.3s ease;
        }
        .block-card:hover { border-color: var(--gray-300); box-shadow: var(--shadow); }
        .block-card.focused { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .block-card.minimized .block-body { display: none; }
        .block-card.minimized .block-header { border-bottom: none; }
        @keyframes blockAppear { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

        .block-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.625rem 1rem; cursor: grab; user-select: none;
        }
        .block-header:hover { background: var(--gray-50); }
        .block-drag { color: var(--gray-400); font-size: 1rem; flex-shrink: 0; }
        .block-type-icon {
            width: 28px; height: 28px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.875rem; flex-shrink: 0;
        }
        .block-type-icon.text { background: var(--primary-bg); color: var(--primary); }
        .block-type-icon.video { background: var(--danger-bg); color: var(--danger); }
        .block-type-icon.remember { background: var(--warning-bg); color: #D97706; }
        .block-type-icon.question { background: var(--purple-bg); color: var(--purple); }
        .block-type-icon.image { background: var(--teal-bg); color: var(--teal); }
        .block-type-icon.code { background: var(--pink-bg); color: var(--pink); }
        .block-type-label { font-weight: 600; font-size: 0.75rem; flex: 1; }
        .block-number { font-size: 0.625rem; color: var(--gray-400); }

        .block-actions { display: flex; gap: 0.125rem; }
        .block-action-btn {
            width: 26px; height: 26px; border-radius: var(--radius-xs);
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-400); font-size: 0.875rem; transition: all var(--transition);
        }
        .block-action-btn:hover { background: var(--gray-100); color: var(--gray-700); }
        .block-action-btn.danger:hover { background: var(--danger-bg); color: var(--danger); }

        .block-body { padding: 1rem 1.25rem; border-top: 1px solid var(--gray-100); }

        /* Rich Editor */
        .rich-editor { border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
        .rich-editor:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
        .rich-toolbar {
            display: flex; gap: 0.125rem; padding: 0.375rem;
            background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }
        .rich-tool-btn {
            width: 28px; height: 28px; border-radius: var(--radius-xs);
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--gray-600); font-size: 0.75rem; transition: all var(--transition);
        }
        .rich-tool-btn:hover { background: var(--gray-200); color: var(--gray-900); }
        .rich-content {
            min-height: 80px; padding: 0.75rem;
            font-family: 'Manrope', sans-serif;
            font-size: 0.938rem; line-height: 1.8;
            color: var(--gray-800); outline: none;
        }
        .rich-content:empty::before { content: 'Start typing...'; color: var(--gray-400); }

        /* Form elements */
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 0.5rem 0.75rem;
            border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif; font-size: 0.875rem;
            color: var(--gray-900); transition: all var(--transition);
            background: white; outline: none;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-textarea { resize: vertical; min-height: 60px; }
        .form-label { display: block; font-size: 0.813rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.3125rem; }

        /* Empty state */
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray-400); }
        .empty-state i { font-size: 3.5rem; display: block; margin-bottom: 0.75rem; opacity: 0.5; }
        .empty-state h3 { font-family: 'Space Grotesk', sans-serif; color: var(--gray-500); margin-bottom: 0.5rem; }

        /* Toast */
        .toast-container { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 300; display: flex; flex-direction: column; gap: 0.375rem; }
        .toast {
            background: var(--gray-900); color: white;
            padding: 0.75rem 1.125rem; border-radius: var(--radius);
            font-size: 0.813rem; font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            max-width: 380px; display: flex; align-items: center; gap: 0.5rem;
        }
        .toast.success { background: #059669; }
        .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* Preview Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity var(--transition);
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: white; border-radius: var(--radius-xl);
            width: 90%; max-width: 700px; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            transform: scale(0.95); transition: transform 0.25s ease;
        }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            border: none; background: var(--gray-100); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: var(--gray-200); }
        .modal-body { padding: 1.25rem; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 0.875rem 1.25rem; border-top: 1px solid var(--gray-100); display: flex; justify-content: flex-end; gap: 0.5rem; }

        @media (max-width: 768px) {
            .editor-area { padding: 0.75rem; }
            .block-palette { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; }
            .main-tabs { overflow-x: auto; }
        }
    </style>
</head>
<body>
    <!-- Top Loader -->
    <div class="top-loader" id="topLoader"></div>

    <!-- Topbar -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="admin.html" class="topbar-back"><i class='bx bx-arrow-back'></i> Admin</a>
            <input type="text" class="lesson-title-input" id="lessonTitleInput" placeholder="Untitled Lesson">
            <span class="topbar-status draft" id="topbarStatus">Draft</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-outline btn-sm" id="btnPreview" style="display:none;"><i class='bx bx-show'></i> Preview</button>
            <button class="btn btn-primary btn-sm" id="btnSave" style="display:none;"><i class='bx bx-save'></i> Save</button>
            <button class="btn btn-teal btn-sm" id="btnPublish" style="display:none;"><i class='bx bx-cloud-upload'></i> Publish</button>
        </div>
    </header>

    <!-- Main Tabs -->
    <nav class="main-tabs" id="mainTabs">
        <button class="main-tab active" data-tab="create"><i class='bx bx-plus-circle'></i> Create New</button>
        <button class="main-tab" data-tab="manage"><i class='bx bx-folder'></i> Manage Lessons</button>
        <button class="main-tab" data-tab="editor" id="tabEditor" style="display:none;"><i class='bx bx-edit'></i> Editor</button>
    </nav>

    <!-- ============ TAB: Create New ============ -->
    <div class="tab-panel active" id="panelCreate">
        <div class="create-lesson-container">
            <div class="create-icon">📝</div>
            <h2>Create New Lesson</h2>
            <p>Start building an interactive learning experience</p>
            
            <div style="text-align:left;">
                <div class="form-group">
                    <label class="form-label">Lesson Title <span style="color:var(--danger);">*</span></label>
                    <input type="text" class="form-input" id="createLessonTitle" placeholder="e.g., Introduction to HTML Forms">
                </div>
                <div class="form-group">
                    <label class="form-label">Module <span style="color:var(--danger);">*</span></label>
                    <div class="searchable-select" id="moduleSearchContainer">
                        <input type="text" id="moduleSearchInput" placeholder="Search modules..." autocomplete="off">
                        <div class="dropdown" id="moduleDropdown"></div>
                        <input type="hidden" id="selectedModuleId">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">View Type</label>
                    <div style="display:flex;gap:0.5rem;">
                        <button class="btn btn-outline btn-sm active" id="optOnePage" onclick="selectViewOption('one-page')">📄 One Page</button>
                        <button class="btn btn-outline btn-sm" id="optSections" onclick="selectViewOption('sections')">📑 Sections</button>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="createNewLesson()" style="width:100%;justify-content:center;margin-top:1.5rem;padding:0.75rem;">
                <i class='bx bx-plus'></i> Create Lesson & Start Editing
            </button>
        </div>
    </div>

    <!-- ============ TAB: Manage Lessons ============ -->
    <div class="tab-panel" id="panelManage">
        <div style="max-width:800px;margin:2rem auto;padding:0 1rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h2 style="font-family:'Space Grotesk',sans-serif;font-size:1.25rem;">📚 All Lessons</h2>
                <input type="text" class="form-input" id="lessonSearchInput" placeholder="🔍 Search lessons..." style="max-width:280px;">
            </div>
            <div id="lessonList"></div>
        </div>
    </div>

    <!-- ============ TAB: Editor ============ -->
    <div class="tab-panel" id="panelEditor">
        <div class="editor-area">
            <!-- Block Palette -->
            <div class="block-palette" id="blockPalette">
                <button class="palette-item" onclick="LessonBuilder.addBlock('text')"><i class='bx bx-text'></i> Text</button>
                <button class="palette-item" onclick="LessonBuilder.addBlock('video')"><i class='bx bx-video'></i> Video</button>
                <button class="palette-item" onclick="LessonBuilder.addBlock('remember')"><i class='bx bx-brain'></i> Remember</button>
                <button class="palette-item" onclick="LessonBuilder.addBlock('question')"><i class='bx bx-help-circle'></i> Question</button>
                <button class="palette-item" onclick="LessonBuilder.addBlock('image')"><i class='bx bx-image'></i> Image</button>
                <button class="palette-item" onclick="LessonBuilder.addBlock('code')"><i class='bx bx-code-alt'></i> Code</button>
            </div>

            <!-- Blocks Canvas -->
            <div class="blocks-canvas" id="blocksCanvas"></div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title">📖 Lesson Preview</h3><button class="modal-close" onclick="LessonBuilder.closePreview()"><i class='bx bx-x'></i></button></div>
            <div class="modal-body"><div id="previewContent" style="font-family:'Manrope',sans-serif;line-height:1.8;"></div></div>
            <div class="modal-footer"><button class="btn btn-ghost" onclick="LessonBuilder.closePreview()">Close</button></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db } from './js/firebase.js';
        import { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const IMGBB_API_KEY = 'ba8023ca74166460c442e8e703d2a1b0';

        // ============ UTILITY FUNCTIONS ============
        const $ = id => document.getElementById(id);
        const toast = (msg, type = 'success') => {
            const c = $('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class='bx ${type==='success'?'bx-check-circle':'bx-x-circle'}'></i> ${msg}`;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };
        const showLoader = () => $('topLoader').classList.add('active');
        const hideLoader = () => $('topLoader').classList.remove('active');

        // ============ MODULES DATA ============
        let allModules = [];
        let allLessons = [];

        async function loadModules() {
            try {
                const snap = await getDocs(query(collection(db, 'modules'), orderBy('order')));
                allModules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                allModules = JSON.parse(localStorage.getItem('ak_modules') || '[]');
            }
            setupModuleSearch();
        }

        async function loadLessons() {
            try {
                const snap = await getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')));
                allLessons = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                allLessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]');
            }
            renderLessonList();
        }

        // ============ MODULE SEARCH ============
        let selectedModuleId = '';
        function setupModuleSearch() {
            const input = $('moduleSearchInput');
            const dropdown = $('moduleDropdown');
            
            input.addEventListener('focus', () => {
                filterModules(input.value);
                dropdown.classList.add('show');
            });
            
            input.addEventListener('input', () => filterModules(input.value));
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#moduleSearchContainer')) {
                    dropdown.classList.remove('show');
                }
            });
        }

        function filterModules(query) {
            const dropdown = $('moduleDropdown');
            const filtered = query ? allModules.filter(m => 
                m.name.toLowerCase().includes(query.toLowerCase()) ||
                (m.courseName || '').toLowerCase().includes(query.toLowerCase())
            ) : allModules;
            
            dropdown.innerHTML = filtered.map(m => `
                <div class="dropdown-item ${m.id === selectedModuleId ? 'selected' : ''}" 
                     onclick="selectModule('${m.id}', '${m.name.replace(/'/g, "\\'")} (${(m.courseName||'').replace(/'/g, "\\'")})')">
                    ${m.name} <span style="color:var(--gray-400);font-size:0.75rem;">(${m.courseName||'No course'})</span>
                </div>
            `).join('');
            
            if (!filtered.length) {
                dropdown.innerHTML = '<div class="dropdown-item" style="color:var(--gray-400);">No modules found</div>';
            }
            
            dropdown.classList.add('show');
        }

        window.selectModule = (id, name) => {
            selectedModuleId = id;
            $('selectedModuleId').value = id;
            $('moduleSearchInput').value = name;
            $('moduleDropdown').classList.remove('show');
        };

        // ============ VIEW OPTION ============
        let selectedViewType = 'one-page';
        window.selectViewOption = (type) => {
            selectedViewType = type;
            $('optOnePage').classList.toggle('active', type === 'one-page');
            $('optSections').classList.toggle('active', type === 'sections');
        };

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            
            const tabMap = {
                'create': { tab: document.querySelector('[data-tab="create"]'), panel: $('panelCreate') },
                'manage': { tab: document.querySelector('[data-tab="manage"]'), panel: $('panelManage') },
                'editor': { tab: $('tabEditor'), panel: $('panelEditor') }
            };
            
            const target = tabMap[tabName];
            if (target && target.tab && target.panel) {
                target.tab.classList.add('active');
                target.panel.classList.add('active');
            }
            
            if (tabName === 'manage') loadLessons();
            
            // Show/hide topbar buttons
            const isEditor = tabName === 'editor';
            $('btnPreview').style.display = isEditor ? '' : 'none';
            $('btnSave').style.display = isEditor ? '' : 'none';
            $('btnPublish').style.display = isEditor ? '' : 'none';
            $('lessonTitleInput').style.display = isEditor ? '' : 'none';
            $('topbarStatus').style.display = isEditor ? '' : 'none';
        }

        document.getElementById('mainTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.main-tab');
            if (tab) {
                const tabName = tab.dataset.tab;
                if (tabName) switchTab(tabName);
            }
        });

        // ============ CREATE NEW LESSON ============
        window.createNewLesson = () => {
            const title = $('createLessonTitle').value.trim();
            
            if (!title) {
                toast('Please enter a lesson title', 'error');
                $('createLessonTitle').focus();
                return;
            }
            if (!selectedModuleId) {
                toast('Please select a module', 'error');
                $('moduleSearchInput').focus();
                return;
            }
            
            // Initialize the Lesson Builder
            LessonBuilder.init({
                title: title,
                moduleId: selectedModuleId,
                viewType: selectedViewType,
                blocks: [],
                pages: [{ blocks: [] }],
                status: 'draft',
                lessonId: null
            });
            
            switchTab('editor');
            toast('Lesson created! Start adding blocks.', 'success');
        };

        // ============ MANAGE LESSONS ============
        function renderLessonList() {
            const container = $('lessonList');
            const searchQuery = ($('lessonSearchInput')?.value || '').toLowerCase();
            
            let filtered = allLessons;
            if (searchQuery) {
                filtered = allLessons.filter(l => 
                    (l.title || '').toLowerCase().includes(searchQuery) ||
                    (l.moduleName || '').toLowerCase().includes(searchQuery)
                );
            }
            
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-state"><i class="bx bx-folder-open"></i><h3>No Lessons Found</h3><p>Create your first lesson or adjust search</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(l => `
                <div class="lesson-list-item" onclick="editExistingLesson('${l.id}')">
                    <div style="width:40px;height:40px;border-radius:var(--radius-sm);background:var(--primary-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class='bx bx-book-open' style="color:var(--primary);"></i>
                    </div>
                    <div class="lesson-info">
                        <div class="lesson-name">${escapeHtml(l.title || 'Untitled')}</div>
                        <div class="lesson-meta">
                            ${l.moduleName || 'No module'} • ${l.viewType === 'sections' ? 'Sections' : 'One Page'} • 
                            ${l.blockCount || 0} blocks • ${l.estimatedTime || 0} min • 
                            <span style="color:${l.status==='published'?'var(--success)':'var(--gray-500)'};">${l.status||'draft'}</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:0.25rem;">
                        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();viewLesson('${l.id}')" title="View"><i class='bx bx-show'></i></button>
                        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteLessonConfirm('${l.id}')" title="Delete" style="color:var(--danger);"><i class='bx bx-trash'></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.editExistingLesson = async (id) => {
            showLoader();
            try {
                const snap = await getDoc(doc(db, 'lessons', id));
                if (snap.exists()) {
                    const data = snap.data();
                    LessonBuilder.init({
                        title: data.title || 'Untitled',
                        moduleId: data.moduleId || '',
                        viewType: data.viewType || 'one-page',
                        blocks: data.viewType === 'sections' ? [] : (data.pages?.[0]?.blocks || []),
                        pages: data.viewType === 'sections' ? (data.pages || [{ blocks: [] }]) : [{ blocks: [] }],
                        status: data.status || 'draft',
                        lessonId: id
                    });
                    switchTab('editor');
                    toast('Lesson loaded!', 'success');
                }
            } catch (e) {
                toast('Failed to load lesson', 'error');
            }
            hideLoader();
        };

        window.viewLesson = (id) => {
            localStorage.setItem('ak_current_lesson', id);
            // Reload in view mode
        };

        window.deleteLessonConfirm = async (id) => {
            if (!confirm('Delete this lesson permanently?')) return;
            showLoader();
            try {
                await deleteDoc(doc(db, 'lessons', id));
                allLessons = allLessons.filter(l => l.id !== id);
                renderLessonList();
                toast('Lesson deleted!', 'success');
            } catch (e) {
                allLessons = allLessons.filter(l => l.id !== id);
                localStorage.setItem('ak_lessons', JSON.stringify(allLessons));
                renderLessonList();
                toast('Deleted locally', 'warning');
            }
            hideLoader();
        };

        $('lessonSearchInput')?.addEventListener('input', renderLessonList);

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // ============ LESSON BUILDER (Namespaced) ============
        const LessonBuilder = {
            title: '',
            moduleId: '',
            viewType: 'one-page',
            status: 'draft',
            blocks: [],
            pages: [{ blocks: [] }],
            currentPage: 0,
            lessonId: null,
            focusedBlockId: null,
            autoSaveTimer: null,
            lastDeleted: null,

            init(data) {
                this.title = data.title;
                this.moduleId = data.moduleId;
                this.viewType = data.viewType;
                this.status = data.status;
                this.blocks = data.blocks || [];
                this.pages = data.pages || [{ blocks: [] }];
                this.currentPage = 0;
                this.lessonId = data.lessonId;
                this.focusedBlockId = null;
                
                $('lessonTitleInput').value = this.title;
                $('topbarStatus').textContent = this.status;
                $('topbarStatus').className = 'topbar-status ' + this.status;
                
                this.renderBlocks();
                this.updateStats();
                $('lessonTitleInput').style.display = '';
                $('topbarStatus').style.display = '';
            },

            getBlocks() {
                return this.viewType === 'sections' ? (this.pages[this.currentPage]?.blocks || []) : this.blocks;
            },

            addBlock(type) {
                const block = this.createBlockData(type);
                const blocks = this.getBlocks();
                blocks.push(block);
                this.focusedBlockId = block.id;
                this.renderBlocks();
                this.updateStats();
                this.autoSave();
                this.scrollToBlock(block.id);
                toast('Block added!', 'success');
            },

            createBlockData(type) {
                const id = 'b_' + Date.now();
                const base = { id, type };
                switch (type) {
                    case 'text': return { ...base, content: '' };
                    case 'video': return { ...base, url: '' };
                    case 'remember': return { ...base, text: '' };
                    case 'question': return { ...base, question: '', questionType: 'multiple-choice', options: ['', '', '', ''], correctAnswer: 0, points: 10 };
                    case 'image': return { ...base, url: '', alt: '' };
                    case 'code': return { ...base, code: '', language: 'javascript', caption: '' };
                    default: return base;
                }
            },

            renderBlocks() {
                const canvas = $('blocksCanvas');
                if (!canvas) return;
                const blocks = this.getBlocks();
                
                if (!blocks.length) {
                    canvas.innerHTML = `
                        <div class="empty-state">
                            <i class='bx bx-cube'></i>
                            <h3>Empty Canvas</h3>
                            <p>Click a block type above to start building</p>
                        </div>`;
                    return;
                }
                
                canvas.innerHTML = blocks.map((block, i) => this.renderBlockCard(block, i)).join('');
            },

            renderBlockCard(block, index) {
                const isFocused = this.focusedBlockId === block.id;
                const icons = { text: 'bx-text', video: 'bx-video', remember: 'bx-brain', question: 'bx-help-circle', image: 'bx-image', code: 'bx-code-alt' };
                const labels = { text: 'Rich Text', video: 'Video', remember: 'Remember', question: 'Question', image: 'Image', code: 'Code' };
                
                return `
                <div class="block-card ${isFocused ? 'focused' : ''}" id="block-${block.id}"
                     onclick="LessonBuilder.focusBlock('${block.id}')">
                    <div class="block-header">
                        <i class='bx bx-grid-vertical block-drag'></i>
                        <div class="block-type-icon ${block.type}"><i class='bx ${icons[block.type] || 'bx-cube'}'></i></div>
                        <span class="block-type-label">${labels[block.type] || block.type}</span>
                        <span class="block-number">Block ${index + 1}</span>
                        <div class="block-actions">
                            <button class="block-action-btn" onclick="event.stopPropagation();LessonBuilder.toggleMinimize('${block.id}')"><i class='bx bx-chevron-up'></i></button>
                            <button class="block-action-btn" onclick="event.stopPropagation();LessonBuilder.duplicateBlock('${block.id}')"><i class='bx bx-copy'></i></button>
                            <button class="block-action-btn danger" onclick="event.stopPropagation();LessonBuilder.deleteBlock('${block.id}')"><i class='bx bx-trash'></i></button>
                        </div>
                    </div>
                    <div class="block-body" id="body-${block.id}">
                        ${this.renderBlockContent(block)}
                    </div>
                </div>`;
            },

            renderBlockContent(block) {
                const bid = block.id;
                switch (block.type) {
                    case 'text': return `
                        <div class="rich-editor">
                            <div class="rich-toolbar">
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('bold','${bid}')"><b>B</b></button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('italic','${bid}')"><i>I</i></button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('underline','${bid}')"><u>U</u></button>
                                <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('formatBlock','${bid}','h2')">H2</button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('formatBlock','${bid}','h3')">H3</button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('formatBlock','${bid}','p')">P</button>
                                <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('insertUnorderedList','${bid}')"><i class='bx bx-list-ul'></i></button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('insertOrderedList','${bid}')"><i class='bx bx-list-ol'></i></button>
                                <button class="rich-tool-btn" onclick="LessonBuilder.execCmd('formatBlock','${bid}','blockquote')"><i class='bx bx-quote-right'></i></button>
                                <span style="width:1px;background:var(--gray-300);margin:0 0.25rem;"></span>
                                <button class="rich-tool-btn" onclick="LessonBuilder.insertLink('${bid}')"><i class='bx bx-link'></i></button>
                            </div>
                            <div class="rich-content" id="rich-${bid}" contenteditable="true"
                                 oninput="LessonBuilder.updateBlockField('${bid}','content',this.innerHTML)"
                                 onfocus="LessonBuilder.focusBlock('${bid}')">${block.content || ''}</div>
                        </div>`;
                    case 'video': return `
                        <input type="text" class="form-input" value="${block.url||''}" placeholder="YouTube URL..." 
                               onchange="LessonBuilder.updateBlockField('${bid}','url',this.value);LessonBuilder.renderBlocks();">
                        ${block.url ? `<div style="margin-top:0.75rem;position:relative;padding-bottom:56.25%;height:0;background:var(--gray-900);border-radius:var(--radius);overflow:hidden;"><iframe src="https://www.youtube.com/embed/${LessonBuilder.getYouTubeId(block.url)||''}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen></iframe></div>` : ''}`;
                    case 'remember': return `
                        <div style="background:var(--warning-bg);border:1px solid #FCD34D;border-radius:var(--radius);padding:1rem;">
                            <label style="font-weight:700;font-size:0.75rem;color:#D97706;display:block;margin-bottom:0.5rem;">🧠 Key Point</label>
                            <textarea class="form-textarea" onchange="LessonBuilder.updateBlockField('${bid}','text',this.value)" rows="3">${block.text||''}</textarea>
                        </div>`;
                    case 'question': return `
                        <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
                            <select class="form-select" onchange="LessonBuilder.updateBlockField('${bid}','questionType',this.value);LessonBuilder.renderBlocks();" style="width:180px;">
                                <option value="multiple-choice" ${block.questionType==='multiple-choice'?'selected':''}>Multiple Choice</option>
                                <option value="boolean" ${block.questionType==='boolean'?'selected':''}>True/False</option>
                            </select>
                            <input type="number" class="form-input" value="${block.points||10}" onchange="LessonBuilder.updateBlockField('${bid}','points',parseInt(this.value)||0)" style="width:80px;" min="0" placeholder="Points">
                        </div>
                        <input type="text" class="form-input" value="${block.question||''}" onchange="LessonBuilder.updateBlockField('${bid}','question',this.value)" placeholder="Enter question..." style="margin-bottom:0.75rem;font-weight:600;">
                        ${block.questionType === 'boolean' ? `
                            <div style="display:flex;gap:0.5rem;">
                                <button class="btn btn-outline btn-sm ${block.correctAnswer===true?'active':''}" style="flex:1;${block.correctAnswer===true?'background:var(--success-bg);border-color:var(--success);':''}" onclick="LessonBuilder.updateBlockField('${bid}','correctAnswer',true);LessonBuilder.renderBlocks();">✅ True</button>
                                <button class="btn btn-outline btn-sm ${block.correctAnswer===false?'active':''}" style="flex:1;${block.correctAnswer===false?'background:var(--success-bg);border-color:var(--success);':''}" onclick="LessonBuilder.updateBlockField('${bid}','correctAnswer',false);LessonBuilder.renderBlocks();">❌ False</button>
                            </div>` : `
                            ${(block.options||['','','','']).map((opt,i) => `
                                <div style="display:flex;align-items:center;gap:0.5rem;padding:0.375rem 0.75rem;border:1px solid ${block.correctAnswer===i?'var(--success)':'var(--gray-200)'};border-radius:var(--radius-sm);margin-bottom:0.25rem;background:${block.correctAnswer===i?'var(--success-bg)':'white'};cursor:pointer;" onclick="LessonBuilder.updateBlockField('${bid}','correctAnswer',${i});LessonBuilder.renderBlocks();">
                                    <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${block.correctAnswer===i?'var(--success)':'var(--gray-300)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${block.correctAnswer===i?'✓':''}</div>
                                    <input class="form-input" value="${opt}" placeholder="Option ${String.fromCharCode(65+i)}" onchange="LessonBuilder.updateBlockOption('${bid}',${i},this.value)" onclick="event.stopPropagation();" style="border:none;padding:0.25rem;flex:1;">
                                    <span style="font-size:0.688rem;color:var(--gray-400);">${String.fromCharCode(65+i)}</span>
                                </div>
                            `).join('')}
                            <div style="font-size:0.688rem;color:var(--gray-400);margin-top:0.25rem;">Click option row to mark as correct</div>`}`;
                    case 'image': return `
                        <input type="file" accept="image/*" style="display:none;" id="imgfile-${bid}" onchange="LessonBuilder.uploadImage('${bid}',this)">
                        <div class="form-input" style="text-align:center;cursor:pointer;padding:1.5rem;border:2px dashed var(--gray-300);border-radius:var(--radius);" onclick="document.getElementById('imgfile-${bid}').click()">
                            <i class='bx bx-cloud-upload' style="font-size:2rem;color:var(--gray-400);"></i>
                            <p style="font-size:0.75rem;color:var(--gray-500);">Click to upload</p>
                        </div>
                        <input type="text" class="form-input" value="${block.url||''}" onchange="LessonBuilder.updateBlockField('${bid}','url',this.value);LessonBuilder.renderBlocks();" placeholder="Or paste URL..." style="margin-top:0.5rem;">
                        <input type="text" class="form-input" value="${block.alt||''}" onchange="LessonBuilder.updateBlockField('${bid}','alt',this.value)" placeholder="Caption" style="margin-top:0.375rem;">
                        ${block.url?`<img src="${block.url}" style="max-width:100%;max-height:300px;margin-top:0.75rem;border-radius:var(--radius);">`:''}`;
                    case 'code': return `
                        <select class="form-select" onchange="LessonBuilder.updateBlockField('${bid}','language',this.value)" style="width:160px;margin-bottom:0.5rem;">
                            <option value="javascript" ${block.language==='javascript'?'selected':''}>JavaScript</option>
                            <option value="python" ${block.language==='python'?'selected':''}>Python</option>
                            <option value="html" ${block.language==='html'?'selected':''}>HTML</option>
                            <option value="css" ${block.language==='css'?'selected':''}>CSS</option>
                        </select>
                        <textarea class="form-textarea" onchange="LessonBuilder.updateBlockField('${bid}','code',this.value)" rows="5" style="font-family:'JetBrains Mono',monospace;font-size:0.813rem;background:#1e1e2e;color:#cdd6f4;">${block.code||''}</textarea>
                        <input type="text" class="form-input" value="${block.caption||''}" onchange="LessonBuilder.updateBlockField('${bid}','caption',this.value)" placeholder="Caption" style="margin-top:0.375rem;">`;
                    default: return '';
                }
            },

            focusBlock(id) {
                this.focusedBlockId = id;
                document.querySelectorAll('.block-card').forEach(c => c.classList.remove('focused'));
                const card = document.getElementById('block-' + id);
                if (card) card.classList.add('focused');
            },

            scrollToBlock(id) {
                setTimeout(() => {
                    const el = document.getElementById('block-' + id);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            },

            toggleMinimize(id) {
                document.getElementById('block-' + id)?.classList.toggle('minimized');
            },

            deleteBlock(id) {
                const blocks = this.getBlocks();
                const index = blocks.findIndex(b => b.id === id);
                if (index === -1) return;
                this.lastDeleted = { block: blocks.splice(index, 1)[0], index };
                this.renderBlocks();
                this.updateStats();
                this.autoSave();
                toast('Block deleted', 'info');
            },

            duplicateBlock(id) {
                const blocks = this.getBlocks();
                const index = blocks.findIndex(b => b.id === id);
                if (index === -1) return;
                const clone = JSON.parse(JSON.stringify(blocks[index]));
                clone.id = 'b_' + Date.now();
                blocks.splice(index + 1, 0, clone);
                this.renderBlocks();
                this.updateStats();
                this.autoSave();
                toast('Block duplicated!', 'success');
            },

            updateBlockField(id, field, value) {
                const blocks = this.getBlocks();
                const block = blocks.find(b => b.id === id);
                if (block) {
                    block[field] = value;
                    this.autoSave();
                }
            },

            updateBlockOption(id, optIndex, value) {
                const blocks = this.getBlocks();
                const block = blocks.find(b => b.id === id);
                if (block && block.options) {
                    block.options[optIndex] = value;
                    this.autoSave();
                }
            },

            execCmd(command, blockId, value = null) {
                const richEl = document.getElementById('rich-' + blockId);
                if (!richEl) return;
                richEl.focus();
                if (command === 'formatBlock') {
                    document.execCommand(command, false, value);
                } else if (command === 'insertUnorderedList' || command === 'insertOrderedList') {
                    document.execCommand(command, false, null);
                } else {
                    document.execCommand(command, false, null);
                }
                this.updateBlockField(blockId, 'content', richEl.innerHTML);
            },

            insertLink(blockId) {
                const richEl = document.getElementById('rich-' + blockId);
                if (!richEl) return;
                richEl.focus();
                const url = prompt('Enter URL:', 'https://');
                if (url) {
                    document.execCommand('createLink', false, url);
                    this.updateBlockField(blockId, 'content', richEl.innerHTML);
                }
            },

            getYouTubeId(url) {
                if (!url) return null;
                const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?\s]{11})/);
                return match ? match[1] : null;
            },

            async uploadImage(blockId, input) {
                const file = input.files?.[0];
                if (!file) return;
                showLoader();
                try {
                    const fd = new FormData(); fd.append('image', file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                    const data = await res.json();
                    if (data.success) {
                        this.updateBlockField(blockId, 'url', data.data.url);
                        this.renderBlocks();
                        toast('Image uploaded!', 'success');
                    } else {
                        toast('Upload failed', 'error');
                    }
                } catch (e) {
                    toast('Upload error', 'error');
                }
                hideLoader();
            },

            updateStats() {
                const blocks = this.getBlocks();
                const totalPoints = blocks.filter(b => b.type === 'question').reduce((s, b) => s + (b.points || 0), 0);
                // Update any stats display if needed
            },

            async save() {
                showLoader();
                $('topbarStatus').textContent = 'Saving...';
                $('topbarStatus').className = 'topbar-status saving';
                
                const data = {
                    title: $('lessonTitleInput')?.value || this.title,
                    moduleId: this.moduleId,
                    viewType: this.viewType,
                    status: this.status,
                    pages: this.viewType === 'sections' ? this.pages : [{ blocks: this.blocks }],
                    estimatedTime: this.getBlocks().length * 5,
                    blockCount: this.getBlocks().length,
                    updatedAt: new Date().toISOString()
                };
                this.title = data.title;

                try {
                    if (this.lessonId) {
                        await updateDoc(doc(db, 'lessons', this.lessonId), { ...data, updatedAt: Timestamp.now() });
                    } else {
                        const ref = await addDoc(collection(db, 'lessons'), { ...data, createdAt: Timestamp.now(), updatedAt: Timestamp.now() });
                        this.lessonId = ref.id;
                        localStorage.setItem('ak_current_lesson', ref.id);
                        window.history.replaceState({}, '', '?id=' + ref.id);
                    }
                    localStorage.setItem('ak_lesson_backup', JSON.stringify(data));
                    $('topbarStatus').textContent = this.status;
                    $('topbarStatus').className = 'topbar-status ' + this.status;
                    toast('Saved! 💾', 'success');
                } catch (e) {
                    localStorage.setItem('ak_lesson_backup', JSON.stringify(data));
                    toast('Saved locally (offline)', 'warning');
                }
                hideLoader();
            },

            publish() {
                this.status = 'published';
                $('topbarStatus').textContent = 'Published';
                $('topbarStatus').className = 'topbar-status published';
                this.save();
                toast('Lesson published! 🚀', 'success');
            },

            preview() {
                const blocks = this.getBlocks();
                let html = `<h1 style="font-family:'Space Grotesk',sans-serif;">${this.title}</h1>`;
                blocks.forEach(b => {
                    html += '<div style="padding:1rem;border:1px solid var(--gray-200);border-radius:var(--radius);margin-bottom:0.75rem;">';
                    if (b.type === 'text') html += b.content || '<p style="color:var(--gray-400);">Empty</p>';
                    if (b.type === 'video') html += b.url ? '<div style="background:var(--gray-900);color:white;padding:2rem;text-align:center;">📹 Video</div>' : '<p>No video</p>';
                    if (b.type === 'remember') html += `<div style="background:var(--warning-bg);padding:1rem;border-radius:var(--radius);"><strong>🧠</strong> ${b.text||''}</div>`;
                    if (b.type === 'question') html += `<div style="background:var(--purple-bg);padding:1rem;border-radius:var(--radius);"><strong>❓ ${b.question||''}</strong><br>${b.options?.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`).join('<br>')||''}</div>`;
                    if (b.type === 'image') html += b.url ? `<img src="${b.url}" style="max-width:100%;border-radius:var(--radius);">` : '<p>No image</p>';
                    if (b.type === 'code') html += `<pre style="background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:var(--radius);font-family:'JetBrains Mono',monospace;">${b.code||''}</pre>`;
                    html += '</div>';
                });
                $('previewContent').innerHTML = html;
                $('previewModal').classList.add('show');
            },

            closePreview() {
                $('previewModal').classList.remove('show');
            },

            autoSave() {
                clearTimeout(this.autoSaveTimer);
                this.autoSaveTimer = setTimeout(() => {
                    const data = {
                        title: $('lessonTitleInput')?.value || this.title,
                        moduleId: this.moduleId,
                        viewType: this.viewType,
                        status: this.status,
                        pages: this.viewType === 'sections' ? this.pages : [{ blocks: this.blocks }],
                        estimatedTime: this.getBlocks().length * 5,
                        blockCount: this.getBlocks().length
                    };
                    localStorage.setItem('ak_lesson_autosave', JSON.stringify(data));
                }, 2000);
            }
        };

        // ============ TOPBAR BUTTONS ============
        $('btnSave').addEventListener('click', () => LessonBuilder.save());
        $('btnPublish').addEventListener('click', () => LessonBuilder.publish());
        $('btnPreview').addEventListener('click', () => LessonBuilder.preview());

        // Title input
        $('lessonTitleInput').addEventListener('input', function() {
            LessonBuilder.title = this.value;
            LessonBuilder.autoSave();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') { e.preventDefault(); if (LessonBuilder.getBlocks) LessonBuilder.save(); }
            if (e.ctrlKey && e.key === 'p') { e.preventDefault(); if (LessonBuilder.preview) LessonBuilder.preview(); }
            if (e.key === 'Delete' && LessonBuilder.focusedBlockId && !e.target.closest('[contenteditable],input,textarea,select')) {
                e.preventDefault();
                LessonBuilder.deleteBlock(LessonBuilder.focusedBlockId);
            }
            if (e.ctrlKey && e.key === 'd' && LessonBuilder.focusedBlockId && !e.target.closest('input,textarea,select')) {
                e.preventDefault();
                LessonBuilder.duplicateBlock(LessonBuilder.focusedBlockId);
            }
            if (e.ctrlKey && e.key === 'z' && LessonBuilder.lastDeleted) {
                e.preventDefault();
                const { block, index } = LessonBuilder.lastDeleted;
                LessonBuilder.getBlocks().splice(index, 0, block);
                LessonBuilder.renderBlocks();
                LessonBuilder.lastDeleted = null;
                toast('Undo!', 'info');
            }
            if (e.key === 'Escape') {
                $('previewModal').classList.remove('show');
            }
        });

        // Close modal on overlay click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay') && e.target.classList.contains('show')) {
                e.target.classList.remove('show');
            }
        });

        // ============ INIT ============
        loadModules();
        loadLessons();
        console.log('🚀 Akademia Lesson Studio v2.0 loaded!');
    </script>
</body>
</html>
