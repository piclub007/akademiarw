<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Lesson</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-light: #3B82F6;
            --primary-bg: #EFF6FF; --primary-bg-hover: #DBEAFE;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --success: #10B981; --success-bg: #ECFDF5; --success-dark: #059669;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2; --danger-dark: #DC2626;
            --purple: #7C3AED; --purple-bg: #F5F3FF;
            --orange: #F97316; --orange-bg: #FFF7ED;
            --sidebar-width: 320px;
            --header-height: 60px;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            display: flex;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        /* ============ SIDEBAR / TABLE OF CONTENTS ============ */
        .lesson-sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            display: flex; flex-direction: column;
            z-index: 100;
            transition: transform var(--transition);
        }

        .sidebar-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--gray-100);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sidebar-header img { height: 28px; width: auto; }
        .sidebar-back {
            display: flex; align-items: center; gap: 0.375rem;
            color: var(--gray-600); text-decoration: none;
            font-size: 0.813rem; font-weight: 500;
            padding: 0.375rem 0.5rem; border-radius: var(--radius-sm);
            transition: all var(--transition);
        }
        .sidebar-back:hover { background: var(--gray-100); color: var(--gray-900); }

        .sidebar-progress {
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--gray-100);
        }
        .progress-label {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.375rem;
        }
        .progress-bar {
            height: 6px; background: var(--gray-200);
            border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: var(--primary);
            border-radius: 3px; transition: width 0.5s ease;
        }

        .sidebar-toc {
            flex: 1; overflow-y: auto; padding: 0.75rem;
        }
        .toc-section {
            margin-bottom: 0.25rem;
        }
        .toc-item {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 0.75rem; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition);
            font-size: 0.813rem; color: var(--gray-600);
            border: none; background: none; width: 100%; text-align: left;
        }
        .toc-item:hover { background: var(--gray-50); color: var(--gray-900); }
        .toc-item.active { background: var(--primary-bg); color: var(--primary); font-weight: 600; }
        .toc-item.completed { color: var(--success-dark); }
        .toc-item .toc-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
        .toc-item .toc-badge {
            margin-left: auto; font-size: 0.625rem;
            padding: 0.125rem 0.375rem; border-radius: 100px;
        }
        .toc-badge.done { background: var(--success-bg); color: var(--success-dark); }
        .toc-badge.current { background: var(--primary-bg); color: var(--primary); }

        .sidebar-footer {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--gray-100);
        }
        .points-display {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.875rem; font-weight: 600;
        }
        .points-icon {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--warning-bg); color: var(--warning-dark);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.125rem;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1; margin-left: var(--sidebar-width);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* Top bar */
        .lesson-topbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200);
            padding: 0 2rem;
            height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .lesson-topbar-left {
            display: flex; align-items: center; gap: 1rem;
        }
        .menu-toggle {
            display: none; background: none; border: none;
            font-size: 1.5rem; color: var(--gray-700); cursor: pointer;
        }
        .lesson-breadcrumb {
            font-size: 0.813rem; color: var(--gray-500);
            display: flex; align-items: center; gap: 0.375rem;
        }
        .lesson-breadcrumb a { color: var(--primary); text-decoration: none; }
        .lesson-breadcrumb a:hover { text-decoration: underline; }
        .lesson-breadcrumb .sep { color: var(--gray-400); }

        .lesson-topbar-actions {
            display: flex; align-items: center; gap: 0.75rem;
        }
        .btn {
            font-family: 'Inter', sans-serif;
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 1rem; border-radius: var(--radius-sm);
            font-size: 0.813rem; font-weight: 600;
            transition: all var(--transition); cursor: pointer;
            border: none; white-space: nowrap;
        }
        .btn-ghost { background: transparent; color: var(--gray-600); }
        .btn-ghost:hover { background: var(--gray-100); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.25); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: var(--success-dark); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }

        /* Content area */
        .lesson-content-area {
            flex: 1; padding: 2rem;
            max-width: 900px; margin: 0 auto; width: 100%;
        }

        /* Lesson header */
        .lesson-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .lesson-badge {
            display: inline-flex; align-items: center; gap: 0.375rem;
            background: var(--primary-bg); color: var(--primary);
            padding: 0.375rem 0.875rem; border-radius: 100px;
            font-size: 0.75rem; font-weight: 600; margin-bottom: 0.75rem;
        }
        .lesson-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.25rem; font-weight: 700;
            color: var(--gray-900); letter-spacing: -1px;
            margin-bottom: 0.5rem; line-height: 1.2;
        }
        .lesson-meta {
            display: flex; align-items: center; justify-content: center;
            gap: 1.5rem; font-size: 0.813rem; color: var(--gray-500);
        }

        /* ============ BLOCK STYLES ============ */
        .blocks-flow {
            display: flex; flex-direction: column; gap: 1.25rem;
        }

        /* Text Block */
        .block-text {
            padding: 0.5rem 0;
        }
        .block-text h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; font-weight: 700;
            color: var(--gray-900); margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
        }
        .block-text h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem; font-weight: 600;
            color: var(--gray-800); margin-bottom: 0.5rem;
        }
        .block-text p {
            font-family: 'Manrope', sans-serif;
            font-size: 1rem; line-height: 1.8; color: var(--gray-700);
            margin-bottom: 1rem;
        }
        .block-text a { color: var(--primary); text-decoration: underline; }
        .block-text code {
            background: var(--gray-100); padding: 0.125rem 0.375rem;
            border-radius: 4px; font-family: 'Fira Code', monospace;
            font-size: 0.875rem; color: var(--danger-dark);
        }
        .block-text pre {
            background: var(--gray-900); color: #e5e7eb;
            padding: 1.25rem; border-radius: var(--radius);
            overflow-x: auto; margin: 1rem 0;
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem; line-height: 1.6;
        }
        .block-text ul, .block-text ol {
            margin: 0.75rem 0 1rem 1.5rem;
            font-family: 'Manrope', sans-serif;
            line-height: 1.8; color: var(--gray-700);
        }

        /* Video Block */
        .block-video {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: var(--gray-900);
        }
        .video-wrapper iframe {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .video-placeholder {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; gap: 0.75rem;
        }
        .video-placeholder i { font-size: 3rem; opacity: 0.6; }
        .video-placeholder p { font-size: 0.875rem; opacity: 0.7; }

        /* Remember Block */
        .block-remember {
            background: var(--warning-bg);
            border: 1px solid #FCD34D;
            border-radius: var(--radius-lg);
            padding: 1.25rem 1.5rem;
            display: flex; gap: 1rem;
            align-items: flex-start;
        }
        .block-remember .remember-icon {
            font-size: 1.5rem; flex-shrink: 0;
            margin-top: 0.125rem;
        }
        .block-remember .remember-content {
            flex: 1;
        }
        .block-remember .remember-label {
            font-weight: 700; font-size: 0.813rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--warning-dark); margin-bottom: 0.375rem;
        }
        .block-remember .remember-text {
            font-family: 'Manrope', sans-serif;
            font-size: 0.938rem; line-height: 1.7;
            color: var(--gray-800); margin-bottom: 0.75rem;
        }
        .block-remember .acknowledge-btn {
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 1rem; border-radius: var(--radius-sm);
            background: var(--warning); color: white;
            border: none; cursor: pointer; font-weight: 600;
            font-size: 0.813rem; transition: all var(--transition);
        }
        .block-remember .acknowledge-btn:hover { background: var(--warning-dark); }
        .block-remember .acknowledge-btn.acknowledged {
            background: var(--success); cursor: default;
        }
        .remember-hidden {
            opacity: 0.3; pointer-events: none;
            filter: grayscale(0.5);
        }

        /* Remember Question Block */
        .block-remember-question {
            background: var(--white);
            border: 2px solid var(--warning);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            animation: slideIn 0.3s ease;
        }
        .block-remember-question .rq-header {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .block-remember-question .rq-header i { color: var(--warning); font-size: 1.25rem; }
        .block-remember-question .rq-header span {
            font-weight: 700; font-size: 0.875rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--warning-dark);
        }
        .block-remember-question .rq-question {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.0625rem; font-weight: 600;
            margin-bottom: 1rem; color: var(--gray-900);
        }

        /* Question Block */
        .block-question {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        .block-question.correct { border-color: var(--success); background: var(--success-bg); }
        .block-question.incorrect { border-color: var(--danger); background: var(--danger-bg); }
        .question-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .question-type-badge {
            font-size: 0.688rem; font-weight: 600;
            padding: 0.25rem 0.625rem; border-radius: 100px;
            background: var(--gray-100); color: var(--gray-600);
            display: inline-flex; align-items: center; gap: 0.25rem;
        }
        .question-points {
            font-size: 0.75rem; font-weight: 600; color: var(--warning-dark);
        }
        .question-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.0625rem; font-weight: 600;
            color: var(--gray-900); margin-bottom: 1.25rem;
        }
        .question-options {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .option-btn {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            background: white; cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            font-size: 0.938rem; color: var(--gray-700);
            text-align: left; width: 100%;
        }
        .option-btn:hover { border-color: var(--primary); background: var(--primary-bg); }
        .option-btn.selected { border-color: var(--primary); background: var(--primary-bg); font-weight: 600; }
        .option-btn.correct { border-color: var(--success); background: var(--success-bg); color: var(--success-dark); }
        .option-btn.incorrect { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-dark); }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .option-letter {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--gray-100); display: flex;
            align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.75rem;
            flex-shrink: 0;
        }
        .option-btn.selected .option-letter { background: var(--primary); color: white; }
        .option-btn.correct .option-letter { background: var(--success); color: white; }
        .option-btn.incorrect .option-letter { background: var(--danger); color: white; }

        .question-feedback {
            margin-top: 1rem; padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem; font-weight: 500;
            display: none;
        }
        .question-feedback.show { display: block; animation: fadeIn 0.3s ease; }
        .question-feedback.correct { background: var(--success-bg); color: var(--success-dark); }
        .question-feedback.incorrect { background: var(--danger-bg); color: var(--danger-dark); }

        .submit-answer-btn {
            margin-top: 1rem;
            padding: 0.625rem 1.5rem;
            background: var(--primary); color: white;
            border: none; border-radius: var(--radius-sm);
            font-weight: 600; cursor: pointer;
            transition: all var(--transition);
            font-size: 0.875rem;
        }
        .submit-answer-btn:hover { background: var(--primary-dark); }
        .submit-answer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Complete the following */
        .complete-input {
            width: 100%; padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-family: 'Fira Code', monospace;
            font-size: 0.938rem; outline: none;
            transition: all var(--transition);
        }
        .complete-input:focus { border-color: var(--primary); }

        /* Matching */
        .matching-pairs {
            display: flex; flex-direction: column; gap: 0.5rem;
        }
        .matching-row {
            display: flex; align-items: center; gap: 1rem;
        }
        .matching-left {
            flex: 1; padding: 0.625rem 1rem;
            background: var(--gray-50); border-radius: var(--radius-sm);
            font-weight: 500; font-size: 0.875rem;
        }
        .matching-select {
            padding: 0.5rem 0.75rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-sm); outline: none;
            font-size: 0.875rem; flex: 1;
        }

        /* Boolean */
        .boolean-options {
            display: flex; gap: 1rem;
        }
        .boolean-btn {
            flex: 1; padding: 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            text-align: center; cursor: pointer;
            font-weight: 600; font-size: 1rem;
            transition: all var(--transition);
            background: white;
        }
        .boolean-btn:hover { border-color: var(--primary); }
        .boolean-btn.selected { border-color: var(--primary); background: var(--primary-bg); }

        /* Image Block */
        .block-image {
            background: white; border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg); overflow: hidden;
        }
        .block-image img {
            width: 100%; height: auto; display: block;
            max-height: 500px; object-fit: contain;
        }
        .block-image .image-caption {
            padding: 0.75rem 1rem;
            font-size: 0.813rem; color: var(--gray-500);
            text-align: center; background: var(--gray-50);
        }

        /* ============ NAVIGATION BUTTONS ============ */
        .lesson-navigation {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 3rem; padding-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }
        .nav-btn {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-weight: 600; font-size: 0.875rem;
            transition: all var(--transition); cursor: pointer;
            border: none; text-decoration: none;
        }
        .nav-btn.prev { background: var(--gray-100); color: var(--gray-700); }
        .nav-btn.prev:hover { background: var(--gray-200); }
        .nav-btn.next { background: var(--primary); color: white; }
        .nav-btn.next:hover { background: var(--primary-dark); transform: translateX(2px); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ============ TOAST ============ */
        .toast-container {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            z-index: 300; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .toast {
            background: var(--gray-900); color: white;
            padding: 0.75rem 1.25rem; border-radius: var(--radius);
            font-size: 0.875rem; font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease, slideOut 0.3s ease 3s forwards;
            max-width: 400px;
        }
        .toast.success { background: var(--success-dark); }
        .toast.error { background: var(--danger-dark); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ============ COMPLETION MODAL ============ */
        .completion-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity var(--transition);
        }
        .completion-overlay.show { opacity: 1; pointer-events: all; }
        .completion-modal {
            background: white; border-radius: var(--radius-xl);
            padding: 2.5rem; text-align: center;
            max-width: 450px; width: 90%;
            box-shadow: var(--shadow-lg);
        }
        .completion-icon {
            font-size: 4rem; margin-bottom: 1rem;
        }
        .completion-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;
        }
        .completion-stats {
            display: flex; gap: 2rem; justify-content: center;
            margin: 1.5rem 0;
        }
        .completion-stat {
            text-align: center;
        }
        .completion-stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem; font-weight: 700; color: var(--primary);
        }
        .completion-stat-label {
            font-size: 0.75rem; color: var(--gray-500);
        }

        /* ============ SECTION NAVIGATION ============ */
        .section-nav {
            display: flex; align-items: center; justify-content: center;
            gap: 0.5rem; margin: 1.5rem 0;
        }
        .section-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--gray-300); border: none;
            cursor: pointer; transition: all var(--transition);
        }
        .section-dot.active { background: var(--primary); width: 24px; border-radius: 5px; }
        .section-dot.completed { background: var(--success); }

        /* Responsive */
        @media (max-width: 1024px) {
            .lesson-sidebar { transform: translateX(-100%); }
            .lesson-sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .menu-toggle { display: block; }
            .lesson-content-area { padding: 1.5rem 1rem; }
        }
        @media (max-width: 640px) {
            .lesson-title { font-size: 1.5rem; }
            .lesson-meta { flex-wrap: wrap; gap: 0.75rem; }
        }
    </style>
</head>
<body>
    <!-- Sidebar / Table of Contents -->
    <aside class="lesson-sidebar" id="lessonSidebar">
        <div class="sidebar-header">
            <a href="index.html" class="sidebar-back">
                <i class='bx bx-arrow-back'></i> Back to Course
            </a>
        </div>
        
        <div class="sidebar-progress">
            <div class="progress-label">
                <span>Lesson Progress</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:0%;"></div>
            </div>
        </div>

        <nav class="sidebar-toc" id="sidebarToc">
            <!-- Dynamically populated -->
        </nav>

        <div class="sidebar-footer">
            <div class="points-display">
                <div class="points-icon"><i class='bx bx-star'></i></div>
                <div>
                    <div style="font-size:0.75rem;color:var(--gray-500);">Points Earned</div>
                    <div id="totalPoints">0 / 0</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="lesson-topbar">
            <div class="lesson-topbar-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class='bx bx-menu'></i>
                </button>
                <div class="lesson-breadcrumb">
                    <a href="#" id="breadcrumbCourse">Course</a>
                    <span class="sep">/</span>
                    <span id="breadcrumbModule">Module</span>
                    <span class="sep">/</span>
                    <span style="color:var(--gray-900);font-weight:500;">Lesson</span>
                </div>
            </div>
            <div class="lesson-topbar-actions">
                <span id="sectionIndicator" style="font-size:0.813rem;color:var(--gray-500);"></span>
                <button class="btn btn-outline btn-sm" id="markCompleteBtn">
                    <i class='bx bx-check-circle'></i> Mark Complete
                </button>
            </div>
        </header>

        <div class="lesson-content-area">
            <!-- Lesson Header -->
            <div class="lesson-header" id="lessonHeader">
                <div class="lesson-badge"><i class='bx bx-book-open'></i> <span id="lessonBadgeText">Lesson</span></div>
                <h1 class="lesson-title" id="lessonTitleDisplay">Loading...</h1>
                <div class="lesson-meta">
                    <span><i class='bx bx-time'></i> <span id="lessonDuration">0 min</span></span>
                    <span><i class='bx bx-cube'></i> <span id="lessonBlockCount">0 blocks</span></span>
                    <span><i class='bx bx-star'></i> <span id="lessonPoints">0 points</span></span>
                </div>
            </div>

            <!-- Section Navigation (for sections view) -->
            <div class="section-nav" id="sectionNav" style="display:none;">
                <!-- Dynamically populated -->
            </div>

            <!-- Blocks Flow -->
            <div class="blocks-flow" id="blocksFlow">
                <!-- Dynamically populated -->
            </div>

            <!-- Navigation -->
            <div class="lesson-navigation">
                <button class="nav-btn prev" id="prevBtn" onclick="navigateLesson('prev')">
                    <i class='bx bx-chevron-left'></i> Previous
                </button>
                <span style="font-size:0.813rem;color:var(--gray-500);" id="pageIndicator"></span>
                <button class="nav-btn next" id="nextBtn" onclick="navigateLesson('next')">
                    Next <i class='bx bx-chevron-right'></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Completion Modal -->
    <div class="completion-overlay" id="completionOverlay">
        <div class="completion-modal">
            <div class="completion-icon">🎉</div>
            <h2 class="completion-title">Lesson Complete!</h2>
            <p style="color:var(--gray-500);margin-bottom:1rem;">Great job! You've completed this lesson.</p>
            <div class="completion-stats">
                <div class="completion-stat">
                    <div class="completion-stat-value" id="completionScore">0%</div>
                    <div class="completion-stat-label">Score</div>
                </div>
                <div class="completion-stat">
                    <div class="completion-stat-value" id="completionPoints">0</div>
                    <div class="completion-stat-label">Points</div>
                </div>
                <div class="completion-stat">
                    <div class="completion-stat-value" id="completionTime">0m</div>
                    <div class="completion-stat-label">Time</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="continueLearning()" style="width:100%;justify-content:center;">
                Continue Learning <i class='bx bx-right-arrow-alt'></i>
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db } from './js/firebase.js';
        import { getDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ============ APP STATE ============
        const AppState = {
            lesson: null,
            currentPage: 0,
            totalPages: 1,
            blocks: [],
            answeredQuestions: {},
            acknowledgedRemembers: {},
            earnedPoints: 0,
            totalPoints: 0,
            startTime: Date.now(),
            isCompleted: false
        };

        // ============ UTILITIES ============
        const $ = (id) => document.getElementById(id);
        
        function showToast(message, type = 'success') {
            const container = $('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function getYouTubeId(url) {
            if (!url) return null;
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            return match ? match[1] : null;
        }

        // ============ LOAD LESSON ============
        async function loadLesson() {
            // Try to get lesson ID from URL
            const params = new URLSearchParams(window.location.search);
            let lessonId = params.get('id');
            
            if (!lessonId) {
                // Try localStorage for demo/testing
                lessonId = localStorage.getItem('ak_current_lesson');
            }

            if (!lessonId) {
                // Load demo lesson for testing
                loadDemoLesson();
                return;
            }

            try {
                const lessonSnap = await getDoc(doc(db, 'lessons', lessonId));
                if (lessonSnap.exists()) {
                    AppState.lesson = { id: lessonSnap.id, ...lessonSnap.data() };
                    initializeLesson();
                } else {
                    loadDemoLesson();
                }
            } catch (e) {
                console.warn('Firebase unavailable, loading demo:', e.message);
                loadDemoLesson();
            }
        }

        function loadDemoLesson() {
            // Demo lesson for testing
            AppState.lesson = {
                id: 'demo',
                title: 'Introduction to HTML Forms',
                viewType: 'one-page',
                estimatedTime: 25,
                status: 'published',
                moduleName: 'HTML Forms',
                courseName: 'HTML Fundamentals',
                pages: [{
                    blocks: [
                        {
                            id: 'block_1',
                            type: 'text',
                            contentType: 'title',
                            content: 'Understanding HTML Forms'
                        },
                        {
                            id: 'block_2',
                            type: 'text',
                            contentType: 'paragraph',
                            content: 'HTML forms are the backbone of user interaction on the web. They allow users to <b>input data</b>, make selections, and submit information to servers. Every time you log in, search, or make a purchase online, you\'re using an HTML form.'
                        },
                        {
                            id: 'block_3',
                            type: 'remember',
                            text: 'Forms use the &lt;form&gt; tag as a container for all input elements. The <code>action</code> attribute specifies where to send the data, and the <code>method</code> attribute defines how to send it (GET or POST).'
                        },
                        {
                            id: 'block_4',
                            type: 'text',
                            contentType: 'subtitle',
                            content: 'Basic Form Structure'
                        },
                        {
                            id: 'block_5',
                            type: 'text',
                            contentType: 'paragraph',
                            content: 'Here\'s a simple form example:'
                        },
                        {
                            id: 'block_6',
                            type: 'text',
                            contentType: 'paragraph',
                            content: '<pre>&lt;form action="/submit" method="POST"&gt;\n  &lt;label for="name"&gt;Name:&lt;/label&gt;\n  &lt;input type="text" id="name" name="name"&gt;\n  &lt;button type="submit"&gt;Send&lt;/button&gt;\n&lt;/form&gt;</pre>'
                        },
                        {
                            id: 'block_7',
                            type: 'video',
                            url: 'https://www.youtube.com/watch?v=2O8pkybH6po'
                        },
                        {
                            id: 'block_8',
                            type: 'text',
                            contentType: 'subtitle',
                            content: 'Common Input Types'
                        },
                        {
                            id: 'block_9',
                            type: 'text',
                            contentType: 'paragraph',
                            content: 'HTML provides various input types for different data: <code>text</code>, <code>email</code>, <code>password</code>, <code>number</code>, <code>date</code>, <code>checkbox</code>, <code>radio</code>, and <code>file</code>. Each type provides built-in validation and appropriate keyboards on mobile devices.'
                        },
                        {
                            id: 'block_10',
                            type: 'remember',
                            text: 'Always use the <code>&lt;label&gt;</code> element with input fields. It improves accessibility and makes your forms easier to use by allowing users to click the label to focus the input.'
                        },
                        {
                            id: 'block_11',
                            type: 'remember-question',
                            question: 'What tag is used to create a form container?',
                            options: ['&lt;input&gt;', '&lt;form&gt;', '&lt;div&gt;', '&lt;section&gt;'],
                            correctAnswer: 1
                        },
                        {
                            id: 'block_12',
                            type: 'text',
                            contentType: 'title',
                            content: 'Form Validation'
                        },
                        {
                            id: 'block_13',
                            type: 'text',
                            contentType: 'paragraph',
                            content: 'HTML5 introduced built-in form validation attributes. You can use <code>required</code>, <code>minlength</code>, <code>maxlength</code>, <code>min</code>, <code>max</code>, and <code>pattern</code> to validate user input without JavaScript.'
                        },
                        {
                            id: 'block_14',
                            type: 'question',
                            questionType: 'multiple-choice',
                            question: 'Which attribute makes a form field mandatory?',
                            options: ['mandatory', 'validate', 'required', 'needed'],
                            correctAnswer: 2,
                            points: 10
                        },
                        {
                            id: 'block_15',
                            type: 'question',
                            questionType: 'boolean',
                            question: 'The GET method sends form data in the URL.',
                            correctAnswer: true,
                            points: 5
                        },
                        {
                            id: 'block_16',
                            type: 'text',
                            contentType: 'subtitle',
                            content: 'Summary'
                        },
                        {
                            id: 'block_17',
                            type: 'text',
                            contentType: 'paragraph',
                            content: 'You\'ve learned the fundamentals of HTML forms: the <code>&lt;form&gt;</code> container, various input types, the importance of labels, and basic validation. Forms are essential for creating interactive web applications.'
                        },
                        {
                            id: 'block_18',
                            type: 'question',
                            questionType: 'complete',
                            question: 'Complete the opening tag: _____ action="/login" method="POST"',
                            correctAnswer: 0,
                            options: ['<form', '<input', '<button', '<div'],
                            points: 10
                        }
                    ]
                }]
            };
            initializeLesson();
        }

        function initializeLesson() {
            const lesson = AppState.lesson;
            if (!lesson) return;

            // Update header
            $('lessonTitleDisplay').textContent = lesson.title;
            $('lessonDuration').textContent = `${lesson.estimatedTime || 0} min`;
            $('lessonBadgeText').textContent = lesson.moduleName || 'Lesson';
            
            // Breadcrumb
            if (lesson.courseName) $('breadcrumbCourse').textContent = lesson.courseName;
            if (lesson.moduleName) $('breadcrumbModule').textContent = lesson.moduleName;

            // Setup pages
            const pages = lesson.pages || [{ blocks: [] }];
            AppState.totalPages = pages.length;
            AppState.currentPage = 0;

            // Load saved progress
            loadProgress();

            // Calculate total points
            AppState.totalPoints = 0;
            pages.forEach(page => {
                page.blocks?.forEach(block => {
                    if (block.type === 'question') AppState.totalPoints += (block.points || 0);
                });
            });

            // Setup view
            if (lesson.viewType === 'sections') {
                $('sectionNav').style.display = 'flex';
                renderSectionNav();
            }

            // Update TOC
            renderTableOfContents();
            
            // Render first page
            renderPage(AppState.currentPage);
            
            // Update navigation
            updateNavigation();
            updateProgress();
            updatePointsDisplay();

            // Track start time
            AppState.startTime = Date.now();
        }

        // ============ PROGRESS MANAGEMENT ============
        function loadProgress() {
            try {
                const saved = JSON.parse(localStorage.getItem(`ak_progress_${AppState.lesson.id}`) || '{}');
                AppState.answeredQuestions = saved.answeredQuestions || {};
                AppState.acknowledgedRemembers = saved.acknowledgedRemembers || {};
                AppState.earnedPoints = saved.earnedPoints || 0;
                AppState.isCompleted = saved.isCompleted || false;
            } catch (e) {}
        }

        function saveProgress() {
            try {
                localStorage.setItem(`ak_progress_${AppState.lesson.id}`, JSON.stringify({
                    answeredQuestions: AppState.answeredQuestions,
                    acknowledgedRemembers: AppState.acknowledgedRemembers,
                    earnedPoints: AppState.earnedPoints,
                    isCompleted: AppState.isCompleted,
                    lastUpdated: new Date().toISOString()
                }));
            } catch (e) {}
        }

        function updateProgress() {
            const pages = AppState.lesson?.pages || [];
            let totalBlocks = 0;
            let completedBlocks = 0;

            pages.forEach(page => {
                page.blocks?.forEach(block => {
                    totalBlocks++;
                    if (block.type === 'remember' && AppState.acknowledgedRemembers[block.id]) completedBlocks++;
                    if (block.type === 'remember-question' && AppState.answeredQuestions[block.id] !== undefined) completedBlocks++;
                    if (block.type === 'question' && AppState.answeredQuestions[block.id] !== undefined) completedBlocks++;
                    if (block.type === 'text' || block.type === 'video' || block.type === 'image') completedBlocks++; // Auto-complete content blocks
                });
            });

            const percent = totalBlocks > 0 ? Math.round((completedBlocks / totalBlocks) * 100) : 0;
            $('progressPercent').textContent = `${percent}%`;
            $('progressFill').style.width = `${percent}%`;

            // Check completion
            if (percent === 100 && !AppState.isCompleted) {
                AppState.isCompleted = true;
                saveProgress();
                showCompletionModal();
            }
        }

        function updatePointsDisplay() {
            $('totalPoints').textContent = `${AppState.earnedPoints} / ${AppState.totalPoints}`;
            $('lessonPoints').textContent = `${AppState.totalPoints} points`;
        }

        // ============ RENDER TABLE OF CONTENTS ============
        function renderTableOfContents() {
            const toc = $('sidebarToc');
            const blocks = getCurrentPageBlocks();
            
            const items = blocks.filter(b => ['text', 'question', 'remember', 'remember-question', 'video'].includes(b.type));
            
            toc.innerHTML = items.map((block, i) => {
                let icon = 'bx-text';
                let label = 'Content';
                if (block.type === 'question') { icon = 'bx-help-circle'; label = 'Question'; }
                if (block.type === 'remember') { icon = 'bx-brain'; label = 'Remember'; }
                if (block.type === 'remember-question') { icon = 'bx-question-mark'; label = 'Recall'; }
                if (block.type === 'video') { icon = 'bx-video'; label = 'Video'; }
                
                let badge = '';
                if (block.type === 'question' && AppState.answeredQuestions[block.id] !== undefined) {
                    badge = '<span class="toc-badge done">✓</span>';
                }
                if (block.type === 'remember' && AppState.acknowledgedRemembers[block.id]) {
                    badge = '<span class="toc-badge done">✓</span>';
                }
                
                return `
                    <div class="toc-section">
                        <button class="toc-item" onclick="scrollToBlock('${block.id}')">
                            <i class='bx ${icon} toc-icon'></i>
                            <span>${escapeHtml(block.content?.substring(0, 30) || block.text?.substring(0, 30) || block.question?.substring(0, 30) || label)}</span>
                            ${badge}
                        </button>
                    </div>
                `;
            }).join('');
        }

        // ============ RENDER PAGE ============
        function getCurrentPageBlocks() {
            const pages = AppState.lesson?.pages || [];
            return pages[AppState.currentPage]?.blocks || [];
        }

        function renderPage(pageIndex) {
            AppState.currentPage = pageIndex;
            const blocks = getCurrentPageBlocks();
            AppState.blocks = blocks;

            const flow = $('blocksFlow');
            flow.innerHTML = blocks.map((block, index) => renderBlock(block, index)).join('');

            // Update section nav
            if (AppState.lesson?.viewType === 'sections') {
                renderSectionNav();
            }

            $('blockCount') && ($('blockCount').textContent = `${blocks.length} blocks`);
            $('sectionIndicator').textContent = AppState.lesson?.viewType === 'sections' 
                ? `Page ${pageIndex + 1} of ${AppState.totalPages}`
                : '';

            updateNavigation();
            renderTableOfContents();
            updateProgress();

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderBlock(block, index) {
            switch (block.type) {
                case 'text': return renderTextBlock(block);
                case 'video': return renderVideoBlock(block);
                case 'remember': return renderRememberBlock(block);
                case 'remember-question': return renderRememberQuestionBlock(block);
                case 'question': return renderQuestionBlock(block);
                case 'image': return renderImageBlock(block);
                default: return '';
            }
        }

        function renderTextBlock(block) {
            const content = block.content || '';
            const id = block.id;
            
            let html = `<div class="block-text" id="${id}">`;
            if (block.contentType === 'title') {
                html += `<h2>${content}</h2>`;
            } else if (block.contentType === 'subtitle') {
                html += `<h3>${content}</h3>`;
            } else {
                // Process markdown-like content
                html += `<p>${processTextContent(content)}</p>`;
            }
            html += '</div>';
            return html;
        }

        function processTextContent(content) {
            // Convert code blocks
            content = content.replace(/<pre>(.*?)<\/pre>/gs, (match, code) => {
                return `<pre>${code}</pre>`;
            });
            return content;
        }

        function renderVideoBlock(block) {
            const youtubeId = getYouTubeId(block.url);
            const id = block.id;
            
            if (youtubeId) {
                return `
                    <div class="block-video" id="${id}">
                        <div class="video-wrapper">
                            <iframe src="https://www.youtube.com/embed/${youtubeId}" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                            </iframe>
                        </div>
                    </div>`;
            }
            
            return `
                <div class="block-video" id="${id}">
                    <div class="video-wrapper">
                        <div class="video-placeholder">
                            <i class='bx bx-video'></i>
                            <p>Video unavailable</p>
                        </div>
                    </div>
                </div>`;
        }

        function renderRememberBlock(block) {
            const id = block.id;
            const isAcknowledged = AppState.acknowledgedRemembers[id];
            
            return `
                <div class="block-remember ${isAcknowledged ? 'remember-hidden' : ''}" id="${id}">
                    <div class="remember-icon">🧠</div>
                    <div class="remember-content">
                        <div class="remember-label">Remember This</div>
                        <div class="remember-text">${processTextContent(block.text || '')}</div>
                        <button class="acknowledge-btn ${isAcknowledged ? 'acknowledged' : ''}" 
                                onclick="acknowledgeRemember('${id}')" 
                                ${isAcknowledged ? 'disabled' : ''}>
                            <i class='bx ${isAcknowledged ? 'bx-check' : 'bx-check-circle'}'></i>
                            ${isAcknowledged ? 'Got it!' : 'I understand'}
                        </button>
                    </div>
                </div>`;
        }

        function renderRememberQuestionBlock(block) {
            const id = block.id;
            const answered = AppState.answeredQuestions[id];
            
            return `
                <div class="block-remember-question" id="${id}">
                    <div class="rq-header">
                        <i class='bx bx-question-mark'></i>
                        <span>Quick Recall</span>
                    </div>
                    <div class="rq-question">${block.question || 'Question'}</div>
                    <div class="question-options">
                        ${(block.options || []).map((opt, i) => `
                            <button class="option-btn ${answered === i ? (i === block.correctAnswer ? 'correct' : 'incorrect') : ''}" 
                                    onclick="answerRememberQuestion('${id}', ${i}, ${block.correctAnswer})"
                                    ${answered !== undefined ? 'disabled' : ''}>
                                <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                                ${opt || `Option ${String.fromCharCode(65 + i)}`}
                            </button>
                        `).join('')}
                    </div>
                    ${answered !== undefined ? `
                        <div class="question-feedback show ${answered === block.correctAnswer ? 'correct' : 'incorrect'}">
                            ${answered === block.correctAnswer ? '✅ Correct! Well remembered.' : `❌ Not quite. The correct answer is ${String.fromCharCode(65 + block.correctAnswer)}.`}
                        </div>
                    ` : ''}
                </div>`;
        }

        function renderQuestionBlock(block) {
            const id = block.id;
            const answered = AppState.answeredQuestions[id];
            
            let typeLabel = 'Multiple Choice';
            if (block.questionType === 'boolean') typeLabel = 'True/False';
            if (block.questionType === 'complete') typeLabel = 'Complete';
            if (block.questionType === 'matching') typeLabel = 'Matching';
            
            let html = `
                <div class="block-question ${answered !== undefined ? (answered.correct ? 'correct' : 'incorrect') : ''}" id="${id}">
                    <div class="question-header">
                        <span class="question-type-badge">
                            <i class='bx ${block.questionType === 'boolean' ? 'bx-check-circle' : 'bx-help-circle'}'></i>
                            ${typeLabel}
                        </span>
                        <span class="question-points">+${block.points || 0} pts</span>
                    </div>
                    <div class="question-text">${block.question || 'Question'}</div>`;
            
            if (block.questionType === 'multiple-choice') {
                html += `<div class="question-options">${(block.options || []).map((opt, i) => `
                    <button class="option-btn ${answered?.selected === i ? (i === block.correctAnswer ? 'correct' : 'incorrect') : ''}" 
                            onclick="answerQuestion('${id}', ${i}, ${block.correctAnswer}, ${block.points || 0})"
                            ${answered !== undefined ? 'disabled' : ''}>
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        ${opt || `Option ${String.fromCharCode(65 + i)}`}
                    </button>
                `).join('')}</div>`;
            } else if (block.questionType === 'boolean') {
                html += `<div class="boolean-options">
                    <button class="boolean-btn ${answered?.selected === true ? (block.correctAnswer === true ? 'correct' : 'incorrect') : ''}" 
                            onclick="answerQuestion('${id}', true, ${block.correctAnswer}, ${block.points || 0})"
                            ${answered !== undefined ? 'disabled' : ''}>
                        ✅ True
                    </button>
                    <button class="boolean-btn ${answered?.selected === false ? (block.correctAnswer === false ? 'correct' : 'incorrect') : ''}" 
                            onclick="answerQuestion('${id}', false, ${block.correctAnswer}, ${block.points || 0})"
                            ${answered !== undefined ? 'disabled' : ''}>
                        ❌ False
                    </button>
                </div>`;
            } else if (block.questionType === 'complete') {
                html += `
                    <input type="text" class="complete-input" id="completeInput_${id}" placeholder="Type your answer..." ${answered !== undefined ? 'disabled' : ''}>
                    <button class="submit-answer-btn" onclick="submitCompleteAnswer('${id}', '${block.options?.[block.correctAnswer] || ''}', ${block.points || 0})" ${answered !== undefined ? 'disabled' : ''}>
                        Submit Answer
                    </button>`;
            }
            
            if (answered !== undefined) {
                html += `
                    <div class="question-feedback show ${answered.correct ? 'correct' : 'incorrect'}">
                        ${answered.correct ? '✅ Correct! Great job.' : '❌ Incorrect. Try again next time.'}
                    </div>`;
            }
            
            html += '</div>';
            return html;
        }

        function renderImageBlock(block) {
            const id = block.id;
            return `
                <div class="block-image" id="${id}">
                    <img src="${block.url || 'https://via.placeholder.com/800x400'}" alt="${block.alt || ''}" onerror="this.src='https://via.placeholder.com/800x400?text=Image+Not+Found'">
                    ${block.alt ? `<div class="image-caption">${block.alt}</div>` : ''}
                </div>`;
        }

        function renderSectionNav() {
            const nav = $('sectionNav');
            nav.innerHTML = Array.from({ length: AppState.totalPages }, (_, i) => `
                <button class="section-dot ${i === AppState.currentPage ? 'active' : ''}" 
                        onclick="renderPage(${i})"></button>
            `).join('');
        }

        // ============ INTERACTIONS ============
        window.acknowledgeRemember = (blockId) => {
            AppState.acknowledgedRemembers[blockId] = true;
            saveProgress();
            renderPage(AppState.currentPage);
            updateProgress();
            showToast('Point remembered! 👍', 'success');
        };

        window.answerRememberQuestion = (blockId, selected, correctAnswer) => {
            const correct = selected === correctAnswer;
            AppState.answeredQuestions[blockId] = { selected, correct };
            saveProgress();
            renderPage(AppState.currentPage);
            updateProgress();
            showToast(correct ? 'Correct! 🎉' : 'Not quite. Review and try again.', correct ? 'success' : 'error');
        };

        window.answerQuestion = (blockId, selected, correctAnswer, points) => {
            const correct = selected === correctAnswer;
            AppState.answeredQuestions[blockId] = { selected, correct };
            if (correct) {
                AppState.earnedPoints += (points || 0);
            }
            saveProgress();
            updatePointsDisplay();
            renderPage(AppState.currentPage);
            updateProgress();
            showToast(correct ? `Correct! +${points || 0} points 🎉` : 'Incorrect. Keep learning!', correct ? 'success' : 'error');
        };

        window.submitCompleteAnswer = (blockId, correctAnswer, points) => {
            const input = $(`completeInput_${blockId}`);
            if (!input) return;
            const userAnswer = input.value.trim().toLowerCase();
            const correct = userAnswer === correctAnswer.toLowerCase().replace('<', '').replace('>', '');
            
            AppState.answeredQuestions[blockId] = { selected: userAnswer, correct };
            if (correct) {
                AppState.earnedPoints += (points || 0);
            }
            saveProgress();
            updatePointsDisplay();
            renderPage(AppState.currentPage);
            updateProgress();
            showToast(correct ? `Correct! +${points || 0} points 🎉` : `The correct answer was: ${correctAnswer}`, correct ? 'success' : 'error');
        };

        window.scrollToBlock = (blockId) => {
            const el = document.getElementById(blockId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.style.boxShadow = '0 0 0 4px rgba(37,99,235,0.3)';
                setTimeout(() => el.style.boxShadow = '', 2000);
            }
        };

        // ============ NAVIGATION ============
        function updateNavigation() {
            $('prevBtn').disabled = AppState.currentPage === 0;
            $('nextBtn').disabled = AppState.currentPage >= AppState.totalPages - 1;
            $('pageIndicator').textContent = `${AppState.currentPage + 1} / ${AppState.totalPages}`;
        }

        window.navigateLesson = (direction) => {
            if (direction === 'next' && AppState.currentPage < AppState.totalPages - 1) {
                renderPage(AppState.currentPage + 1);
            } else if (direction === 'prev' && AppState.currentPage > 0) {
                renderPage(AppState.currentPage - 1);
            }
        };

        window.renderPage = renderPage;

        // ============ COMPLETION ============
        function showCompletionModal() {
            const elapsed = Math.floor((Date.now() - AppState.startTime) / 60000);
            $('completionScore').textContent = `${Math.round((AppState.earnedPoints / AppState.totalPoints) * 100) || 0}%`;
            $('completionPoints').textContent = AppState.earnedPoints;
            $('completionTime').textContent = `${elapsed}m`;
            $('completionOverlay').classList.add('show');
        }

        window.continueLearning = () => {
            $('completionOverlay').classList.remove('show');
            // Navigate to next lesson or back to course
            window.location.href = 'courses.html';
        };

        window.markComplete = () => {
            AppState.isCompleted = true;
            saveProgress();
            showCompletionModal();
        };

        // ============ EVENT LISTENERS ============
        $('menuToggle').addEventListener('click', () => {
            $('lessonSidebar').classList.toggle('open');
        });

        $('markCompleteBtn').addEventListener('click', window.markComplete);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && !e.ctrlKey && !e.metaKey && !e.target.closest('input')) {
                navigateLesson('next');
            }
            if (e.key === 'ArrowLeft' && !e.ctrlKey && !e.metaKey && !e.target.closest('input')) {
                navigateLesson('prev');
            }
            if (e.key === 'Escape') {
                $('completionOverlay').classList.remove('show');
            }
        });

        // Close sidebar on outside click (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = $('lessonSidebar');
            const toggle = $('menuToggle');
            if (sidebar.classList.contains('open') && 
                !sidebar.contains(e.target) && 
                !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        // ============ INIT ============
        loadLesson();
        console.log('📚 Akademia Lesson Page loaded!');
    </script>
</body>
</html>
