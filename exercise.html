<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Exercises & Exams</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED; --accent-bg: #F5F3FF;
            --success: #04AA6D; --success-bg: #ECFDF5; --success-dark: #038857;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2; --danger-dark: #DC2626;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --dark-bg: #2D3748; --dark-surface: #1a1f2e;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 24px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f0f2f5 0%, #e8ecf1 100%);
            color: var(--gray-800); display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        .topbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
        .topbar-left { display: flex; align-items: center; gap: 1rem; }
        .topbar-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .topbar-logo img { height: 28px; width: auto; }
        .topbar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; color: var(--gray-900); }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--gray-500); }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-score { font-weight: 700; font-size: 0.938rem; color: var(--success); display: flex; align-items: center; gap: 0.375rem; }
        .topbar-timer { font-weight: 600; font-size: 0.813rem; color: var(--gray-600); display: flex; align-items: center; gap: 0.25rem; }
        .topbar-mode { font-size: 0.75rem; padding: 0.25rem 0.625rem; border-radius: 100px; font-weight: 600; }
        .topbar-mode.exercise { background: var(--accent-bg); color: var(--accent); }
        .topbar-mode.exam { background: var(--danger-bg); color: var(--danger-dark); }

        .btn { font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; transition: all var(--transition); cursor: pointer; border: none; text-decoration: none; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: white; } .btn-success:hover { background: var(--success-dark); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.813rem; }

        .main-content { flex: 1; overflow-y: auto; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .exercise-container { width: 100%; max-width: 750px; animation: fadeSlideIn 0.4s ease; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .mode-select { text-align: center; }
        .mode-select h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .mode-select p { color: var(--gray-500); margin-bottom: 2rem; }
        .mode-select .info-banner { background: var(--primary-bg); border: 1px solid #BFDBFE; border-radius: var(--radius-lg); padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.813rem; color: var(--primary); display: inline-flex; align-items: center; gap: 0.5rem; }
        .mode-cards { display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; }
        .mode-card { background: white; border: 2px solid var(--gray-200); border-radius: var(--radius-2xl); padding: 2rem; text-align: center; cursor: pointer; transition: all var(--transition); width: 240px; }
        .mode-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .mode-card i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
        .mode-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; margin-bottom: 0.375rem; }
        .mode-card p { font-size: 0.75rem; color: var(--gray-500); }
        .limit-badge { display: inline-block; margin-top: 0.5rem; padding: 0.1875rem 0.625rem; border-radius: 100px; font-size: 0.688rem; font-weight: 600; }
        .limit-badge.logged { background: var(--success-bg); color: var(--success-dark); }
        .limit-badge.guest { background: var(--warning-bg); color: var(--warning-dark); }

        .progress-section { margin-bottom: 1.25rem; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.375rem; }
        .progress-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s ease; }
        .progress-dots { display: flex; gap: 0.375rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); transition: all var(--transition); }
        .progress-dot.correct { background: var(--success); }
        .progress-dot.wrong { background: var(--danger); }
        .progress-dot.current { background: var(--primary); width: 10px; height: 10px; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        /* QUESTION CARD - W3Schools Inspired */
        .question-card {
            background: var(--dark-bg); color: white; border-radius: var(--radius-2xl);
            padding: 2.5rem; transition: all var(--transition); position: relative;
            box-shadow: var(--shadow-lg); animation: cardIn 0.35s ease;
            text-align: center;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .q-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; justify-content: center; }
        .q-number { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--success); }
        .q-course { font-size: 0.688rem; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); padding: 0.1875rem 0.625rem; border-radius: 100px; }
        .q-points { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: var(--warning); font-weight: 600; }
        .q-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 600; color: white; margin-bottom: 1.5rem; line-height: 1.4; }

        /* MCQ Options - W3Schools Style */
        .mcq-options { display: flex; flex-direction: column; gap: 0.5rem; max-width: 500px; margin: 0 auto; }
        .mcq-opt {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.1); border: 2px solid transparent;
            border-radius: var(--radius); cursor: pointer; transition: all var(--transition);
            font-size: 0.938rem; text-align: left; width: 100%; color: white; font-family: 'Inter', sans-serif;
        }
        .mcq-opt:hover:not(:disabled) { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
        .mcq-opt:disabled { cursor: not-allowed; opacity: 0.7; }
        .mcq-opt.correct-show { background: var(--success-bg); color: var(--success-dark); border-color: var(--success); }
        .mcq-opt.wrong-show { background: var(--danger-bg); color: var(--danger-dark); border-color: var(--danger); }
        .mcq-opt input[type="radio"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .mcq-opt label { cursor: pointer; flex: 1; font-size: 0.938rem; }

        /* Boolean */
        .bool-group { display: flex; gap: 0.75rem; max-width: 400px; margin: 0 auto; }
        .bool-btn { flex: 1; padding: 1.25rem; border: 2px solid rgba(255,255,255,0.2); border-radius: var(--radius-lg); text-align: center; cursor: pointer; font-weight: 700; font-size: 1.125rem; transition: all var(--transition); background: rgba(255,255,255,0.05); color: white; }
        .bool-btn:hover:not(:disabled) { border-color: var(--primary); background: rgba(37,99,235,0.2); }

        /* Complete - W3Schools Fill-in-Blanks Style */
        .complete-container { text-align: left; max-width: 550px; margin: 0 auto; }
        .complete-sentence {
            background: rgba(0,0,0,0.3); padding: 1.5rem 2rem; border-radius: var(--radius);
            font-family: 'Source Code Pro', 'JetBrains Mono', monospace; font-size: 0.938rem;
            line-height: 2; color: #cdd6f4; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1rem;
        }
        .complete-input-inline {
            display: inline-block; padding: 0.1875rem 0.5rem; border: none;
            border-bottom: 2px solid var(--warning); background: rgba(255,255,255,0.1);
            color: white; font-family: 'Source Code Pro', 'JetBrains Mono', monospace;
            font-size: 0.938rem; outline: none; min-width: 80px; text-align: center;
            border-radius: 3px 3px 0 0; transition: all var(--transition);
        }
        .complete-input-inline:focus { border-bottom-color: var(--success); background: rgba(255,255,255,0.15); }
        .complete-input-inline:disabled { opacity: 0.7; }
        .submit-inline-btn { margin-top: 0.75rem; text-align: center; }

        /* Matching */
        .matching-wrap { max-width: 600px; margin: 0 auto; }
        .matching-columns { display: flex; gap: 2rem; position: relative; }
        .matching-col { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .match-item { padding: 0.75rem 1rem; border: 2px solid rgba(255,255,255,0.15); border-radius: var(--radius); cursor: pointer; transition: all var(--transition); background: rgba(255,255,255,0.05); color: white; font-weight: 500; text-align: center; user-select: none; position: relative; z-index: 2; font-size: 0.875rem; }
        .match-item:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
        .match-item.selected { border-color: var(--warning); background: rgba(245,158,11,0.2); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
        .match-item.matched { border-color: var(--success); background: rgba(4,170,109,0.2); }
        .match-item.wrong-match { border-color: var(--danger); background: rgba(239,68,68,0.2); }
        .matching-svg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .matching-svg-layer svg { width: 100%; height: 100%; }
        .match-submit-wrap { margin-top: 1rem; text-align: center; }

        /* Feedback */
        .feedback-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); border-radius: var(--radius-2xl);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .feedback-overlay.show { display: flex; }
        .feedback-overlay.correct { background: rgba(4,170,109,0.9); }
        .feedback-overlay.wrong { background: rgba(220,38,38,0.9); }
        .feedback-overlay h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: white; }
        .feedback-overlay button { margin-top: 1rem; }

        .nav-row { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }
        .nav-row .btn { min-width: 130px; justify-content: center; }

        .results-wrap { text-align: center; animation: fadeSlideIn 0.5s ease; background: white; border-radius: var(--radius-2xl); padding: 2.5rem; box-shadow: var(--shadow); }
        .results-icon { font-size: 5rem; display: block; margin-bottom: 0.5rem; }
        .results-pct { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; }
        .results-grade { font-size: 1.25rem; font-weight: 600; margin: 0.5rem 0; }
        .results-stats { display: flex; justify-content: center; gap: 3rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .r-stat { text-align: center; }
        .r-stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .r-stat-lbl { font-size: 0.75rem; color: var(--gray-500); }

        .login-gate { background: var(--warning-bg); border: 2px dashed var(--warning); border-radius: var(--radius-2xl); padding: 2rem; text-align: center; margin-top: 1rem; }
        .login-gate i { font-size: 3rem; color: var(--warning); display: block; margin-bottom: 0.75rem; }
        .login-gate h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .login-gate p { font-size: 0.875rem; color: var(--gray-500); margin-bottom: 1rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 5rem; color: var(--gray-300); display: block; margin-bottom: 1rem; }
        .empty-state h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: var(--gray-500); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-400); margin-bottom: 1.5rem; }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.813rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 360px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toast.success { background: #059669; } .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 600px) {
            .main-content { padding: 1rem; }
            .question-card { padding: 1.5rem; }
            .results-stats { gap: 1.5rem; }
            .mode-cards { flex-direction: column; align-items: center; }
            .matching-columns { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo"><img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia"><span>Akademia</span></a>
            <span class="topbar-title" id="topbarTitle">Exercises</span>
            <span class="topbar-mode exercise" id="topbarMode" style="display:none;">Exercise</span>
        </div>
        <div class="topbar-actions">
            <span class="topbar-timer" id="timerDisplay"><i class="bx bx-time"></i> 00:00</span>
            <span class="topbar-score" id="scoreDisplay"><i class="bx bxs-star"></i> 0</span>
            <a href="user.html" class="btn btn-outline btn-sm"><i class="bx bx-user"></i> Dashboard</a>
        </div>
    </header>

    <main class="main-content">
        <div class="exercise-container" id="exerciseContainer"></div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // Use regular script (not module) to avoid CORS issues with Firestore
        var $ = function(id) { return document.getElementById(id); };
        var toast = function(msg, type) { var c = $('toastContainer'); var t = document.createElement('div'); t.className = 'toast ' + (type || 'success'); t.innerHTML = '<i class="bx ' + (type === 'success' ? 'bx-check-circle' : 'bx-x-circle') + '"></i> ' + msg; t.addEventListener('click', function() { t.remove(); }); c.appendChild(t); setTimeout(function() { if (t.parentElement) t.remove(); }, 3500); };

        var App = {
            user: null, courses: [], modules: [], lessons: [],
            allQuestions: [], currentQuestions: [], mode: '',
            questionLimit: 10, currentIndex: 0, score: 0, answers: [],
            timer: null, timerSeconds: 0, isLoggedIn: false,
            guestExerciseLimit: 5, guestExamLimit: 10,
            filterCourseId: null, filterModuleId: null, filterLessonId: null,
            matchingSelections: {}, matchingLeftSelected: null,
            filterCourseName: '', filterModuleName: '', filterLessonName: ''
        };

        // Parse URL
        function parseURL() {
            var p = new URLSearchParams(window.location.search);
            App.filterCourseId = p.get('course') || null;
            App.filterModuleId = p.get('module') || null;
            App.filterLessonId = p.get('lesson') || null;
            App.mode = p.get('mode') || '';
        }

        // Load from localStorage (offline-first)
        function loadLocalData() {
            try { App.courses = JSON.parse(localStorage.getItem('ak_courses') || '[]'); } catch(e) { App.courses = []; }
            try { App.modules = JSON.parse(localStorage.getItem('ak_modules') || '[]'); } catch(e) { App.modules = []; }
            try { App.lessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]'); } catch(e) { App.lessons = []; }
            // Also check ak_exbank for exercise bank questions
            extractAllQuestions();
            proceedAfterLoad();
        }

        // Try Firebase, fallback to localStorage
        function loadData() {
            // Try to import Firebase dynamically
            var firebaseReady = false;
            
            try {
                import('./js/firebase.js').then(function(fb) {
                    var db = fb.db;
                    var auth = fb.auth;
                    
                    import("https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js").then(function(authMod) {
                        authMod.onAuthStateChanged(auth, function(u) {
                            App.user = u;
                            App.isLoggedIn = !!(u || localStorage.getItem('ak_user'));
                        });
                        if (!App.user && localStorage.getItem('ak_user')) App.isLoggedIn = true;
                    }).catch(function() {});
                    
                    import("https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js").then(function(fs) {
                        var col = fs.collection, getDocs = fs.getDocs, query = fs.query, orderBy = fs.orderBy, doc = fs.doc, getDoc = fs.getDoc;
                        
                        Promise.all([
                            getDocs(query(col(db, 'courses'), orderBy('createdAt', 'desc'))),
                            getDocs(query(col(db, 'modules'), orderBy('order'))),
                            getDocs(query(col(db, 'lessons'), orderBy('createdAt', 'desc')))
                        ]).then(function(results) {
                            App.courses = []; results[0].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.courses.push(o); });
                            App.modules = []; results[1].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.modules.push(o); });
                            App.lessons = []; results[2].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.lessons.push(o); });
                            
                            // Save to localStorage
                            localStorage.setItem('ak_courses', JSON.stringify(App.courses));
                            localStorage.setItem('ak_modules', JSON.stringify(App.modules));
                            localStorage.setItem('ak_lessons', JSON.stringify(App.lessons));
                            
                            // If specific lesson requested, load its exercise bank
                            if (App.filterLessonId) {
                                getDoc(doc(db, 'lessons', App.filterLessonId)).then(function(snap) {
                                    if (snap.exists()) {
                                        var data = snap.data();
                                        var bank = data.exerciseBank || [];
                                        bank.forEach(function(q) { if (q.question) App.allQuestions.push(formatQuestion(q, data, 'exercise_bank')); });
                                    }
                                    extractFromAllLessons();
                                    proceedAfterLoad();
                                }).catch(function() { extractFromAllLessons(); proceedAfterLoad(); });
                            } else {
                                extractFromAllLessons();
                                proceedAfterLoad();
                            }
                        }).catch(function(e) {
                            console.warn('Firebase load failed, using localStorage:', e.message);
                            loadLocalData();
                        });
                    }).catch(function(e) {
                        console.warn('Firestore import failed:', e.message);
                        loadLocalData();
                    });
                }).catch(function(e) {
                    console.warn('Firebase import failed:', e.message);
                    loadLocalData();
                });
            } catch(e) {
                console.warn('Dynamic import not supported:', e.message);
                loadLocalData();
            }
            
            // Set a timeout - if Firebase doesn't respond in 3 seconds, use localStorage
            setTimeout(function() {
                if (!App.allQuestions.length && !App.courses.length) {
                    console.warn('Firebase timeout, using localStorage');
                    loadLocalData();
                }
            }, 3000);
        }

        function formatQuestion(q, lessonData, source) {
            var mod = App.modules.find(function(m) { return m.id === (lessonData.moduleId || q.moduleId); });
            var course = App.courses.find(function(c) { return c.id === (mod ? mod.courseId : (q.courseId || lessonData.courseId)); });
            return {
                question: q.question, questionType: q.questionType || 'multiple-choice',
                options: q.options || ['','','',''], correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : 0,
                points: q.points || 10, sentence: q.sentence || '',
                matchingRight: q.matchingRight || null, matchingTypes: q.matchingTypes || {left:'text',right:'text'},
                source: source || 'lesson_block',
                lessonId: lessonData.id || q.lessonId, lessonTitle: lessonData.title || q.lessonTitle || 'Untitled',
                moduleId: mod ? mod.id : (q.moduleId || ''), moduleName: mod ? mod.name : (q.moduleName || ''),
                courseId: course ? course.id : (q.courseId || ''), courseName: course ? course.name : (q.courseName || '')
            };
        }

        function extractFromAllLessons() {
            App.lessons.forEach(function(lesson) {
                // Exercise bank
                var bank = lesson.exerciseBank || [];
                bank.forEach(function(q) { if (q.question) App.allQuestions.push(formatQuestion(q, lesson, 'exercise_bank')); });
                // Question blocks
                (lesson.pages || []).forEach(function(page) {
                    (page.blocks || []).forEach(function(block) {
                        if ((block.type === 'question' || block.type === 'remember-question') && block.question) {
                            App.allQuestions.push(formatQuestion(block, lesson, 'lesson_block'));
                        }
                    });
                });
            });
        }

        function extractAllQuestions() {
            App.allQuestions = [];
            
            // Also try ak_exbank from localStorage (legacy shared bank)
            try {
                var legacyBank = JSON.parse(localStorage.getItem('ak_exbank') || '[]');
                legacyBank.forEach(function(q) {
                    if (q.question) App.allQuestions.push({
                        question: q.question, questionType: q.questionType || 'multiple-choice',
                        options: q.options || ['','','',''], correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : 0,
                        points: q.points || 10, sentence: q.sentence || '',
                        matchingRight: q.matchingRight || null, matchingTypes: q.matchingTypes || {left:'text',right:'text'},
                        source: 'legacy_bank', courseName: 'Exercise Bank', moduleName: '', lessonTitle: ''
                    });
                });
            } catch(e) {}

            // From lessons
            App.lessons.forEach(function(lesson) {
                var bank = lesson.exerciseBank || [];
                bank.forEach(function(q) { if (q.question) App.allQuestions.push(formatQuestion(q, lesson, 'exercise_bank')); });
                (lesson.pages || []).forEach(function(page) {
                    (page.blocks || []).forEach(function(block) {
                        if ((block.type === 'question' || block.type === 'remember-question') && block.question) {
                            App.allQuestions.push(formatQuestion(block, lesson, 'lesson_block'));
                        }
                    });
                });
            });

            // Apply filters
            if (App.filterCourseId) App.allQuestions = App.allQuestions.filter(function(q) { return q.courseId === App.filterCourseId || q.source === 'legacy_bank'; });
            if (App.filterModuleId) App.allQuestions = App.allQuestions.filter(function(q) { return q.moduleId === App.filterModuleId; });
            if (App.filterLessonId) App.allQuestions = App.allQuestions.filter(function(q) { return q.lessonId === App.filterLessonId; });
            
            // Set names
            if (App.filterCourseId) { var c = App.courses.find(function(x) { return x.id === App.filterCourseId; }); App.filterCourseName = c ? c.name : ''; }
            if (App.filterModuleId) { var m = App.modules.find(function(x) { return x.id === App.filterModuleId; }); App.filterModuleName = m ? m.name : ''; }
            if (App.filterLessonId) { var l = App.lessons.find(function(x) { return x.id === App.filterLessonId; }); App.filterLessonName = l ? (l.title || '') : ''; }
        }

        function proceedAfterLoad() {
            if (App.filterLessonId || App.filterModuleId || App.filterCourseId || App.mode) {
                if (!App.mode) App.mode = 'exercise';
                startSession(App.mode);
            } else {
                renderModeSelect();
            }
        }

        function renderModeSelect() {
            if (!App.allQuestions.length) {
                $('exerciseContainer').innerHTML = '<div class="empty-state"><i class="bx bx-dumbbell"></i><h2>No Questions Available</h2><p>Add exercises to the Exercise Bank in the Lesson Studio, or create lessons with question blocks.</p><a href="course.html" class="btn btn-primary"><i class="bx bx-book-open"></i> Browse Courses</a><a href="index.html" class="btn btn-outline" style="margin-left:0.5rem;"><i class="bx bx-home"></i> Home</a></div>';
                return;
            }
            var totalQ = App.allQuestions.length;
            var contextName = App.filterLessonName || App.filterModuleName || App.filterCourseName || '';
            var contextLabel = contextName ? ' for ' + contextName : '';
            var guestEx = Math.min(App.guestExerciseLimit, totalQ);
            var guestExam = Math.min(App.guestExamLimit, totalQ);
            var loggedEx = Math.min(10, totalQ);
            var loggedExam = Math.min(30, totalQ);

            $('exerciseContainer').innerHTML = '<div class="mode-select"><h2>Ready to Practice?</h2>' +
                (contextName ? '<div class="info-banner"><i class="bx bx-info-circle"></i> Questions from: <strong>' + contextName + '</strong></div>' : '') +
                '<p>' + totalQ + ' questions available' + contextLabel + '</p>' +
                '<div class="mode-cards">' +
                    '<div class="mode-card" onclick="startSession(\'exercise\')"><i class="bx bx-dumbbell" style="color:var(--accent);"></i><h3>Exercise</h3><p>Practice with selected questions</p><span class="limit-badge ' + (App.isLoggedIn ? 'logged' : 'guest') + '">' + (App.isLoggedIn ? loggedEx : guestEx) + ' questions</span></div>' +
                    '<div class="mode-card" onclick="startSession(\'exam\')"><i class="bx bx-book-open" style="color:var(--danger);"></i><h3>Exam</h3><p>Full assessment mode</p><span class="limit-badge ' + (App.isLoggedIn ? 'logged' : 'guest') + '">' + (App.isLoggedIn ? loggedExam : guestExam) + ' questions</span></div>' +
                '</div>' +
                (!App.isLoggedIn ? '<p style="margin-top:1.5rem;font-size:0.813rem;color:var(--gray-500);"><i class="bx bx-lock-alt"></i> <a href="auth.html?mode=signin" style="color:var(--primary);">Sign in</a> to unlock full question limits</p>' : '') +
            '</div>';
        }

        window.startSession = function(mode) {
            App.mode = mode;
            App.questionLimit = mode === 'exercise' ? (App.isLoggedIn ? 10 : App.guestExerciseLimit) : (App.isLoggedIn ? 30 : App.guestExamLimit);
            App.questionLimit = Math.min(App.questionLimit, App.allQuestions.length);
            var shuffled = App.allQuestions.slice().sort(function() { return Math.random() - 0.5; });
            App.currentQuestions = shuffled.slice(0, App.questionLimit);
            App.currentIndex = 0; App.score = 0;
            App.answers = new Array(App.currentQuestions.length);
            App.timerSeconds = 0; App.matchingSelections = {}; App.matchingLeftSelected = null;
            $('topbarMode').style.display = ''; $('topbarMode').textContent = mode === 'exercise' ? 'Exercise' : 'Exam';
            $('topbarMode').className = 'topbar-mode ' + mode;
            $('topbarTitle').textContent = mode === 'exercise' ? 'Exercise' : 'Exam';
            updateScore(); startTimer(); renderQuestion();
        };

        function startTimer() {
            clearInterval(App.timer); App.timerSeconds = 0;
            $('timerDisplay').innerHTML = '<i class="bx bx-time"></i> 00:00';
            App.timer = setInterval(function() { App.timerSeconds++; var m = String(Math.floor(App.timerSeconds / 60)).padStart(2, '0'); var s = String(App.timerSeconds % 60).padStart(2, '0'); $('timerDisplay').innerHTML = '<i class="bx bx-time"></i> ' + m + ':' + s; }, 1000);
        }
        function updateScore() { $('scoreDisplay').innerHTML = '<i class="bx bxs-star"></i> ' + App.score; }

        // ============ RENDER QUESTION ============
        function renderQuestion() {
            if (App.currentIndex >= App.currentQuestions.length) { showResults(); return; }
            var guestMax = App.mode === 'exercise' ? App.guestExerciseLimit : App.guestExamLimit;
            if (!App.isLoggedIn && App.currentIndex >= guestMax) { renderLoginGate(); return; }

            var q = App.currentQuestions[App.currentIndex];
            var userAns = App.answers[App.currentIndex];
            var isAnswered = userAns !== undefined;
            var totalShow = App.isLoggedIn ? App.currentQuestions.length : Math.min(App.currentQuestions.length, guestMax);
            var dotsHTML = '';
            for (var d = 0; d < totalShow; d++) { var dc = ''; if (App.answers[d] !== undefined) { dc = App.answers[d] === App.currentQuestions[d].correctAnswer ? 'correct' : 'wrong'; } else if (d === App.currentIndex) { dc = 'current'; } dotsHTML += '<div class="progress-dot ' + dc + '"></div>'; }

            var bodyHTML = '';
            if (q.questionType === 'matching') bodyHTML = renderMatchingQuestion(q, isAnswered);
            else if (q.questionType === 'boolean') bodyHTML = renderBooleanQuestion(q, isAnswered);
            else if (q.questionType === 'complete-text' || q.questionType === 'complete' || q.questionType === 'complete-drag') bodyHTML = renderCompleteQuestion(q, isAnswered);
            else bodyHTML = renderMCQQuestion(q, isAnswered);

            var feedbackOverlay = '';
            if (isAnswered) {
                var correct = q.correctAnswer;
                var isCorrect = (q.questionType === 'matching') ? (userAns === q.correctAnswer) : (userAns === correct);
                feedbackOverlay = '<div class="feedback-overlay show ' + (isCorrect ? 'correct' : 'wrong') + '">' +
                    '<h2>' + (isCorrect ? '✅ Correct Answer!' : '❌ Wrong Answer!') + '</h2>' +
                    '<p style="color:rgba(255,255,255,0.8);">' + (isCorrect ? '+ ' + (q.points||10) + ' Sparks' : '') + '</p>' +
                    '<button class="btn btn-primary" onclick="nextQuestion()" style="background:white;color:' + (isCorrect ? 'var(--success-dark)' : 'var(--danger-dark)') + ';">' + (App.currentIndex < App.currentQuestions.length - 1 ? 'Next Question →' : 'See Results →') + '</button>' +
                '</div>';
            }

            var progress = Math.round(((App.currentIndex + 1) / App.currentQuestions.length) * 100);
            $('exerciseContainer').innerHTML = '' +
                '<div class="progress-section"><div class="progress-header"><span>Question ' + (App.currentIndex + 1) + ' of ' + totalShow + '</span><span>' + progress + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%;"></div></div></div>' +
                '<div class="question-card" style="position:relative;">' +
                    '<div class="q-meta"><span class="q-number">Question ' + (App.currentIndex + 1) + '</span>' + (q.courseName ? '<span class="q-course">' + q.courseName + '</span>' : '') + '<span class="q-points"><i class="bx bxs-star"></i> ' + (q.points || 10) + ' pts</span></div>' +
                    '<div class="q-text">' + (q.question || 'Question') + '</div>' + bodyHTML +
                    feedbackOverlay +
                '</div><div class="progress-dots">' + dotsHTML + '</div>';
        }

        // ============ MCQ - W3Schools Style Radio Buttons ============
        function renderMCQQuestion(q, isAnswered) {
            var opts = q.options || []; var correct = q.correctAnswer; var userAns = App.answers[App.currentIndex];
            var h = '<div class="mcq-options">';
            for (var i = 0; i < opts.length; i++) {
                if (!opts[i] && opts[i] !== '') continue;
                var cls = ''; if (userAns === i) { cls = userAns === correct ? 'correct-show' : 'wrong-show'; } else if (isAnswered && correct === i) { cls = 'correct-show'; }
                h += '<div class="mcq-opt ' + cls + '" onclick="answerMCQ(' + i + ')">' +
                    '<input type="radio" name="mcq" id="mcq' + i + '" ' + (userAns === i ? 'checked' : '') + (isAnswered ? ' disabled' : '') + '>' +
                    '<label for="mcq' + i + '">' + (opts[i] || 'Option ' + String.fromCharCode(65 + i)) + '</label></div>';
            }
            h += '</div>';
            if (!isAnswered) h += '<div class="nav-row"><button class="btn btn-primary" onclick="submitMCQ()">Submit Answer →</button></div>';
            return h;
        }

        window.answerMCQ = function(index) {
            if (App.answers[App.currentIndex] !== undefined) return;
            // Just select, don't submit yet
            document.querySelectorAll('.mcq-opt').forEach(function(el) { el.classList.remove('correct-show', 'wrong-show'); });
            document.querySelectorAll('.mcq-opt')[index].classList.add('selected');
            document.getElementById('mcq' + index).checked = true;
        };

        window.submitMCQ = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            var selected = document.querySelector('input[name="mcq"]:checked');
            if (!selected) { toast('Please select an answer', 'error'); return; }
            var index = parseInt(selected.id.replace('mcq', ''));
            var q = App.currentQuestions[App.currentIndex];
            var correct = index === q.correctAnswer;
            App.answers[App.currentIndex] = index;
            if (correct) { App.score += (q.points || 10); updateScore(); awardSparks(q.points || 10); }
            renderQuestion();
        };

        // ============ BOOLEAN ============
        function renderBooleanQuestion(q, isAnswered) {
            var correct = q.correctAnswer; var userAns = App.answers[App.currentIndex];
            var h = '<div class="bool-group">' +
                '<button class="bool-btn' + (userAns === 0 ? ' correct-show' : '') + '" onclick="answerBool(0)"' + (isAnswered ? ' disabled' : '') + '><i class="bx bx-check"></i> True</button>' +
                '<button class="bool-btn' + (userAns === 1 ? ' correct-show' : '') + '" onclick="answerBool(1)"' + (isAnswered ? ' disabled' : '') + '><i class="bx bx-x"></i> False</button>' +
            '</div>';
            return h;
        }

        window.answerBool = function(index) {
            if (App.answers[App.currentIndex] !== undefined) return;
            var q = App.currentQuestions[App.currentIndex];
            var correct = index === q.correctAnswer;
            App.answers[App.currentIndex] = index;
            if (correct) { App.score += (q.points || 10); updateScore(); awardSparks(q.points || 10); }
            renderQuestion();
        };

        // ============ COMPLETE - W3Schools Fill-in-Blanks Style ============
        function renderCompleteQuestion(q, isAnswered) {
            var sentence = q.sentence || q.question || '';
            var correctAns = ((q.options || [])[q.correctAnswer] || '');
            var userAns = App.answers[App.currentIndex];
            var displaySentence = sentence.replace(/____/g, '<input type="text" class="complete-input-inline" id="completeInput" placeholder="?" ' + (isAnswered ? 'disabled' : '') + '>');
            
            var h = '<div class="complete-container"><div class="complete-sentence">' + displaySentence + '</div>';
            if (!isAnswered) h += '<div class="submit-inline-btn"><button class="btn btn-primary" onclick="submitCompleteAnswer()">Submit Answer →</button></div>';
            h += '</div>';
            
            // Focus the input
            setTimeout(function() { var inp = $('completeInput'); if (inp) inp.focus(); }, 100);
            
            return h;
        }

        window.submitCompleteAnswer = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            var input = $('completeInput'); if (!input) return;
            var val = input.value.trim(); if (!val) { toast('Please type an answer', 'error'); return; }
            var q = App.currentQuestions[App.currentIndex];
            var correctAns = ((q.options || [])[q.correctAnswer] || '').toLowerCase();
            var isCorrect = val.toLowerCase() === correctAns;
            App.answers[App.currentIndex] = isCorrect ? q.correctAnswer : -1;
            if (isCorrect) { App.score += (q.points || 10); updateScore(); awardSparks(q.points || 10); }
            renderQuestion();
        };

        // ============ MATCHING ============
        function renderMatchingQuestion(q, isAnswered) {
            App.matchingSelections = {}; App.matchingLeftSelected = null;
            var leftItems = (q.options || []).filter(function(x) { return x && x.trim(); });
            var rightItems = (q.matchingRight || []).filter(function(x) { return x && x.trim(); });
            if (!leftItems.length) leftItems = ['Item 1', 'Item 2'];
            if (!rightItems.length) rightItems = ['Match 1', 'Match 2'];
            var shuffledRight = rightItems.slice().sort(function() { return Math.random() - 0.5; });
            
            var h = '<div class="matching-wrap"><p style="font-size:0.813rem;color:rgba(255,255,255,0.6);margin-bottom:1rem;">Click a left item, then click its matching right item. Yellow lines show connections.</p>';
            h += '<div class="matching-container" id="matchingContainer"><div class="matching-columns">';
            h += '<div class="matching-col" id="matchingLeftCol">';
            for (var i = 0; i < leftItems.length; i++) { h += '<div class="match-item left-item" data-index="' + i + '" onclick="selectMatchingLeft(' + i + ', this)">' + leftItems[i] + '</div>'; }
            h += '</div><div class="matching-svg-layer" id="matchingSvgLayer"><svg id="matchingSvg"></svg></div>';
            h += '<div class="matching-col" id="matchingRightCol">';
            for (var j = 0; j < shuffledRight.length; j++) { h += '<div class="match-item right-item" data-original-index="' + rightItems.indexOf(shuffledRight[j]) + '" data-display-index="' + j + '" onclick="selectMatchingRight(' + rightItems.indexOf(shuffledRight[j]) + ', ' + j + ', this)">' + shuffledRight[j] + '</div>'; }
            h += '</div></div></div>';
            if (!isAnswered) h += '<div class="match-submit-wrap"><button class="btn btn-primary" onclick="submitMatchingAnswer()">Submit Matches</button></div>';
            h += '</div>';
            setTimeout(function() { drawMatchingLines(); }, 100);
            return h;
        }

        window.selectMatchingLeft = function(index, el) { if (App.answers[App.currentIndex] !== undefined) return; App.matchingLeftSelected = index; document.querySelectorAll('.left-item').forEach(function(i) { i.classList.remove('selected'); }); el.classList.add('selected'); document.querySelectorAll('.right-item').forEach(function(i) { i.classList.remove('selected'); }); App.matchingSelections[index] = undefined; drawMatchingLines(); };
        window.selectMatchingRight = function(originalIndex, displayIndex, el) { if (App.answers[App.currentIndex] !== undefined) return; if (App.matchingLeftSelected === null) return; Object.keys(App.matchingSelections).forEach(function(k) { if (App.matchingSelections[k] === originalIndex) delete App.matchingSelections[k]; }); App.matchingSelections[App.matchingLeftSelected] = originalIndex; document.querySelectorAll('.left-item').forEach(function(i) { i.classList.remove('selected'); }); document.querySelectorAll('.right-item').forEach(function(i) { i.classList.remove('selected'); }); var le = document.querySelector('.left-item[data-index="' + App.matchingLeftSelected + '"]'); if (le) le.classList.add('matched'); el.classList.add('matched'); App.matchingLeftSelected = null; drawMatchingLines(); };

        function drawMatchingLines() {
            var svg = document.getElementById('matchingSvg'); var container = document.getElementById('matchingContainer');
            if (!svg || !container) return;
            var cr = container.getBoundingClientRect(); var lines = '';
            Object.keys(App.matchingSelections).forEach(function(li) {
                var ri = App.matchingSelections[li]; if (ri === undefined) return;
                var le = document.querySelector('.left-item[data-index="' + li + '"]');
                var re = document.querySelector('.right-item[data-original-index="' + ri + '"]');
                if (le && re) {
                    var lr = le.getBoundingClientRect(); var rr = re.getBoundingClientRect();
                    var x1 = lr.right - cr.left; var y1 = lr.top + lr.height/2 - cr.top;
                    var x2 = rr.left - cr.left; var y2 = rr.top + rr.height/2 - cr.top;
                    var cp = (x1 + x2) / 2;
                    lines += '<path d="M' + x1 + ',' + y1 + ' C' + cp + ',' + y1 + ' ' + cp + ',' + y2 + ' ' + x2 + ',' + y2 + '" stroke="var(--warning)" stroke-width="3" fill="none" stroke-linecap="round" filter="drop-shadow(0 2px 3px rgba(245,158,11,0.3))"/>';
                }
            });
            svg.innerHTML = lines;
        }

        window.submitMatchingAnswer = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            var q = App.currentQuestions[App.currentIndex];
            var leftItems = (q.options || []).filter(function(x) { return x && x.trim(); });
            var totalPairs = leftItems.length || 1; var correctPairs = 0;
            Object.keys(App.matchingSelections).forEach(function(li) { if (App.matchingSelections[li] === parseInt(li)) correctPairs++; });
            var earnedPoints = Math.round((q.points || 10) * (correctPairs / totalPairs));
            App.answers[App.currentIndex] = correctPairs === totalPairs ? q.correctAnswer : -1;
            App.score += earnedPoints; updateScore();
            if (earnedPoints > 0) awardSparks(earnedPoints);
            document.querySelectorAll('.left-item, .right-item').forEach(function(el) { el.style.pointerEvents = 'none'; });
            var sb = document.querySelector('.match-submit-wrap'); if (sb) sb.style.display = 'none';
            renderQuestion();
        };

        window.nextQuestion = function() { if (App.currentIndex < App.currentQuestions.length - 1) { App.currentIndex++; renderQuestion(); } else { showResults(); } };
        function awardSparks(pts) { var c = parseInt(localStorage.getItem('ak_sparks') || '0'); localStorage.setItem('ak_sparks', String(c + pts)); }

        function renderLoginGate() {
            var gm = App.mode === 'exercise' ? App.guestExerciseLimit : App.guestExamLimit;
            $('exerciseContainer').innerHTML = '<div class="progress-section"><div class="progress-header"><span>Free Preview: ' + gm + '/' + gm + '</span><span>100%</span></div><div class="progress-bar"><div class="progress-fill" style="width:100%;"></div></div></div>' +
                '<div class="login-gate"><i class="bx bx-lock-alt"></i><h3>Unlock Full Access</h3><p>Sign in to access all ' + App.currentQuestions.length + ' questions!</p>' +
                '<a href="auth.html?mode=signin" class="btn btn-primary"><i class="bx bx-log-in"></i> Sign In</a><a href="auth.html?mode=register" class="btn btn-outline" style="margin-left:0.5rem;"><i class="bx bx-user-plus"></i> Create Account</a></div>';
        }

        function showResults() {
            clearInterval(App.timer);
            var total = App.currentQuestions.length; var correct = 0;
            for (var i = 0; i < App.answers.length; i++) { if (App.answers[i] === App.currentQuestions[i].correctAnswer) correct++; }
            var pct = Math.round((correct / total) * 100);
            var grade = pct >= 90 ? 'Excellent!' : pct >= 70 ? 'Great Job!' : pct >= 50 ? 'Good Effort!' : 'Keep Practicing!';
            var gColor = pct >= 90 ? 'var(--success)' : pct >= 70 ? 'var(--primary)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
            var mins = Math.floor(App.timerSeconds / 60); var secs = App.timerSeconds % 60;
            var hist = []; try { hist = JSON.parse(localStorage.getItem('ak_exercise_history') || '[]'); } catch(e) { hist = []; }
            hist.push({ date: new Date().toISOString(), mode: App.mode, score: App.score, correct: correct, total: total, pct: pct, time: App.timerSeconds, courseId: App.filterCourseId, moduleId: App.filterModuleId, lessonId: App.filterLessonId });
            localStorage.setItem('ak_exercise_history', JSON.stringify(hist.slice(-30)));

            $('exerciseContainer').innerHTML = '<div class="results-wrap"><i class="bx bx-trophy results-icon" style="color:' + gColor + ';"></i><div class="results-pct" style="color:' + gColor + ';">' + pct + '%</div><div class="results-grade" style="color:' + gColor + ';">' + grade + '</div><p style="color:var(--gray-500);font-size:0.875rem;">' + (App.mode === 'exam' ? 'Exam' : 'Exercise') + ' Complete</p>' +
                '<div class="results-stats"><div class="r-stat"><div class="r-stat-val">' + correct + '/' + total + '</div><div class="r-stat-lbl">Correct</div></div><div class="r-stat"><div class="r-stat-val"><i class="bx bxs-star" style="color:var(--warning);"></i> ' + App.score + '</div><div class="r-stat-lbl">Sparks</div></div><div class="r-stat"><div class="r-stat-val">' + mins + 'm ' + secs + 's</div><div class="r-stat-lbl">Time</div></div></div>' +
                '<div class="nav-row"><button class="btn btn-primary" onclick="retrySession()"><i class="bx bx-refresh"></i> Retry</button><a href="course.html" class="btn btn-outline"><i class="bx bx-book-open"></i> Courses</a><a href="user.html" class="btn btn-success"><i class="bx bx-user"></i> Dashboard</a></div></div>';
        }

        window.retrySession = function() {
            var shuffled = App.allQuestions.slice().sort(function() { return Math.random() - 0.5; });
            App.currentQuestions = shuffled.slice(0, App.questionLimit);
            App.currentIndex = 0; App.score = 0; App.answers = new Array(App.currentQuestions.length);
            App.timerSeconds = 0; App.matchingSelections = {}; App.matchingLeftSelected = null;
            updateScore(); startTimer(); renderQuestion();
        };

        // Keyboard
        document.addEventListener('keydown', function(e) {
            if (App.currentIndex >= App.currentQuestions.length || !App.currentQuestions.length) return;
            if (e.key === 'Enter' && App.answers[App.currentIndex] !== undefined) { nextQuestion(); return; }
        });
        window.addEventListener('resize', function() { drawMatchingLines(); });

        // ============ INIT ============
        parseURL();
        // Check if user is logged in from localStorage
        if (localStorage.getItem('ak_user')) App.isLoggedIn = true;
        loadData();
        console.log('🚀 Akademia Exercise System ready!');
    </script>
</body>
</html>
