<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Exercises</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED; --accent-bg: #F5F3FF;
            --success: #04AA6D; --success-bg: #ECFDF5; --success-dark: #038857;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2; --danger-dark: #DC2626;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 24px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f0f2f5 0%, #e8ecf1 100%);
            color: var(--gray-800); display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        /* TOPBAR */
        .topbar {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem;
            height: 56px; display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; z-index: 10;
        }
        .topbar-left { display: flex; align-items: center; gap: 1rem; }
        .topbar-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .topbar-logo img { height: 28px; width: auto; }
        .topbar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; color: var(--gray-900); }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--gray-500); }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-score {
            font-weight: 700; font-size: 0.938rem; color: var(--success);
            display: flex; align-items: center; gap: 0.375rem;
        }
        .topbar-timer {
            font-weight: 600; font-size: 0.813rem; color: var(--gray-600);
            display: flex; align-items: center; gap: 0.25rem;
        }

        .btn {
            font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 0.875rem;
            font-weight: 600; transition: all var(--transition); cursor: pointer;
            border: none; text-decoration: none; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: white; } .btn-success:hover { background: var(--success-dark); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.813rem; }

        /* MAIN CONTENT */
        .main-content {
            flex: 1; overflow-y: auto; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
        }
        .exercise-container {
            width: 100%; max-width: 750px; animation: fadeSlideIn 0.4s ease;
        }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* PROGRESS BAR */
        .progress-section { margin-bottom: 1.25rem; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.375rem; }
        .progress-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s ease; }
        .progress-dots { display: flex; gap: 0.375rem; justify-content: center; margin-top: 1rem; }
        .progress-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300);
            transition: all var(--transition);
        }
        .progress-dot.correct { background: var(--success); }
        .progress-dot.wrong { background: var(--danger); }
        .progress-dot.current { background: var(--primary); width: 10px; height: 10px; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        /* QUESTION CARD */
        .question-card {
            background: white; border: 2px solid var(--gray-200); border-radius: var(--radius-2xl);
            padding: 2.5rem; transition: all var(--transition); position: relative;
            box-shadow: var(--shadow); animation: cardIn 0.35s ease;
        }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .question-card.correct-flash { border-color: var(--success); box-shadow: 0 0 30px rgba(4,170,109,0.15); }
        .question-card.wrong-flash { border-color: var(--danger); box-shadow: 0 0 30px rgba(239,68,68,0.1); }
        
        .q-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .q-number { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        .q-course { font-size: 0.688rem; color: var(--gray-500); background: var(--gray-100); padding: 0.1875rem 0.625rem; border-radius: 100px; }
        .q-points { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: var(--warning-dark); font-weight: 600; margin-left: auto; }
        
        .q-text {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem;
            font-weight: 600; color: var(--gray-900); margin-bottom: 1.5rem; line-height: 1.4;
        }

        .options-list { display: flex; flex-direction: column; gap: 0.625rem; }
        .opt-btn {
            display: flex; align-items: center; gap: 0.875rem;
            padding: 1rem 1.25rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); cursor: pointer; transition: all var(--transition);
            background: white; font-family: 'Inter', sans-serif; font-size: 0.938rem;
            text-align: left; width: 100%; color: var(--gray-700);
        }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-bg); transform: translateX(3px); }
        .opt-btn:disabled { cursor: not-allowed; }
        .opt-btn.correct-show { border-color: var(--success); background: var(--success-bg); color: var(--success-dark); }
        .opt-btn.wrong-show { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-dark); }
        .opt-letter {
            width: 34px; height: 34px; border-radius: 50%; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.813rem; flex-shrink: 0; transition: all var(--transition);
        }
        .opt-btn.correct-show .opt-letter { background: var(--success); color: white; }
        .opt-btn.wrong-show .opt-letter { background: var(--danger); color: white; }

        .feedback-toast {
            margin-top: 1.25rem; padding: 1rem 1.25rem; border-radius: var(--radius);
            font-weight: 600; font-size: 0.875rem; display: none; align-items: center; gap: 0.5rem;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback-toast.show { display: flex; }
        .feedback-toast.correct { background: var(--success-bg); color: var(--success-dark); }
        .feedback-toast.wrong { background: var(--danger-bg); color: var(--danger-dark); }

        /* COMPLETE INPUT */
        .complete-wrap { display: flex; gap: 0.5rem; }
        .complete-input {
            flex: 1; padding: 0.875rem 1.125rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); font-family: 'JetBrains Mono', monospace;
            font-size: 0.938rem; outline: none; transition: all var(--transition); background: white;
        }
        .complete-input:focus { border-color: var(--primary); }
        .complete-input:disabled { opacity: 0.8; }

        /* BOOLEAN */
        .bool-group { display: flex; gap: 0.75rem; }
        .bool-btn {
            flex: 1; padding: 1.25rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); text-align: center; cursor: pointer;
            font-weight: 700; font-size: 1.125rem; transition: all var(--transition); background: white;
        }
        .bool-btn:hover:not(:disabled) { border-color: var(--primary); }

        /* NAV BUTTONS */
        .nav-row { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }
        .nav-row .btn { min-width: 130px; justify-content: center; }

        /* RESULTS */
        .results-wrap { text-align: center; animation: fadeSlideIn 0.5s ease; }
        .results-icon { font-size: 5rem; display: block; margin-bottom: 0.5rem; }
        .results-pct { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; }
        .results-grade { font-size: 1.25rem; font-weight: 600; margin: 0.5rem 0; }
        .results-stats { display: flex; justify-content: center; gap: 3rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .r-stat { text-align: center; }
        .r-stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .r-stat-lbl { font-size: 0.75rem; color: var(--gray-500); }

        /* LOGIN GATE */
        .login-gate {
            background: var(--warning-bg); border: 2px dashed var(--warning);
            border-radius: var(--radius-2xl); padding: 2rem; text-align: center;
            margin-top: 1rem; animation: fadeSlideIn 0.4s ease;
        }
        .login-gate i { font-size: 3rem; color: var(--warning); display: block; margin-bottom: 0.75rem; }
        .login-gate h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .login-gate p { font-size: 0.875rem; color: var(--gray-500); margin-bottom: 1rem; }

        /* EMPTY */
        .empty-exercise { text-align: center; padding: 4rem 2rem; }
        .empty-exercise i { font-size: 5rem; color: var(--gray-300); display: block; margin-bottom: 1rem; }
        .empty-exercise h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: var(--gray-500); margin-bottom: 0.5rem; }
        .empty-exercise p { color: var(--gray-400); margin-bottom: 1.5rem; }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.813rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 360px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toast.success { background: #059669; } .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 600px) {
            .main-content { padding: 1rem; }
            .question-card { padding: 1.5rem; }
            .results-stats { gap: 1.5rem; }
            .nav-row .btn { min-width: 100px; font-size: 0.813rem; }
        }
    </style>
</head>
<body>
    <!-- TOPBAR -->
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo">
                <img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia">
                <span>Akademia</span>
            </a>
            <span class="topbar-title" id="topbarTitle">Exercises</span>
        </div>
        <div class="topbar-actions">
            <span class="topbar-timer" id="timerDisplay"><i class='bx bx-time'></i> 00:00</span>
            <span class="topbar-score" id="scoreDisplay"><i class='bx bxs-star'></i> 0</span>
            <a href="user.html" class="btn btn-outline btn-sm"><i class='bx bx-user'></i> Dashboard</a>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main-content">
        <div class="exercise-container" id="exerciseContainer"></div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const $ = id => document.getElementById(id);
        const toast = (msg, type = 'success') => {
            const c = $('toastContainer'); const t = document.createElement('div');
            t.className = `toast ${type}`; t.innerHTML = `<i class='bx ${type==='success'?'bx-check-circle':'bx-x-circle'}'></i> ${msg}`;
            t.addEventListener('click', () => t.remove()); c.appendChild(t);
            setTimeout(() => { if (t.parentElement) t.remove(); }, 3500);
        };

        const App = {
            user: null, courses: [], modules: [], lessons: [],
            questions: [], currentIndex: 0, score: 0, answers: [],
            timer: null, timerSeconds: 0, isLoggedIn: false,
            freeLimit: 4, filterCourseId: null, filterModuleId: null, filterLessonId: null
        };

        // ============ PARSE URL ============
        function parseURL() {
            const p = new URLSearchParams(window.location.search);
            App.filterCourseId = p.get('course') || null;
            App.filterModuleId = p.get('module') || null;
            App.filterLessonId = p.get('lesson') || null;
        }

        // ============ AUTH ============
        function initAuth() {
            onAuthStateChanged(auth, (u) => {
                App.user = u;
                App.isLoggedIn = !!u || !!localStorage.getItem('ak_user');
                loadData();
            });
            // Check cached
            if (!App.user && localStorage.getItem('ak_user')) {
                App.isLoggedIn = true;
                loadData();
            }
        }

        // ============ LOAD DATA ============
        async function loadData() {
            try {
                const [cS, mS, lS] = await Promise.all([
                    getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc'))),
                    getDocs(query(collection(db, 'modules'), orderBy('order'))),
                    getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')))
                ]);
                App.courses = cS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.modules = mS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.lessons = lS.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                App.courses = JSON.parse(localStorage.getItem('ak_courses') || '[]');
                App.modules = JSON.parse(localStorage.getItem('ak_modules') || '[]');
                App.lessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]');
            }
            extractQuestions();
            startExercise();
        }

        function extractQuestions() {
            App.questions = [];
            App.lessons.forEach(lesson => {
                const mod = App.modules.find(m => m.id === lesson.moduleId);
                const course = App.courses.find(c => c.id === mod?.courseId);
                (lesson.pages || []).forEach(page => {
                    (page.blocks || []).forEach(block => {
                        if ((block.type === 'question' || block.type === 'remember-question') && block.question) {
                            App.questions.push({
                                ...block, lessonId: lesson.id, lessonTitle: lesson.title,
                                moduleId: mod?.id, moduleName: mod?.name,
                                courseId: course?.id, courseName: course?.name
                            });
                        }
                    });
                });
            });

            // Apply filters
            if (App.filterCourseId) {
                App.questions = App.questions.filter(q => q.courseId === App.filterCourseId);
            }
            if (App.filterModuleId) {
                App.questions = App.questions.filter(q => q.moduleId === App.filterModuleId);
            }
            if (App.filterLessonId) {
                App.questions = App.questions.filter(q => q.lessonId === App.filterLessonId);
            }

            // Shuffle
            App.questions = App.questions.sort(() => Math.random() - 0.5);
        }

        // ============ START ============
        function startExercise() {
            if (!App.questions.length) {
                renderEmpty();
                return;
            }
            App.currentIndex = 0;
            App.score = 0;
            App.answers = new Array(App.questions.length).fill(undefined);
            App.timerSeconds = 0;
            updateScoreDisplay();
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(App.timer);
            App.timerSeconds = 0;
            $('timerDisplay').innerHTML = '<i class="bx bx-time"></i> 00:00';
            App.timer = setInterval(() => {
                App.timerSeconds++;
                const m = Math.floor(App.timerSeconds / 60).toString().padStart(2, '0');
                const s = (App.timerSeconds % 60).toString().padStart(2, '0');
                $('timerDisplay').innerHTML = `<i class='bx bx-time'></i> ${m}:${s}`;
            }, 1000);
        }

        function updateScoreDisplay() {
            $('scoreDisplay').innerHTML = `<i class='bx bxs-star'></i> ${App.score}`;
        }

        // ============ RENDER ============
        function renderEmpty() {
            const c = $('exerciseContainer');
            c.innerHTML = `
                <div class="empty-exercise">
                    <i class='bx bx-dumbbell'></i>
                    <h2>No Exercises Available</h2>
                    <p>Complete lessons to generate practice questions, or browse courses to find exercises.</p>
                    <a href="course.html" class="btn btn-primary"><i class='bx bx-book-open'></i> Browse Courses</a>
                    <a href="index.html" class="btn btn-outline" style="margin-left:0.5rem;"><i class='bx bx-home'></i> Home</a>
                </div>`;
        }

        function renderQuestion() {
            if (App.currentIndex >= App.questions.length) {
                showResults();
                return;
            }

            // Check login gate
            if (!App.isLoggedIn && App.currentIndex >= App.freeLimit) {
                renderLoginGate();
                return;
            }

            const q = App.questions[App.currentIndex];
            const userAns = App.answers[App.currentIndex];
            const isAnswered = userAns !== undefined;
            const correct = q.correctAnswer;
            const cardClass = isAnswered ? (userAns === correct ? 'correct-flash' : 'wrong-flash') : '';

            let optHTML = '';
            if (q.questionType === 'boolean') {
                optHTML = `<div class="bool-group">
                    <button class="bool-btn ${userAns===0?'correct-show':''} ${userAns!==undefined&&userAns!==0&&correct===0?'correct-show':''}" onclick="answerQuestion(0)" ${isAnswered?'disabled':''}><i class='bx bx-check'></i> True</button>
                    <button class="bool-btn ${userAns===1?'correct-show':''} ${userAns!==undefined&&userAns!==1&&correct===1?'correct-show':''}" onclick="answerQuestion(1)" ${isAnswered?'disabled':''}><i class='bx bx-x'></i> False</button>
                </div>`;
            } else if (q.questionType === 'complete') {
                optHTML = `<div class="complete-wrap">
                    <input type="text" class="complete-input" id="completeInput" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')submitCompleteAnswer()" ${isAnswered?'disabled':''}>
                    ${!isAnswered ? '<button class="btn btn-primary" onclick="submitCompleteAnswer()">Submit</button>' : ''}
                </div>`;
            } else {
                optHTML = `<div class="options-list">${(q.options||[]).map((o,i)=>`
                    <button class="opt-btn ${userAns===i?(userAns===correct?'correct-show':'wrong-show'):''} ${isAnswered&&correct===i&&userAns!==i?'correct-show':''}" onclick="answerQuestion(${i})" ${isAnswered?'disabled':''}>
                        <span class="opt-letter">${String.fromCharCode(65+i)}</span> ${o||`Option ${String.fromCharCode(65+i)}`}
                    </button>`).join('')}</div>`;
            }

            const progress = Math.round(((App.currentIndex + 1) / App.questions.length) * 100);
            const c = $('exerciseContainer');
            c.innerHTML = `
                <div class="progress-section">
                    <div class="progress-header"><span>Question ${App.currentIndex+1} of ${Math.min(App.questions.length, App.isLoggedIn?App.questions.length:App.freeLimit)}</span><span>${progress}%</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
                </div>
                <div class="question-card ${cardClass}">
                    <div class="q-meta">
                        <span class="q-number">Question ${App.currentIndex+1}</span>
                        ${q.courseName?`<span class="q-course">${q.courseName}</span>`:''}
                        <span class="q-points"><i class='bx bxs-star'></i> ${q.points||10} pts</span>
                    </div>
                    <div class="q-text">${q.question||'Question'}</div>
                    ${optHTML}
                    ${isAnswered ? `
                        <div class="feedback-toast show ${userAns===correct?'correct':'wrong'}">
                            <i class='bx ${userAns===correct?'bx-check-circle':'bx-x-circle'}'></i>
                            <span>${userAns===correct?'Correct! +'+(q.points||10)+' Sparks':'Incorrect'}</span>
                        </div>
                        <div class="nav-row">
                            <button class="btn btn-primary" onclick="nextQuestion()">${App.currentIndex<App.questions.length-1?'Next <i class=\\'bx bx-chevron-right\\'></i>':'See Results <i class=\\'bx bx-trophy\\'></i>'}</button>
                        </div>
                    ` : ''}
                </div>
                <div class="progress-dots">
                    ${App.questions.slice(0, App.isLoggedIn?App.questions.length:App.freeLimit).map((_,i)=>`<div class="progress-dot ${App.answers[i]!==undefined?(App.answers[i]===App.questions[i]?.correctAnswer?'correct':'wrong'):i===App.currentIndex?'current':''}"></div>`).join('')}
                </div>`;
        }

        function renderLoginGate() {
            const c = $('exerciseContainer');
            c.innerHTML = `
                <div class="progress-section"><div class="progress-header"><span>Free Preview: 4/${App.freeLimit}</span><span>100%</span></div><div class="progress-bar"><div class="progress-fill" style="width:100%;"></div></div></div>
                <div class="login-gate">
                    <i class='bx bx-lock-alt'></i>
                    <h3>Unlock Full Access</h3>
                    <p>You've completed 4 free questions. Sign in to access all exercises and earn Sparks!</p>
                    <a href="auth.html?mode=signin" class="btn btn-primary"><i class='bx bx-log-in'></i> Sign In</a>
                    <a href="auth.html?mode=register" class="btn btn-outline" style="margin-left:0.5rem;"><i class='bx bx-user-plus'></i> Create Account</a>
                </div>`;
        }

        // ============ ANSWER ============
        window.answerQuestion = function(index) {
            if (App.answers[App.currentIndex] !== undefined) return;
            const q = App.questions[App.currentIndex];
            const correct = index === q.correctAnswer;
            App.answers[App.currentIndex] = index;
            if (correct) {
                App.score += (q.points || 10);
                updateScoreDisplay();
                awardSparks(q.points || 10);
            }
            renderQuestion();
        };

        window.submitCompleteAnswer = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            const input = $('completeInput');
            if (!input) return;
            const val = input.value.trim();
            if (!val) { toast('Please type an answer', 'error'); return; }
            const q = App.questions[App.currentIndex];
            const correctAns = (q.options?.[q.correctAnswer] || '').toLowerCase();
            const isCorrect = val.toLowerCase() === correctAns;
            App.answers[App.currentIndex] = isCorrect ? q.correctAnswer : -1;
            if (isCorrect) {
                App.score += (q.points || 10);
                updateScoreDisplay();
                awardSparks(q.points || 10);
            }
            renderQuestion();
        };

        window.nextQuestion = function() {
            if (App.currentIndex < App.questions.length - 1) {
                App.currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        };

        function awardSparks(pts) {
            const current = parseInt(localStorage.getItem('ak_sparks') || 0);
            localStorage.setItem('ak_sparks', current + pts);
        }

        // ============ RESULTS ============
        function showResults() {
            clearInterval(App.timer);
            const total = App.questions.length;
            const correct = App.answers.filter((a, i) => a === App.questions[i]?.correctAnswer).length;
            const pct = Math.round((correct / total) * 100);
            const grade = pct >= 90 ? 'Excellent!' : pct >= 70 ? 'Great Job!' : pct >= 50 ? 'Good Effort!' : 'Keep Practicing!';
            const gColor = pct >= 90 ? 'var(--success)' : pct >= 70 ? 'var(--primary)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
            const mins = Math.floor(App.timerSeconds / 60);
            const secs = App.timerSeconds % 60;

            // Save history
            const hist = JSON.parse(localStorage.getItem('ak_exercise_history') || '[]');
            hist.push({ date: new Date().toISOString(), score: App.score, correct, total, pct, time: App.timerSeconds });
            localStorage.setItem('ak_exercise_history', JSON.stringify(hist.slice(-20)));

            const c = $('exerciseContainer');
            c.innerHTML = `
                <div class="results-wrap">
                    <i class='bx bx-trophy results-icon' style="color:${gColor};"></i>
                    <div class="results-pct" style="color:${gColor};">${pct}%</div>
                    <div class="results-grade" style="color:${gColor};">${grade}</div>
                    <div class="results-stats">
                        <div class="r-stat"><div class="r-stat-val">${correct}/${total}</div><div class="r-stat-lbl">Correct</div></div>
                        <div class="r-stat"><div class="r-stat-val"><i class='bx bxs-star' style='color:var(--warning);'></i> ${App.score}</div><div class="r-stat-lbl">Sparks Earned</div></div>
                        <div class="r-stat"><div class="r-stat-val">${mins}m ${secs}s</div><div class="r-stat-lbl">Time</div></div>
                    </div>
                    <div class="nav-row">
                        <button class="btn btn-primary" onclick="retryExercise()"><i class='bx bx-refresh'></i> Retry</button>
                        <a href="course.html" class="btn btn-outline"><i class='bx bx-book-open'></i> Courses</a>
                        <a href="user.html" class="btn btn-success"><i class='bx bx-user'></i> Dashboard</a>
                    </div>
                </div>`;
        }

        window.retryExercise = function() {
            App.questions = App.questions.sort(() => Math.random() - 0.5);
            startExercise();
        };

        // ============ KEYBOARD ============
        document.addEventListener('keydown', function(e) {
            if (App.currentIndex >= App.questions.length) return;
            if (App.answers[App.currentIndex] !== undefined) {
                if (e.key === 'Enter' || e.key === 'ArrowRight') nextQuestion();
                return;
            }
            const q = App.questions[App.currentIndex];
            if (q.questionType === 'multiple-choice') {
                const map = { 'a': 0, 'b': 1, 'c': 2, 'd': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
                if (map[e.key.toLowerCase()] !== undefined && map[e.key.toLowerCase()] < (q.options||[]).length) {
                    answerQuestion(map[e.key.toLowerCase()]);
                }
            }
            if (q.questionType === 'boolean') {
                if (e.key.toLowerCase() === 't' || e.key === '1') answerQuestion(0);
                if (e.key.toLowerCase() === 'f' || e.key === '2') answerQuestion(1);
            }
        });

        // ============ INIT ============
        parseURL();
        initAuth();
        console.log('🚀 Akademia Exercise System ready!');
    </script>
</body>
</html>
