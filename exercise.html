<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Exercises</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED; --accent-bg: #F5F3FF;
            --success: #04AA6D; --success-bg: #ECFDF5; --success-dark: #038857;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2; --danger-dark: #DC2626;
            --pink: #EC4899; --pink-bg: #FDF2F8;
            --orange: #F97316; --orange-bg: #FFF7ED;
            --teal: #14B8A6; --teal-bg: #F0FDFA;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --dark-bg: #0d1117; --dark-surface: #161b22; --dark-border: #30363d;
            --sidebar-width: 280px; --header-height: 56px;
            --radius-sm: 6px; --radius: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: var(--gray-50);
            color: var(--gray-800); display: flex; -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); background: var(--dark-bg); color: #c9d1d9;
            display: flex; flex-direction: column; position: fixed;
            top: 0; left: 0; bottom: 0; z-index: 100;
            border-right: 1px solid var(--dark-border); overflow-y: auto;
        }
        .sidebar-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--dark-border);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sidebar-header img { height: 32px; width: auto; }
        .sidebar-header span { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; color: white; }
        .sidebar-nav { flex: 1; padding: 0.5rem; }
        .sidebar-section { margin-bottom: 0.25rem; }
        .sidebar-label { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #8b949e; padding: 0.625rem 0.75rem 0.25rem; }
        .sidebar-item {
            display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition);
            color: #c9d1d9; font-size: 0.875rem; font-weight: 400;
            border: none; background: none; width: 100%; text-align: left; text-decoration: none;
        }
        .sidebar-item:hover { background: #21262d; color: white; }
        .sidebar-item.active { background: #1f6feb22; color: #58a6ff; }
        .sidebar-item i { font-size: 1.125rem; width: 20px; text-align: center; flex-shrink: 0; }
        .sidebar-badge {
            margin-left: auto; font-size: 0.625rem; padding: 0.125rem 0.5rem;
            border-radius: 100px; background: #21262d; color: #8b949e;
        }
        .sidebar-footer { padding: 0.75rem; border-top: 1px solid var(--dark-border); }
        .sidebar-sparks {
            padding: 0.75rem 1.5rem; border-top: 1px solid var(--dark-border);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sparks-icon { font-size: 1.25rem; color: var(--warning); }
        .sparks-value { font-weight: 700; font-size: 0.938rem; color: white; }
        .sparks-label { font-size: 0.688rem; color: #8b949e; }

        /* MAIN */
        .main-content { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .topbar {
            background: var(--white); border-bottom: 1px solid var(--gray-200);
            padding: 0 1.5rem; height: var(--header-height); display: flex;
            align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 1rem; }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; }
        .topbar-info { display: flex; align-items: center; gap: 1rem; font-size: 0.813rem; color: var(--gray-500); }
        .topbar-info span { display: flex; align-items: center; gap: 0.25rem; }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }

        .btn {
            font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 0.875rem;
            font-weight: 600; transition: all var(--transition); cursor: pointer;
            border: none; text-decoration: none; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: white; } .btn-success:hover { background: var(--success-dark); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.813rem; }
        .btn-xs { padding: 0.25rem 0.625rem; font-size: 0.75rem; border-radius: 100px; }

        /* CONTENT */
        .content-area { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
        .page { display: none; animation: fadeSlide 0.25s ease; }
        .page.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* EXERCISE HEADER */
        .exercise-header {
            background: white; border: 1px solid var(--gray-100); border-radius: var(--radius-xl);
            padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        .exercise-progress { display: flex; align-items: center; gap: 1rem; }
        .progress-dots { display: flex; gap: 0.25rem; }
        .progress-dot {
            width: 10px; height: 10px; border-radius: 50%; background: var(--gray-300);
            transition: all var(--transition);
        }
        .progress-dot.done { background: var(--success); }
        .progress-dot.current { background: var(--primary); width: 12px; height: 12px; }
        .progress-dot.wrong { background: var(--danger); }
        .score-display { font-weight: 700; font-size: 1.125rem; color: var(--success); }
        .timer-display { font-weight: 600; font-size: 0.938rem; color: var(--gray-600); display: flex; align-items: center; gap: 0.375rem; }

        /* QUESTION CARD */
        .question-card {
            background: white; border: 2px solid var(--gray-200); border-radius: var(--radius-xl);
            padding: 2rem; margin-bottom: 1.5rem; transition: all var(--transition);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .question-card.correct { border-color: var(--success); background: var(--success-bg); }
        .question-card.incorrect { border-color: var(--danger); background: var(--danger-bg); }
        .question-number {
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--primary); margin-bottom: 0.5rem;
        }
        .question-text {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem;
            font-weight: 600; color: var(--gray-900); margin-bottom: 1.5rem; line-height: 1.4;
        }
        .question-points { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: var(--warning-dark); font-weight: 600; margin-bottom: 1rem; }

        .options-list { display: flex; flex-direction: column; gap: 0.625rem; }
        .option-btn {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.875rem 1.125rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); cursor: pointer; transition: all var(--transition);
            background: white; font-family: 'Inter', sans-serif; font-size: 0.938rem;
            text-align: left; width: 100%; color: var(--gray-700);
        }
        .option-btn:hover { border-color: var(--primary); background: var(--primary-bg); }
        .option-btn.selected { border-color: var(--primary); background: var(--primary-bg); }
        .option-btn.correct-answer { border-color: var(--success); background: var(--success-bg); color: var(--success-dark); }
        .option-btn.wrong-answer { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-dark); }
        .option-letter {
            width: 32px; height: 32px; border-radius: 50%; background: var(--gray-100);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.813rem; flex-shrink: 0;
        }
        .option-btn.selected .option-letter { background: var(--primary); color: white; }
        .option-btn.correct-answer .option-letter { background: var(--success); color: white; }
        .option-btn.wrong-answer .option-letter { background: var(--danger); color: white; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.85; }

        .feedback-box {
            margin-top: 1.25rem; padding: 1rem 1.25rem; border-radius: var(--radius);
            font-weight: 600; font-size: 0.875rem; display: none; align-items: center; gap: 0.5rem;
        }
        .feedback-box.show { display: flex; animation: fadeSlide 0.3s ease; }
        .feedback-box.correct { background: var(--success-bg); color: var(--success-dark); }
        .feedback-box.incorrect { background: var(--danger-bg); color: var(--danger-dark); }
        .feedback-box .explanation { font-weight: 400; font-size: 0.813rem; margin-top: 0.25rem; }

        /* COMPLETE THE FOLLOWING */
        .complete-input {
            width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); font-family: 'JetBrains Mono', monospace;
            font-size: 0.938rem; outline: none; transition: all var(--transition);
        }
        .complete-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.06); }
        .complete-input.correct { border-color: var(--success); background: var(--success-bg); }
        .complete-input.incorrect { border-color: var(--danger); background: var(--danger-bg); }

        /* TRUE/FALSE */
        .boolean-options { display: flex; gap: 0.75rem; }
        .boolean-btn {
            flex: 1; padding: 1.25rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg); text-align: center; cursor: pointer;
            font-weight: 700; font-size: 1.125rem; transition: all var(--transition);
            background: white;
        }
        .boolean-btn:hover { border-color: var(--primary); }
        .boolean-btn.selected { border-color: var(--primary); background: var(--primary-bg); }

        /* MATCHING */
        .matching-pairs { display: flex; flex-direction: column; gap: 0.5rem; }
        .matching-row { display: flex; align-items: center; gap: 1rem; }
        .matching-left {
            flex: 1; padding: 0.75rem 1rem; background: var(--gray-50);
            border-radius: var(--radius); font-weight: 500;
        }
        .matching-select {
            flex: 1; padding: 0.625rem 0.75rem; border: 2px solid var(--gray-200);
            border-radius: var(--radius); font-family: 'Inter', sans-serif;
            font-size: 0.875rem; outline: none;
        }

        /* NAVIGATION */
        .nav-buttons { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem; }
        .nav-buttons .btn { min-width: 120px; justify-content: center; }

        /* RESULTS */
        .results-card {
            background: white; border: 1px solid var(--gray-100); border-radius: var(--radius-2xl);
            padding: 2.5rem; text-align: center; margin-bottom: 1.5rem;
        }
        .results-score {
            font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem;
            font-weight: 700; color: var(--success);
        }
        .results-grade { font-size: 1.25rem; font-weight: 600; margin: 0.5rem 0; }
        .results-stats { display: flex; justify-content: center; gap: 3rem; margin: 1.5rem 0; }
        .result-stat { text-align: center; }
        .result-stat .rs-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .result-stat .rs-lbl { font-size: 0.75rem; color: var(--gray-500); }
        .results-breakdown { text-align: left; margin-top: 1.5rem; }
        .result-item {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .result-item i { font-size: 1.25rem; }
        .result-item .ri-text { flex: 1; font-size: 0.813rem; }
        .result-item .ri-status { font-weight: 600; font-size: 0.75rem; }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 5rem; color: var(--gray-300); display: block; margin-bottom: 1rem; }
        .empty-state h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: var(--gray-500); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-400); margin-bottom: 1.5rem; }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.875rem 1.125rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 380px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toast.success { background: #059669; } .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); } .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; } .content-area { padding: 1rem; }
            .results-stats { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia" style="filter:brightness(0)invert(1);">
            <span>Akademia</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <div class="sidebar-label">Filter by Course</div>
                <button class="sidebar-item active" data-filter="all"><i class='bx bx-grid-alt'></i> All Exercises</button>
                <div id="sidebarCourses"></div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Navigation</div>
                <a href="index.html" class="sidebar-item"><i class='bx bx-home'></i> Home</a>
                <a href="course.html" class="sidebar-item"><i class='bx bx-book-open'></i> Courses</a>
                <a href="user.html" class="sidebar-item"><i class='bx bx-user'></i> Dashboard</a>
            </div>
        </nav>
        <div class="sidebar-sparks">
            <i class='bx bxs-star sparks-icon'></i>
            <div><div class="sparks-value" id="sidebarSparks">0</div><div class="sparks-label">Sparks</div></div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="topbar-title">Exercises</h1>
                <div class="topbar-info" id="topbarInfo">
                    <span><i class='bx bx-help-circle'></i> <span id="questionCount">0</span> questions</span>
                    <span><i class='bx bx-time'></i> <span id="timerDisplay">00:00</span></span>
                </div>
            </div>
            <div class="topbar-actions">
                <span style="font-weight:700;color:var(--success);" id="topbarScore">Score: 0</span>
                <a href="user.html" class="btn btn-outline btn-sm"><i class='bx bx-user'></i> Dashboard</a>
            </div>
        </header>

        <div class="content-area">
            <!-- EXERCISE PAGE -->
            <div class="page active" id="pageExercise">
                <div id="exerciseContent">
                    <div class="empty-state">
                        <i class='bx bx-dumbbell'></i>
                        <h2>Ready to Practice?</h2>
                        <p>Select a course from the sidebar or click below to start exercises</p>
                        <button class="btn btn-primary btn-lg" onclick="startAllExercises()"><i class='bx bx-play-circle'></i> Start All Exercises</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const $ = id => document.getElementById(id);
        const toast = (msg, type = 'success') => {
            const c = $('toastContainer'); const t = document.createElement('div');
            t.className = `toast ${type}`; t.innerHTML = `<i class='bx ${type==='success'?'bx-check-circle':'bx-x-circle'}'></i> ${msg}`;
            t.addEventListener('click', () => t.remove()); c.appendChild(t);
            setTimeout(() => { if (t.parentElement) t.remove(); }, 3500);
        };

        const App = {
            courses: [], modules: [], lessons: [], allQuestions: [],
            filteredQuestions: [], currentIndex: 0, score: 0, answers: [],
            timer: null, timerSeconds: 0, activeFilter: 'all'
        };

        // ============ INIT ============
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const courseId = params.get('course');
            const moduleId = params.get('module');
            const lessonId = params.get('lesson');

            await loadData();
            
            if (courseId) {
                App.activeFilter = courseId;
                if (moduleId) App.activeFilter = moduleId;
                if (lessonId) App.activeFilter = lessonId;
                startExercises();
            } else {
                renderSidebar();
            }
        }

        // ============ LOAD DATA ============
        async function loadData() {
            try {
                const [cS, mS, lS] = await Promise.all([
                    getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc'))),
                    getDocs(query(collection(db, 'modules'), orderBy('order'))),
                    getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')))
                ]);
                App.courses = cS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.modules = mS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.lessons = lS.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                App.courses = JSON.parse(localStorage.getItem('ak_courses') || '[]');
                App.modules = JSON.parse(localStorage.getItem('ak_modules') || '[]');
                App.lessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]');
            }
            extractAllQuestions();
            renderSidebar();
            updateSparksDisplay();
        }

        function extractAllQuestions() {
            App.allQuestions = [];
            App.lessons.forEach(lesson => {
                const mod = App.modules.find(m => m.id === lesson.moduleId);
                const course = App.courses.find(c => c.id === mod?.courseId);
                (lesson.pages || []).forEach(page => {
                    (page.blocks || []).forEach(block => {
                        if ((block.type === 'question' || block.type === 'remember-question') && block.question) {
                            App.allQuestions.push({
                                ...block,
                                lessonId: lesson.id,
                                lessonTitle: lesson.title,
                                moduleId: mod?.id,
                                moduleName: mod?.name,
                                courseId: course?.id,
                                courseName: course?.name
                            });
                        }
                    });
                });
            });

            // If no real questions, add demo ones
            if (!App.allQuestions.length) {
                App.allQuestions = generateDemoQuestions();
            }
        }

        function generateDemoQuestions() {
            const demos = [];
            const courses = App.courses.length ? App.courses : [{ id: 'c1', name: 'HTML' }, { id: 'c2', name: 'CSS' }, { id: 'c3', name: 'JavaScript' }, { id: 'c4', name: 'Python' }];
            courses.forEach((course, ci) => {
                for (let i = 0; i < 5; i++) {
                    const qTypes = ['multiple-choice', 'boolean', 'complete'];
                    const qType = qTypes[Math.floor(Math.random() * qTypes.length)];
                    const base = {
                        type: 'question', questionType: qType,
                        lessonId: 'demo', lessonTitle: 'Demo Lesson',
                        courseId: course.id, courseName: course.name,
                        points: 10, correctAnswer: 0
                    };
                    if (qType === 'boolean') {
                        demos.push({ ...base, question: `${course.name}: Is this statement true? (Demo Q${i+1})`, options: ['True', 'False'], correctAnswer: Math.random() > 0.5 ? 0 : 1 });
                    } else if (qType === 'complete') {
                        demos.push({ ...base, question: `${course.name}: Complete the code: _____ tag is used for headings in ${course.name}.`, options: ['<h1>'], correctAnswer: 0 });
                    } else {
                        demos.push({ ...base, question: `${course.name}: What is the correct syntax? (Demo Q${i+1})`, options: ['Option A', 'Option B', 'Option C', 'Option D'], correctAnswer: Math.floor(Math.random() * 4) });
                    }
                }
            });
            return demos;
        }

        // ============ SIDEBAR ============
        function renderSidebar() {
            const container = $('sidebarCourses');
            if (!container) return;
            container.innerHTML = App.courses.map(c => {
                const count = App.allQuestions.filter(q => q.courseId === c.id).length;
                return `<button class="sidebar-item ${App.activeFilter === c.id ? 'active' : ''}" data-filter="${c.id}" onclick="filterByCourse('${c.id}')">
                    <i class='bx bx-book-open'></i> ${c.name || 'Course'}
                    <span class="sidebar-badge">${count}</span>
                </button>`;
            }).join('');
        }

        window.filterByCourse = function(courseId) {
            App.activeFilter = courseId;
            document.querySelectorAll('.sidebar-item[data-filter]').forEach(i => i.classList.remove('active'));
            document.querySelector(`.sidebar-item[data-filter="${courseId}"]`)?.classList.add('active');
            startExercises();
        };

        window.startAllExercises = function() {
            App.activeFilter = 'all';
            startExercises();
        };

        // ============ START EXERCISES ============
        function startExercises() {
            App.filteredQuestions = App.activeFilter === 'all' 
                ? [...App.allQuestions].sort(() => Math.random() - 0.5)
                : App.allQuestions.filter(q => q.courseId === App.activeFilter || q.moduleId === App.activeFilter || q.lessonId === App.activeFilter);
            
            if (!App.filteredQuestions.length) {
                App.filteredQuestions = generateDemoQuestions().filter(q => App.activeFilter === 'all' || q.courseId === App.activeFilter);
            }

            App.currentIndex = 0;
            App.score = 0;
            App.answers = [];
            App.timerSeconds = 0;
            
            $('questionCount').textContent = App.filteredQuestions.length;
            $('topbarScore').textContent = 'Score: 0';
            updateSparksDisplay();
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(App.timer);
            App.timerSeconds = 0;
            App.timer = setInterval(() => {
                App.timerSeconds++;
                const mins = Math.floor(App.timerSeconds / 60).toString().padStart(2, '0');
                const secs = (App.timerSeconds % 60).toString().padStart(2, '0');
                $('timerDisplay').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // ============ RENDER QUESTION ============
        function renderQuestion() {
            if (App.currentIndex >= App.filteredQuestions.length) {
                showResults();
                return;
            }

            const q = App.filteredQuestions[App.currentIndex];
            const container = $('exerciseContent');
            const isAnswered = App.answers[App.currentIndex] !== undefined;
            const userAnswer = App.answers[App.currentIndex];
            const correct = q.correctAnswer;

            let optionsHTML = '';
            if (q.questionType === 'boolean') {
                optionsHTML = `
                    <div class="boolean-options">
                        <button class="boolean-btn ${userAnswer === 0 ? 'selected' : ''} ${isAnswered ? (correct === 0 ? 'correct-answer' : userAnswer === 0 ? 'wrong-answer' : '') : ''}" 
                                onclick="selectAnswer(0)" ${isAnswered ? 'disabled' : ''}>
                            <i class='bx bx-check'></i> True
                        </button>
                        <button class="boolean-btn ${userAnswer === 1 ? 'selected' : ''} ${isAnswered ? (correct === 1 ? 'correct-answer' : userAnswer === 1 ? 'wrong-answer' : '') : ''}" 
                                onclick="selectAnswer(1)" ${isAnswered ? 'disabled' : ''}>
                            <i class='bx bx-x'></i> False
                        </button>
                    </div>`;
            } else if (q.questionType === 'complete') {
                optionsHTML = `
                    <input type="text" class="complete-input ${isAnswered ? (userAnswer === correct ? 'correct' : 'incorrect') : ''}" 
                           id="completeInput" placeholder="Type your answer..." 
                           onkeydown="if(event.key==='Enter')submitComplete()" ${isAnswered ? 'disabled' : ''}>
                    ${!isAnswered ? '<button class="btn btn-primary" style="margin-top:0.75rem;" onclick="submitComplete()">Submit</button>' : ''}`;
            } else {
                optionsHTML = `<div class="options-list">${(q.options || []).map((opt, i) => `
                    <button class="option-btn ${userAnswer === i ? 'selected' : ''} ${isAnswered ? (correct === i ? 'correct-answer' : userAnswer === i ? 'wrong-answer' : '') : ''}" 
                            onclick="selectAnswer(${i})" ${isAnswered ? 'disabled' : ''}>
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        ${opt || `Option ${String.fromCharCode(65 + i)}`}
                    </button>
                `).join('')}</div>`;
            }

            const cardClass = isAnswered ? (userAnswer === correct ? 'correct' : 'incorrect') : '';
            container.innerHTML = `
                <div class="question-card ${cardClass}">
                    <div class="question-number">Question ${App.currentIndex + 1} of ${App.filteredQuestions.length} • ${q.courseName || 'General'}</div>
                    <div class="question-text">${q.question || 'Question'}</div>
                    <div class="question-points"><i class='bx bxs-star'></i> ${q.points || 10} points</div>
                    ${optionsHTML}
                    ${isAnswered ? `
                        <div class="feedback-box show ${userAnswer === correct ? 'correct' : 'incorrect'}">
                            <i class='bx ${userAnswer === correct ? 'bx-check-circle' : 'bx-x-circle'}'></i>
                            <div>
                                ${userAnswer === correct ? 'Correct! Well done!' : `Incorrect. The correct answer is: ${q.questionType === 'boolean' ? (correct === 0 ? 'True' : 'False') : String.fromCharCode(65 + correct)}`}
                            </div>
                        </div>
                        <div class="nav-buttons">
                            ${App.currentIndex < App.filteredQuestions.length - 1 ? 
                                `<button class="btn btn-primary" onclick="nextQuestion()">Next Question <i class='bx bx-chevron-right'></i></button>` :
                                `<button class="btn btn-success" onclick="showResults()">See Results <i class='bx bx-trophy'></i></button>`
                            }
                        </div>
                    ` : ''}
                </div>
                <div class="progress-dots" style="justify-content:center;margin-top:1rem;">
                    ${App.filteredQuestions.map((_, i) => `
                        <div class="progress-dot ${App.answers[i] !== undefined ? (App.answers[i] === App.filteredQuestions[i]?.correctAnswer ? 'done' : 'wrong') : i === App.currentIndex ? 'current' : ''}"></div>
                    `).join('')}
                </div>
            `;
        }

        // ============ ANSWER HANDLING ============
        window.selectAnswer = function(index) {
            if (App.answers[App.currentIndex] !== undefined) return;
            const q = App.filteredQuestions[App.currentIndex];
            const correct = q.correctAnswer;
            App.answers[App.currentIndex] = index;
            
            if (index === correct) {
                App.score += (q.points || 10);
                $('topbarScore').textContent = `Score: ${App.score}`;
                awardSparks(q.points || 10);
                updateSparksDisplay();
            }
            renderQuestion();
        };

        window.submitComplete = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            const input = $('completeInput');
            if (!input) return;
            const userAnswer = input.value.trim();
            const q = App.filteredQuestions[App.currentIndex];
            const correctAnswer = q.options?.[q.correctAnswer] || '';
            
            // Case-insensitive comparison
            const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();
            const answerIndex = isCorrect ? q.correctAnswer : -1;
            App.answers[App.currentIndex] = answerIndex;
            
            if (isCorrect) {
                App.score += (q.points || 10);
                $('topbarScore').textContent = `Score: ${App.score}`;
                awardSparks(q.points || 10);
                updateSparksDisplay();
            }
            renderQuestion();
        };

        window.nextQuestion = function() {
            if (App.currentIndex < App.filteredQuestions.length - 1) {
                App.currentIndex++;
                renderQuestion();
            }
        };

        // ============ SPARKS ============
        function awardSparks(points) {
            const current = parseInt(localStorage.getItem('ak_sparks') || 0);
            localStorage.setItem('ak_sparks', current + points);
        }

        function updateSparksDisplay() {
            const sparks = parseInt(localStorage.getItem('ak_sparks') || 0);
            $('sidebarSparks').textContent = sparks.toLocaleString();
        }

        // ============ RESULTS ============
        function showResults() {
            clearInterval(App.timer);
            const total = App.filteredQuestions.length;
            const correct = App.answers.filter((a, i) => a === App.filteredQuestions[i]?.correctAnswer).length;
            const percentage = Math.round((correct / total) * 100);
            const grade = percentage >= 90 ? 'Excellent!' : percentage >= 70 ? 'Good Job!' : percentage >= 50 ? 'Keep Practicing!' : 'Keep Learning!';
            const gradeColor = percentage >= 90 ? 'var(--success)' : percentage >= 70 ? 'var(--primary)' : percentage >= 50 ? 'var(--warning)' : 'var(--danger)';
            const mins = Math.floor(App.timerSeconds / 60);
            const secs = App.timerSeconds % 60;

            // Save to localStorage
            const exerciseHistory = JSON.parse(localStorage.getItem('ak_exercise_history') || '[]');
            exerciseHistory.push({
                date: new Date().toISOString(),
                courseId: App.activeFilter,
                score: App.score,
                correct,
                total,
                percentage,
                time: App.timerSeconds
            });
            localStorage.setItem('ak_exercise_history', JSON.stringify(exerciseHistory));

            const container = $('exerciseContent');
            container.innerHTML = `
                <div class="results-card">
                    <i class='bx bx-trophy' style="font-size:4rem;color:var(--warning);display:block;margin-bottom:0.5rem;"></i>
                    <div class="results-score">${percentage}%</div>
                    <div class="results-grade" style="color:${gradeColor};">${grade}</div>
                    <div class="results-stats">
                        <div class="result-stat"><div class="rs-val">${correct}/${total}</div><div class="rs-lbl">Correct Answers</div></div>
                        <div class="result-stat"><div class="rs-val"><i class='bx bxs-star' style="color:var(--warning);"></i> ${App.score}</div><div class="rs-lbl">Points Earned</div></div>
                        <div class="result-stat"><div class="rs-val">${mins}m ${secs}s</div><div class="rs-lbl">Time Taken</div></div>
                    </div>
                    <div class="nav-buttons">
                        <button class="btn btn-primary" onclick="retryExercises()"><i class='bx bx-refresh'></i> Retry</button>
                        <button class="btn btn-outline" onclick="reviewAnswers()"><i class='bx bx-list-ul'></i> Review Answers</button>
                        <a href="user.html" class="btn btn-success"><i class='bx bx-user'></i> Dashboard</a>
                    </div>
                    <div class="results-breakdown" id="resultsBreakdown" style="display:none;">
                        <h4 style="margin-bottom:1rem;">Answer Breakdown</h4>
                        ${App.filteredQuestions.map((q, i) => {
                            const userAnswer = App.answers[i];
                            const isCorrect = userAnswer === q.correctAnswer;
                            return `<div class="result-item">
                                <i class='bx ${isCorrect ? 'bx-check-circle' : 'bx-x-circle'}' style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'};"></i>
                                <div class="ri-text">Q${i+1}: ${q.question?.substring(0, 80)}...</div>
                                <div class="ri-status" style="color:${isCorrect ? 'var(--success)' : 'var(--danger)'};">${isCorrect ? 'Correct' : 'Wrong'}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        window.retryExercises = function() {
            startExercises();
        };

        window.reviewAnswers = function() {
            const breakdown = $('resultsBreakdown');
            if (breakdown) breakdown.style.display = breakdown.style.display === 'none' ? 'block' : 'none';
        };

        // ============ KEYBOARD ============
        document.addEventListener('keydown', function(e) {
            if (App.currentIndex >= App.filteredQuestions.length) return;
            const q = App.filteredQuestions[App.currentIndex];
            if (App.answers[App.currentIndex] !== undefined) {
                if (e.key === 'Enter' || e.key === 'ArrowRight') nextQuestion();
                return;
            }
            if (q.questionType === 'multiple-choice') {
                const keys = ['1', '2', '3', '4', 'a', 'b', 'c', 'd'];
                const idx = keys.indexOf(e.key.toLowerCase());
                if (idx >= 0 && idx < (q.options || []).length) selectAnswer(idx);
            }
        });

        window.startAllExercises = startAllExercises;
        window.filterByCourse = filterByCourse;

        // ============ INIT ============
        init();
        console.log('🚀 Akademia Exercise System loaded!');
    </script>
</body>
</html>
