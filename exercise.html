<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Exercises & Exams</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED; --accent-bg: #F5F3FF;
            --success: #04AA6D; --success-bg: #ECFDF5; --success-dark: #038857;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2; --danger-dark: #DC2626;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --radius-sm: 8px; --radius: 12px; --radius-lg: 16px; --radius-xl: 20px; --radius-2xl: 24px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08); --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f0f2f5 0%, #e8ecf1 100%);
            color: var(--gray-800); display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        .topbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gray-200); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
        .topbar-left { display: flex; align-items: center; gap: 1rem; }
        .topbar-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .topbar-logo img { height: 28px; width: auto; }
        .topbar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; color: var(--gray-900); }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--gray-500); }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }
        .topbar-score { font-weight: 700; font-size: 0.938rem; color: var(--success); display: flex; align-items: center; gap: 0.375rem; }
        .topbar-timer { font-weight: 600; font-size: 0.813rem; color: var(--gray-600); display: flex; align-items: center; gap: 0.25rem; }
        .topbar-mode { font-size: 0.75rem; padding: 0.25rem 0.625rem; border-radius: 100px; font-weight: 600; }
        .topbar-mode.exercise { background: var(--accent-bg); color: var(--accent); }
        .topbar-mode.exam { background: var(--danger-bg); color: var(--danger-dark); }

        .btn { font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: var(--radius-sm); font-size: 0.875rem; font-weight: 600; transition: all var(--transition); cursor: pointer; border: none; text-decoration: none; white-space: nowrap; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: white; } .btn-success:hover { background: var(--success-dark); }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.813rem; }

        .main-content { flex: 1; overflow-y: auto; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
        .exercise-container { width: 100%; max-width: 750px; animation: fadeSlideIn 0.4s ease; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .mode-select { text-align: center; }
        .mode-select h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .mode-select p { color: var(--gray-500); margin-bottom: 2rem; }
        .mode-select .info-banner { background: var(--primary-bg); border: 1px solid #BFDBFE; border-radius: var(--radius-lg); padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.813rem; color: var(--primary); display: inline-flex; align-items: center; gap: 0.5rem; }
        .mode-cards { display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap; }
        .mode-card { background: white; border: 2px solid var(--gray-200); border-radius: var(--radius-2xl); padding: 2rem; text-align: center; cursor: pointer; transition: all var(--transition); width: 240px; }
        .mode-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .mode-card i { font-size: 3rem; display: block; margin-bottom: 0.75rem; }
        .mode-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; margin-bottom: 0.375rem; }
        .mode-card p { font-size: 0.75rem; color: var(--gray-500); }
        .mode-card .limit-badge { display: inline-block; margin-top: 0.5rem; padding: 0.1875rem 0.625rem; border-radius: 100px; font-size: 0.688rem; font-weight: 600; }
        .mode-card .limit-badge.logged { background: var(--success-bg); color: var(--success-dark); }
        .mode-card .limit-badge.guest { background: var(--warning-bg); color: var(--warning-dark); }

        .progress-section { margin-bottom: 1.25rem; }
        .progress-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.375rem; }
        .progress-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.4s ease; }
        .progress-dots { display: flex; gap: 0.375rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-300); transition: all var(--transition); }
        .progress-dot.correct { background: var(--success); }
        .progress-dot.wrong { background: var(--danger); }
        .progress-dot.current { background: var(--primary); width: 10px; height: 10px; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

        .question-card { background: white; border: 2px solid var(--gray-200); border-radius: var(--radius-2xl); padding: 2.5rem; transition: all var(--transition); position: relative; box-shadow: var(--shadow); animation: cardIn 0.35s ease; }
        @keyframes cardIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .question-card.correct-flash { border-color: var(--success); box-shadow: 0 0 30px rgba(4,170,109,0.15); }
        .question-card.wrong-flash { border-color: var(--danger); box-shadow: 0 0 30px rgba(239,68,68,0.1); }
        .q-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .q-number { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); }
        .q-course { font-size: 0.688rem; color: var(--gray-500); background: var(--gray-100); padding: 0.1875rem 0.625rem; border-radius: 100px; }
        .q-points { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.75rem; color: var(--warning-dark); font-weight: 600; margin-left: auto; }
        .q-text { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; font-weight: 600; color: var(--gray-900); margin-bottom: 1.5rem; line-height: 1.4; }

        .options-list { display: flex; flex-direction: column; gap: 0.625rem; }
        .opt-btn { display: flex; align-items: center; gap: 0.875rem; padding: 1rem 1.25rem; border: 2px solid var(--gray-200); border-radius: var(--radius-lg); cursor: pointer; transition: all var(--transition); background: white; font-family: 'Inter', sans-serif; font-size: 0.938rem; text-align: left; width: 100%; color: var(--gray-700); }
        .opt-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-bg); transform: translateX(3px); }
        .opt-btn:disabled { cursor: not-allowed; }
        .opt-btn.correct-show { border-color: var(--success); background: var(--success-bg); color: var(--success-dark); }
        .opt-btn.wrong-show { border-color: var(--danger); background: var(--danger-bg); color: var(--danger-dark); }
        .opt-letter { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.813rem; flex-shrink: 0; transition: all var(--transition); }
        .opt-btn.correct-show .opt-letter { background: var(--success); color: white; }
        .opt-btn.wrong-show .opt-letter { background: var(--danger); color: white; }

        .feedback-toast { margin-top: 1.25rem; padding: 1rem 1.25rem; border-radius: var(--radius); font-weight: 600; font-size: 0.875rem; display: none; align-items: center; gap: 0.5rem; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback-toast.show { display: flex; }
        .feedback-toast.correct { background: var(--success-bg); color: var(--success-dark); }
        .feedback-toast.wrong { background: var(--danger-bg); color: var(--danger-dark); }

        .complete-wrap { display: flex; gap: 0.5rem; }
        .complete-input { flex: 1; padding: 0.875rem 1.125rem; border: 2px solid var(--gray-200); border-radius: var(--radius-lg); font-family: 'JetBrains Mono', monospace; font-size: 0.938rem; outline: none; transition: all var(--transition); background: white; }
        .complete-input:focus { border-color: var(--primary); }
        .complete-input:disabled { opacity: 0.8; }

        .bool-group { display: flex; gap: 0.75rem; }
        .bool-btn { flex: 1; padding: 1.25rem; border: 2px solid var(--gray-200); border-radius: var(--radius-lg); text-align: center; cursor: pointer; font-weight: 700; font-size: 1.125rem; transition: all var(--transition); background: white; }
        .bool-btn:hover:not(:disabled) { border-color: var(--primary); }

        .matching-container { position: relative; }
        .matching-columns { display: flex; gap: 2rem; position: relative; }
        .matching-col { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        .matching-item { padding: 0.875rem 1.125rem; border: 2px solid var(--gray-200); border-radius: var(--radius-lg); cursor: pointer; transition: all var(--transition); background: white; font-weight: 500; text-align: center; user-select: none; position: relative; z-index: 2; }
        .matching-item:hover { border-color: var(--primary); }
        .matching-item.selected { border-color: var(--warning); background: var(--warning-bg); box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
        .matching-item.matched { border-color: var(--success); background: var(--success-bg); }
        .matching-item.wrong-match { border-color: var(--danger); background: var(--danger-bg); }
        .matching-svg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
        .matching-svg-layer svg { width: 100%; height: 100%; }
        .matching-line { stroke: var(--warning); stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 2px 3px rgba(245,158,11,0.3)); }
        .matching-line.correct-line { stroke: var(--success); }
        .matching-line.wrong-line { stroke: var(--danger); stroke-dasharray: 8 4; }
        .match-submit-btn { margin-top: 1rem; text-align: center; }

        .nav-row { display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.25rem; }
        .nav-row .btn { min-width: 130px; justify-content: center; }

        .results-wrap { text-align: center; animation: fadeSlideIn 0.5s ease; background: white; border-radius: var(--radius-2xl); padding: 2.5rem; box-shadow: var(--shadow); }
        .results-icon { font-size: 5rem; display: block; margin-bottom: 0.5rem; }
        .results-pct { font-family: 'Space Grotesk', sans-serif; font-size: 3.5rem; font-weight: 700; }
        .results-grade { font-size: 1.25rem; font-weight: 600; margin: 0.5rem 0; }
        .results-stats { display: flex; justify-content: center; gap: 3rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .r-stat { text-align: center; }
        .r-stat-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .r-stat-lbl { font-size: 0.75rem; color: var(--gray-500); }

        .login-gate { background: var(--warning-bg); border: 2px dashed var(--warning); border-radius: var(--radius-2xl); padding: 2rem; text-align: center; margin-top: 1rem; animation: fadeSlideIn 0.4s ease; }
        .login-gate i { font-size: 3rem; color: var(--warning); display: block; margin-bottom: 0.75rem; }
        .login-gate h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .login-gate p { font-size: 0.875rem; color: var(--gray-500); margin-bottom: 1rem; }

        .empty-state { text-align: center; padding: 4rem 2rem; }
        .empty-state i { font-size: 5rem; color: var(--gray-300); display: block; margin-bottom: 1rem; }
        .empty-state h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; color: var(--gray-500); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--gray-400); margin-bottom: 1.5rem; }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.813rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 360px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toast.success { background: #059669; } .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 600px) { .main-content { padding: 1rem; } .question-card { padding: 1.5rem; } .results-stats { gap: 1.5rem; } .mode-cards { flex-direction: column; align-items: center; } .matching-columns { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="topbar-logo"><img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia"><span>Akademia</span></a>
            <span class="topbar-title" id="topbarTitle">Exercises</span>
            <span class="topbar-mode exercise" id="topbarMode" style="display:none;">Exercise</span>
        </div>
        <div class="topbar-actions">
            <span class="topbar-timer" id="timerDisplay"><i class="bx bx-time"></i> 00:00</span>
            <span class="topbar-score" id="scoreDisplay"><i class="bx bxs-star"></i> 0</span>
            <a href="user.html" class="btn btn-outline btn-sm"><i class="bx bx-user"></i> Dashboard</a>
        </div>
    </header>

    <main class="main-content">
        <div class="exercise-container" id="exerciseContainer"></div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, getDocs, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        var $ = function(id) { return document.getElementById(id); };
        var toast = function(msg, type) { var c = $('toastContainer'); var t = document.createElement('div'); t.className = 'toast ' + (type || 'success'); t.innerHTML = '<i class="bx ' + (type === 'success' ? 'bx-check-circle' : 'bx-x-circle') + '"></i> ' + msg; t.addEventListener('click', function() { t.remove(); }); c.appendChild(t); setTimeout(function() { if (t.parentElement) t.remove(); }, 3500); };

        var App = {
            user: null, courses: [], modules: [], lessons: [],
            allQuestions: [], currentQuestions: [], mode: '',
            questionLimit: 10, // Default: 10 for exercise
            currentIndex: 0, score: 0, answers: [],
            timer: null, timerSeconds: 0, isLoggedIn: false,
            guestExerciseLimit: 5, guestExamLimit: 10,
            filterCourseId: null, filterModuleId: null, filterLessonId: null,
            matchingSelections: {}, matchingLeftSelected: null,
            filterCourseName: '', filterModuleName: '', filterLessonName: ''
        };

        // ============ PARSE URL PARAMETERS ============
        function parseURL() {
            var p = new URLSearchParams(window.location.search);
            App.filterCourseId = p.get('course') || null;
            App.filterModuleId = p.get('module') || null;
            App.filterLessonId = p.get('lesson') || null;
            App.mode = p.get('mode') || '';
        }

        function initAuth() {
            onAuthStateChanged(auth, function(u) {
                App.user = u;
                App.isLoggedIn = !!(u || localStorage.getItem('ak_user'));
                loadData();
            });
            if (!App.user && localStorage.getItem('ak_user')) { App.isLoggedIn = true; loadData(); }
        }

        async function loadData() {
            try {
                var results = await Promise.all([
                    getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc'))),
                    getDocs(query(collection(db, 'modules'), orderBy('order'))),
                    getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')))
                ]);
                App.courses = []; results[0].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.courses.push(o); });
                App.modules = []; results[1].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.modules.push(o); });
                App.lessons = []; results[2].docs.forEach(function(d) { var o = d.data(); o.id = d.id; App.lessons.push(o); });
            } catch (e) {
                try { App.courses = JSON.parse(localStorage.getItem('ak_courses') || '[]'); } catch(ex) { App.courses = []; }
                try { App.modules = JSON.parse(localStorage.getItem('ak_modules') || '[]'); } catch(ex) { App.modules = []; }
                try { App.lessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]'); } catch(ex) { App.lessons = []; }
            }
            extractAllQuestions();
            
            // If URL has params, auto-start appropriate mode
            if (App.filterLessonId || App.filterModuleId || App.filterCourseId || App.mode) {
                if (!App.mode) App.mode = 'exercise'; // Default to exercise
                startSession(App.mode);
            } else {
                renderModeSelect();
            }
        }

        function extractAllQuestions() {
            App.allQuestions = [];
            
            // If specific lesson is requested, load that lesson's exercise bank from Firestore
            if (App.filterLessonId) {
                loadLessonExerciseBank(App.filterLessonId);
            } else if (App.filterModuleId) {
                // Load all lessons in this module
                var modLessons = App.lessons.filter(function(l) { return l.moduleId === App.filterModuleId; });
                modLessons.forEach(function(lesson) {
                    extractFromLesson(lesson);
                });
            } else if (App.filterCourseId) {
                // Load all lessons in this course
                var courseMods = App.modules.filter(function(m) { return m.courseId === App.filterCourseId; });
                courseMods.forEach(function(mod) {
                    var modLessons = App.lessons.filter(function(l) { return l.moduleId === mod.id; });
                    modLessons.forEach(function(lesson) {
                        extractFromLesson(lesson);
                    });
                });
            } else {
                // Load from ALL lessons
                App.lessons.forEach(function(lesson) {
                    extractFromLesson(lesson);
                });
            }
            
            // Set filter names for display
            if (App.filterCourseId) {
                var course = App.courses.find(function(c) { return c.id === App.filterCourseId; });
                App.filterCourseName = course ? course.name : '';
            }
            if (App.filterModuleId) {
                var mod = App.modules.find(function(m) { return m.id === App.filterModuleId; });
                App.filterModuleName = mod ? mod.name : '';
            }
            if (App.filterLessonId) {
                var les = App.lessons.find(function(l) { return l.id === App.filterLessonId; });
                App.filterLessonName = les ? (les.title || 'Untitled') : '';
            }
        }

        async function loadLessonExerciseBank(lessonId) {
            try {
                var snap = await getDoc(doc(db, 'lessons', lessonId));
                if (snap.exists()) {
                    var data = snap.data();
                    var bank = data.exerciseBank || [];
                    var mod = App.modules.find(function(m) { return m.id === data.moduleId; });
                    var course = App.courses.find(function(c) { return c.id === (mod ? mod.courseId : null); });
                    
                    bank.forEach(function(q) {
                        if (q.question) {
                            App.allQuestions.push({
                                question: q.question, questionType: q.questionType || 'multiple-choice',
                                options: q.options || ['','','',''], correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : 0,
                                points: q.points || 10, sentence: q.sentence || '',
                                matchingRight: q.matchingRight || null, matchingTypes: q.matchingTypes || {left:'text',right:'text'},
                                source: 'exercise_bank', lessonId: lessonId, lessonTitle: data.title || 'Untitled',
                                moduleId: mod ? mod.id : '', moduleName: mod ? mod.name : '',
                                courseId: course ? course.id : '', courseName: course ? course.name : ''
                            });
                        }
                    });
                }
            } catch(e) {}
            
            // Also extract from lesson blocks as fallback
            var lesson = App.lessons.find(function(l) { return l.id === lessonId; });
            if (lesson) extractFromLesson(lesson);
        }

        function extractFromLesson(lesson) {
            var mod = App.modules.find(function(m) { return m.id === lesson.moduleId; });
            var course = App.courses.find(function(c) { return c.id === (mod ? mod.courseId : null); });
            
            // First try exercise bank from lesson data (if already loaded)
            var bank = lesson.exerciseBank || [];
            bank.forEach(function(q) {
                if (q.question) {
                    App.allQuestions.push({
                        question: q.question, questionType: q.questionType || 'multiple-choice',
                        options: q.options || ['','','',''], correctAnswer: q.correctAnswer !== undefined ? q.correctAnswer : 0,
                        points: q.points || 10, sentence: q.sentence || '',
                        matchingRight: q.matchingRight || null,
                        source: 'exercise_bank', lessonId: lesson.id, lessonTitle: lesson.title || 'Untitled',
                        moduleId: mod ? mod.id : '', moduleName: mod ? mod.name : '',
                        courseId: course ? course.id : '', courseName: course ? course.name : ''
                    });
                }
            });
            
            // Also extract from blocks
            (lesson.pages || []).forEach(function(page) {
                (page.blocks || []).forEach(function(block) {
                    if ((block.type === 'question' || block.type === 'remember-question') && block.question) {
                        App.allQuestions.push({
                            question: block.question, questionType: block.questionType || 'multiple-choice',
                            options: block.options || ['','','',''], correctAnswer: block.correctAnswer !== undefined ? block.correctAnswer : 0,
                            points: block.points || 10, sentence: block.sentence || '',
                            matchingRight: block.matchingRight || null,
                            source: 'lesson_block', lessonId: lesson.id, lessonTitle: lesson.title || 'Untitled',
                            moduleId: mod ? mod.id : '', moduleName: mod ? mod.name : '',
                            courseId: course ? course.id : '', courseName: course ? course.name : ''
                        });
                    }
                });
            });
        }

        function renderModeSelect() {
            if (!App.allQuestions.length) {
                $('exerciseContainer').innerHTML = '<div class="empty-state"><i class="bx bx-dumbbell"></i><h2>No Questions Available</h2><p>Add exercises to the Exercise Bank in the Lesson Studio, or create lessons with question blocks.</p><a href="course.html" class="btn btn-primary"><i class="bx bx-book-open"></i> Browse Courses</a><a href="index.html" class="btn btn-outline" style="margin-left:0.5rem;"><i class="bx bx-home"></i> Home</a></div>';
                return;
            }

            var totalQ = App.allQuestions.length;
            var contextName = App.filterLessonName || App.filterModuleName || App.filterCourseName || '';
            var contextLabel = contextName ? ' for ' + contextName : '';
            var guestExLimit = Math.min(App.guestExerciseLimit, totalQ);
            var guestExamLimit = Math.min(App.guestExamLimit, totalQ);
            var loggedExLimit = Math.min(10, totalQ);
            var loggedExamLimit = Math.min(30, totalQ);

            $('exerciseContainer').innerHTML = '<div class="mode-select"><h2>Ready to Practice?</h2>' +
                (contextName ? '<div class="info-banner"><i class="bx bx-info-circle"></i> Questions from: <strong>' + contextName + '</strong></div>' : '') +
                '<p>' + totalQ + ' questions available' + contextLabel + '</p>' +
                '<div class="mode-cards">' +
                    '<div class="mode-card" onclick="startSession(\'exercise\')">' +
                        '<i class="bx bx-dumbbell" style="color:var(--accent);"></i><h3>Exercise</h3>' +
                        '<p>Practice with selected questions</p>' +
                        '<span class="limit-badge ' + (App.isLoggedIn ? 'logged' : 'guest') + '">' + (App.isLoggedIn ? loggedExLimit : guestExLimit) + ' questions</span>' +
                    '</div>' +
                    '<div class="mode-card" onclick="startSession(\'exam\')">' +
                        '<i class="bx bx-book-open" style="color:var(--danger);"></i><h3>Exam</h3>' +
                        '<p>Full assessment mode</p>' +
                        '<span class="limit-badge ' + (App.isLoggedIn ? 'logged' : 'guest') + '">' + (App.isLoggedIn ? loggedExamLimit : guestExamLimit) + ' questions</span>' +
                    '</div>' +
                '</div>' +
                (!App.isLoggedIn ? '<p style="margin-top:1.5rem;font-size:0.813rem;color:var(--gray-500);"><i class="bx bx-lock-alt"></i> <a href="auth.html?mode=signin" style="color:var(--primary);">Sign in</a> to unlock full question limits</p>' : '') +
            '</div>';
        }

        window.startSession = function(mode) {
            App.mode = mode;
            
            // Set question limits based on mode and login status
            if (mode === 'exercise') {
                App.questionLimit = App.isLoggedIn ? 10 : App.guestExerciseLimit;
            } else {
                App.questionLimit = App.isLoggedIn ? 30 : App.guestExamLimit;
            }
            
            // Cap at available questions
            App.questionLimit = Math.min(App.questionLimit, App.allQuestions.length);
            
            // Shuffle and select
            var shuffled = App.allQuestions.slice().sort(function() { return Math.random() - 0.5; });
            App.currentQuestions = shuffled.slice(0, App.questionLimit);
            
            App.currentIndex = 0; App.score = 0;
            App.answers = new Array(App.currentQuestions.length);
            App.timerSeconds = 0; App.matchingSelections = {}; App.matchingLeftSelected = null;
            
            $('topbarMode').style.display = '';
            $('topbarMode').textContent = mode === 'exercise' ? 'Exercise' : 'Exam';
            $('topbarMode').className = 'topbar-mode ' + mode;
            $('topbarTitle').textContent = mode === 'exercise' ? 'Exercise' : 'Exam';
            
            updateScore(); startTimer(); renderQuestion();
        };

        function startTimer() {
            clearInterval(App.timer); App.timerSeconds = 0;
            $('timerDisplay').innerHTML = '<i class="bx bx-time"></i> 00:00';
            App.timer = setInterval(function() {
                App.timerSeconds++;
                var m = String(Math.floor(App.timerSeconds / 60)).padStart(2, '0');
                var s = String(App.timerSeconds % 60).padStart(2, '0');
                $('timerDisplay').innerHTML = '<i class="bx bx-time"></i> ' + m + ':' + s;
            }, 1000);
        }

        function updateScore() { $('scoreDisplay').innerHTML = '<i class="bx bxs-star"></i> ' + App.score; }

        function renderQuestion() {
            if (App.currentIndex >= App.currentQuestions.length) { showResults(); return; }
            
            // Guest limit check
            var guestMax = App.mode === 'exercise' ? App.guestExerciseLimit : App.guestExamLimit;
            if (!App.isLoggedIn && App.currentIndex >= guestMax) { renderLoginGate(); return; }

            var q = App.currentQuestions[App.currentIndex];
            var userAns = App.answers[App.currentIndex];
            var isAnswered = userAns !== undefined;
            var progress = Math.round(((App.currentIndex + 1) / App.currentQuestions.length) * 100);
            var totalShow = App.isLoggedIn ? App.currentQuestions.length : Math.min(App.currentQuestions.length, guestMax);

            var cardClass = '';
            if (q.questionType !== 'matching' && q.questionType !== 'complete-drag') {
                if (isAnswered) {
                    var correct = q.correctAnswer;
                    cardClass = userAns === correct ? 'correct-flash' : 'wrong-flash';
                }
            }

            var dotsHTML = '';
            for (var d = 0; d < totalShow; d++) {
                var dc = '';
                if (App.answers[d] !== undefined) { dc = App.answers[d] === App.currentQuestions[d].correctAnswer ? 'correct' : 'wrong'; }
                else if (d === App.currentIndex) { dc = 'current'; }
                dotsHTML += '<div class="progress-dot ' + dc + '"></div>';
            }

            var bodyHTML = '';
            if (q.questionType === 'matching') { bodyHTML = renderMatchingQuestion(q, isAnswered); }
            else if (q.questionType === 'boolean') { bodyHTML = renderBoolean(q, isAnswered); }
            else if (q.questionType === 'complete-text' || q.questionType === 'complete' || q.questionType === 'complete-drag') { bodyHTML = renderCompleteOrDrag(q, isAnswered); }
            else { bodyHTML = renderMultipleChoice(q, isAnswered); }

            var navHTML = '';
            if (isAnswered) {
                var isCorrect = userAns === q.correctAnswer;
                var fbClass = isCorrect ? 'correct' : 'wrong';
                var fbMsg = isCorrect ? 'Correct! +' + (q.points || 10) + ' Sparks' : 'Incorrect';
                navHTML = '<div class="feedback-toast show ' + fbClass + '"><i class="bx ' + (isCorrect ? 'bx-check-circle' : 'bx-x-circle') + '"></i><span>' + fbMsg + '</span></div>' +
                    '<div class="nav-row"><button class="btn btn-primary" onclick="nextQuestion()">' + (App.currentIndex < App.currentQuestions.length - 1 ? 'Next Question' : 'See Results') + ' <i class="bx bx-chevron-right"></i></button></div>';
            }

            $('exerciseContainer').innerHTML = '' +
                '<div class="progress-section"><div class="progress-header"><span>Question ' + (App.currentIndex + 1) + ' of ' + totalShow + '</span><span>' + progress + '%</span></div><div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%;"></div></div></div>' +
                '<div class="question-card ' + cardClass + '">' +
                    '<div class="q-meta"><span class="q-number">Question ' + (App.currentIndex + 1) + '</span>' + (q.courseName ? '<span class="q-course">' + q.courseName + '</span>' : '') + '<span class="q-points"><i class="bx bxs-star"></i> ' + (q.points || 10) + ' pts</span></div>' +
                    '<div class="q-text">' + (q.question || 'Question') + '</div>' + bodyHTML + navHTML +
                '</div><div class="progress-dots">' + dotsHTML + '</div>';
        }

        function renderMultipleChoice(q, isAnswered) {
            var opts = q.options || []; var correct = q.correctAnswer; var userAns = App.answers[App.currentIndex];
            var h = '<div class="options-list">';
            for (var i = 0; i < opts.length; i++) {
                if (!opts[i] && opts[i] !== '') continue;
                var cls = '';
                if (userAns === i) { cls = userAns === correct ? 'correct-show' : 'wrong-show'; }
                else if (isAnswered && correct === i) { cls = 'correct-show'; }
                h += '<button class="opt-btn ' + cls + '" onclick="answerMCQ(' + i + ')"' + (isAnswered ? ' disabled' : '') + '><span class="opt-letter">' + String.fromCharCode(65 + i) + '</span> ' + (opts[i] || 'Option ' + String.fromCharCode(65 + i)) + '</button>';
            }
            h += '</div>'; return h;
        }

        function renderBoolean(q, isAnswered) {
            var correct = q.correctAnswer; var userAns = App.answers[App.currentIndex];
            return '<div class="bool-group">' +
                '<button class="bool-btn' + (userAns === 0 ? ' correct-show' : '') + (isAnswered && correct === 0 && userAns !== 0 ? ' correct-show' : '') + '" onclick="answerMCQ(0)"' + (isAnswered ? ' disabled' : '') + '><i class="bx bx-check"></i> True</button>' +
                '<button class="bool-btn' + (userAns === 1 ? ' correct-show' : '') + (isAnswered && correct === 1 && userAns !== 1 ? ' correct-show' : '') + '" onclick="answerMCQ(1)"' + (isAnswered ? ' disabled' : '') + '><i class="bx bx-x"></i> False</button>' +
            '</div>';
        }

        function renderCompleteOrDrag(q, isAnswered) {
            return '<div class="complete-wrap">' +
                '<input type="text" class="complete-input" id="completeInput" placeholder="Type your answer..." onkeydown="if(event.key===\'Enter\')submitCompleteAnswer()"' + (isAnswered ? ' disabled' : '') + '>' +
                (!isAnswered ? '<button class="btn btn-primary" onclick="submitCompleteAnswer()">Submit</button>' : '') +
            '</div>';
        }

        function renderMatchingQuestion(q, isAnswered) {
            App.matchingSelections = {}; App.matchingLeftSelected = null;
            var leftItems = (q.options || []).filter(function(x) { return x && x.trim(); });
            var rightItems = (q.matchingRight || []).filter(function(x) { return x && x.trim(); });
            if (!leftItems.length) leftItems = ['Item 1', 'Item 2'];
            if (!rightItems.length) rightItems = ['Match 1', 'Match 2'];
            var shuffledRight = rightItems.slice().sort(function() { return Math.random() - 0.5; });
            
            var h = '<p style="font-size:0.813rem;color:var(--gray-500);margin-bottom:1rem;">Click a left item, then click its matching right item.</p>';
            h += '<div class="matching-container" id="matchingContainer"><div class="matching-columns">';
            h += '<div class="matching-col" id="matchingLeftCol">';
            for (var i = 0; i < leftItems.length; i++) { h += '<div class="matching-item left-item" data-index="' + i + '" onclick="selectMatchingLeft(' + i + ', this)">' + leftItems[i] + '</div>'; }
            h += '</div><div class="matching-svg-layer" id="matchingSvgLayer"><svg id="matchingSvg"></svg></div>';
            h += '<div class="matching-col" id="matchingRightCol">';
            for (var j = 0; j < shuffledRight.length; j++) { h += '<div class="matching-item right-item" data-original-index="' + rightItems.indexOf(shuffledRight[j]) + '" data-display-index="' + j + '" onclick="selectMatchingRight(' + rightItems.indexOf(shuffledRight[j]) + ', ' + j + ', this)">' + shuffledRight[j] + '</div>'; }
            h += '</div></div></div>';
            if (!isAnswered) { h += '<div class="match-submit-btn"><button class="btn btn-primary" onclick="submitMatchingAnswer()">Submit Matches</button></div>'; }
            setTimeout(function() { drawMatchingLines(); }, 100);
            return h;
        }

        window.selectMatchingLeft = function(index, el) { if (App.answers[App.currentIndex] !== undefined) return; App.matchingLeftSelected = index; document.querySelectorAll('.left-item').forEach(function(item) { item.classList.remove('selected'); }); el.classList.add('selected'); document.querySelectorAll('.right-item').forEach(function(item) { item.classList.remove('selected'); }); App.matchingSelections[index] = undefined; drawMatchingLines(); };
        window.selectMatchingRight = function(originalIndex, displayIndex, el) { if (App.answers[App.currentIndex] !== undefined) return; if (App.matchingLeftSelected === null) return; Object.keys(App.matchingSelections).forEach(function(key) { if (App.matchingSelections[key] === originalIndex) delete App.matchingSelections[key]; }); App.matchingSelections[App.matchingLeftSelected] = originalIndex; document.querySelectorAll('.left-item').forEach(function(item) { item.classList.remove('selected'); }); document.querySelectorAll('.right-item').forEach(function(item) { item.classList.remove('selected'); }); var leftEl = document.querySelector('.left-item[data-index="' + App.matchingLeftSelected + '"]'); if (leftEl) leftEl.classList.add('matched'); el.classList.add('matched'); App.matchingLeftSelected = null; drawMatchingLines(); };

        function drawMatchingLines() {
            var svg = document.getElementById('matchingSvg'); var container = document.getElementById('matchingContainer');
            if (!svg || !container) return;
            var containerRect = container.getBoundingClientRect();
            var linesHTML = '';
            Object.keys(App.matchingSelections).forEach(function(leftIdx) {
                var rightIdx = App.matchingSelections[leftIdx]; if (rightIdx === undefined) return;
                var leftEl = document.querySelector('.left-item[data-index="' + leftIdx + '"]');
                var rightEl = document.querySelector('.right-item[data-original-index="' + rightIdx + '"]');
                if (leftEl && rightEl) {
                    var lr = leftEl.getBoundingClientRect(); var rr = rightEl.getBoundingClientRect();
                    var x1 = lr.right - containerRect.left; var y1 = lr.top + lr.height/2 - containerRect.top;
                    var x2 = rr.left - containerRect.left; var y2 = rr.top + rr.height/2 - containerRect.top;
                    var cpX = (x1 + x2) / 2;
                    linesHTML += '<path d="M' + x1 + ',' + y1 + ' C' + cpX + ',' + y1 + ' ' + cpX + ',' + y2 + ' ' + x2 + ',' + y2 + '" class="matching-line" />';
                }
            });
            if (App.matchingLeftSelected !== null) {
                var pendingLeft = document.querySelector('.left-item[data-index="' + App.matchingLeftSelected + '"]');
                if (pendingLeft) { var plr = pendingLeft.getBoundingClientRect(); linesHTML += '<circle cx="' + (plr.right - containerRect.left) + '" cy="' + (plr.top + plr.height/2 - containerRect.top) + '" r="5" fill="var(--warning)" opacity="0.6" />'; }
            }
            svg.innerHTML = linesHTML;
        }

        window.submitMatchingAnswer = function() {
            if (App.answers[App.currentIndex] !== undefined) return;
            var q = App.currentQuestions[App.currentIndex];
            var leftItems = (q.options || []).filter(function(x) { return x && x.trim(); });
            var totalPairs = leftItems.length || 1; var correctPairs = 0;
            Object.keys(App.matchingSelections).forEach(function(leftIdx) { if (App.matchingSelections[leftIdx] === parseInt(leftIdx)) correctPairs++; });
            var isPerfect = correctPairs === totalPairs;
            var earnedPoints = Math.round((q.points || 10) * (correctPairs / totalPairs));
            App.answers[App.currentIndex] = isPerfect ? q.correctAnswer : -1;
            App.score += earnedPoints; updateScore();
            if (earnedPoints > 0) awardSparks(earnedPoints);
            document.querySelectorAll('.left-item, .right-item').forEach(function(el) { el.style.pointerEvents = 'none'; });
            var submitBtn = document.querySelector('.match-submit-btn'); if (submitBtn) submitBtn.style.display = 'none';
            renderQuestion();
        };

        window.answerMCQ = function(index) { if (App.answers[App.currentIndex] !== undefined) return; var q = App.currentQuestions[App.currentIndex]; var correct = index === q.correctAnswer; App.answers[App.currentIndex] = index; if (correct) { App.score += (q.points || 10); updateScore(); awardSparks(q.points || 10); } renderQuestion(); };
        window.submitCompleteAnswer = function() { if (App.answers[App.currentIndex] !== undefined) return; var input = $('completeInput'); if (!input) return; var val = input.value.trim(); if (!val) { toast('Please type an answer', 'error'); return; } var q = App.currentQuestions[App.currentIndex]; var correctAns = ((q.options || [])[q.correctAnswer] || '').toLowerCase(); var isCorrect = val.toLowerCase() === correctAns; App.answers[App.currentIndex] = isCorrect ? q.correctAnswer : -1; if (isCorrect) { App.score += (q.points || 10); updateScore(); awardSparks(q.points || 10); } renderQuestion(); };
        window.nextQuestion = function() { if (App.currentIndex < App.currentQuestions.length - 1) { App.currentIndex++; renderQuestion(); } else { showResults(); } };
        function awardSparks(pts) { var current = parseInt(localStorage.getItem('ak_sparks') || '0'); localStorage.setItem('ak_sparks', String(current + pts)); }

        function renderLoginGate() {
            var guestMax = App.mode === 'exercise' ? App.guestExerciseLimit : App.guestExamLimit;
            $('exerciseContainer').innerHTML = '<div class="progress-section"><div class="progress-header"><span>Free Preview: ' + guestMax + '/' + guestMax + '</span><span>100%</span></div><div class="progress-bar"><div class="progress-fill" style="width:100%;"></div></div></div>' +
                '<div class="login-gate"><i class="bx bx-lock-alt"></i><h3>Unlock Full Access</h3><p>You have completed ' + guestMax + ' free questions. Sign in to access all ' + App.currentQuestions.length + ' questions and earn Sparks!</p>' +
                '<a href="auth.html?mode=signin" class="btn btn-primary"><i class="bx bx-log-in"></i> Sign In</a><a href="auth.html?mode=register" class="btn btn-outline" style="margin-left:0.5rem;"><i class="bx bx-user-plus"></i> Create Account</a></div>';
        }

        function showResults() {
            clearInterval(App.timer);
            var total = App.currentQuestions.length;
            var correct = 0;
            for (var i = 0; i < App.answers.length; i++) { if (App.answers[i] === App.currentQuestions[i].correctAnswer) correct++; }
            var pct = Math.round((correct / total) * 100);
            var grade = pct >= 90 ? 'Excellent!' : pct >= 70 ? 'Great Job!' : pct >= 50 ? 'Good Effort!' : 'Keep Practicing!';
            var gColor = pct >= 90 ? 'var(--success)' : pct >= 70 ? 'var(--primary)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
            var mins = Math.floor(App.timerSeconds / 60); var secs = App.timerSeconds % 60;
            var hist = []; try { hist = JSON.parse(localStorage.getItem('ak_exercise_history') || '[]'); } catch(e) { hist = []; }
            hist.push({ date: new Date().toISOString(), mode: App.mode, score: App.score, correct: correct, total: total, pct: pct, time: App.timerSeconds, courseId: App.filterCourseId, moduleId: App.filterModuleId, lessonId: App.filterLessonId });
            localStorage.setItem('ak_exercise_history', JSON.stringify(hist.slice(-30)));

            $('exerciseContainer').innerHTML = '<div class="results-wrap"><i class="bx bx-trophy results-icon" style="color:' + gColor + ';"></i><div class="results-pct" style="color:' + gColor + ';">' + pct + '%</div><div class="results-grade" style="color:' + gColor + ';">' + grade + '</div><p style="color:var(--gray-500);font-size:0.875rem;">' + (App.mode === 'exam' ? 'Exam' : 'Exercise') + ' Complete</p>' +
                '<div class="results-stats"><div class="r-stat"><div class="r-stat-val">' + correct + '/' + total + '</div><div class="r-stat-lbl">Correct</div></div><div class="r-stat"><div class="r-stat-val"><i class="bx bxs-star" style="color:var(--warning);"></i> ' + App.score + '</div><div class="r-stat-lbl">Sparks</div></div><div class="r-stat"><div class="r-stat-val">' + mins + 'm ' + secs + 's</div><div class="r-stat-lbl">Time</div></div></div>' +
                '<div class="nav-row"><button class="btn btn-primary" onclick="retrySession()"><i class="bx bx-refresh"></i> Retry</button><a href="course.html" class="btn btn-outline"><i class="bx bx-book-open"></i> Courses</a><a href="user.html" class="btn btn-success"><i class="bx bx-user"></i> Dashboard</a></div></div>';
        }

        window.retrySession = function() {
            var shuffled = App.allQuestions.slice().sort(function() { return Math.random() - 0.5; });
            App.currentQuestions = shuffled.slice(0, App.questionLimit);
            App.currentIndex = 0; App.score = 0; App.answers = new Array(App.currentQuestions.length);
            App.timerSeconds = 0; App.matchingSelections = {}; App.matchingLeftSelected = null;
            updateScore(); startTimer(); renderQuestion();
        };

        document.addEventListener('keydown', function(e) {
            if (App.currentIndex >= App.currentQuestions.length || !App.currentQuestions.length) return;
            var q = App.currentQuestions[App.currentIndex];
            if (q.questionType === 'matching') return;
            if (App.answers[App.currentIndex] !== undefined) { if (e.key === 'Enter' || e.key === 'ArrowRight') nextQuestion(); return; }
            if (q.questionType === 'multiple-choice' || q.questionType === 'complete-drag') { var map = {'a':0,'b':1,'c':2,'d':3,'1':0,'2':1,'3':2,'4':3}; if (map[e.key.toLowerCase()] !== undefined && map[e.key.toLowerCase()] < (q.options||[]).length) answerMCQ(map[e.key.toLowerCase()]); }
            if (q.questionType === 'boolean') { if (e.key.toLowerCase()==='t'||e.key==='1') answerMCQ(0); if (e.key.toLowerCase()==='f'||e.key==='2') answerMCQ(1); }
        });
        window.addEventListener('resize', function() { drawMatchingLines(); });

        parseURL(); initAuth();
        console.log('🚀 Akademia Exercise System - Full Query Support ready!');
    </script>
</body>
</html>
