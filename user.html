<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademia - Student Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <style>
        :root {
            --primary: #2563EB; --primary-dark: #1D4ED8; --primary-bg: #EFF6FF;
            --accent: #8B5CF6; --accent-dark: #7C3AED; --accent-bg: #F5F3FF;
            --success: #04AA6D; --success-bg: #ECFDF5; --success-dark: #038857;
            --warning: #F59E0B; --warning-bg: #FFFBEB; --warning-dark: #D97706;
            --danger: #EF4444; --danger-bg: #FEF2F2;
            --pink: #EC4899; --pink-bg: #FDF2F8;
            --orange: #F97316; --orange-bg: #FFF7ED;
            --teal: #14B8A6; --teal-bg: #F0FDFA;
            --indigo: #6366F1; --indigo-bg: #EEF2FF;
            --white: #ffffff; --gray-50: #f9fafb; --gray-100: #f3f4f6;
            --gray-200: #e5e7eb; --gray-300: #d1d5db; --gray-400: #9ca3af;
            --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
            --gray-800: #1f2937; --gray-900: #111827;
            --dark-bg: #0d1117; --dark-surface: #161b22; --dark-border: #30363d;
            --sidebar-width: 260px; --header-height: 56px;
            --radius-sm: 6px; --radius: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-2xl: 20px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06); --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Inter', sans-serif; background: var(--gray-50);
            color: var(--gray-800); display: flex; -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: var(--sidebar-width); background: var(--dark-bg); color: #c9d1d9;
            display: flex; flex-direction: column; position: fixed;
            top: 0; left: 0; bottom: 0; z-index: 100;
            border-right: 1px solid var(--dark-border); overflow-y: auto;
        }
        .sidebar-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--dark-border);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sidebar-header img { height: 28px; width: auto; }
        .sidebar-header span {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.125rem; font-weight: 700; color: white;
        }
        .sidebar-user {
            padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--dark-border);
            display: flex; align-items: center; gap: 0.625rem;
        }
        .sidebar-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.938rem; flex-shrink: 0;
        }
        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .sidebar-user-info { flex: 1; min-width: 0; }
        .sidebar-user-name { font-weight: 600; font-size: 0.813rem; color: white; }
        .sidebar-user-level { font-size: 0.625rem; color: var(--warning); }

        .sidebar-nav { flex: 1; padding: 0.5rem; }
        .sidebar-section { margin-bottom: 0.25rem; }
        .sidebar-label {
            font-size: 0.625rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: #8b949e; padding: 0.625rem 0.75rem 0.25rem;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4375rem 0.75rem; border-radius: var(--radius-sm);
            cursor: pointer; transition: all var(--transition);
            color: #c9d1d9; font-size: 0.813rem; font-weight: 400;
            border: none; background: none; width: 100%; text-align: left;
            text-decoration: none;
        }
        .sidebar-item:hover { background: #21262d; color: white; }
        .sidebar-item.active { background: #1f6feb22; color: #58a6ff; }
        .sidebar-item i { font-size: 1rem; width: 18px; text-align: center; flex-shrink: 0; }
        .sidebar-badge {
            margin-left: auto; font-size: 0.625rem; padding: 0.125rem 0.4375rem;
            border-radius: 100px; background: #21262d; color: #8b949e;
        }
        .sidebar-sparks {
            padding: 0.75rem 1.25rem; border-top: 1px solid var(--dark-border);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .sparks-icon { font-size: 1.25rem; color: var(--warning); }
        .sparks-value { font-weight: 700; font-size: 0.875rem; color: white; }
        .sparks-label { font-size: 0.625rem; color: #8b949e; }

        /* ============ MAIN ============ */
        .main-content {
            flex: 1; margin-left: var(--sidebar-width);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        .topbar {
            background: var(--white); border-bottom: 1px solid var(--gray-200);
            padding: 0 1.5rem; height: var(--header-height);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 1rem; }
        .topbar-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 700; }
        .topbar-streak {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.25rem 0.75rem; border-radius: 100px;
            background: var(--warning-bg); color: var(--warning-dark);
            font-weight: 700; font-size: 0.75rem;
        }
        .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }

        .btn {
            font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.4375rem 0.875rem; border-radius: var(--radius-sm); font-size: 0.813rem;
            font-weight: 600; transition: all var(--transition); cursor: pointer;
            border: none; text-decoration: none; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 0.3125rem 0.625rem; font-size: 0.75rem; }
        .btn-xs { padding: 0.1875rem 0.5rem; font-size: 0.688rem; border-radius: 100px; }

        /* ============ CONTENT ============ */
        .content-area { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .page { display: none; animation: fadeSlide 0.25s ease; }
        .page.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ============ DASHBOARD WIDGETS ============ */
        .welcome-banner {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; border-radius: var(--radius-2xl); padding: 2rem;
            margin-bottom: 1.5rem; display: flex; align-items: center; gap: 2rem;
        }
        .welcome-text h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .welcome-text p { color: #9ca3af; font-size: 0.875rem; }
        .welcome-stats { display: flex; gap: 2rem; }
        .welcome-stat { text-align: center; }
        .welcome-stat .ws-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; }
        .welcome-stat .ws-lbl { font-size: 0.688rem; color: #9ca3af; }

        .widget-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .widget {
            background: white; border: 1px solid var(--gray-100); border-radius: var(--radius-xl);
            padding: 1.25rem; transition: all var(--transition);
        }
        .widget:hover { box-shadow: var(--shadow-md); }
        .widget-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .widget-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.875rem; font-weight: 600; }

        .daily-challenge {
            background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
            border: 2px solid var(--accent); border-radius: var(--radius-xl);
            padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .daily-challenge h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; margin-bottom: 0.5rem; }
        .daily-challenge .dc-reward { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.75rem; border-radius: 100px; background: var(--warning-bg); color: var(--warning-dark); font-weight: 700; font-size: 0.75rem; }

        .level-progress { margin-top: 1rem; }
        .level-bar { height: 8px; background: var(--gray-200); border-radius: 4px; overflow: hidden; }
        .level-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width 0.5s; }
        .level-info { display: flex; justify-content: space-between; font-size: 0.688rem; color: var(--gray-500); margin-top: 0.25rem; }

        .streak-flame { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        .quick-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .quick-action {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem; border-radius: var(--radius-sm);
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            transition: all var(--transition); border: 1px solid var(--gray-200);
            background: white; color: var(--gray-700);
        }
        .quick-action:hover { border-color: var(--primary); background: var(--primary-bg); color: var(--primary); }

        .progress-item {
            display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .progress-item:last-child { border-bottom: none; }
        .progress-icon {
            width: 32px; height: 32px; border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .progress-info { flex: 1; }
        .progress-name { font-weight: 600; font-size: 0.75rem; }
        .progress-pct { font-size: 0.688rem; color: var(--gray-500); }
        .mini-bar { height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; margin-top: 0.25rem; }
        .mini-bar-fill { height: 100%; background: var(--success); border-radius: 2px; }

        .achievement-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
        .ach-card {
            background: white; border: 1px solid var(--gray-200); border-radius: var(--radius-lg);
            padding: 1rem; text-align: center; transition: all var(--transition);
        }
        .ach-card.earned { border-color: var(--success); background: var(--success-bg); }
        .ach-card.locked { opacity: 0.4; filter: grayscale(0.5); }
        .ach-icon { font-size: 2rem; display: block; margin-bottom: 0.375rem; }
        .ach-name { font-weight: 600; font-size: 0.688rem; }
        .ach-date { font-size: 0.625rem; color: var(--gray-500); }

        /* Settings */
        .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
        .settings-card {
            background: white; border: 1px solid var(--gray-100); border-radius: var(--radius-xl);
            padding: 1.25rem;
        }
        .settings-card h4 { font-family: 'Space Grotesk', sans-serif; font-size: 0.875rem; font-weight: 600; margin-bottom: 1rem; }
        .form-group { margin-bottom: 0.75rem; }
        .form-label { display: block; font-size: 0.688rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.1875rem; }
        .form-input, .form-select {
            width: 100%; padding: 0.5rem 0.625rem; border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm); font-family: 'Inter', sans-serif;
            font-size: 0.813rem; color: var(--gray-900); outline: none; transition: all var(--transition);
        }
        .form-input:focus, .form-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.06); }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--gray-100); }
        .toggle-row:last-child { border-bottom: none; }
        .toggle-row span { font-size: 0.813rem; }
        .toggle-switch {
            width: 40px; height: 22px; border-radius: 11px;
            background: var(--gray-300); cursor: pointer; position: relative;
            transition: all var(--transition);
        }
        .toggle-switch.on { background: var(--success); }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: white; transition: all var(--transition);
        }
        .toggle-switch.on::after { left: 20px; }

        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { background: var(--gray-900); color: white; padding: 0.75rem 1rem; border-radius: var(--radius); font-size: 0.813rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease; max-width: 360px; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .toast.success { background: #059669; } .toast.error { background: #DC2626; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .widget-grid { grid-template-columns: 1fr; }
            .welcome-banner { flex-direction: column; text-align: center; }
            .welcome-stats { justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://i.ibb.co/fVqsXWYz/akademia-logo-removebg-preview.png" alt="Akademia" style="filter:brightness(0)invert(1);">
            <span>Akademia</span>
        </div>
        <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <div class="sidebar-user-name" id="sidebarName">Student</div>
                <div class="sidebar-user-level" id="sidebarLevel">⚡ Level 1</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-section">
                <div class="sidebar-label">Main</div>
                <button class="sidebar-item active" data-page="dashboard"><i class='bx bxs-dashboard'></i> Dashboard</button>
                <button class="sidebar-item" data-page="courses"><i class='bx bx-book-open'></i> My Courses</button>
                <button class="sidebar-item" data-page="progress"><i class='bx bx-trending-up'></i> Progress</button>
                <button class="sidebar-item" data-page="achievements"><i class='bx bx-trophy'></i> Achievements</button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Engage</div>
                <button class="sidebar-item" data-page="challenges"><i class='bx bx-target-lock'></i> Challenges</button>
                <button class="sidebar-item" data-page="league"><i class='bx bx-crown'></i> League</button>
                <button class="sidebar-item" data-page="goals"><i class='bx bx-flag'></i> Goals</button>
                <button class="sidebar-item" data-page="career"><i class='bx bx-briefcase'></i> Career Hub</button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Personal</div>
                <button class="sidebar-item" data-page="activity"><i class='bx bx-history'></i> Activity</button>
                <button class="sidebar-item" data-page="certificates"><i class='bx bx-certification'></i> Certificates</button>
                <button class="sidebar-item" data-page="bookmarks"><i class='bx bx-bookmark'></i> Bookmarks</button>
                <button class="sidebar-item" data-page="friends"><i class='bx bx-group'></i> Friends</button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-label">Settings</div>
                <button class="sidebar-item" data-page="profile"><i class='bx bx-user'></i> Profile</button>
                <button class="sidebar-item" data-page="settings"><i class='bx bx-cog'></i> Settings</button>
                <button class="sidebar-item" data-page="support"><i class='bx bx-support'></i> Support</button>
            </div>
        </nav>
        <div class="sidebar-sparks">
            <i class='bx bxs-star sparks-icon'></i>
            <div><div class="sparks-value" id="sidebarSparks">0</div><div class="sparks-label">Sparks</div></div>
            <button class="sidebar-item" onclick="handleLogout()" style="margin-left:auto;color:var(--danger);width:auto;padding:0.25rem 0.5rem;">
                <i class='bx bx-log-out'></i>
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
                <div class="topbar-streak" id="topbarStreak"><i class='bx bx-fire streak-flame'></i> <span id="streakCount">0</span> day streak</div>
            </div>
            <div class="topbar-actions">
                <span style="font-size:0.75rem;color:var(--gray-500);">⚡ <span id="topbarSparks">0</span> Sparks</span>
                <a href="index.html" class="btn btn-outline btn-sm"><i class='bx bx-home'></i></a>
            </div>
        </header>

        <div class="content-area">
            <!-- DASHBOARD -->
            <div class="page active" id="pageDashboard"></div>
            <div class="page" id="pageCourses"></div>
            <div class="page" id="pageProgress"></div>
            <div class="page" id="pageAchievements"></div>
            <div class="page" id="pageChallenges"></div>
            <div class="page" id="pageLeague"></div>
            <div class="page" id="pageGoals"></div>
            <div class="page" id="pageCareer"></div>
            <div class="page" id="pageActivity"></div>
            <div class="page" id="pageCertificates"></div>
            <div class="page" id="pageBookmarks"></div>
            <div class="page" id="pageFriends"></div>
            <div class="page" id="pageProfile"></div>
            <div class="page" id="pageSettings"></div>
            <div class="page" id="pageSupport"></div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module">
        import { db, auth } from './js/firebase.js';
        import { onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { collection, getDocs, doc, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const $ = id => document.getElementById(id);
        const toast = (msg, type = 'success') => {
            const c = $('toastContainer'); const t = document.createElement('div');
            t.className = `toast ${type}`; t.innerHTML = `<i class='bx ${type==='success'?'bx-check-circle':'bx-x-circle'}'></i> ${msg}`;
            t.addEventListener('click', () => t.remove()); c.appendChild(t);
            setTimeout(() => { if (t.parentElement) t.remove(); }, 3500);
        };

        const App = {
            user: null, userData: {}, courses: [], modules: [], lessons: [],
            completed: {}, enrolled: [], sparks: 0, level: 1, streak: 0,
            currentPage: 'dashboard'
        };

        // ============ AUTH ============
        function initAuth() {
            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    App.user = u;
                    try { const s = await getDoc(doc(db, 'users', u.uid)); if (s.exists()) App.userData = s.data(); } catch (e) {}
                } else {
                    const c = JSON.parse(localStorage.getItem('ak_user') || 'null');
                    if (c) App.user = c; else { window.location.href = 'auth.html'; return; }
                }
                App.userData = App.userData || {};
                App.userData.displayName = App.userData.displayName || App.user?.displayName || 'Student';
                App.userData.email = App.userData.email || App.user?.email || '';
                updateUI();
                loadData();
            });
        }

        function updateUI() {
            $('sidebarName').textContent = App.userData.displayName || 'Student';
            $('sidebarAvatar').textContent = (App.userData.displayName || 'S').charAt(0).toUpperCase();
            App.sparks = parseInt(localStorage.getItem('ak_sparks') || 0);
            App.streak = parseInt(localStorage.getItem('ak_streak') || 0);
            App.level = Math.floor(App.sparks / 100) + 1;
            $('sidebarLevel').textContent = '⚡ Level ' + App.level;
            $('sidebarSparks').textContent = App.sparks.toLocaleString();
            $('topbarSparks').textContent = App.sparks.toLocaleString();
            $('streakCount').textContent = App.streak;
        }

        async function loadData() {
            try {
                const [cS, mS, lS] = await Promise.all([
                    getDocs(query(collection(db, 'courses'), orderBy('createdAt', 'desc'))),
                    getDocs(query(collection(db, 'modules'), orderBy('order'))),
                    getDocs(query(collection(db, 'lessons'), orderBy('createdAt', 'desc')))
                ]);
                App.courses = cS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.modules = mS.docs.map(d => ({ id: d.id, ...d.data() }));
                App.lessons = lS.docs.map(d => ({ id: d.id, ...d.data() }));
            } catch (e) {
                App.courses = JSON.parse(localStorage.getItem('ak_courses') || '[]');
                App.lessons = JSON.parse(localStorage.getItem('ak_lessons') || '[]');
                App.modules = JSON.parse(localStorage.getItem('ak_modules') || '[]');
            }
            App.completed = JSON.parse(localStorage.getItem('ak_completed') || '{}');
            App.enrolled = JSON.parse(localStorage.getItem('ak_enrolled') || App.courses.slice(0, 3).map(c => c.id));
            renderPage();
        }

        // ============ PAGE SWITCHING ============
        function switchPage(page) {
            App.currentPage = page;
            document.querySelectorAll('.sidebar-item[data-page]').forEach(i => i.classList.remove('active'));
            document.querySelector(`.sidebar-item[data-page="${page}"]`)?.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const el = $(`page${page.charAt(0).toUpperCase() + page.slice(1)}`);
            if (el) el.classList.add('active');
            $('topbarTitle').textContent = page.charAt(0).toUpperCase() + page.slice(1).replace(/([A-Z])/g, ' $1');
            renderPage();
        }

        document.querySelectorAll('.sidebar-item[data-page]').forEach(item => {
            item.addEventListener('click', () => switchPage(item.dataset.page));
        });

        function renderPage() {
            const p = App.currentPage;
            if (p === 'dashboard') renderDashboard();
            else if (p === 'courses') renderCourses();
            else if (p === 'progress') renderProgress();
            else if (p === 'achievements') renderAchievements();
            else if (p === 'challenges') renderChallenges();
            else if (p === 'league') renderLeague();
            else if (p === 'goals') renderGoals();
            else if (p === 'career') renderCareer();
            else if (p === 'activity') renderActivity();
            else if (p === 'certificates') renderCertificates();
            else if (p === 'bookmarks') renderBookmarks();
            else if (p === 'friends') renderFriends();
            else if (p === 'profile') renderProfile();
            else if (p === 'settings') renderSettings();
            else if (p === 'support') renderSupport();
        }

        // ============ DASHBOARD ============
        function renderDashboard() {
            const done = Object.keys(App.completed).length;
            const achievements = JSON.parse(localStorage.getItem('ak_achievements') || '[]');
            const nextLevelSparks = App.level * 100;
            const progressToNext = Math.round((App.sparks % 100) / 100 * 100);

            $('pageDashboard').innerHTML = `
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Welcome back, ${App.userData.displayName?.split(' ')[0] || 'Student'}! 👋</h1>
                        <p>Keep up the momentum. You're doing great!</p>
                        <div class="level-progress" style="margin-top:1rem;">
                            <div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:0.25rem;"><span>Level ${App.level}</span><span>Level ${App.level+1}</span></div>
                            <div class="level-bar"><div class="level-bar-fill" style="width:${progressToNext}%;"></div></div>
                            <div class="level-info"><span>${App.sparks} Sparks</span><span>${nextLevelSparks - App.sparks} to next level</span></div>
                        </div>
                    </div>
                    <div class="welcome-stats">
                        <div class="welcome-stat"><div class="ws-val">${App.streak}</div><div class="ws-lbl">Day Streak 🔥</div></div>
                        <div class="welcome-stat"><div class="ws-val">${done}</div><div class="ws-lbl">Lessons Done</div></div>
                        <div class="welcome-stat"><div class="ws-val">${achievements.length}</div><div class="ws-lbl">Achievements</div></div>
                    </div>
                </div>

                <div class="daily-challenge">
                    <h3>🎯 Daily Challenge</h3>
                    <p style="font-size:0.875rem;margin-bottom:0.75rem;">Complete 3 lessons today to earn bonus Sparks!</p>
                    <span class="dc-reward"><i class='bx bxs-star'></i> +50 Sparks</span>
                    <span style="font-size:0.75rem;color:var(--gray-500);margin-left:0.75rem;">${done} / 3 completed</span>
                    <div class="mini-bar" style="margin-top:0.75rem;"><div class="mini-bar-fill" style="width:${Math.min(done/3*100,100)}%;"></div></div>
                </div>

                <div class="widget-grid">
                    <div class="widget">
                        <div class="widget-header"><h3 class="widget-title">📚 Continue Learning</h3></div>
                        ${App.enrolled.slice(0, 3).map(cid => {
                            const c = App.courses.find(x => x.id === cid);
                            return c ? `<div class="progress-item">
                                <div class="progress-icon" style="background:var(--primary-bg);color:var(--primary);"><i class='bx bx-book-open'></i></div>
                                <div class="progress-info"><div class="progress-name">${c.name}</div><div class="progress-pct">${c.difficulty||'Beginner'}</div></div>
                                <a href="course.html?id=${c.id}" class="btn btn-primary btn-xs">Resume</a>
                            </div>` : '';
                        }).join('') || '<p style="font-size:0.75rem;color:var(--gray-400);">No courses yet. <a href="course.html">Browse</a></p>'}
                    </div>
                    <div class="widget">
                        <div class="widget-header"><h3 class="widget-title">⚡ Quick Actions</h3></div>
                        <div class="quick-actions">
                            <button class="quick-action" onclick="window.location.href='course.html'"><i class='bx bx-search'></i> Find Courses</button>
                            <button class="quick-action" onclick="switchPage('challenges')"><i class='bx bx-target-lock'></i> Challenges</button>
                            <button class="quick-action" onclick="switchPage('goals')"><i class='bx bx-flag'></i> Set Goal</button>
                            <button class="quick-action" onclick="switchPage('certificates')"><i class='bx bx-certification'></i> Certificates</button>
                        </div>
                    </div>
                </div>`;
        }

        // ============ OTHER PAGES ============
        function renderCourses() {
            const enrolled = App.courses.filter(c => App.enrolled.includes(c.id));
            $('pageCourses').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">📚 My Courses (${enrolled.length})</h3></div>
                ${enrolled.length ? enrolled.map(c => `<div class="progress-item">
                    <div class="progress-icon" style="background:var(--primary-bg);color:var(--primary);"><i class='bx bx-book-open'></i></div>
                    <div class="progress-info"><div class="progress-name">${c.name}</div><div class="progress-pct">${c.difficulty||'All Levels'} • ${c.duration||0}h</div></div>
                    <a href="course.html?id=${c.id}" class="btn btn-primary btn-xs">View</a>
                </div>`).join('') : '<p style="color:var(--gray-400);padding:1rem;">No enrolled courses. <a href="course.html">Browse</a></p>'}
            </div>`;
        }

        function renderProgress() {
            const enrolled = App.courses.filter(c => App.enrolled.includes(c.id));
            $('pageProgress').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">📈 Learning Progress</h3></div>
                ${enrolled.length ? enrolled.map(c => {
                    const total = App.lessons.filter(l => { const m = App.modules.find(x => x.id === l.moduleId); return m && m.courseId === c.id; }).length;
                    const done = App.lessons.filter(l => { const m = App.modules.find(x => x.id === l.moduleId); return m && m.courseId === c.id && App.completed[l.id]; }).length;
                    const pct = total ? Math.round(done/total*100) : 0;
                    return `<div class="progress-item">
                        <div class="progress-icon" style="background:var(--primary-bg);color:var(--primary);"><i class='bx bx-book-open'></i></div>
                        <div class="progress-info"><div class="progress-name">${c.name}</div><div class="progress-pct">${done}/${total} lessons • ${pct}%</div><div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%;"></div></div></div>
                        <span style="font-weight:700;color:var(--success);">${pct}%</span>
                    </div>`;
                }).join('') : '<p style="color:var(--gray-400);padding:1rem;">No progress yet.</p>'}
            </div>`;
        }

        function renderAchievements() {
            const earned = JSON.parse(localStorage.getItem('ak_achievements') || '[]');
            const all = [
                { id:'first', name:'First Steps', icon:'👶', cond: Object.keys(App.completed).length >= 1 },
                { id:'five', name:'Learner', icon:'📚', cond: Object.keys(App.completed).length >= 5 },
                { id:'ten', name:'Scholar', icon:'🎓', cond: Object.keys(App.completed).length >= 10 },
                { id:'enroll', name:'Enrolled', icon:'🚀', cond: App.enrolled.length >= 1 },
                { id:'streak3', name:'3-Day Streak', icon:'🔥', cond: App.streak >= 3 },
                { id:'streak7', name:'7-Day Streak', icon:'💪', cond: App.streak >= 7 },
                { id:'sparks100', name:'100 Sparks', icon:'⭐', cond: App.sparks >= 100 },
                { id:'sparks500', name:'500 Sparks', icon:'🌟', cond: App.sparks >= 500 }
            ];
            $('pageAchievements').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🏆 Achievements</h3></div>
                <div class="achievement-grid">${all.map(a => {
                    const e = earned.find(x => x.id === a.id) || a.cond;
                    return `<div class="ach-card ${e ? 'earned' : 'locked'}"><span class="ach-icon">${a.icon}</span><div class="ach-name">${a.name}</div><div class="ach-date">${e ? 'Earned! 🎉' : 'Locked'}</div></div>`;
                }).join('')}</div></div>`;
        }

        function renderChallenges() {
            $('pageChallenges').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🎯 Challenges</h3></div>
                <div class="daily-challenge"><h3>Daily: Complete 3 Lessons</h3><p style="font-size:0.875rem;">Reward: +50 Sparks</p><span class="dc-reward"><i class='bx bxs-star'></i> +50</span></div>
                <div class="daily-challenge" style="background:linear-gradient(135deg,#FFF7ED,#FFEDD5);border-color:var(--orange);"><h3>Weekly: 7-Day Streak</h3><p style="font-size:0.875rem;">Reward: +200 Sparks</p><span class="dc-reward" style="background:#FFF7ED;color:var(--orange);"><i class='bx bxs-star'></i> +200</span></div>
            </div>`;
        }

        function renderLeague() {
            const tiers = ['Bronze','Silver','Gold','Platinum','Diamond','Master','Legend'];
            const currentTier = tiers[Math.min(Math.floor(App.sparks / 200), 6)];
            $('pageLeague').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">👑 League</h3></div>
                <div style="text-align:center;padding:2rem;">
                    <i class='bx bx-crown' style="font-size:4rem;color:var(--warning);display:block;margin-bottom:1rem;"></i>
                    <h2 style="font-family:'Space Grotesk',sans-serif;">${currentTier} Tier</h2>
                    <p style="color:var(--gray-500);">${App.sparks} Sparks • Rank #${Math.floor(Math.random()*1000)+100}</p>
                    <div class="level-bar" style="margin-top:1rem;"><div class="level-bar-fill" style="width:${(App.sparks%200)/200*100}%;"></div></div>
                    <p style="font-size:0.75rem;color:var(--gray-500);margin-top:0.25rem;">${200 - (App.sparks%200)} Sparks to next tier</p>
                </div></div>`;
        }

        function renderGoals() {
            $('pageGoals').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🎯 Goals</h3></div>
                <p style="color:var(--gray-400);padding:1rem;">Set your learning goals: Daily 30 min, Weekly 5 lessons, Monthly 1 course. <a href="#">Configure</a></p></div>`;
        }

        function renderCareer() {
            $('pageCareer').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">💼 Career Hub</h3></div>
                <p style="color:var(--gray-400);padding:1rem;">Based on your path: <strong>Frontend Developer</strong> • Skills needed: HTML, CSS, JavaScript, React. <a href="#">Explore careers</a></p></div>`;
        }

        function renderActivity() {
            const acts = Object.keys(App.completed).map(id => {
                const l = App.lessons.find(x => x.id === id);
                return l ? { title: l.title, date: 'Today' } : null;
            }).filter(Boolean).slice(0, 20);
            $('pageActivity').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🕐 Recent Activity</h3></div>
                ${acts.length ? acts.map(a => `<div class="progress-item"><div class="progress-icon" style="background:var(--success-bg);color:var(--success);"><i class='bx bx-check-circle'></i></div><div class="progress-info"><div class="progress-name">Completed: ${a.title}</div><div class="progress-pct">${a.date}</div></div></div>`).join('') : '<p style="color:var(--gray-400);padding:1rem;">No activity yet.</p>'}
            </div>`;
        }

        function renderCertificates() {
            $('pageCertificates').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">📜 Certificates</h3></div>
                <p style="color:var(--gray-400);padding:1rem;">Complete courses to earn certificates. <a href="certificate.html">View certificates</a></p></div>`;
        }

        function renderBookmarks() {
            const bm = JSON.parse(localStorage.getItem('ak_bookmarks') || '[]');
            $('pageBookmarks').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🔖 Bookmarks (${bm.length})</h3></div>
                ${bm.length ? bm.map(b => `<div class="progress-item"><div class="progress-icon" style="background:var(--warning-bg);color:var(--warning-dark);"><i class='bx bx-bookmark'></i></div><div class="progress-info"><div class="progress-name">${b.title||'Bookmark'}</div></div></div>`).join('') : '<p style="color:var(--gray-400);padding:1rem;">No bookmarks yet.</p>'}
            </div>`;
        }

        function renderFriends() {
            $('pageFriends').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">👥 Friends</h3></div>
                <p style="color:var(--gray-400);padding:1rem;">Coming soon! Invite friends to learn together.</p></div>`;
        }

        function renderProfile() {
            $('pageProfile').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">👤 Profile</h3></div>
                <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;">
                    <div class="sidebar-avatar" style="width:72px;height:72px;font-size:1.5rem;">${(App.userData.displayName||'S').charAt(0)}</div>
                    <div><h3>${App.userData.displayName||'Student'}</h3><p style="color:var(--gray-500);">${App.userData.email||''}</p><p style="color:var(--gray-500);">Level ${App.level} • ${App.sparks} Sparks</p></div>
                </div>
                <form id="profileForm">
                    <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="profName" value="${App.userData.displayName||''}"></div>
                    <div class="form-group"><label class="form-label">Bio</label><input class="form-input" id="profBio" value="${App.userData.bio||''}" placeholder="Tell us about yourself"></div>
                    <button class="btn btn-primary"><i class='bx bx-save'></i> Save</button>
                </form></div>`;
            $('profileForm')?.addEventListener('submit', async function(e) {
                e.preventDefault();
                const name = $('profName').value.trim();
                const bio = $('profBio').value.trim();
                if (!name) { toast('Name required', 'error'); return; }
                App.userData.displayName = name; App.userData.bio = bio;
                if (App.user?.uid) { try { await updateProfile(App.user, { displayName: name }); await setDoc(doc(db, 'users', App.user.uid), { displayName: name, bio }, { merge: true }); } catch (e) {} }
                updateUI(); toast('Profile updated!', 'success');
            });
        }

        function renderSettings() {
            $('pageSettings').innerHTML = `<div class="settings-grid">
                <div class="settings-card"><h4>🔔 Notifications</h4>
                    <div class="toggle-row"><span>Email Notifications</span><div class="toggle-switch on" onclick="this.classList.toggle('on')"></div></div>
                    <div class="toggle-row"><span>Achievement Alerts</span><div class="toggle-switch on" onclick="this.classList.toggle('on')"></div></div>
                    <div class="toggle-row"><span>Weekly Reports</span><div class="toggle-switch" onclick="this.classList.toggle('on')"></div></div>
                </div>
                <div class="settings-card"><h4>🎨 Appearance</h4>
                    <div class="form-group"><label class="form-label">Theme</label><select class="form-select"><option>Light</option><option>Dark</option><option>System</option></select></div>
                </div>
                <div class="settings-card"><h4>🔒 Security</h4>
                    <button class="btn btn-outline btn-sm" style="width:100%;margin-bottom:0.5rem;">Change Password</button>
                    <button class="btn btn-outline btn-sm" style="width:100%;">Manage Sessions</button>
                </div>
            </div>`;
        }

        function renderSupport() {
            $('pageSupport').innerHTML = `<div class="widget"><div class="widget-header"><h3 class="widget-title">🆘 Support</h3></div>
                <p style="color:var(--gray-400);padding:1rem;">Need help? <a href="help-center.html">Visit Help Center</a> • <a href="contact.html">Contact Support</a></p></div>`;
        }

        // ============ LOGOUT ============
        window.handleLogout = async function() {
            try { await signOut(auth); } catch (e) {}
            localStorage.removeItem('ak_user'); window.location.href = 'index.html';
        };

        window.switchPage = switchPage;

        // ============ INIT ============
        initAuth();
        console.log('🚀 Akademia Student Hub loaded!');
    </script>
</body>
</html>
